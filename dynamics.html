<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRXRKnTXILsjtEbTNQTCQI-Voi0H0mCOshu55mIbU6CZmtaCQWwVyNUrtPdvccCtuNyej6UJszLmZPV/pub?output=csv';

const MONTHS_UK=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

const CHART_COLORS=['#0071e3','#ff3b30','#34c759','#ff9500','#af52de','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c','#e67e22','#8e44ad','#2980b9','#27ae60','#d35400','#16a085','#c0392b','#7f8c8d','#f39c12','#2c3e50'];

const GROUP_HINTS=[
    {kw:['товарообіг','то ','то,'],cls:'badge-to'},
    {kw:['послуг','serv'],cls:'badge-serv'},
    {kw:['аксес','acc','акс'],cls:'badge-acc'},
    {kw:['чек','конвер','кпч','asp','шт'],cls:'badge-checks'},
];

// Правила підсумку
function summaryRule(name) {
    const lo = name.toLowerCase().trim();
    if (/лфл/.test(lo)) return {type:'none'};
    // % виконання — окремий рядок, не підсумовується стандартно
    if (/^%\s*викон/.test(lo)) return {type:'none'};
    // % метрики — ratio
    if (/послуги\s*%|послуг.*%/.test(lo)) return {type:'ratio', num:'Послуги грн', fallback:'Послуги'};
    if (/acc\s*%|аcc\s*%/.test(lo))       return {type:'ratio', num:'ACC'};
    if (/гурт\s*%/.test(lo))              return {type:'ratio', num:'Гурт'};
    // Конверсія — avg
    if (/конвер/.test(lo)) return {type:'avg'};
    // Абсолютні суми — включаючи ТО план
    if (/^то$|^то план$|товарообіг|трафік|^чеки$|послуги грн|^послуги$|^acc$|^аcc$|^гурт$/.test(lo)) return {type:'sum'};
    // Решта — avg
    return {type:'avg'};
}

// Хелпер: знайти назву метрики ТО і ТО план в allMetrics
function findMetricName(pattern){
    return allMetrics.find(m=>pattern.test(m.toLowerCase().trim()))||null;
}
function getTOPlanNames(){
    const to=findMetricName(/^то$/);
    const plan=findMetricName(/^то план$/)||findMetricName(/то.*план/)||findMetricName(/план.*то/);
    return {to,plan};
}
// Розрахунок % виконання для конкретного місяця/року
function calcFulfillment(y,m){
    const {to,plan}=getTOPlanNames();
    if(!to||!plan)return null;
    const toVal=parsedByYear[y]?.[to]?.[m];
    const planVal=parsedByYear[y]?.[plan]?.[m];
    if(toVal==null||planVal==null||planVal===0)return null;
    return (toVal/planVal)*100;
}
// Розрахунок % виконання за набором periods
function calcFulfillmentPeriod(periodsSet){
    const {to,plan}=getTOPlanNames();
    if(!to||!plan)return null;
    let toSum=0,planSum=0;
    for(const k of periodsSet){
        const[y,m]=k.split('_').map(Number);
        const tv=parsedByYear[y]?.[to]?.[m];
        const pv=parsedByYear[y]?.[plan]?.[m];
        if(tv!=null)toSum+=tv;
        if(pv!=null)planSum+=pv;
    }
    return planSum>0?(toSum/planSum)*100:null;
}
function hasFulfillmentData(){
    const {to,plan}=getTOPlanNames();
    return !!(to&&plan);
}

// STATE
let allYears=[],allMetrics=[],allMonths=[];
let selectedPeriods=new Set(); // "рік_місяць"
let selectedMetrics=new Set();
const yearColorMap={};
let viewMode='table',chartInstance=null;
let parsedByYear={};
let compareMode=false;
let periods1=new Set(); // Період 1
let periods2=new Set(); // Період 2
let tooltipEnabled=true;
let chartType='line';
let showFulfillment=true;

// CSV
function parseCSV(text){
    const rows=[];let row=[],col='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
        else if(c==='"')inQ=!inQ;
        else if(c===','&&!inQ){row.push(col.trim());col='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(col.trim());rows.push(row);row=[];col='';}
        else col+=c;
    }
    if(col||row.length){row.push(col.trim());rows.push(row);}
    return rows.filter(r=>r.some(c=>c));
}
const MMAP={'січень':1,'лютий':2,'березень':3,'квітень':4,'травень':5,'червень':6,'липень':7,'серпень':8,'вересень':9,'жовтень':10,'листопад':11,'грудень':12,'січ':1,'лют':2,'бер':3,'кві':4,'тра':5,'чер':6,'лип':7,'сер':8,'вер':9,'жов':10,'лис':11,'гру':12};
function mNum(s){const lo=(s||'').toLowerCase().trim();for(const[k,v]of Object.entries(MMAP))if(lo===k||lo.startsWith(k))return v;return null;}
function toN(v){if(!v&&v!==0)return null;const s=String(v).replace(/\s|\u00a0/g,'').replace('%','').replace(',','.');if(['#div/0!','#value!','#ref!','#n/a','#name?'].includes(s.toLowerCase()))return null;const n=parseFloat(s);return isNaN(n)?null:n;}
function fmt(v){if(v===null||v===undefined)return'—';const n=Number(v);if(isNaN(n))return String(v);if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+'М';if(Math.abs(n)>=1000)return(n/1000).toFixed(1)+'К';if(n%1!==0)return n.toFixed(2);return n.toLocaleString('uk-UA');}

function detectAndParse(rows){
    const header=rows[0];
    const metrics=header.slice(2).map(h=>h.trim()).filter(Boolean);
    allMetrics=metrics;
    let lastYear=null;
    const ms=new Set();
    rows.slice(1).forEach(row=>{
        const yr=parseInt((row[0]||'').trim());
        if(!isNaN(yr)&&yr>2000&&yr<2100)lastYear=yr;
        if(!lastYear)return;
        const mo=mNum((row[1]||'').trim());
        if(!mo)return;
        ms.add(mo);
        if(!parsedByYear[lastYear])parsedByYear[lastYear]={};
        metrics.forEach((m,i)=>{
            const v=toN(row[i+2]);if(v===null)return;
            if(!parsedByYear[lastYear][m])parsedByYear[lastYear][m]={};
            parsedByYear[lastYear][m][mo]=v;
        });
    });
    allYears=Object.keys(parsedByYear).map(Number).sort((a,b)=>b-a);
    allMonths=[...ms].sort((a,b)=>a-b);
    const step=Math.floor(CHART_COLORS.length/Math.max(allYears.length,1));
    allYears.forEach((y,i)=>{yearColorMap[y]=CHART_COLORS[(i*step)%CHART_COLORS.length];});
    // За замовчуванням — всі місяці всіх років
    allYears.forEach(y=>allMonths.forEach(m=>selectedPeriods.add(y+'_'+m)));
}

function activeMonths(y){ return allMonths.filter(m=>selectedPeriods.has(y+'_'+m)); }
function getAllPairs(){
    return allYears.flatMap(y=>
        allMonths.filter(m=>allMetrics.some(met=>parsedByYear[y]?.[met]?.[m]!=null))
                 .map(m=>({y,m,key:y+'_'+m}))
    );
}
// activePeriods — тільки пари з реальними даними для хоча б одного показника
function activePeriods(){
    return allYears.flatMap(y=>
        allMonths.filter(m=>
            selectedPeriods.has(y+'_'+m) &&
            allMetrics.some(met=>parsedByYear[y]?.[met]?.[m]!=null)
        ).map(m=>({y,m}))
    );
}
function yColor(y){return yearColorMap[y]||'#86868b';}
function dsColor(y,mi){const bi=CHART_COLORS.indexOf(yearColorMap[y]);return CHART_COLORS[(bi+mi*2)%CHART_COLORS.length];}
function badgeCls(name){const lo=name.toLowerCase();for(const g of GROUP_HINTS)if(g.kw.some(k=>lo.includes(k)))return g.cls;if(lo.includes('%')||lo.includes('доля')||lo.includes('конвер'))return'badge-pct';return'badge-other';}

function calcPeriodVal(metric, periodsSet){
    const rule=summaryRule(metric);
    if(rule.type==='none')return null;
    const pairs=[...periodsSet].map(k=>{const[y,m]=k.split('_');return{y:+y,m:+m};});
    if(!pairs.length)return null;

    if(rule.type==='sum'){
        return pairs.reduce((s,p)=>{
            const v=parsedByYear[p.y]?.[metric]?.[p.m];
            return s+(v!=null?v:0);
        },0);
    }
    if(rule.type==='avg'){
        const vals=pairs.map(p=>parsedByYear[p.y]?.[metric]?.[p.m]).filter(v=>v!=null);
        return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    }
    if(rule.type==='ratio'){
        const numKey=rule.num,fbKey=rule.fallback;
        let numSum=0,toSum=0;
        pairs.forEach(p=>{
            const numMv=parsedByYear[p.y]?.[numKey]||parsedByYear[p.y]?.[fbKey]||{};
            const toMv=parsedByYear[p.y]?.['ТО']||{};
            const nv=numMv[p.m];const tv=toMv[p.m];
            if(nv!=null)numSum+=nv;if(tv!=null)toSum+=tv;
        });
        return toSum>0?(numSum/toSum*100):null;
    }
    return null;
}

function renderCompareSummary(){
    const panel=document.getElementById('compareSummaryPanel');
    const grid=document.getElementById('compareSummaryGrid');
    grid.innerHTML='';
    if(!selectedMetrics.size){panel.style.display='none';return;}

    const metrics=[...selectedMetrics];
    const p1label=[...periods1].sort().map(k=>{const[y,m]=k.split('_');return MONTHS_UK[+m-1].slice(0,3)+' '+String(y).slice(2);}).join(', ');
    const p2label=[...periods2].sort().map(k=>{const[y,m]=k.split('_');return MONTHS_UK[+m-1].slice(0,3)+' '+String(y).slice(2);}).join(', ');

    metrics.forEach(metric=>{
        const rule=summaryRule(metric);
        if(rule.type==='none')return;

        const v1=calcPeriodVal(metric,periods1);
        const v2=calcPeriodVal(metric,periods2);
        if(v1===null&&v2===null)return;

        const isRatio=rule.type==='ratio'||rule.type==='avg';
        const n1=periods1.size,n2=periods2.size;

        const fmtVal=v=>v!=null?(isRatio?v.toFixed(2)+'%':fmt(v)):'—';
        const fmtAvg=v=>v!=null?(isRatio?v.toFixed(2)+'%':fmt(v)):'—';

        let diff=null,diffPct=null;
        if(v1!=null&&v2!=null){diff=v2-v1;diffPct=v1!==0?(diff/Math.abs(v1)*100):null;}
        const cls=diff==null?'flat':Math.abs(diff)<0.001?'flat':diff>0?'up':'down';
        const arrow=cls==='up'?'▲':cls==='down'?'▼':'→';
        const diffStr=diff==null?'н/д':(isRatio?(diff>0?'+':'')+diff.toFixed(2)+'%':(diff>0?'+':'')+fmt(Math.abs(diff)))+(diffPct!=null?' ('+diffPct.toFixed(1)+'%)':'');

        const card=document.createElement('div');card.className='cmp-card';
        card.innerHTML=`
            <div class="cmp-card-label">${metric}</div>
            <div class="cmp-row">
                <div class="cmp-row-lbl"><span class="p1-dot"></span> П1</div>
                <div class="cmp-row-val">${fmtVal(v1)}</div>
            </div>
            ${!isRatio&&n1>1?`<div class="cmp-row"><div class="cmp-row-lbl" style="padding-left:11px">Сер./міс</div><div class="cmp-row-val" style="color:#86868b;font-size:11px">${v1!=null?fmt(v1/n1):'—'}</div></div>`:''}
            <div class="cmp-row">
                <div class="cmp-row-lbl"><span class="p2-dot"></span> П2</div>
                <div class="cmp-row-val">${fmtVal(v2)}</div>
            </div>
            ${!isRatio&&n2>1?`<div class="cmp-row"><div class="cmp-row-lbl" style="padding-left:11px">Сер./міс</div><div class="cmp-row-val" style="color:#86868b;font-size:11px">${v2!=null?fmt(v2/n2):'—'}</div></div>`:''}
            <hr class="cmp-divider">
            <div class="cmp-row">
                <div class="cmp-row-lbl">Відхилення</div>
                <span class="cmp-delta ${cls}">${arrow} ${diffStr}</span>
            </div>`;
        grid.appendChild(card);
    });
    panel.style.display=grid.children.length?'block':'none';
}

            const c1=P1_SHADES[mi%P1_SHADES.length];

            const data1=Array.from({length:maxLen},(_,i)=>{const p=p1pairs[i];return p!=null?(parsedByYear[p.y]?.[metric]?.[p.m]??null):null;});
            const data2=Array.from({length:maxLen},(_,i)=>{const p=p2pairs[i];return p!=null?(parsedByYear[p.y]?.[metric]?.[p.m]??null):null;});
            const tt1=p1pairs.map(p=>MONTHS_UK[p.m-1].slice(0,3)+' '+p.y);
            const tt2=p2pairs.map(p=>MONTHS_UK[p.m-1].slice(0,3)+' '+p.y);
            while(tt1.length<maxLen) tt1.push('');while(tt2.length<maxLen) tt2.push('');
            const showFul=showFulfillment&&hasFul&&toName&&metric===toName;
            const ful1=showFul?Array.from({length:maxLen},(_,i)=>{const p=p1pairs[i];return p?calcFulfillment(p.y,p.m):null;}):null;
            const ful2=showFul?Array.from({length:maxLen},(_,i)=>{const p=p2pairs[i];return p?calcFulfillment(p.y,p.m):null;}):null;
            datasets.push({label:`${metric} (П1)`,data:data1,borderColor:c1,backgroundColor:c1+'18',pointBackgroundColor:c1,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:false,borderDash:[],_tt:tt1,_fulData:ful1});
            datasets.push({label:`${metric} (П2)`,data:data2,borderColor:c2,backgroundColor:c2+'18',pointBackgroundColor:c2,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:false,borderDash:[5,3],_tt:tt2,_fulData:ful2});
        });
        // % виконання як окремий датасет якщо вибраний
        if(fulSelected&&hasFul){
            const fulColor='#5856d6';
            const fd1=Array.from({length:maxLen},(_,i)=>{const p=p1pairs[i];return p?calcFulfillment(p.y,p.m):null;});
            const fd2=Array.from({length:maxLen},(_,i)=>{const p=p2pairs[i];return p?calcFulfillment(p.y,p.m):null;});
            datasets.push({label:'% вик (П1)',data:fd1,borderColor:fulColor,backgroundColor:fulColor+'18',pointBackgroundColor:fulColor,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:false,borderDash:[4,3],_isPctLine:true});
            datasets.push({label:'% вик (П2)',data:fd2,borderColor:'#af52de',backgroundColor:'#af52de18',pointBackgroundColor:'#af52de',pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:false,borderDash:[4,3],_isPctLine:true});
        }
    } else {
        const periods=activePeriods().sort((a,b)=>a.y-b.y||a.m-b.m);
        const years=[...new Set(periods.map(p=>p.y))].sort((a,b)=>a-b);
        const hasFul=hasFulfillmentData();
        const {to:toName}=getTOPlanNames();

        if(years.length>1){
            const uniqPairs=periods;
            labels=uniqPairs.map(p=>MONTHS_UK[p.m-1].slice(0,3)+' '+String(p.y).slice(2));
            metrics.forEach((metric,mi)=>{
                years.forEach(y=>{
                    const mv=parsedByYear[y]?.[metric]||{};
                    const color=dsColor(y,mi);
                    const data=uniqPairs.map(p=>p.y===y?(mv[p.m]??null):null);
                    const showFul=showFulfillment&&hasFul&&toName&&metric===toName;
                    const fulData=showFul?uniqPairs.map(p=>p.y===y?calcFulfillment(p.y,p.m):null):null;
                    datasets.push({label:`${metric} (${y})`,data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true,_fulData:fulData});
                });
            });
            if(fulSelected&&hasFul){
                years.forEach((y,yi)=>{
                    const colors=['#5856d6','#af52de','#ff3b30'];
                    const color=colors[yi%colors.length];
                    const data=uniqPairs.map(p=>p.y===y?calcFulfillment(p.y,p.m):null);
                    datasets.push({label:`% вик (${y})`,data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true,borderDash:[4,3],_isPctLine:true});
                });
            }
        } else {
            const y=years[0];
            const xMonths=[...new Set(periods.map(p=>p.m))].sort((a,b)=>a-b);
            labels=xMonths.map(m=>MONTHS_UK[m-1].slice(0,3));
            metrics.forEach((metric,mi)=>{
                const mv=parsedByYear[y]?.[metric]||{};
                const color=dsColor(y,mi);
                const data=xMonths.map(m=>mv[m]??null);
                const showFul=showFulfillment&&hasFul&&toName&&metric===toName;
                const fulData=showFul?xMonths.map(m=>calcFulfillment(y,m)):null;
                datasets.push({label:metric,data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true,_fulData:fulData});
            });
            if(fulSelected&&hasFul){
                const color='#5856d6';
                const data=xMonths.map(m=>calcFulfillment(y,m));
                datasets.push({label:'% виконання',data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true,borderDash:[4,3],_isPctLine:true});
            }
        }
    }
    if(chartInstance){chartInstance.destroy();chartInstance=null;}
    body.innerHTML='<div class="chart-wrap"><canvas id="dynChart"></canvas></div>';

    // Насичені кольори заливки для стовпців
    datasets.forEach(ds=>{
        if(chartType==='bar'){
            ds.backgroundColor=ds.borderColor+'cc';
        }
    });

    // datalabels для bar: показуємо значення + % виконання над стовпцем тільки для ТО
    const barDataLabelsConfig={
        display:(ctx)=>{
            const ds=ctx.dataset;
            if(ds._isPct)return false;
            return ctx.chart.getDatasetMeta(ctx.datasetIndex).hidden?false:true;
        },
        color:'#1d1d1f',
        backgroundColor:'rgba(255,255,255,0.95)',
        padding:4,
        font:{size:10,weight:'600',family:'Inter'},
        formatter:(value,ctx)=>{
            if(value===null||value===undefined)return'';
            const ds=ctx.dataset;
            const idx=ctx.dataIndex;
            if(ds._isPctLine) return value.toFixed(1)+'%';
            const ful=ds._fulData?ds._fulData[idx]:null;
            if(ful!==null&&ful!==undefined) return fmt(value)+'\n'+ful.toFixed(1)+'%';
            return fmt(value);
        },
        anchor:'end',
        align:'top',
        offset:4,
        borderWidth:1,
        borderColor:(ctx)=>ctx.dataset.borderColor+'60',
        borderRadius:4,
        clip:false
    };

    const smartLabels={
        id:'smartLabels',
        afterDatasetsDraw(chart){
            const ctx=chart.ctx;ctx.save();
            const FS=10,PX=5,PY=3,LH=FS+PY*2+2,GAP=3;
            ctx.font=`700 ${FS}px Inter,sans-serif`;

            // Збираємо всі точки: значення метрик + % виконання — в єдиний масив
            const pts=[];
            chart.data.datasets.forEach((ds,di)=>{
                if(ds._isPct)return;
                const meta=chart.getDatasetMeta(di);if(meta.hidden)return;
                // _isPctLine — % виконання як окремий датасет: форматуємо як %
                const isPctLine=!!ds._isPctLine;
                ds.data.forEach((val,pi)=>{
                    if(val===null||val===undefined)return;
                    const el=meta.data[pi];if(!el)return;
                    const text=isPctLine?val.toFixed(1)+'%':fmt(val);
                    const tw=ctx.measureText(text).width;
                    const good=isPctLine?(val>=100):true;
                    const color=isPctLine?(good?'#1a7f37':'#c0392b'):ds.borderColor;
                    const fillColor=isPctLine?(good?'rgba(52,199,89,0.13)':'rgba(255,59,48,0.10)'):'#fff';
                    const strokeColor=isPctLine?(good?'#34c759':'#ff3b30'):ds.borderColor;
                    pts.push({x:el.x,y:el.y,text,color,tw,fillColor,strokeColor});
                });
                // % виконання overlay для звичайних датасетів (через _fulData)
                if(ds._fulData){
                    ds._fulData.forEach((ful,pi)=>{
                        if(ful===null||ful===undefined)return;
                        const el=meta.data[pi];if(!el)return;
                        const text=ful.toFixed(1)+'%';
                        const tw=ctx.measureText(text).width;
                        const good=ful>=100;
                        pts.push({
                            x:el.x,
                            y:el.y-LH-GAP,
                            text,color:good?'#1a7f37':'#c0392b',tw,
                            fillColor:good?'rgba(52,199,89,0.13)':'rgba(255,59,48,0.10)',
                            strokeColor:good?'#34c759':'#ff3b30'
                        });
                    });
                }
            });

            // Антиколізійний алгоритм — групуємо по X, розштовхуємо по Y
            const byX={};
            pts.forEach(p=>{const k=Math.round(p.x/4)*4;if(!byX[k])byX[k]=[];byX[k].push(p);});
            Object.values(byX).forEach(grp=>{
                grp.sort((a,b)=>a.y-b.y);
                grp.forEach(p=>{p.ly=p.y-LH/2-6;});
                for(let it=0;it<30;it++){
                    let ch=false;
                    for(let i=1;i<grp.length;i++){
                        const pr=grp[i-1],cu=grp[i];
                        const df=(pr.ly+LH+GAP)-cu.ly;
                        if(df>0){pr.ly-=df/2;cu.ly+=df/2;ch=true;}
                    }
                    if(!ch)break;
                }
                grp.forEach(p=>{
                    const bw=p.tw+PX*2,bh=LH,bx=p.x-bw/2,by=p.ly-bh/2;
                    ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=4;ctx.shadowOffsetY=1;
                    ctx.fillStyle=p.fillColor;
                    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();
                    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
                    ctx.strokeStyle=p.strokeColor||p.color;ctx.lineWidth=1.2;
                    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.stroke();
                    ctx.fillStyle=p.color;ctx.font=`700 ${FS}px Inter,sans-serif`;
                    ctx.textAlign='center';ctx.textBaseline='middle';
                    ctx.fillText(p.text,p.x,by+bh/2);
                    ctx.textAlign='left';ctx.textBaseline='alphabetic';
                    // лінія від лейбла до точки якщо далеко
                    const lsy=by+bh;
                    if(p.y-lsy>8){
                        ctx.strokeStyle=(p.strokeColor||p.color)+'88';ctx.lineWidth=1;
                        ctx.setLineDash([2,2]);ctx.beginPath();
                        ctx.moveTo(p.x,lsy);ctx.lineTo(p.x,p.y-4);ctx.stroke();
                        ctx.setLineDash([]);
                    }
                });
            });
            ctx.restore();
        }
    };

    const ctx=document.getElementById('dynChart').getContext('2d');
    chartInstance=new Chart(ctx,{
        type:chartType,
        data:{labels,datasets},
        plugins:chartType==='line'?[smartLabels]:[ChartDataLabels],
        options:{
            responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
            layout:{padding:{top:chartType==='line'?50:45,left:8,right:8}},
            plugins:{
                legend:{display:datasets.length>1,position:'top',labels:{font:{family:'Inter',size:10},boxWidth:20,padding:10,
                    generateLabels(c){return c.data.datasets.map((ds,i)=>({text:ds.label,fillStyle:ds.borderColor,strokeStyle:ds.borderColor,lineWidth:2,hidden:c.getDatasetMeta(i).hidden,datasetIndex:i}));}}},
                tooltip:{enabled:tooltipEnabled,backgroundColor:'#1d1d1f',titleFont:{family:'Inter',size:12},bodyFont:{family:'Inter',size:11},padding:10,
                    callbacks:{label:c=>{const d=c.dataset._tt?.[c.dataIndex];return` ${c.dataset.label}${d?' ['+d+']':''}: ${fmt(c.raw)}`;}}},
                datalabels:chartType==='bar'?barDataLabelsConfig:false
            },
            scales:{
                x:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:compareMode?8:10},color:'#86868b',maxRotation:compareMode?45:0,minRotation:0}},
                y:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:10},color:'#86868b',callback:v=>fmt(v)}}
            }
        }
    });
    renderSummary();
    renderMiniChart();
}

// ── Міні порівняльний графік під summary ──
let miniChartInstances=[];
function renderMiniChart(){
    const panel=document.getElementById('miniChartPanel');
    const body=document.getElementById('miniChartBody');
    if(!compareMode||!selectedMetrics.size||(!periods1.size&&!periods2.size)){
        panel.style.display='none';
        miniChartInstances.forEach(c=>c.destroy());miniChartInstances=[];
        return;
    }
    panel.style.display='block';
    miniChartInstances.forEach(c=>c.destroy());miniChartInstances=[];
    body.innerHTML='';

    const P1C='#0071e3', P2C='#34c759';
    const n1=periods1.size, n2=periods2.size;

    const p1lbl=[...periods1].sort().map(k=>{const[y,m]=k.split('_');return MONTHS_UK[+m-1].slice(0,3)+' '+String(y).slice(2);}).join(', ');
    const p2lbl=[...periods2].sort().map(k=>{const[y,m]=k.split('_');return MONTHS_UK[+m-1].slice(0,3)+' '+String(y).slice(2);}).join(', ');

    // Хелпер: будує один горизонтальний міні-бар з дельтою
    function mkBar(title, blocks, deltaStr, deltaColor){
        const wrap=document.createElement('div');
        wrap.style.cssText='margin-bottom:22px';

        // Заголовок з дельтою
        const hdr=document.createElement('div');
        hdr.style.cssText='font-size:11px;font-weight:700;color:var(--text-sec);margin-bottom:8px;display:flex;align-items:center;gap:8px';
        hdr.innerHTML=`<span>${title}</span>`+(deltaStr?`<span style="font-weight:700;color:${deltaColor}">${deltaStr}</span>`:'');
        wrap.appendChild(hdr);

        blocks.forEach(b=>{
            if(b.v1===null&&b.v2===null)return;

            // Підзаголовок (Сума / Середнє)
            if(b.label){
                const sub=document.createElement('div');
                sub.style.cssText='font-size:10px;font-weight:600;color:#a0a0ab;margin-bottom:5px;margin-top:6px;text-transform:uppercase;letter-spacing:.04em';
                sub.textContent=b.label;
                wrap.appendChild(sub);
            }

            // Дельта для цього блоку
            let bDeltaStr='', bDeltaColor='#86868b';
            if(b.v1!=null&&b.v2!=null){
                const diff=b.v2-b.v1;
                const diffPct=b.v1!==0?(diff/Math.abs(b.v1)*100):null;
                const up=diff>0;
                bDeltaColor=up?'#1a7f37':'#c0392b';
                const arrow=up?'▲':'▼';
                if(b.isPercent){bDeltaStr=`${arrow} ${up?'+':''}${diff.toFixed(2)}%`;}
                else{bDeltaStr=`${arrow} ${up?'+':''}${fmt(Math.abs(diff))}`+(diffPct!=null?` (${diffPct.toFixed(1)}%)`:'');}
            }

            // Два рядки: П1 і П2
            [[b.v1,P1C,'П1',null],[b.v2,P2C,'П2',bDeltaStr]].forEach(([val,color,period,delta])=>{
                if(val===null||val===undefined)return;
                const valStr=b.fmt(val);
                const row=document.createElement('div');
                row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:4px';

                // Кольорова крапка
                const dot=document.createElement('span');
                dot.style.cssText=`display:inline-block;width:8px;height:8px;border-radius:2px;background:${color};flex-shrink:0`;
                row.appendChild(dot);

                // Підпис П1/П2
                const lbl=document.createElement('span');
                lbl.style.cssText='font-size:10px;font-weight:600;color:#6e6e73;width:22px;flex-shrink:0';
                lbl.textContent=period+':';
                row.appendChild(lbl);

                // Бар — займає весь вільний простір
                const barWrap=document.createElement('div');
                barWrap.style.cssText='flex:1;background:#f0f0f5;border-radius:4px;height:18px;overflow:hidden;min-width:60px';
                const barFill=document.createElement('div');
                const maxVal=Math.max(Math.abs(b.v1??0),Math.abs(b.v2??0));
                const pct=maxVal>0?Math.abs(val)/maxVal*100:50;
                barFill.style.cssText=`height:100%;width:${pct}%;background:${color}cc;border-radius:4px;transition:width .5s ease`;
                barWrap.appendChild(barFill);
                row.appendChild(barWrap);

                // Значення — фіксована ширина праворуч від бару
                const valEl=document.createElement('span');
                valEl.style.cssText=`font-size:11px;font-weight:700;color:${color};width:56px;text-align:right;flex-shrink:0`;
                valEl.textContent=valStr;
                row.appendChild(valEl);

                wrap.appendChild(row);
            });

            // Дельта — окремим рядком під барами (не стискає бар)
            if(bDeltaStr){
                const dRow=document.createElement('div');
                dRow.style.cssText='display:flex;justify-content:flex-end;margin-bottom:4px;margin-top:-1px';
                const dEl=document.createElement('span');
                dEl.style.cssText=`font-size:10px;font-weight:700;color:${bDeltaColor};white-space:nowrap`;
                dEl.textContent=bDeltaStr;
                dRow.appendChild(dEl);
                wrap.appendChild(dRow);
            }
        });
        body.appendChild(wrap);
    }

    // Перевірка чи метрика пов'язана з виконанням
    const {to:toName,plan:planName}=getTOPlanNames();
    const fulMetrics=new Set([toName,planName,'% виконання'].filter(Boolean));

    [...selectedMetrics].forEach(metric=>{
        if(metric==='% виконання')return; // обробляємо окремо
        const rule=summaryRule(metric);
        if(rule.type==='none')return;

        // isPercent — тільки справжні % метрики (ratio). avg — абсолютні числа (СРЧ, КТЧ, АСП...)
        const isPercent=rule.type==='ratio';
        const isAvg=rule.type==='avg';
        const isSum=rule.type==='sum';
        const v1=calcPeriodVal(metric,periods1);
        const v2=calcPeriodVal(metric,periods2);
        if(v1===null&&v2===null)return;

        const fmtV=v=>v!=null?(isPercent?v.toFixed(2)+'%':fmt(v)):'—';

        // Дельта для заголовка
        let deltaStr='',deltaColor='#86868b';
        if(v1!=null&&v2!=null){
            const diff=v2-v1;
            const diffPct=v1!==0?(diff/Math.abs(v1)*100):null;
            const up=diff>0;
            deltaColor=up?'#1a7f37':'#c0392b';
            const arrow=up?'▲':'▼';
            if(isPercent){
                deltaStr=`${arrow} ${up?'+':''}${diff.toFixed(2)}%`;
            } else {
                deltaStr=`${arrow} ${up?'+':''}${fmt(Math.abs(diff))}`+(diffPct!=null?` (${diffPct.toFixed(1)}%)`:'');
            }
        }

        const blocks=[];
        if(isSum){
            blocks.push({label:n1>1||n2>1?'Сума':'',v1,v2,fmt:fmtV,isPercent:false});
            if(n1>1||n2>1){
                const avg1=v1!=null?v1/n1:null;
                const avg2=v2!=null?v2/n2:null;
                blocks.push({label:'Середнє',v1:avg1,v2:avg2,fmt:v=>v!=null?fmt(v):'—',isPercent:false});
            }
        } else if(isPercent){
            blocks.push({label:'',v1,v2,fmt:fmtV,isPercent:true});
        } else {
            // avg — абсолютне значення (СРЧ, КТЧ, АСП тощо)
            blocks.push({label:n1>1||n2>1?'Середнє':'',v1,v2,fmt:fmtV,isPercent:false});
        }

        mkBar(metric, blocks, deltaStr, deltaColor);
    });

    // % виконання — тільки якщо є ТО і ТО план і хоча б одна з них вибрана або % вик вибраний
    const showFulBlock=hasFulfillmentData()&&(
        selectedMetrics.has(toName)||selectedMetrics.has(planName)||selectedMetrics.has('% виконання')
    );
    if(showFulBlock){
        const vf1=calcFulfillmentPeriod(periods1);
        const vf2=calcFulfillmentPeriod(periods2);
        if(vf1!==null||vf2!==null){
            let deltaStr='',deltaColor='#86868b';
            if(vf1!=null&&vf2!=null){
                const diff=vf2-vf1;const up=diff>0;deltaColor=up?'#1a7f37':'#c0392b';
                deltaStr=`${up?'▲':'▼'} ${up?'+':''}${diff.toFixed(1)}%`;
            }
            mkBar('% виконання плану',
                [{label:'',v1:vf1??0,v2:vf2??0,fmt:v=>v.toFixed(1)+'%',isRatio:true}],
                deltaStr,deltaColor
            );
        }
    }
}

// SUMMARY
// Обчислює "базове значення" метрики для порівняння (залежно від правила)
function calcBase(y, metric, rule, months){
    const mv=parsedByYear[y]?.[metric]||{};
    const vals=months.map(m=>mv[m]).filter(v=>v!==undefined&&v!==null);
    if(!vals.length)return null;
    if(rule.type==='sum') return vals.reduce((a,b)=>a+b,0);
    if(rule.type==='avg') return vals.reduce((a,b)=>a+b,0)/vals.length;
    if(rule.type==='ratio'){
        const numKey=rule.num,fbKey=rule.fallback;
        const numMv=parsedByYear[y]?.[numKey]||parsedByYear[y]?.[fbKey]||{};
        const toMv=parsedByYear[y]?.['ТО']||{};
        const numSum=months.map(m=>numMv[m]).filter(v=>v!=null).reduce((a,b)=>a+b,0);
        const toSum=months.map(m=>toMv[m]).filter(v=>v!=null).reduce((a,b)=>a+b,0);
        return toSum>0?(numSum/toSum*100):null;
    }
    return null;
}

function mkDeltaRow(prevYear, currYear, prevVal, currVal){
    const row=document.createElement('div');row.className='delta-row';
    const lbl=document.createElement('div');lbl.className='delta-label';
    lbl.textContent=`${prevYear}→${currYear}`;
    row.appendChild(lbl);

    const diff=currVal-prevVal;
    const pct=prevVal!==0?(diff/Math.abs(prevVal)*100):null;

    const badge=document.createElement('div');
    let cls, arrow, text;
    if(pct===null){cls='delta-flat';arrow='→';text='н/д';}
    else if(Math.abs(pct)<0.05){cls='delta-flat';arrow='→';text='0.00%';}
    else if(diff>0){cls='delta-up';arrow='▲';text='+'+pct.toFixed(2)+'%';}
    else{cls='delta-down';arrow='▼';text=pct.toFixed(2)+'%';}

    badge.className='delta-badge '+cls;
    badge.innerHTML=`<span class="delta-arrow">${arrow}</span>${text}`;
    row.appendChild(badge);
    return row;
}

function renderSummary(){
    const panel=document.getElementById('summaryPanel');
    const grid=document.getElementById('summaryGrid');grid.innerHTML='';
    const metrics=[...selectedMetrics];
    if(!metrics.length){panel.style.display='none';return;}

    if(compareMode){
        // В режимі порівняння — показуємо суму/середнє/відхилення саме за periods1 і periods2
        metrics.forEach(metric=>{
            const rule=summaryRule(metric);
            if(rule.type==='none')return;
            const v1=calcPeriodVal(metric,periods1);
            const v2=calcPeriodVal(metric,periods2);
            if(v1===null&&v2===null)return;

            const isRatio=rule.type==='ratio';
            const isAvg=rule.type==='avg';
            const n1=periods1.size,n2=periods2.size;
            // isRatio — справжні % (послуги%, acc%); isAvg — абсолютні середні (СРЧ, КТЧ...)
            const fmtV=v=>v!=null?(isRatio?v.toFixed(2)+'%':fmt(v)):'—';

            const card=document.createElement('div');card.className='summary-card';
            const lbl=document.createElement('div');lbl.className='summary-card-label';lbl.title=metric;lbl.textContent=metric;card.appendChild(lbl);
            const rowsEl=document.createElement('div');rowsEl.className='summary-rows';card.appendChild(rowsEl);

            // П1
            const yl1=document.createElement('div');
            yl1.style.cssText='font-size:10px;font-weight:700;color:#0071e3;margin-bottom:2px;display:flex;align-items:center;gap:4px';
            yl1.innerHTML='<span class="p1-dot"></span>Період 1';
            rowsEl.appendChild(yl1);
            if(isAvg){
                rowsEl.appendChild(mkSRow('Середнє',fmtV(v1),isRatio||isAvg));
            } else if(isRatio){
                rowsEl.appendChild(mkSRow('Частка від ТО',fmtV(v1),true));
            } else {
                rowsEl.appendChild(mkSRow('Сума',fmtV(v1)));
                if(n1>1) rowsEl.appendChild(mkSRow('Середнє',v1!=null?fmt(v1/n1):'—'));
            }

            const hr=document.createElement('hr');hr.className='summary-divider';rowsEl.appendChild(hr);

            // П2
            const yl2=document.createElement('div');
            yl2.style.cssText='font-size:10px;font-weight:700;color:#34c759;margin-bottom:2px;display:flex;align-items:center;gap:4px';
            yl2.innerHTML='<span class="p2-dot"></span>Період 2';
            rowsEl.appendChild(yl2);
            if(isAvg){
                rowsEl.appendChild(mkSRow('Середнє',fmtV(v2),isRatio||isAvg));
            } else if(isRatio){
                rowsEl.appendChild(mkSRow('Частка від ТО',fmtV(v2),true));
            } else {
                rowsEl.appendChild(mkSRow('Сума',fmtV(v2)));
                if(n2>1) rowsEl.appendChild(mkSRow('Середнє',v2!=null?fmt(v2/n2):'—'));
            }

            // Delta
            if(v1!=null&&v2!=null){
                const diff=v2-v1;
                const diffPct=v1!==0?(diff/Math.abs(v1)*100):null;
                const cls=Math.abs(diff)<0.001?'flat':diff>0?'up':'down';
                const arrow=cls==='up'?'▲':cls==='down'?'▼':'→';
                // isRatio — справжні % → показуємо різницю в %; isAvg/sum — абсолютно + %зміни
                let diffStr=isRatio?((diff>0?'+':'')+diff.toFixed(2)+'%'):((diff>0?'+':'')+fmt(Math.abs(diff)));
                if(diffPct!=null&&!isRatio) diffStr+=' ('+diffPct.toFixed(1)+'%)';
                const dRow=document.createElement('div');dRow.className='delta-row';
                const dLbl=document.createElement('div');dLbl.className='delta-label';dLbl.textContent='Відхилення П2 vs П1';
                const badge=document.createElement('div');badge.className='delta-badge '+cls;
                badge.innerHTML=`<span class="delta-arrow">${arrow}</span>${diffStr}`;
                dRow.appendChild(dLbl);dRow.appendChild(badge);
                rowsEl.appendChild(dRow);
            }

            if(rowsEl.children.length)grid.appendChild(card);
        });

        // ── Картка % виконання в режимі порівняння ──
        const {to:toNc,plan:planNc}=getTOPlanNames();
        const fulRelC=hasFulfillmentData()&&(
            selectedMetrics.has(toNc)||selectedMetrics.has(planNc)||selectedMetrics.has('% виконання')
        );
        if(fulRelC){
            const card=document.createElement('div');card.className='summary-card';
            card.style.borderColor='rgba(88,86,214,.3)';
            const lbl=document.createElement('div');lbl.className='summary-card-label';
            lbl.style.color='#5856d6';lbl.textContent='% виконання плану';card.appendChild(lbl);
            const rowsEl=document.createElement('div');rowsEl.className='summary-rows';card.appendChild(rowsEl);

            const vf1=calcFulfillmentPeriod(periods1);
            const vf2=calcFulfillmentPeriod(periods2);

            const fmtFul=v=>v!=null?v.toFixed(1)+'%':'—';
            const mkFulRow=(label,val,dotClass)=>{
                const yl=document.createElement('div');
                yl.style.cssText=dotClass==='p1'
                    ?'font-size:10px;font-weight:700;color:#0071e3;margin-bottom:2px;display:flex;align-items:center;gap:4px'
                    :'font-size:10px;font-weight:700;color:#34c759;margin-bottom:2px;display:flex;align-items:center;gap:4px';
                yl.innerHTML=`<span class="${dotClass}-dot"></span>${label}`;
                rowsEl.appendChild(yl);
                const row=document.createElement('div');row.className='summary-row';
                const l=document.createElement('div');l.className='summary-row-lbl';l.textContent='Виконання';
                const v=document.createElement('div');v.className='summary-row-val';
                if(val!==null){v.style.color=val>=100?'#1a7f37':'#c0392b';v.style.fontWeight='700';}
                v.textContent=fmtFul(val);
                row.appendChild(l);row.appendChild(v);rowsEl.appendChild(row);
            };
            mkFulRow('Період 1',vf1,'p1');
            const hr=document.createElement('hr');hr.className='summary-divider';rowsEl.appendChild(hr);
            mkFulRow('Період 2',vf2,'p2');

            if(vf1!=null&&vf2!=null){
                const diff=vf2-vf1;
                const cls=Math.abs(diff)<0.01?'flat':diff>0?'up':'down';
                const arrow=cls==='up'?'▲':cls==='down'?'▼':'→';
                const dRow=document.createElement('div');dRow.className='delta-row';
                const dLbl=document.createElement('div');dLbl.className='delta-label';dLbl.textContent='Відхилення П2 vs П1';
                const badge=document.createElement('div');badge.className='delta-badge '+cls;
                badge.innerHTML=`<span class="delta-arrow">${arrow}</span>${(diff>0?'+':'')+diff.toFixed(1)+'%'}`;
                dRow.appendChild(dLbl);dRow.appendChild(badge);rowsEl.appendChild(dRow);
            }
            if(rowsEl.children.length)grid.appendChild(card);
        }

        panel.style.display=grid.children.length?'block':'none';
        return;
    }

    // Звичайний режим (без порівняння)
    const periods=activePeriods();const years=[...new Set(periods.map(p=>p.y))].sort((a,b)=>a-b);const months=[...new Set(periods.map(p=>p.m))].sort((a,b)=>a-b);
    if(!periods.length){panel.style.display='none';return;}

    metrics.forEach(metric=>{
        const rule=summaryRule(metric);
        if(rule.type==='none')return;

        const card=document.createElement('div');card.className='summary-card';
        const lbl=document.createElement('div');lbl.className='summary-card-label';lbl.title=metric;lbl.textContent=metric;card.appendChild(lbl);
        const rowsEl=document.createElement('div');rowsEl.className='summary-rows';card.appendChild(rowsEl);

        // Зберігаємо базові значення для delta
        const baseVals={};

        years.forEach((y,yi)=>{
            const yMonths=allMonths.filter(m=>selectedPeriods.has(y+'_'+m));
            const mv=parsedByYear[y]?.[metric]||{};
            const vals=yMonths.map(m=>mv[m]).filter(v=>v!==undefined&&v!==null);
            if(!vals.length)return;
            const yc=yColor(y);
            if(yi>0){const hr=document.createElement('hr');hr.className='summary-divider';rowsEl.appendChild(hr);}
            if(years.length>1){
                const yl=document.createElement('div');
                yl.style.cssText=`font-size:10px;font-weight:700;color:${yc};margin-bottom:2px;display:flex;align-items:center;gap:4px`;
                yl.innerHTML=`<span class="year-dot" style="background:${yc}"></span>${y}`;
                rowsEl.appendChild(yl);
            }
            if(rule.type==='sum'){
                const sum=vals.reduce((a,b)=>a+b,0);
                const avg=sum/vals.length;
                baseVals[y]=sum;
                rowsEl.appendChild(mkSRow('Сума',fmt(sum)));
                rowsEl.appendChild(mkSRow('Середнє',fmt(avg)));
            } else if(rule.type==='avg'){
                const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
                baseVals[y]=avg;
                rowsEl.appendChild(mkSRow('Середнє',fmt(avg)));
            } else if(rule.type==='ratio'){
                const numKey=rule.num,fbKey=rule.fallback;
                const numMv=parsedByYear[y]?.[numKey]||parsedByYear[y]?.[fbKey]||{};
                const toMv=parsedByYear[y]?.['ТО']||{};
                const numSum=yMonths.map(m=>numMv[m]).filter(v=>v!=null).reduce((a,b)=>a+b,0);
                const toSum=yMonths.map(m=>toMv[m]).filter(v=>v!=null).reduce((a,b)=>a+b,0);
                const pct=toSum>0?(numSum/toSum*100):null;
                if(pct===null)return;
                baseVals[y]=pct;
                rowsEl.appendChild(mkSRow('Частка від ТО',pct.toFixed(2)+'%',true));
            }
        });

        // Delta між послідовними роками
        if(years.length>=2){
            for(let i=1;i<years.length;i++){
                const py=years[i-1],cy=years[i];
                if(baseVals[py]!=null&&baseVals[cy]!=null){
                    rowsEl.appendChild(mkDeltaRow(py,cy,baseVals[py],baseVals[cy]));
                }
            }
        }

        if(rowsEl.children.length)grid.appendChild(card);
    });

    // ── Картка % виконання за період — тільки якщо ТО, ТО план або % виконання вибрані ──
    const {to:toN,plan:planN}=getTOPlanNames();
    const fulRelevant=hasFulfillmentData()&&(
        selectedMetrics.has(toN)||selectedMetrics.has(planN)||selectedMetrics.has('% виконання')
    );
    if(fulRelevant){
        const card=document.createElement('div');card.className='summary-card';
        card.style.borderColor='rgba(88,86,214,.3)';
        const lbl=document.createElement('div');lbl.className='summary-card-label';
        lbl.style.color='#5856d6';lbl.textContent='% виконання плану';card.appendChild(lbl);
        const rowsEl=document.createElement('div');rowsEl.className='summary-rows';card.appendChild(rowsEl);

        years.forEach((y,yi)=>{
            const yMonths=allMonths.filter(m=>selectedPeriods.has(y+'_'+m));
            const val=calcFulfillmentPeriod(new Set(yMonths.map(m=>y+'_'+m)));
            if(val===null)return;
            const yc=yColor(y);
            if(yi>0){const hr=document.createElement('hr');hr.className='summary-divider';rowsEl.appendChild(hr);}
            if(years.length>1){
                const yl=document.createElement('div');
                yl.style.cssText=`font-size:10px;font-weight:700;color:${yc};margin-bottom:2px;display:flex;align-items:center;gap:4px`;
                yl.innerHTML=`<span class="year-dot" style="background:${yc}"></span>${y}`;
                rowsEl.appendChild(yl);
            }
            const good=val>=100;
            const row=document.createElement('div');row.className='summary-row';
            const l=document.createElement('div');l.className='summary-row-lbl';l.textContent='За період';
            const v=document.createElement('div');v.className='summary-row-val';
            v.style.color=good?'#1a7f37':'#c0392b';
            v.style.fontWeight='700';
            v.textContent=val.toFixed(1)+'%';
            row.appendChild(l);row.appendChild(v);rowsEl.appendChild(row);
        });
        if(rowsEl.children.length)grid.appendChild(card);
    }

    panel.style.display=grid.children.length?'block':'none';
}

function mkSRow(label,val,isPct=false){
    const row=document.createElement('div');row.className='summary-row';
    const l=document.createElement('div');l.className='summary-row-lbl';l.textContent=label;
    const v=document.createElement('div');v.className='summary-row-val'+(isPct?' pct':'');v.textContent=val;
    row.appendChild(l);row.appendChild(v);return row;
}

// VIEW
function setView(mode){
    viewMode=mode;
    document.getElementById('btnTable').classList.toggle('active',mode==='table');
    document.getElementById('btnChart').classList.toggle('active',mode==='chart');
    document.getElementById('tableSection').style.display=mode==='table'?'':'none';
    document.getElementById('chartPanel').classList.toggle('visible',mode==='chart');
    if(mode==='chart'){renderChart();renderMiniChart();}else renderSummary();
}

function showTableSkeleton(card, rows=12, cols=5){
    card.innerHTML='';
    const wrap=document.createElement('div');
    for(let r=0;r<rows;r++){
        const row=document.createElement('div');row.className='tbl-row-skel';
        for(let c=0;c<cols;c++){
            const cell=document.createElement('div');
            cell.className='tbl-row-skel-cell skel'+(c===0?' wide':'');
            cell.style.animationDelay=(r*0.04+c*0.015)+'s';
            row.appendChild(cell);
        }
        wrap.appendChild(row);
    }
    card.appendChild(wrap);
}

// INIT
async function init(){
    // Show skeleton immediately
    const card=document.getElementById('tableCard');
    showTableSkeleton(card, 12, 5);
    try{
        const res=await fetch(CSV_URL+'&t='+Date.now());
        if(!res.ok)throw new Error('HTTP '+res.status);
        const text=await res.text();
        const rows=parseCSV(text);
        if(!rows.length)throw new Error('Порожній файл');
        detectAndParse(rows);
        if(!allYears.length)throw new Error('Не вдалось розпізнати структуру');
        // Animate filters in
        const fw=document.querySelector('.filters-wrap');
        if(fw)fw.classList.add('appear');
        renderFilters();
        renderTable();
        setView('table');
    }catch(e){
        document.getElementById('tableCard').innerHTML=`<div class="status-box error">❌ ${e.message}</div>`;
        console.error(e);
    }
}
init();
</script>
