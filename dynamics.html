<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Динаміка показників</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    
    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-sec: #6e6e73;
            --accent: #0071e3;
            --border: #d2d2d7;
            --card: #fff;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 8px 10px 60px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── SKELETON + ANIMATION SYSTEM ── */
        @keyframes shimmer {
            0% { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .skel {
            background: linear-gradient(90deg, #eaeaed 25%, #f5f5f7 50%, #eaeaed 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 7px;
        }

        .tbl-row-skel {
            display: flex;
            gap: 8px;
            padding: 9px 10px;
            border-bottom: 1px solid #f2f2f4;
        }

        .tbl-row-skel-cell {
            height: 11px;
            border-radius: 5px;
            flex: 1;
        }

        .tbl-row-skel-cell.wide {
            flex: 2.5;
        }

        .metric-row.appear {
            animation: fadeInUp 0.28s ease both;
        }

        .filters-wrap.appear {
            animation: fadeIn 0.3s ease both;
        }

        /* NAVIGATION & UI */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 0;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: #e5e5ea;
            border-radius: 10px;
            padding: 3px;
            align-self: center;
        }

        .view-btn {
            border: none;
            background: transparent;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-btn.active {
            background: white;
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        /* BI FILTERS */
        .filters-wrap {
            background: var(--card);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 0;
            margin-bottom: 12px;
            overflow: hidden;
            display: flex;
            align-items: stretch;
            flex-wrap: wrap;
            border: 1px solid rgba(0,0,0,0.06);
            opacity: 0;
        }

        .filter-group {
            display: flex;
            align-items: flex-start;
            gap: 0;
            padding: 8px 12px;
            border-right: 1px solid #f0f0f2;
            flex-shrink: 0;
        }

        .filter-group.filter-months {
            flex: 1;
            min-width: 0;
            border-right: none;
        }

        .filter-group:last-child {
            border-right: none;
        }

        .filter-label {
            font-size: 10px;
            font-weight: 700;
            color: #a0a0ab;
            text-transform: uppercase;
            letter-spacing: .06em;
            white-space: nowrap;
            margin-right: 8px;
            user-select: none;
            padding-top: 5px;
        }

        .pills {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pill {
            border: none;
            background: transparent;
            padding: 4px 8px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            color: #6e6e73;
            transition: all 0.15s;
            white-space: nowrap;
            line-height: 1.4;
        }

        .pill:hover {
            background: #f2f2f7;
            color: #1d1d1f;
        }

        .pill.active {
            background: #1d1d1f;
            color: #fff;
        }

        .pill.year-active {
            background: #1d1d1f;
            color: #fff;
        }

        /* TABLE */
        .table-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 14px;
            border: 1px solid rgba(0,0,0,0.04);
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
        }

        th {
            text-align: center;
            padding: 6px 4px;
            color: var(--text-sec);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 4px 4px;
            border-bottom: 1px solid #f2f2f4;
            font-size: 11px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        tr:last-child td {
            border-bottom: none;
        }

        th.col-metric, td.col-metric {
            position: sticky;
            left: 0;
            background: white;
            z-index: 5;
            text-align: left;
            font-weight: 600;
            padding-left: 10px;
            box-shadow: 4px 0 8px -2px rgba(0,0,0,.1);
            border-right: 1px solid #e0e0e5;
            white-space: normal;
            word-break: break-word;
            line-height: 1.25;
            min-width: 110px;
            max-width: 110px;
            width: 110px;
            font-size: 10px;
            color: var(--text);
        }

        th.col-metric {
            z-index: 11;
            font-size: 9px;
        }

        tr.metric-row:hover td {
            background: #f0f4ff !important;
        }

        tr.metric-row.selected td {
            background: #e8f0fe !important;
        }

        tr.metric-row.selected td.col-metric {
            color: var(--accent);
            font-weight: 700;
        }

        /* BADGES */
        .badge {
            display: inline-block;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 5px;
            white-space: nowrap;
        }
        .badge-to    { background: rgba(0,113,227, 0.12); color: #1a50b8; }
        .badge-serv  { background: rgba(52,199,89, 0.12); color: #1a7f37; }
        .badge-acc   { background: rgba(255,149,0, 0.12); color: #b85000; }
        .badge-checks{ background: rgba(175,82,222, 0.12); color: #6d28d9; }
        .badge-pct   { background: rgba(134,134,139, 0.10); color: #6e6e73; }
        .badge-other { background: rgba(134,134,139, 0.08); color: #555; }

        /* CHART PANEL */
        .chart-panel {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 16px;
            display: none;
            border: 1px solid rgba(0,0,0,0.04);
            animation: fadeIn 0.3s ease;
        }

        .chart-panel.visible {
            display: block;
        }

        .chart-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-title {
            font-size: 15px;
            font-weight: 700;
        }

        .chart-subtitle {
            font-size: 11px;
            color: var(--text-sec);
            margin-top: 2px;
        }

        .selected-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            background: #f2f2f7;
            border: 1px solid transparent;
        }

        .chip:hover {
            background: #e5e5ea;
        }

        .chip .chip-x {
            opacity: 0.6;
            font-size: 13px;
            line-height: 1;
        }

        .chart-wrap {
            position: relative;
            height: 320px;
        }

        @media (max-width: 600px) {
            .chart-wrap { height: 240px; }
        }

        /* SUMMARY / TOTALS - ПОВЕРНУТО ОРИГІНАЛЬНИЙ ДИЗАЙН */
        .summary-panel {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }

        .summary-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 10px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 8px;
        }

        .summary-card {
            background: #f9f9fb;
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .summary-card-label {
            font-size: 10px;
            color: var(--text-sec);
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .summary-rows {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .summary-row-lbl {
            font-size: 10px;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .year-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .summary-row-val {
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
        }

        .delta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed #e0e0e5;
        }

        .delta-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .delta-up   { background: rgba(52,199,89, 0.15); color: #1a7f37; }
        .delta-down { background: rgba(255,59,48, 0.12); color: #c0392b; }

        /* COMPARE MODE UI */
        .compare-btn {
            border: none;
            background: #f0f0f5;
            border-radius: 9px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .compare-btn.on {
            background: #5856d6;
            color: #fff;
        }

        .period-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 6px;
        }
        .period-label.p1 { background: #e8f1fd; color: #1a50b8; }
        .period-label.p2 { background: #e3f8ec; color: #1a7f37; }

        .compare-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .cmp-card {
            background: #f9f9fb;
            border-radius: 12px;
            padding: 10px 12px;
            border: 1px solid var(--border);
        }

        .status-box { padding: 40px; text-align: center; color: var(--text-sec); font-size: 14px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px">
        <a href="index.html" class="back-link">← Назад</a>
        <div class="page-title">Динаміка показників</div>
    </div>
    <div class="view-toggle">
        <button class="view-btn active" id="btnTable" onclick="setView('table')">📋 Таблиця</button>
        <button class="view-btn" id="btnChart" onclick="setView('chart')">📈 Графік</button>
    </div>
</div>

<div class="filters-wrap" style="flex-direction:column;align-items:stretch">
    <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f0f0f2;flex-wrap:wrap">
        <span style="font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.06em">Режим аналізу</span>
        <button class="compare-btn" id="compareModeBtn" onclick="toggleCompareMode()">⚖️ Порівняння</button>
    </div>
    <div id="filterRow1" style="display:flex;align-items:flex-start;padding:7px 10px;flex-wrap:wrap;gap:4px">
        <span class="period-label p1" id="periodLabel1" style="display:none;margin-top:2px">Період 1</span>
        <div class="pills" id="yearPills" style="flex-wrap:wrap"></div>
    </div>
    <div id="filterRow2" style="display:none;border-top:1px solid #f0f0f2;padding:7px 10px;flex-wrap:wrap;gap:4px;align-items:flex-start">
        <span class="period-label p2" style="margin-top:2px">Період 2</span>
        <div class="pills" id="yearPills2" style="flex-wrap:wrap"></div>
    </div>
</div>

<div id="tableSection">
    <div class="table-card" id="tableCard"></div>
</div>

<div class="chart-panel" id="chartPanel">
    <div class="chart-top">
        <div>
            <div class="chart-title">Динаміка по місяцях</div>
            <div class="chart-subtitle" id="chartSubtitle">Оберіть показники у таблиці</div>
        </div>
        <div class="selected-chips" id="selectedChips"></div>
    </div>
    <div id="chartBody">
        <div class="chart-wrap">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
    
    <div class="summary-panel" id="summaryPanel" style="display:none">
        <div class="summary-title">Підсумки за обраний період</div>
        <div class="summary-grid" id="summaryGrid"></div>
    </div>

    <div class="summary-panel" id="compareSummaryPanel" style="display:none">
        <div class="summary-title">Порівняння періодів</div>
        <div class="compare-summary-grid" id="compareSummaryGrid"></div>
    </div>
</div>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRXRKnTXILsjtEbTNQTCQI-Voi0H0mCOshu55mIbU6CZmtaCQWwVyNUrtPdvccCtuNyej6UJszLmZPV/pub?output=csv';
const MONTHS_UK=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const CHART_COLORS=['#0071e3','#ff3b30','#34c759','#ff9500','#af52de','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c'];

Chart.register(ChartDataLabels);

function summaryRule(name) {
    const lo = name.toLowerCase().trim();
    if (/лфл/.test(lo)) return {type:'none'};
    if (/послуги\s*%|послуг.*%/.test(lo)) return {type:'ratio', num:'Послуги грн'};
    if (/acc\s*%|аcc\s*%/.test(lo)) return {type:'ratio', num:'ACC'};
    if (/^то$|товарообіг|трафік|^чеки$|послуги грн|^послуги$|^acc$|^аcc$|^гурт$/.test(lo)) return {type:'sum'};
    return {type:'avg'};
}

const GROUP_HINTS=[
    {kw:['товарообіг','то ','то,'],cls:'badge-to'},
    {kw:['послуг','serv'],cls:'badge-serv'},
    {kw:['аксес','acc','акс'],cls:'badge-acc'},
    {kw:['чек','конвер','кпч','asp','шт'],cls:'badge-checks'},
];

let allYears=[], allMetrics=[], allMonths=[];
let selectedPeriods=new Set(), selectedMetrics=new Set();
let parsedByYear={}, yearColorMap={};
let compareMode=false, periods1=new Set(), periods2=new Set();
let viewMode='table', chartInstance=null;

function parseCSV(text){
    const rows=[];let row=[],col='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
        else if(c==='"')inQ=!inQ;
        else if(c===','&&!inQ){row.push(col.trim());col='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(col.trim());rows.push(row);row=[];col='';}
        else col+=c;
    }
    if(col||row.length){row.push(col.trim());rows.push(row);}
    return rows.filter(r=>r.some(c=>c));
}

const MMAP={'січень':1,'лютий':2,'березень':3,'квітень':4,'травень':5,'червень':6,'липень':7,'серпень':8,'вересень':9,'жовтень':10,'листопад':11,'грудень':12};
function mNum(s){const lo=(s||'').toLowerCase().trim();for(const[k,v]of Object.entries(MMAP))if(lo.startsWith(k.slice(0,3)))return v;return null;}
function toN(v){if(!v&&v!==0)return null;const s=String(v).replace(/\s|\u00a0/g,'').replace('%','').replace(',','.');const n=parseFloat(s);return isNaN(n)?null:n;}
function fmt(v){
    if(v===null||v===undefined)return'—';
    const n=Number(v);
    if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+'М';
    if(Math.abs(n)>=1000)return(n/1000).toFixed(1)+'К';
    return n.toLocaleString('uk-UA');
}

function detectAndParse(rows){
    const header=rows[0];
    allMetrics=header.slice(2).map(h=>h.trim()).filter(Boolean);
    let lastYear=null; const ms=new Set();
    rows.slice(1).forEach(row=>{
        const yr=parseInt((row[0]||'').trim());
        if(!isNaN(yr)&&yr>2000)lastYear=yr;
        const mo=mNum((row[1]||'').trim());
        if(!mo || !lastYear)return; ms.add(mo);
        if(!parsedByYear[lastYear])parsedByYear[lastYear]={};
        allMetrics.forEach((m,i)=>{
            if(!parsedByYear[lastYear][m])parsedByYear[lastYear][m]={};
            parsedByYear[lastYear][m][mo]=toN(row[i+2]);
        });
    });
    allYears=Object.keys(parsedByYear).map(Number).sort((a,b)=>b-a);
    allMonths=[...ms].sort((a,b)=>a-b);
    allYears.forEach((y,i)=>yearColorMap[y]=CHART_COLORS[i%CHART_COLORS.length]);
    allYears.slice(0,1).forEach(y=>allMonths.forEach(m=>selectedPeriods.add(y+'_'+m)));
}

function renderFilters(){
    const yp=document.getElementById('yearPills'), yp2=document.getElementById('yearPills2');
    yp.innerHTML=''; yp2.innerHTML='';
    const renderTo=(cont, set, colorFn)=>{
        allYears.slice().sort().forEach(y=>{
            allMonths.filter(m=>parsedByYear[y]?.[allMetrics[0]]?.[m]!=null).forEach(m=>{
                const key=y+'_'+m;
                const btn=document.createElement('button');
                btn.className='pill'+(set.has(key)?' active':'');
                btn.textContent=MONTHS_UK[m-1].slice(0,3)+' '+String(y).slice(2);
                if(set.has(key)) btn.style.background=colorFn(y);
                btn.onclick=()=>{if(set.has(key))set.delete(key);else set.add(key);renderFilters();refreshAll();};
                cont.appendChild(btn);
            });
        });
    };
    if(compareMode){ renderTo(yp, periods1, ()=>'#0071e3'); renderTo(yp2, periods2, ()=>'#34c759'); }
    else renderTo(yp, selectedPeriods, (y)=>yearColorMap[y]);
}

function renderTable(){
    const card=document.getElementById('tableCard'); card.innerHTML='';
    const periods=compareMode?Array.from(new Set([...periods1,...periods2])).sort():Array.from(selectedPeriods).sort();
    if(!periods.length){card.innerHTML='<div class="status-box">Оберіть період</div>';return;}
    const tbl=document.createElement('table');
    let html='<thead><tr><th class="col-metric">Показник</th>';
    periods.forEach(p=>{const[y,m]=p.split('_');html+=`<th>${MONTHS_UK[m-1].slice(0,3)} ${y.slice(2)}</th>`;});
    html+='</tr></thead><tbody>';
    allMetrics.forEach(m=>{
        const isSel=selectedMetrics.has(m);
        let bCls='badge-other'; const mlo=m.toLowerCase();
        for(const h of GROUP_HINTS)if(h.kw.some(k=>mlo.includes(k))){bCls=h.cls;break;}
        html+=`<tr class="metric-row ${isSel?'selected':''} appear" onclick="toggleMetric('${m}')"><td class="col-metric">${m}</td>`;
        periods.forEach(p=>{const[y,mo]=p.split('_');html+=`<td><span class="badge ${bCls}">${fmt(parsedByYear[y]?.[m]?.[mo])}</span></td>`;});
        html+='</tr>';
    });
    tbl.innerHTML=html+'</tbody>'; card.appendChild(tbl);
}

function toggleMetric(m){if(selectedMetrics.has(m))selectedMetrics.delete(m);else selectedMetrics.add(m);refreshAll();}

function toggleCompareMode(){
    compareMode=!compareMode;
    document.getElementById('compareModeBtn').classList.toggle('on',compareMode);
    document.getElementById('filterRow2').style.display=compareMode?'flex':'none';
    document.getElementById('periodLabel1').style.display=compareMode?'':'none';
    if(compareMode&&periods1.size===0)selectedPeriods.forEach(k=>periods1.add(k));
    renderFilters(); refreshAll();
}

function setView(v){
    viewMode=v;
    document.getElementById('btnTable').classList.toggle('active',v==='table');
    document.getElementById('btnChart').classList.toggle('active',v==='chart');
    document.getElementById('tableSection').style.display=v==='table'?'block':'none';
    document.getElementById('chartPanel').classList.toggle('visible',v==='chart');
    if(v==='chart')renderChart();
}

function refreshAll(){
    renderTable();
    if(viewMode==='chart')renderChart();
    if(compareMode)renderCompareSummary();
    else if(viewMode==='chart')renderSummary();
}

// ПРАВКА: ТІЛЬКИ МІСЯЦІ НА ШКАЛІ
function renderChart(){
    const ctx=document.getElementById('mainChart').getContext('2d');
    if(chartInstance)chartInstance.destroy();
    
    // Беремо унікальні місяці для осі X
    const periods=compareMode?Array.from(new Set([...periods1,...periods2])).sort():Array.from(selectedPeriods).sort();
    const metrics=Array.from(selectedMetrics);
    if(!metrics.length)return;

    const datasets=metrics.map((m,idx)=>{
        const color=CHART_COLORS[idx%CHART_COLORS.length];
        return {
            label:m,
            data:periods.map(p=>{const[y,mo]=p.split('_');return parsedByYear[y]?.[m]?.[mo]}),
            borderColor:color,
            tension:0.35,
            borderWidth:3,
            datalabels: {
                align: 'top',
                font: { size: 10, weight: 'bold' },
                formatter: (v) => v === null ? '' : fmt(v),
                display: metrics.length <= 2
            }
        };
    });

    chartInstance=new Chart(ctx,{
        type:'line',
        data:{ 
            // Виводимо тільки коротку назву місяця
            labels:periods.map(p=>MONTHS_UK[p.split('_')[1]-1].slice(0,3)), 
            datasets 
        },
        options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{ datalabels: { clip: false }, legend: { position: 'bottom' } }
        }
    });
}

function calcPeriodVal(metric, periodsSet){
    const rule=summaryRule(metric); if(rule.type==='none')return null;
    const pairs=[...periodsSet].map(k=>{const[y,m]=k.split('_');return{y:+y,m:+m};});
    if(!pairs.length)return null;
    if(rule.type==='sum') return pairs.reduce((s,p)=>s+(parsedByYear[p.y]?.[metric]?.[p.m]||0),0);
    if(rule.type==='avg'){
        const v=pairs.map(p=>parsedByYear[p.y]?.[metric]?.[p.m]).filter(x=>x!=null);
        return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;
    }
    return null;
}

function renderSummary(){
    const grid=document.getElementById('summaryGrid'); grid.innerHTML='';
    selectedMetrics.forEach(m=>{
        const val=calcPeriodVal(m, selectedPeriods);
        grid.innerHTML+=`
        <div class="summary-card">
            <div class="summary-card-label">${m}</div>
            <div class="summary-row-val">${fmt(val)}</div>
        </div>`;
    });
    document.getElementById('summaryPanel').style.display=selectedMetrics.size?'block':'none';
}

function renderCompareSummary(){
    const grid=document.getElementById('compareSummaryGrid'); grid.innerHTML='';
    selectedMetrics.forEach(m=>{
        const v1=calcPeriodVal(m, periods1), v2=calcPeriodVal(m, periods2);
        const diff=(v2||0)-(v1||0);
        grid.innerHTML+=`
        <div class="cmp-card">
            <div class="cmp-card-label">${m}</div>
            <div>П1: ${fmt(v1)}</div>
            <div>П2: ${fmt(v2)}</div>
            <div class="cmp-delta ${diff>=0?'up':'down'}">${diff>=0?'+':''}${fmt(diff)}</div>
        </div>`;
    });
    document.getElementById('compareSummaryPanel').style.display=selectedMetrics.size?'block':'none';
}

function showTableSkeleton(card, rows=12, cols=5){
    card.innerHTML='';
    const wrap=document.createElement('div');
    for(let r=0;r<rows;r++){
        const row=document.createElement('div'); row.className='tbl-row-skel';
        for(let c=0;c<cols;c++) row.innerHTML+=`<div class="tbl-row-skel-cell skel ${c===0?'wide':''}"></div>`;
        wrap.appendChild(row);
    }
    card.appendChild(wrap);
}

async function init(){
    const card=document.getElementById('tableCard'); showTableSkeleton(card);
    try {
        const res=await fetch(CSV_URL+'&t='+Date.now());
        detectAndParse(parseCSV(await res.text()));
        document.querySelector('.filters-wrap').classList.add('appear');
        renderFilters(); renderTable();
    } catch(e) { card.innerHTML=`Помилка: ${e.message}`; }
}
init();
</script>
