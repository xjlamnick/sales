<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Динаміка показників</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-sec: #6e6e73;
            --accent: #0071e3;
            --border: #d2d2d7;
            --card: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);

            --c-to:     #0071e3;
            --c-serv:   #34c759;
            --c-acc:    #ff9500;
            --c-checks: #af52de;
            --c-other:  #86868b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 8px 10px 40px; min-height: 100vh; }

        /* ── NAV ── */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
        }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; white-space: nowrap; }
        .page-title { font-size: 20px; font-weight: 700; }

        /* ── VIEW TOGGLE ── */
        .view-toggle {
            display: flex; gap: 4px;
            background: #e5e5ea; border-radius: 10px; padding: 3px;
        }
        .view-btn {
            border: none; background: transparent; padding: 5px 12px;
            border-radius: 8px; font-size: 12px; font-weight: 600;
            cursor: pointer; color: var(--text-sec); font-family: inherit; transition: all 0.2s;
        }
        .view-btn.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

        /* ── YEAR TABS ── */
        .year-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .year-tab {
            border: 1.5px solid var(--border); background: white; padding: 5px 16px;
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
            font-family: inherit; color: var(--text-sec); transition: all 0.18s;
        }
        .year-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* ── TABLE ── */
        .table-card {
            background: var(--card); border-radius: 16px;
            box-shadow: var(--shadow); overflow-x: auto;
            -webkit-overflow-scrolling: touch; overscroll-behavior-x: contain;
            margin-bottom: 14px;
        }
        table { border-collapse: collapse; table-layout: fixed; width: 100%; }
        th {
            text-align: center; padding: 6px 4px; color: var(--text-sec);
            font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border); background: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: sticky; top: 0; z-index: 10;
        }
        td {
            padding: 4px 4px; border-bottom: 1px solid #f2f2f4;
            font-size: 11px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
        }
        tr:last-child td { border-bottom: none; }

        /* Sticky перший стовпець */
        th.col-metric, td.col-metric {
            position: sticky; left: 0; background: white; z-index: 5;
            text-align: left; font-weight: 600; padding-left: 10px;
            box-shadow: 4px 0 8px -2px rgba(0,0,0,0.1);
            border-right: 1px solid #e0e0e5;
            white-space: normal; word-break: break-word; line-height: 1.25;
            min-width: 110px; max-width: 110px; width: 110px;
            font-size: 10px; font-style: normal; color: var(--text);
        }
        th.col-metric { z-index: 11; font-size: 9px; }

        /* Група-заголовок */
        .group-row th {
            font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 5px 4px; border-bottom: 2px solid currentColor;
        }
        .g-to     { color: var(--c-to); }
        .g-serv   { color: var(--c-serv); }
        .g-acc    { color: var(--c-acc); }
        .g-checks { color: var(--c-checks); }
        .g-other  { color: var(--c-other); }

        /* Заголовки місяців */
        .month-header-row th { background: #fafafa; }

        /* Рядки метрик */
        tr.metric-row { transition: background 0.15s; }
        tr.metric-row:hover td { background: #f0f4ff !important; }
        tr.metric-row.selected td { background: #e8f0fe !important; }
        tr.metric-row.selected td.col-metric { color: var(--accent); font-weight: 700; }

        .badge {
            display: inline-block; border-radius: 6px; font-size: 10px; font-weight: 600;
            padding: 2px 5px; white-space: nowrap;
        }
        .badge-to     { background: rgba(0,113,227,0.12);   color: #1a50b8; }
        .badge-serv   { background: rgba(52,199,89,0.12);   color: #1a7f37; }
        .badge-acc    { background: rgba(255,149,0,0.12);   color: #b85000; }
        .badge-checks { background: rgba(175,82,222,0.12);  color: #6d28d9; }
        .badge-pct    { background: rgba(134,134,139,0.10); color: #6e6e73; }
        .badge-other  { background: rgba(134,134,139,0.08); color: #555; }

        /* Підказка-рядок зверху таблиці */
        .table-hint {
            font-size: 11px; color: var(--text-sec); padding: 8px 12px;
            border-bottom: 1px solid #f2f2f4; background: #fafafa;
            border-radius: 16px 16px 0 0;
            display: flex; align-items: center; gap: 6px;
        }
        .table-hint span { color: var(--accent); font-weight: 600; }

        /* ── CHART PANEL ── */
        .chart-panel {
            background: var(--card); border-radius: 16px;
            box-shadow: var(--shadow); padding: 16px;
            display: none;
        }
        .chart-panel.visible { display: block; }

        .chart-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
        }
        .chart-title { font-size: 15px; font-weight: 700; }
        .chart-subtitle { font-size: 11px; color: var(--text-sec); margin-top: 2px; }

        .selected-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip {
            display: flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: opacity 0.15s; user-select: none;
        }
        .chip .chip-x { opacity: 0.6; font-size: 13px; line-height: 1; }
        .chip:hover .chip-x { opacity: 1; }

        .chart-wrap { position: relative; height: 320px; }
        @media (max-width: 600px) { .chart-wrap { height: 220px; } }

        .empty-chart {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 200px; color: var(--text-sec); gap: 8px;
        }
        .empty-chart-icon { font-size: 36px; opacity: 0.4; }
        .empty-chart-text { font-size: 13px; font-weight: 500; }

        /* ── SKELETON ── */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }
        .skel {
            background: linear-gradient(90deg, #e8e8ed 25%, #f5f5f7 50%, #e8e8ed 75%);
            background-size: 600px 100%; animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 6px;
        }

        /* ── LOADING / ERROR ── */
        .status-box { padding: 40px; text-align: center; color: var(--text-sec); font-size: 14px; }
        .status-box.error { color: #ff3b30; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px">
        <a href="index.html" class="back-link">← Назад</a>
        <div>
            <div class="page-title">Динаміка показників</div>
        </div>
    </div>
    <div class="view-toggle">
        <button class="view-btn active" id="btnTable" onclick="setView('table')">📋 Таблиця</button>
        <button class="view-btn" id="btnChart" onclick="setView('chart')">📈 Графік</button>
    </div>
</div>

<!-- Вибір року -->
<div class="year-tabs" id="yearTabs"></div>

<!-- Таблиця -->
<div id="tableSection">
    <div class="table-card" id="tableCard">
        <div id="tableLoader" class="status-box">Завантаження…</div>
    </div>
</div>

<!-- Графік -->
<div class="chart-panel" id="chartPanel">
    <div class="chart-top">
        <div>
            <div class="chart-title">Динаміка по місяцях</div>
            <div class="chart-subtitle" id="chartSubtitle">Оберіть показники у таблиці</div>
        </div>
        <div class="selected-chips" id="selectedChips"></div>
    </div>
    <div id="chartBody">
        <div class="empty-chart">
            <div class="empty-chart-icon">📊</div>
            <div class="empty-chart-text">Натисніть на рядок у таблиці, щоб додати показник</div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRXRKnTXILsjtEbTNQTCQI-Voi0H0mCOshu55mIbU6CZmtaCQWwVyNUrtPdvccCtuNyej6UJszLmZPV/pub?output=csv';

const MONTHS_UK = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
                   'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

// Кольори для показників у графіку (циклічно)
// Великий набір перцептуально різних кольорів
const CHART_COLORS = [
    '#0071e3','#ff3b30','#34c759','#ff9500',
    '#af52de','#5856d6','#00b388','#ff6b35',
    '#c8392b','#1abc9c','#e67e22','#8e44ad',
    '#2980b9','#27ae60','#d35400','#16a085',
    '#c0392b','#7f8c8d','#f39c12','#2c3e50'
];

// Генерує унікальний колір для кожної пари (метрика, рік)
function getSeriesColor(metricIdx, yearIdx, totalYears) {
    if (totalYears <= 1) {
        // 1 рік — просто по індексу метрики
        return CHART_COLORS[metricIdx % CHART_COLORS.length];
    }
    // Кілька років: розподіляємо кольори рівномірно по всій палітрі
    // щоб одна метрика в різних роках мала максимально різні кольори
    const totalMetrics = arguments[3] || 1;
    const idx = yearIdx * totalMetrics + metricIdx;
    return CHART_COLORS[idx % CHART_COLORS.length];
}

// Групи для визначення badge-кольору рядка
// Якщо перша колонка (назва) містить ключові слова — призначаємо клас
const GROUP_HINTS = [
    { kw: ['товарообіг','то ','то,','план то','факт то'], cls: 'badge-to' },
    { kw: ['послуг','serv'], cls: 'badge-serv' },
    { kw: ['аксес','acc','акс'], cls: 'badge-acc' },
    { kw: ['чек','конвер','кпч','asp','шт'], cls: 'badge-checks' },
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let allYears = [];
let allMetrics = [];
let selectedYears = new Set();   // мультивибір років
let selectedMetrics = new Set();
let viewMode = 'table';
let chartInstance = null;
let parsedByYear = {};           // parsedByYear[year][metric][month] = value

// ═══════════════════════════════════════════════════════════
// CSV PARSE
// ═══════════════════════════════════════════════════════════
function parseCSV(text) {
    const rows = []; let row = [], col = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (c==='"' && text[i+1]==='"') { col+='"'; i++; }
        else if (c==='"') inQ = !inQ;
        else if (c===',' && !inQ) { row.push(col.trim()); col = ''; }
        else if ((c==='\n'||c==='\r') && !inQ) {
            if (c==='\r' && text[i+1]==='\n') i++;
            row.push(col.trim()); rows.push(row); row = []; col = '';
        } else col += c;
    }
    if (col||row.length) { row.push(col.trim()); rows.push(row); }
    return rows.filter(r => r.some(c => c));
}

const MONTHS_MAP = {
    'січень':1,'лютий':2,'березень':3,'квітень':4,'травень':5,'червень':6,
    'липень':7,'серпень':8,'вересень':9,'жовтень':10,'листопад':11,'грудень':12,
    'січ':1,'лют':2,'бер':3,'кві':4,'тра':5,'чер':6,
    'лип':7,'сер':8,'вер':9,'жов':10,'лис':11,'гру':12,
};
function monthNum(str) {
    const lo = (str||'').toLowerCase().trim();
    for (const [k,v] of Object.entries(MONTHS_MAP)) {
        if (lo === k || lo.startsWith(k)) return v;
    }
    return null;
}
function toNum(v) {
    if (!v && v !== 0) return null;
    const s = String(v).replace(/\s|\u00a0/g,'').replace('%','').replace(',','.');
    if (['#div/0!','#value!','#ref!','#n/a','#name?'].includes(s.toLowerCase())) return null;
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
}
function fmtVal(v) {
    if (v === null || v === undefined) return '—';
    const n = Number(v);
    if (isNaN(n)) return String(v);
    if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(2) + 'М';
    if (Math.abs(n) >= 1000)    return (n/1000).toFixed(1) + 'К';
    if (n % 1 !== 0)            return n.toFixed(2);
    return n.toLocaleString('uk-UA');
}

function detectAndParse(rows) {
    if (!rows.length) return;
    const header = rows[0];
    const metrics = header.slice(2).map(h => h.trim()).filter(Boolean);
    allMetrics = metrics;
    let lastYear = null;
    rows.slice(1).forEach(row => {
        const rawYear  = (row[0] || '').trim();
        const rawMonth = (row[1] || '').trim();
        const yr = parseInt(rawYear);
        if (!isNaN(yr) && yr > 2000 && yr < 2100) lastYear = yr;
        if (!lastYear) return;
        const mo = monthNum(rawMonth);
        if (!mo) return;
        if (!parsedByYear[lastYear]) parsedByYear[lastYear] = {};
        metrics.forEach((metric, mi) => {
            const val = toNum(row[mi + 2]);
            if (val === null) return;
            if (!parsedByYear[lastYear][metric]) parsedByYear[lastYear][metric] = {};
            parsedByYear[lastYear][metric][mo] = val;
        });
    });
    allYears = Object.keys(parsedByYear).map(Number).sort((a,b) => b - a);
    // За замовчуванням обираємо найновіший рік
    if (allYears.length) selectedYears.add(allYears[0]);
}

// ═══════════════════════════════════════════════════════════
// BADGE COLOR
// ═══════════════════════════════════════════════════════════
function badgeClass(name) {
    const lo = name.toLowerCase();
    for (const g of GROUP_HINTS) {
        if (g.kw.some(k => lo.includes(k))) return g.cls;
    }
    if (lo.includes('%') || lo.includes('доля') || lo.includes('конвер')) return 'badge-pct';
    return 'badge-other';
}

// ═══════════════════════════════════════════════════════════
// RENDER TABLE — показує дані для ВСІХ обраних років
// ═══════════════════════════════════════════════════════════
function renderTable() {
    const card = document.getElementById('tableCard');
    card.innerHTML = '';

    const years = [...selectedYears].sort((a,b) => a-b);
    if (!years.length) {
        card.innerHTML = '<div class="status-box">Оберіть рік</div>';
        return;
    }

    // Збираємо всі місяці по всіх обраних роках
    const monthsSet = new Set();
    years.forEach(y => {
        Object.values(parsedByYear[y] || {}).forEach(mv =>
            Object.keys(mv).forEach(m => monthsSet.add(+m))
        );
    });
    const months = [...monthsSet].sort((a,b) => a-b);

    if (!months.length) {
        card.innerHTML = '<div class="status-box">Немає даних</div>';
        return;
    }

    const hint = document.createElement('div');
    hint.className = 'table-hint';
    hint.innerHTML = `<span>💡</span> Натисніть на рядок щоб додати показник на <span>графік</span>`;
    card.appendChild(hint);

    const wrap = document.createElement('div');
    wrap.style.cssText = 'overflow-x:auto;-webkit-overflow-scrolling:touch;';
    card.appendChild(wrap);

    // Ширина: якщо кілька років — менша колонка
    const colW = Math.max(44, Math.floor((window.innerWidth - 115) / (months.length * years.length)));
    const totalW = 115 + colW * months.length * years.length;

    const tbl = document.createElement('table');
    tbl.style.width = totalW + 'px';

    // Colgroup
    const cg = document.createElement('colgroup');
    const c0 = document.createElement('col'); c0.style.width = '115px'; cg.appendChild(c0);
    years.forEach(() => months.forEach(() => {
        const c = document.createElement('col'); c.style.width = colW+'px'; cg.appendChild(c);
    }));
    tbl.appendChild(cg);

    const thead = document.createElement('thead');

    // Рядок 1: групи по роках (якщо > 1 рік)
    if (years.length > 1) {
        const trY = document.createElement('tr');
        const thCorner = document.createElement('th');
        thCorner.className = 'col-metric'; thCorner.rowSpan = 2;
        thCorner.textContent = 'Показник';
        trY.appendChild(thCorner);
        years.forEach((y, yi) => {
            const th = document.createElement('th');
            th.colSpan = months.length;
            th.textContent = y;
            th.style.cssText = `font-weight:800;font-size:11px;border-bottom:2px solid ${CHART_COLORS[yi % CHART_COLORS.length]};color:${CHART_COLORS[yi % CHART_COLORS.length]};`;
            if (yi > 0) th.classList.add('grp-start');
            trY.appendChild(th);
        });
        thead.appendChild(trY);

        // Рядок 2: місяці під кожним роком
        const trM = document.createElement('tr');
        years.forEach((y, yi) => {
            months.forEach((m, mi) => {
                const th = document.createElement('th');
                th.textContent = MONTHS_UK[m-1]?.slice(0,3) || m;
                if (mi === 0 && yi > 0) th.classList.add('grp-start');
                trM.appendChild(th);
            });
        });
        thead.appendChild(trM);
    } else {
        // Один рік — простий заголовок
        const trH = document.createElement('tr');
        const thN = document.createElement('th');
        thN.className = 'col-metric'; thN.textContent = 'Показник';
        trH.appendChild(thN);
        months.forEach(m => {
            const th = document.createElement('th');
            th.textContent = MONTHS_UK[m-1] || m;
            trH.appendChild(th);
        });
        thead.appendChild(trH);
    }
    tbl.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    allMetrics.forEach(metric => {
        // Перевіряємо чи є дані хоч в одному обраному році
        const hasData = years.some(y => parsedByYear[y]?.[metric]);
        if (!hasData) return;

        const tr = document.createElement('tr');
        tr.className = 'metric-row';
        tr.dataset.metric = metric;
        if (selectedMetrics.has(metric)) tr.classList.add('selected');

        const tdN = document.createElement('td');
        tdN.className = 'col-metric';
        tdN.textContent = metric;
        tr.appendChild(tdN);

        const bc = badgeClass(metric);
        years.forEach((y, yi) => {
            const mv = parsedByYear[y]?.[metric] || {};
            months.forEach((m, mi) => {
                const val = mv[m];
                const td = document.createElement('td');
                if (mi === 0 && yi > 0) td.classList.add('grp-start');
                if (val !== undefined && val !== null) {
                    const sp = document.createElement('span');
                    sp.className = 'badge ' + (selectedMetrics.has(metric) ? bc : 'badge-other');
                    sp.textContent = fmtVal(val);
                    td.appendChild(sp);
                } else {
                    td.textContent = '—'; td.style.color = '#ccc';
                }
                tr.appendChild(td);
            });
        });

        tr.addEventListener('click', () => toggleMetric(metric));
        tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
}

// ═══════════════════════════════════════════════════════════
// TOGGLE METRIC
// ═══════════════════════════════════════════════════════════
function toggleMetric(metric) {
    if (selectedMetrics.has(metric)) selectedMetrics.delete(metric);
    else selectedMetrics.add(metric);

    document.querySelectorAll('tr.metric-row').forEach(tr => {
        const m = tr.dataset.metric;
        const sel = selectedMetrics.has(m);
        tr.classList.toggle('selected', sel);
        tr.querySelectorAll('.badge').forEach(sp => {
            sp.className = 'badge ' + (sel ? badgeClass(m) : 'badge-other');
        });
    });
    renderChips();
    renderChart();

    if (selectedMetrics.size === 1 && viewMode === 'table') {
        const btn = document.getElementById('btnChart');
        btn.style.background = '#e8f0fe'; btn.style.color = 'var(--accent)';
        setTimeout(() => { btn.style.background = ''; btn.style.color = ''; }, 1500);
    }
}

// ═══════════════════════════════════════════════════════════
// CHIPS
// ═══════════════════════════════════════════════════════════
function renderChips() {
    const cont = document.getElementById('selectedChips');
    cont.innerHTML = '';
    const years = [...selectedYears].sort((a,b) => a-b);
    const metrics = [...selectedMetrics];
    // Генеруємо чипи для кожної комбінації метрика × рік
    const YEAR_STEP_C = Math.max(1, Math.floor(CHART_COLORS.length / Math.max(years.length, 1)));
    years.forEach((y, yi) => {
        metrics.forEach((metric, mi) => {
            const colorIdx = (yi * YEAR_STEP_C + mi) % CHART_COLORS.length;
            const color = CHART_COLORS[colorIdx];
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.style.cssText = `background:${color}22;color:${color};border:1.5px solid ${color}55;`;
            const label = years.length > 1 ? `${metric} (${y})` : metric;
            chip.innerHTML = `<span>${label}</span><span class="chip-x">✕</span>`;
            chip.addEventListener('click', () => toggleMetric(metric));
            cont.appendChild(chip);
        });
    });

    const yrs = [...selectedYears].sort((a,b)=>a-b).join(', ');
    const sub = document.getElementById('chartSubtitle');
    sub.textContent = selectedMetrics.size
        ? `Обрано: ${selectedMetrics.size} показник${selectedMetrics.size > 1 ? 'и' : ''} • ${yrs}`
        : 'Оберіть показники у таблиці';
}

// ═══════════════════════════════════════════════════════════
// CHART — підписи без накладань
// ═══════════════════════════════════════════════════════════
function renderChart() {
    const body = document.getElementById('chartBody');

    if (!selectedMetrics.size) {
        if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
        body.innerHTML = `<div class="empty-chart">
            <div class="empty-chart-icon">📊</div>
            <div class="empty-chart-text">Натисніть на рядок у таблиці, щоб додати показник</div>
        </div>`;
        return;
    }

    const years = [...selectedYears].sort((a,b) => a-b);
    const metrics = [...selectedMetrics];

    // Місяці: об'єднуємо всі наявні по всіх роках
    const monthsSet = new Set();
    years.forEach(y => metrics.forEach(m => {
        Object.keys(parsedByYear[y]?.[m] || {}).forEach(mo => monthsSet.add(+mo));
    }));
    const months = [...monthsSet].sort((a,b) => a-b);
    const labels = months.map(m => MONTHS_UK[m-1]?.slice(0,3) || m);

    // Будуємо datasets — колір залежить від (yearIdx, metricIdx)
    // Роки розносяться максимально далеко по палітрі, метрики — зміщення
    const datasets = [];
    const YEAR_STEP = Math.max(1, Math.floor(CHART_COLORS.length / Math.max(years.length, 1)));

    years.forEach((y, yi) => {
        metrics.forEach((metric, mi) => {
            const mv = parsedByYear[y]?.[metric] || {};
            // yi*YEAR_STEP — великий крок між роками (напр. 0, 5, 10...)
            // mi — маленький зсув між метриками одного року
            const colorIdx = (yi * YEAR_STEP + mi) % CHART_COLORS.length;
            const color = CHART_COLORS[colorIdx];
            const label = years.length > 1 ? `${metric} (${y})` : metric;
            datasets.push({
                label,
                data: months.map(m => mv[m] ?? null),
                borderColor: color,
                backgroundColor: color + '18',
                pointBackgroundColor: color,
                pointBorderColor: '#fff',
                pointBorderWidth: 1.5,
                pointRadius: 4,
                pointHoverRadius: 7,
                tension: 0.35,
                fill: false,
                spanGaps: true,
                _metric: metric,
                _year: y,
            });
        });
    });

    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    body.innerHTML = '<div class="chart-wrap"><canvas id="dynChart"></canvas></div>';

    // Плагін для підписів значень без накладань
    const datalabelPlugin = {
        id: 'smartLabels',
        afterDatasetsDraw(chart) {
            const ctx = chart.ctx;
            ctx.save();

            // Збираємо всі позиції точок з їх значеннями
            const points = [];
            chart.data.datasets.forEach((ds, di) => {
                const meta = chart.getDatasetMeta(di);
                if (meta.hidden) return;
                ds.data.forEach((val, pi) => {
                    if (val === null || val === undefined) return;
                    const el = meta.data[pi];
                    if (!el) return;
                    points.push({
                        x: el.x, y: el.y,
                        val, color: ds.borderColor,
                        placed: false, labelY: null,
                    });
                });
            });

            // Групуємо по x (місяць) і розміщуємо підписи без накладань
            const byX = {};
            points.forEach(p => {
                const key = Math.round(p.x);
                if (!byX[key]) byX[key] = [];
                byX[key].push(p);
            });

            const FONT_SIZE = 10;
            const PAD_X = 4, PAD_Y = 3;
            const LABEL_H = FONT_SIZE + PAD_Y * 2 + 2;
            const GAP = 4;

            ctx.font = `600 ${FONT_SIZE}px Inter, sans-serif`;
            points.forEach(p => { p.text = fmtVal(p.val); p.tw = ctx.measureText(p.text).width; });

            Object.values(byX).forEach(group => {
                group.sort((a, b) => a.y - b.y);
                group.forEach(p => { p.labelY = p.y - PAD_Y - FONT_SIZE / 2 - 6; });

                for (let iter = 0; iter < 20; iter++) {
                    let changed = false;
                    for (let i = 1; i < group.length; i++) {
                        const prev = group[i - 1];
                        const cur  = group[i];
                        const diff = (prev.labelY + LABEL_H + GAP) - cur.labelY;
                        if (diff > 0) {
                            prev.labelY -= diff / 2;
                            cur.labelY  += diff / 2;
                            changed = true;
                        }
                    }
                    if (!changed) break;
                }

                group.forEach(p => {
                    const bx = p.x - p.tw / 2 - PAD_X;
                    const by = p.labelY - FONT_SIZE - PAD_Y;
                    const bw = p.tw + PAD_X * 2;
                    const bh = FONT_SIZE + PAD_Y * 2;

                    // Тінь
                    ctx.shadowColor = 'rgba(0,0,0,0.18)';
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetY = 1;

                    // Білий фон
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.roundRect(bx, by, bw, bh, 4);
                    ctx.fill();

                    // Бордер
                    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.roundRect(bx, by, bw, bh, 4);
                    ctx.stroke();

                    // Текст
                    ctx.fillStyle = p.color;
                    ctx.font = `700 ${FONT_SIZE}px Inter, sans-serif`;
                    ctx.fillText(p.text, p.x - p.tw / 2, p.labelY);

                    // Пунктирна лінія від підпису до точки
                    const lineStartY = by + bh;
                    if (p.y - lineStartY > 6) {
                        ctx.strokeStyle = p.color + '66';
                        ctx.lineWidth = 1;
                        ctx.setLineDash([2, 2]);
                        ctx.beginPath();
                        ctx.moveTo(p.x, lineStartY);
                        ctx.lineTo(p.x, p.y - 5);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                });
            });

            ctx.restore();
        }
    };

    const ctx = document.getElementById('dynChart').getContext('2d');
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        plugins: [datalabelPlugin],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { top: 30, left: 8, right: 8 } },
            plugins: {
                legend: {
                    display: datasets.length > 1,
                    position: 'top',
                    labels: {
                        font: { family: 'Inter', size: 10 },
                        boxWidth: 20, padding: 10,
                        generateLabels(chart) {
                            return chart.data.datasets.map((ds, i) => ({
                                text: ds.label,
                                fillStyle: ds.borderColor,
                                strokeStyle: ds.borderColor,
                                lineWidth: 2,
                                lineDash: ds.borderDash,
                                hidden: chart.getDatasetMeta(i).hidden,
                                datasetIndex: i,
                            }));
                        }
                    }
                },
                tooltip: {
                    backgroundColor: '#1d1d1f',
                    titleFont: { family: 'Inter', size: 12 },
                    bodyFont:  { family: 'Inter', size: 11 },
                    padding: 10,
                    callbacks: {
                        label: c => ` ${c.dataset.label}: ${fmtVal(c.raw)}`
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: '#f0f0f0' },
                    ticks: { font: { family: 'Inter', size: 10 }, color: '#86868b' }
                },
                y: {
                    grid: { color: '#f0f0f0' },
                    ticks: { font: { family: 'Inter', size: 10 }, color: '#86868b', callback: v => fmtVal(v) }
                }
            }
        }
    });
}

// ═══════════════════════════════════════════════════════════
// VIEW MODE
// ═══════════════════════════════════════════════════════════
function setView(mode) {
    viewMode = mode;
    document.getElementById('btnTable').classList.toggle('active', mode === 'table');
    document.getElementById('btnChart').classList.toggle('active', mode === 'chart');
    document.getElementById('tableSection').style.display = mode === 'table' ? '' : 'none';
    document.getElementById('chartPanel').classList.toggle('visible', mode === 'chart');
    if (mode === 'chart') renderChart();
}

// ═══════════════════════════════════════════════════════════
// YEAR TABS — мультивибір
// ═══════════════════════════════════════════════════════════
function renderYearTabs() {
    const cont = document.getElementById('yearTabs');
    cont.innerHTML = '';

    // Кнопка "Всі"
    const btnAll = document.createElement('button');
    btnAll.className = 'year-tab';
    btnAll.textContent = 'Всі роки';
    btnAll.onclick = () => {
        allYears.forEach(y => selectedYears.add(y));
        updateYearTabs();
        renderTable(); renderChips();
        if (viewMode === 'chart') renderChart();
    };
    cont.appendChild(btnAll);

    allYears.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'year-tab' + (selectedYears.has(y) ? ' active' : '');
        btn.dataset.year = y;
        btn.textContent = y;
        btn.onclick = () => {
            if (selectedYears.has(y)) {
                if (selectedYears.size > 1) selectedYears.delete(y);
            } else {
                selectedYears.add(y);
            }
            updateYearTabs();
            renderTable(); renderChips();
            if (viewMode === 'chart') renderChart();
        };
        cont.appendChild(btn);
    });
}

function updateYearTabs() {
    document.querySelectorAll('.year-tab[data-year]').forEach(btn => {
        btn.classList.toggle('active', selectedYears.has(+btn.dataset.year));
    });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
    try {
        const res = await fetch(CSV_URL + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        if (!rows.length) throw new Error('Порожній файл');

        detectAndParse(rows);

        if (!allYears.length) throw new Error('Не вдалось розпізнати структуру даних');

        renderYearTabs();
        renderTable();
        setView('table');

    } catch (e) {
        document.getElementById('tableCard').innerHTML =
            `<div class="status-box error">❌ Помилка завантаження: ${e.message}</div>`;
        console.error(e);
    }
}

init();
</script>
