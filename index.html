<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title> GORODOK Team — Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <style>
        /* --- СТИЛІ ЕКРАНУ ВХОДУ --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fbfbfd; display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-family: 'Inter', sans-serif;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 22px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); border: 1px solid #d2d2d7;
            text-align: center; max-width: 320px; width: 90%;
        }
        .login-box h2 { margin-bottom: 20px; font-size: 20px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px;
            outline: none; transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: #0071e3; }
        .login-box button {
            width: 100%; padding: 12px; background: #0071e3;
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .error-msg { color: #ff3b30; font-size: 13px; margin-top: 10px; display: none; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --color-bg: #fbfbfd;
            --color-text: #1d1d1f;
            --color-text-secondary: #6e6e73;
            --color-card-bg: #ffffff;
            --color-accent: #0071e3;
            --color-border: #d2d2d7;
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --group-sales: #0071e3;
            --group-eff: #af52de;
            --group-acc: #ff9500;
            --group-services: #34c759;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        #main-content { display: none; }

        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--color-border);
            height: 48px; display: flex; align-items: center;
        }
        .nav-content {
            max-width: 1100px; margin: 0 auto; width: 100%;
            padding: 0 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { font-weight: 600; font-size: 17px; cursor: pointer; }
        .logout-btn { font-size: 12px; color: var(--color-text-secondary); cursor: pointer; border: none; background: none; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
        @media (min-width: 1200px) { .container { max-width: 1280px; padding: 40px 30px; } }
        header { margin-bottom: 16px; }
        header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }
        header p { color: var(--color-text-secondary); font-size: 15px; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        @media (min-width: 1400px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1000px) and (max-width: 1399px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }

        /* КАРУСЕЛЬ */
        .carousel-container { margin-bottom: 30px; overflow: hidden; position: relative; }
        .carousel-wrapper {
            display: flex; gap: 15px; overflow-x: auto;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; padding: 10px 0;
        }
        @media (max-width: 900px) {
            .carousel-wrapper { padding: 10px calc(50% - 140px); scroll-padding: 0 calc(50% - 140px); }
            .banner-card { scroll-snap-align: center; }
        }
        @media (min-width: 1200px) {
            .carousel-wrapper { flex-wrap: wrap; justify-content: flex-start; overflow-x: visible; gap: 15px; }
            .banner-card { flex: 1 1 calc(20% - 12px); min-width: 220px; max-width: 280px; }
        }
        @media (min-width: 900px) and (max-width: 1199px) {
            .carousel-wrapper { flex-wrap: wrap; justify-content: flex-start; overflow-x: visible; }
            .banner-card { flex: 0 0 calc(50% - 8px); max-width: 350px; }
        }
        .carousel-wrapper::-webkit-scrollbar { height: 8px; }
        .carousel-wrapper::-webkit-scrollbar-track { background: #f5f5f7; border-radius: 10px; margin: 0 20px; }
        .carousel-wrapper::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
        .carousel-wrapper::-webkit-scrollbar-thumb:hover { background: #a1a1a6; }
        @media (max-width: 900px) { .carousel-wrapper::-webkit-scrollbar { display: none; } }

        .banner-card {
            flex: 0 0 210px; height: 190px; border-radius: 20px; padding: 18px 20px;
            border: none; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; justify-content: space-between;
            text-decoration: none; color: inherit;
            scroll-snap-align: start; scroll-snap-stop: always;
            position: relative; overflow: hidden;
            box-shadow: 0 2px 14px rgba(0,0,0,0.07);
        }
        @media (min-width: 1200px) { .banner-card { padding: 18px 20px; height: 185px; flex: 1 1 calc(14.28% - 13px); min-width: 175px; max-width: 235px; } }
        .banner-card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,0.12); }

        /* М'які пастельні фони без рамки */
        .banner-special     { background: linear-gradient(145deg, #eef2ff 0%, #e3eaff 100%); }
        .banner-chart       { background: linear-gradient(145deg, #fff7ed 0%, #ffecd6 100%); }
        .banner-plan-fact   { background: linear-gradient(145deg, #edfaf3 0%, #d9f5e7 100%); }
        .banner-plan-fact-2 { background: linear-gradient(145deg, #f8eeff 0%, #f0deff 100%); }
        .banner-documents   { background: linear-gradient(145deg, #edf4ff 0%, #d9e9ff 100%); }
        .banner-sellers     { background: linear-gradient(145deg, #fff4ee 0%, #ffe8d9 100%); }
        .banner-dynamics    { background: linear-gradient(145deg, #f0eeff 0%, #e4deff 100%); }

        .banner-top { display: flex; align-items: flex-start; gap: 12px; }
        .banner-icon {
            width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            background: rgba(255,255,255,0.75);
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .banner-content { flex: 1; min-width: 0; }
        .banner-content h2 { font-size: 14px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; color: #1d1d1f; }
        .banner-content p  { font-size: 11px; color: #6e6e73; line-height: 1.35; }
        .banner-footer { }
        .banner-cta {
            font-size: 11px; font-weight: 600;
            color: #555; opacity: 0.6;
            transition: opacity 0.2s;
        }
        .banner-card:hover .banner-cta { opacity: 1; }

        .section-title { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: var(--color-text); }

        @media (max-width: 600px) {
            .banner-card { flex: 0 0 185px; height: 165px; padding: 14px 16px; }
            .banner-icon { width: 34px; height: 34px; font-size: 17px; border-radius: 10px; }
            .banner-content h2 { font-size: 12px; }
            .banner-content p { font-size: 10px; }
        }

        /* --- SKELETON LOADING --- */
        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #e8e8ed 25%, #f5f5f7 50%, #e8e8ed 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 8px;
        }
        .card.skeleton-card { pointer-events: none; }
        .skeleton-avatar  { width: 48px; height: 48px; border-radius: 50%; }
        .skeleton-line    { height: 14px; margin-bottom: 6px; }
        .skeleton-line.w60 { width: 60%; }
        .skeleton-line.w40 { width: 40%; }
        .skeleton-big     { height: 32px; width: 55%; margin: 12px 0 6px; }
        .skeleton-small   { height: 12px; width: 30%; }
        .skeleton-row     { display: flex; gap: 20px; margin-top: 14px; }
        .skeleton-block   { flex: 1; }

        /* fade-in for real cards */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card.loaded { animation: fadeInUp 0.35s ease both; }

        .card {
            background: var(--color-card-bg); border-radius: 22px; padding: 24px;
            border: 1px solid var(--color-border); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; text-decoration: none; color: inherit; max-width: 450px;
        }
        @media (min-width: 1400px) { .card { max-width: none; } }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); border-color: transparent; }

        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar { width: 56px; height: 56px; border-radius: 50%; margin-right: 16px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 20px; flex-shrink: 0; }
        .card-title h2 { font-size: 18px; font-weight: 600; }
        .card-title p { font-size: 13px; color: var(--color-text-secondary); }
        .main-metric { margin-bottom: 20px; }
        .main-metric-label { font-size: 11px; text-transform: uppercase; font-weight: 600; color: var(--color-text-secondary); }
        .main-metric-value { font-size: 30px; font-weight: 600; }
        .secondary-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 16px; border-top: 1px solid var(--color-border); }
        .metric-mini-label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; }
        .metric-mini-value { font-size: 15px; font-weight: 600; }

        .detail-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg); z-index: 2000; overflow-y: auto; padding: 40px 20px; }
        .detail-page.active { display: block; }
        .detail-container { max-width: 900px; margin: 0 auto; }
        .metric-group { margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .group-title { grid-column: 1 / -1; font-size: 13px; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 4px; padding-left: 5px; text-transform: uppercase; }
        .detail-metric-card { background: #fff; padding: 14px 16px; border-radius: 14px; border-left: 4px solid var(--color-border); }

        @media (max-width: 600px) {
            .metric-group { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
            .detail-metric-card { padding: 10px 12px; border-radius: 12px; }
            .detail-metric-card div:first-child { font-size: 10px !important; }
            .detail-metric-card div:last-child { font-size: 18px !important; }
            .detail-metric-card div:last-child span { font-size: 12px !important; }
            .group-title { font-size: 12px; margin-bottom: 2px; }
            #detail-page { padding: 20px 14px; }
        }

        .group-sales .detail-metric-card { border-left-color: var(--group-sales); }
        .group-eff   .detail-metric-card { border-left-color: var(--group-eff); }
        .group-acc   .detail-metric-card { border-left-color: var(--group-acc); }
        .group-services .detail-metric-card { border-left-color: var(--group-services); }

        @media (max-width: 600px) {
            header h1 { font-size: 32px; }
            .avatar { width: 50px; height: 50px; font-size: 18px; }
        }

        /* --- GSHEET БЛОК (Посилення + КМОТ) --- */
        .gsheet-block {
            background: #fff; border-radius: 18px; border: 1px solid var(--color-border);
            box-shadow: var(--shadow-md); margin-bottom: 24px; overflow: hidden; display: flex; flex-direction: column;
        }
        .gsheet-block.collapsed .gsheet-body { display: none; }
        .gsheet-body { max-height: calc(100dvh - 48px - 50px - 44px - 24px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .gsheet-body::-webkit-scrollbar { width: 3px; }
        .gsheet-body::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
        .gsheet-block.collapsed { border-radius: 18px; }
        .gsheet-expand-btn { background: none; border: none; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--color-accent); padding: 0; display: flex; align-items: center; gap: 4px; font-family: inherit; transition: opacity 0.2s; }
        .gsheet-expand-btn:hover { opacity: 0.7; }
        .gsheet-expand-arrow { display: inline-block; transition: transform 0.25s ease; font-style: normal; }
        .gsheet-block:not(.collapsed) .gsheet-expand-arrow { transform: rotate(180deg); }
        .gsheet-block-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--color-border); background: #f5f5f7; border-radius: 18px 18px 0 0; }
        .gsheet-block-title { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--color-text); }
        .gsheet-refresh-btn { background: none; border: 1px solid var(--color-border); border-radius: 8px; padding: 4px 9px; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; font-family: inherit; }
        .gsheet-refresh-btn:hover { color: var(--color-accent); border-color: var(--color-accent); }
        .gsheet-table-wrapper { overflow-x: hidden; }
        .gsheet-table-wrapper::-webkit-scrollbar { height: 4px; width: 4px; }
        .gsheet-table-wrapper::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 10px; }
        .gsheet-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .gsheet-table thead th { background: #f5f5f7; padding: 5px 6px; text-align: left; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--color-text-secondary); letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--color-border); }
        .gsheet-table tbody tr { border-bottom: 1px solid rgba(0,0,0,0.04); }
        .gsheet-table tbody tr:last-child { border-bottom: none; }
        .gsheet-table tbody td { padding: 4px 5px; white-space: normal; word-break: break-word; vertical-align: top; font-size: 10px; line-height: 1.25; color: var(--color-text); }
        .gsheet-table tbody td:first-child { font-weight: 600; border-left: 3px solid transparent; padding-left: 6px; width: 55px; min-width: 55px; max-width: 55px; white-space: normal; word-break: break-word; }
        .gsheet-row-acc { background: #fff7ed; } .gsheet-row-acc td:first-child { color: #c05800; border-left-color: #f97316; } .gsheet-row-acc:hover { background: #ffedd5; }
        .gsheet-row-av  { background: #eff6ff; } .gsheet-row-av  td:first-child { color: #1d4ed8; border-left-color: #3b82f6; } .gsheet-row-av:hover  { background: #dbeafe; }
        .gsheet-row-dig { background: #fefce8; } .gsheet-row-dig td:first-child { color: #854d0e; border-left-color: #eab308; } .gsheet-row-dig:hover { background: #fef9c3; }
        .gsheet-row-it  { background: #f0fdf4; } .gsheet-row-it  td:first-child { color: #166534; border-left-color: #22c55e; } .gsheet-row-it:hover  { background: #dcfce7; }
        .gsheet-row-kbt { background: #fdf4ff; } .gsheet-row-kbt td:first-child { color: #7c3aed; border-left-color: #a855f7; } .gsheet-row-kbt:hover { background: #f3e8ff; }
        .gsheet-row-mbt { background: #f0fdfa; } .gsheet-row-mbt td:first-child { color: #0f766e; border-left-color: #14b8a6; } .gsheet-row-mbt:hover { background: #ccfbf1; }
        .gsheet-row-credit   { background: #fff1f2; } .gsheet-row-credit   td:first-child { color: #be123c; border-left-color: #f43f5e; } .gsheet-row-credit:hover   { background: #ffe4e6; }
        .gsheet-row-discount { background: #fdf2f8; } .gsheet-row-discount td:first-child { color: #9d174d; border-left-color: #ec4899; } .gsheet-row-discount:hover { background: #fce7f3; }
        .gsheet-row-limit    { background: #f8fafc; } .gsheet-row-limit    td:first-child { color: #475569; border-left-color: #94a3b8; } .gsheet-row-limit:hover    { background: #f1f5f9; }
        .gsheet-row-other    { background: #fff;    } .gsheet-row-other    td:first-child { border-left-color: #d2d2d7; }              .gsheet-row-other:hover    { background: #f9f9fb; }
        .gsheet-loading { padding: 20px; text-align: center; color: var(--color-text-secondary); font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .gsheet-loading-spinner { width: 16px; height: 16px; border: 2px solid #d2d2d7; border-top-color: var(--color-accent); border-radius: 50%; animation: gsheet-spin 0.7s linear infinite; }
        @keyframes gsheet-spin { to { transform: rotate(360deg); } }
        .gsheet-error { padding: 16px; text-align: center; color: #ff3b30; font-size: 12px; }

        /* cell-badge для КМОТ */
        .cell-badge { display: block; border-radius: 6px; font-size: 10px; font-weight: 600; text-align: center; padding: 2px 3px; white-space: nowrap; }

        /* --- PLAN CSS --- */
        .plan-metrics { margin-top:12px; padding-top:12px; border-top:1px solid var(--color-border); }
        .plan-metrics-title { font-size:9px; font-weight:700; text-transform:uppercase; color:var(--color-text-secondary); letter-spacing:0.04em; margin-bottom:8px; }
        .plan-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }
        .plan-item { display:flex; flex-direction:column; gap:1px; }
        .plan-item-label { font-size:8.5px; font-weight:600; text-transform:uppercase; color:var(--color-text-secondary); white-space:nowrap; }
        .plan-item-val { font-size:12px; font-weight:600; color:var(--color-text); }
        .plan-pct { font-size:10px; font-weight:700; padding:1px 4px; border-radius:4px; display:inline-block; }
        .pct-good { background:#dcfce7; color:#166534; }
        .pct-mid  { background:#fef9c3; color:#854d0e; }
        .pct-bad  { background:#ffe4e6; color:#be123c; }
        .detail-plan-section { background:#f5f5f7; border-radius:16px; padding:16px; margin-bottom:20px; }
        .detail-plan-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px; }
        .detail-plan-card { background:#fff; border-radius:12px; padding:10px 12px; display:flex; flex-direction:column; gap:3px; }
        .dpc-label { font-size:9px; font-weight:700; text-transform:uppercase; color:var(--color-text-secondary); }
        .dpc-plan  { font-size:11px; color:var(--color-text-secondary); }
        .dpc-fact  { font-size:17px; font-weight:600; color:var(--color-text); }
        .dpc-rest  { font-size:11px; color:var(--color-text-secondary); margin-top:1px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size: 40px; margin-bottom: 10px;">🔒</div>
        <h2>GORODOK Dashboard</h2>
        <input type="password" id="pass-input" placeholder="Введіть пароль" onkeypress="if(event.key==='Enter') checkPass()">
        <button onclick="checkPass()">Увійти</button>
        <p id="error-msg" class="error-msg">Невірний пароль. Спробуйте ще раз.</p>
    </div>
</div>

<div id="main-content">
    <nav>
        <div class="nav-content">
            <div class="nav-logo" onclick="showHome()">Gorodok Sales Dashboard</div>
            <button class="logout-btn" onclick="logout()">Вийти</button>
        </div>
    </nav>

    <div id="home-page" class="container">
        <header>
            <h1>Команда</h1>
            <p>Статистика та графіки департаменту</p>
        </header>

        <!-- БЛОК ПОСИЛЕННЯ -->
        <div class="gsheet-block collapsed" id="gsheet-block">
            <div class="gsheet-block-header">
                <div class="gsheet-block-title">
                    <span>📋</span>
                    <span id="gsheet-title">ПОСИЛЕННЯ</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button class="gsheet-refresh-btn" onclick="loadGSheet()">↻ Оновити</button>
                    <button class="gsheet-expand-btn" onclick="toggleGSheet()">
                        <span id="gsheet-expand-label">Розгорнути</span>
                        <i class="gsheet-expand-arrow">▼</i>
                    </button>
                </div>
            </div>
            <div class="gsheet-body">
                <div id="gsheet-content">
                    <div class="gsheet-loading">
                        <div class="gsheet-loading-spinner"></div>
                        Завантаження...
                    </div>
                </div>
            </div>
        </div>

        <!-- БЛОК КМОТ -->
        <div class="gsheet-block collapsed" id="kmot-block">
            <div class="gsheet-block-header">
                <div class="gsheet-block-title">
                    <span>📊</span>
                    <span>КМОТ</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button class="gsheet-refresh-btn" onclick="loadKMOT()">↻ Оновити</button>
                    <button class="gsheet-expand-btn" onclick="toggleKMOT()">
                        <span id="kmot-expand-label">Розгорнути</span>
                        <i class="gsheet-expand-arrow">▼</i>
                    </button>
                </div>
            </div>
            <div class="gsheet-body">
                <div id="kmot-content">
                    <div class="gsheet-loading">
                        <div class="gsheet-loading-spinner"></div>
                        Завантаження...
                    </div>
                </div>
            </div>
        </div>

        <div id="sales-cards"></div>
    </div>

    <div id="detail-page" class="detail-page">
        <div class="detail-container">

</div>

<script>
    // --- АВТОРИЗАЦІЯ ---
    const SECRET_PASSWORD = "gteam";
    const EXPIRY_DAYS = 30;

    function checkPass() {
        const input = document.getElementById('pass-input').value;
        const error = document.getElementById('error-msg');
        if (input === SECRET_PASSWORD) {
            const now = new Date();
            localStorage.setItem('auth_date', now.getTime());
            localStorage.setItem('isAuthorized', 'true');
            unlockSite();

            error.style.display = 'block';
            document.getElementById('pass-input').value = '';

    }

    function unlockSite() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        loadGSheet();
        loadKMOT();
        function renderSkeletons(count = 5) {

        container.innerHTML = '';

        carouselContainer.className = 'carousel-container';

        container.appendChild(secTitle);

        // Card skeletons
        const cardsGrid = document.createElement('div');
        cardsGrid.className = 'cards-grid';
        for (let i = 0; i < count; i++) {
            const card = document.createElement('div');
            card.className = 'card skeleton-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="skeleton skeleton-avatar" style="flex-shrink:0;margin-right:14px"></div>
                    <div style="flex:1">
                        <div class="skeleton skeleton-line w60"></div>
                        <div class="skeleton skeleton-line w40"></div>
                    </div>
                </div>
                <div class="skeleton skeleton-line" style="width:80px;height:11px;margin-bottom:6px"></div>
                <div class="skeleton skeleton-big"></div>

                    <div class="skeleton-block">
                        <div class="skeleton skeleton-small" style="margin-bottom:5px"></div>
                        <div class="skeleton skeleton-line w60"></div>
                    </div>
                    <div class="skeleton-block">
                        <div class="skeleton skeleton-small" style="margin-bottom:5px"></div>

        container.appendChild(cardsGrid);
    }

    loadPlanData().then(() => loadData());
    renderSkeletons(5);
    }

    function logout() {
        localStorage.removeItem('isAuthorized');
        localStorage.removeItem('auth_date');
        location.reload();
    }

    window.onload = function() {
        const isAuth = localStorage.getItem('isAuthorized');
        const authDate = localStorage.getItem('auth_date');
        if (isAuth === 'true' && authDate) {
            const now = new Date().getTime();
            const expiryMs = EXPIRY_DAYS * 24 * 60 * 60 * 1000;
            if (now - authDate < expiryMs) { unlockSite(); } else { logout(); }
        }
    };

    // --- CSV PARSER ---
    function parseCSV(text) {
        const rows = []; let cells = [], cur = '', inQ = false;
        for (let i = 0; i < text.length; i++) {
            const ch = text[i];
            if (ch === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
            else if (ch === ',' && !inQ) { cells.push(cur); cur = ''; }
            else if ((ch === '\n' || ch === '\r') && !inQ) {
                if (ch === '\r' && text[i+1] === '\n') i++;
                cells.push(cur); cur = ''; rows.push(cells); cells = [];
            } else cur += ch;
        }
        if (cur || cells.length) { cells.push(cur); rows.push(cells); }
        return rows.filter(r => r.some(c => c.trim()));
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // --- ПОСИЛЕННЯ ---
    const GSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTd9BXXff9qHAx0Hp0MEgb-rzsHOgsnBUoqus8vf5zSCzmDfNbe0Js9pcY_2YMkZT6lLZp7vmTEbwM6/pub?output=csv';

    function toggleGSheet() {
        const block = document.getElementById('gsheet-block');
        const label = document.getElementById('gsheet-expand-label');
        const isCollapsed = block.classList.contains('collapsed');
        if (isCollapsed) { block.classList.remove('collapsed'); label.textContent = 'Згорнути'; }
        else             { block.classList.add('collapsed');    label.textContent = 'Розгорнути'; }
    }

    async function loadGSheet() {
        const content = document.getElementById('gsheet-content');
        content.innerHTML = `<div class="gsheet-loading"><div class="gsheet-loading-spinner"></div>Завантаження...</div>`;
        try {
            const res = await fetch(GSHEET_CSV_URL + '&t=' + Date.now());
            if (!res.ok) throw new Error('fail');
            renderGSheetTable(await res.text());
        } catch(e) {
            content.innerHTML = `<div class="gsheet-error">⚠️ Помилка завантаження</div>`;
        }
    }

    function rowClass(val) {
        const v = (val || '').trim().toLowerCase();
        if (v.startsWith('асс') || v === 'acc') return 'gsheet-row-acc';
        if (v.startsWith('ав') || v === 'av')   return 'gsheet-row-av';
        if (v.startsWith('діг') || v.startsWith('dig')) return 'gsheet-row-dig';
        if (v.startsWith('іт') || v === 'it')   return 'gsheet-row-it';
        if (v.startsWith('кбт') || v === 'kbt') return 'gsheet-row-kbt';
        if (v.startsWith('мбт') || v === 'mbt') return 'gsheet-row-mbt';
        if (v.includes('кредит'))  return 'gsheet-row-credit';
        if (v.includes('знижк') || v.includes('інет')) return 'gsheet-row-discount';
        if (v.includes('обмеж'))   return 'gsheet-row-limit';
        return 'gsheet-row-other';
    }

    function renderGSheetTable(csv) {
        const el = document.getElementById('gsheet-content');
        const rows = parseCSV(csv);
        if (!rows.length) { el.innerHTML = `<div class="gsheet-error">Порожня таблиця</div>`; return; }
        const headers = rows[0];
        const sellerIdx = headers.findIndex(h => /продав|seller|прод\./i.test(h));
        const colWidths = [8, 24, 18, 18, 18, 14];
        const total = headers.length;
        let colgroup = '<colgroup>';
        headers.forEach((h, i) => {
            const w = colWidths[i] !== undefined ? colWidths[i] : Math.floor(60 / Math.max(total - 2, 1));
            colgroup += `<col style="width:${w}%">`;
        });
        colgroup += '</colgroup>';

        let html = `<div class="gsheet-table-wrapper"><table class="gsheet-table">${colgroup}<thead><tr>`;
        headers.forEach((h, i) => {
            const wrap = (i === 0 || i === sellerIdx) ? ' style="white-space:normal"' : '';
            html += `<th${wrap}>${esc(h)}</th>`;
        });
        html += `</tr></thead><tbody>`;
        rows.slice(1).forEach(row => {
            const cls = rowClass(row[0]);
            const hasExtraCols = row.slice(2).some(c => (c || '').trim() !== '');
            html += `<tr class="${cls}">`;
            if (!hasExtraCols && headers.length > 2) {
                html += `<td>${esc(row[0])}</td>`;
                html += `<td colspan="${headers.length - 1}" style="white-space:normal;word-break:break-word">${esc(row[1] || '')}</td>`;
            } else {
                headers.forEach((_, i) => { html += `<td>${esc(row[i])}</td>`; });
            }
            html += `</tr>`;
        });
        html += `</tbody></table></div>`;
        el.innerHTML = html;
    }

    // --- КМОТ ---
    const KMOT_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROoCZz1kw9l2RJoVweetVCzehrD79TfH2m7meuZAedA_MDc6KShkWQCfTgbX92BVs4Xol2fI55GwZc/pub?output=csv';

    function toggleKMOT() {
        const block = document.getElementById('kmot-block');
        const label = document.getElementById('kmot-expand-label');
        const isCollapsed = block.classList.contains('collapsed');
        if (isCollapsed) { block.classList.remove('collapsed'); label.textContent = 'Згорнути'; }
        else             { block.classList.add('collapsed');    label.textContent = 'Розгорнути'; }
    }

    async function loadKMOT() {
        const content = document.getElementById('kmot-content');
        content.innerHTML = `<div class="gsheet-loading"><div class="gsheet-loading-spinner"></div>Завантаження...</div>`;
        try {
            const res = await fetch(KMOT_CSV_URL + '&t=' + Date.now());
            if (!res.ok) throw new Error('fail');
            renderKMOTTable(await res.text());
        } catch(e) {
            content.innerHTML = `<div class="gsheet-error">⚠️ Помилка завантаження</div>`;
        }
    }

    function renderKMOTTable(csv) {
        const el = document.getElementById('kmot-content');
        const rows = parseCSV(csv);
        if (!rows.length) { el.innerHTML = `<div class="gsheet-error">Порожня таблиця</div>`; return; }

        const headers = rows[0];
        const dataRows = rows.slice(1).filter(r => r[0] && r[0].trim());
        const numCols = headers.length;

        // Визначаємо % колонки
        const pctColIndexes = [];
        headers.forEach((h, i) => {
            if (i === 0) return;
            const u = h.toUpperCase();
            if (u.includes('%') || u.includes('ВИКО') || u.includes('ДОЛЯ') || u.includes('SHARE')) {
                pctColIndexes.push(i);
            }
        });

        // Рахуємо min/max для % колонок (без підсумкових рядків)
        const pctRanges = {};
        pctColIndexes.forEach(ci => {
            const vals = dataRows
                .filter(r => !['разом','сума','total','тотал','підсумок','всього','итого'].some(k => (r[0]||'').toLowerCase().includes(k)))
                .map(r => parseFloat((r[ci]||'').replace('%','').replace(/\s/g,'').replace(',','.')) || 0);
            pctRanges[ci] = { min: Math.min(...vals), max: Math.max(...vals) };
        });

        // Ширини колонок
        const lastW = 14;
        const preLastW = 16;
        const firstW = 16;
        const restW = Math.floor((100 - firstW - lastW - preLastW) / Math.max(numCols - 3, 1));
        let colgroup = '<colgroup>';
        headers.forEach((_, i) => {
            let w = restW;
            if (i === 0) w = firstW;
            else if (i === headers.length - 1) w = lastW;
            else if (i === headers.length - 2) w = preLastW;
            colgroup += `<col style="width:${w}%">`;
        });
        colgroup += '</colgroup>';

        let html = `<div class="gsheet-table-wrapper"><table class="gsheet-table">${colgroup}<thead><tr>`;
        headers.forEach((h, i) => {
            const isLast2 = i >= headers.length - 2;
            const fs = isLast2 ? 'font-size:7px;' : '';
            html += `<th style="white-space:normal;word-break:break-word;vertical-align:bottom;text-align:center;${fs}">${esc(h)}</th>`;
        });
        html += `</tr></thead><tbody>`;

        dataRows.forEach(row => {
            const name = (row[0] || '').trim();
            const nameLC = name.toLowerCase();
            const isTotal = ['разом','сума','total','тотал','підсумок','всього','итого'].some(k => nameLC.includes(k));
            const totalStyle = isTotal ? ' style="background:#eaf1fe;font-weight:700"' : '';

            html += `<tr${totalStyle}>`;
            headers.forEach((h, ci) => {
                const val = (row[ci] != null ? row[ci] : '').toString().trim();

                if (ci === 0) {
                    html += `<td style="font-weight:600;border-left:3px solid #d2d2d7;white-space:normal;word-break:break-word">${esc(val)}</td>`;
                    return;
                }

                // % колонка — динамічна заливка (тільки не підсумок)
                if (pctColIndexes.includes(ci) && !isTotal) {
                    const n = parseFloat(val.replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
                    const { min, max } = pctRanges[ci] || { min:0, max:1 };
                    const range = max - min || 1;
                    const ratio = (n - min) / range;
                    const hue = Math.round(ratio * 120);
                    const bg = `hsl(${hue},70%,${Math.round(88-ratio*10)}%)`;
                    const fg = `hsl(${hue},60%,${Math.round(28+ratio*10)}%)`;
                    html += `<td><span class="cell-badge" style="background:${bg};color:${fg}">${esc(val)}</span></td>`;
                    return;
                }

                const numVal = parseFloat(val.replace(/\s/g,'').replace(',','.'));
                // Числові значення — сірий бейдж БЕЗ округлення
                if (!isNaN(numVal) && val !== '') {
                    const bg = isTotal ? 'rgba(0,113,227,0.10)' : 'rgba(134,134,139,0.08)';
                    const fg = isTotal ? '#1a50b8' : '#3d3d3f';
                    html += `<td><span class="cell-badge" style="background:${bg};color:${fg}">${esc(val)}</span></td>`;
                    return;
                }

                html += `<td>${esc(val)}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        el.innerHTML = html;
    }

    // --- PLAN DATA ---
    const PLAN_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv';
    let planData = {};

    async function loadPlanData() {
        try {
            const res = await fetch(PLAN_CSV_URL + '&t=' + Date.now());
            const text = await res.text();
            const rows = parseCSV(text);
            if (!rows.length) return;
            const hdr = rows[0].map(h => h.trim());
            const iTO = hdr.findIndex(h => h === 'ТО план');
            const iACC = hdr.findIndex(h => h === 'АСС план');
            const iServ = hdr.findIndex(h => h === 'ПОСЛУГИ план');
            rows.slice(1).forEach(row => {
                const name = (row[0] || '').trim();
                if (!name) return;
                const num = s => parseFloat((s||'0').replace(/[\s\u00a0]/g,'').replace(',','.')) || 0;
                planData[name] = { to: num(row[iTO]), acc: num(row[iACC]), serv: num(row[iServ]) };
                if (/тотал|total|загалом/i.test(name)) planData['Показники магазину'] = planData[name];
            });
        } catch(e) { console.warn('Plan error:', e); }
    }

    function getPlan(name) {
        if (planData[name]) return planData[name];
        const key = Object.keys(planData).find(k =>
            k.toLowerCase().includes(name.toLowerCase()) || name.toLowerCase().includes(k.toLowerCase())
        );
        return key ? planData[key] : null;
    }
    function pctCls(p) { return p >= 100 ? 'pct-good' : p >= 70 ? 'pct-mid' : 'pct-bad'; }
    function fmtPct(fact, plan) {
        if (!plan) return '';
        const p = Math.round(fact / plan * 100);
        return '<span class="plan-pct ' + pctCls(p) + '">' + p + '%</span>';
    }
    function fmtRest(fact, plan) {
        const r = plan - fact;
        return r > 0 ? '-' + formatFull(r) : '✓';
    }

    // --- ДАНІ КАРТОК ---
    let currentData = [];

    const SALES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRxPqHp5lwwhjdDTaJdiwWYbhqZmeALG5dVhSZ6rHx2W8KGrcNWaa5-7qiVB87KKbQEXjtF1WVwmBzp/pub?gid=50416606&single=true&output=csv';

    const PERCENT_COLS = ['% Доля ACC', 'Доля Послуг', 'Конверсія ПК', 'Конверсія ПК Offline', 'Доля УДС'];
    const UNIT_COLS    = ['Шт.', 'Чеки', 'ПЧ'];

    const GRADIENTS = [
        'linear-gradient(135deg, #FF6B6B 0%, #EE5253 100%)',
        'linear-gradient(135deg, #4834d4 0%, #686de0 100%)',
        'linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)',
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #f7971e 0%, #ffd200 100%)',
        'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
        'linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%)',
        'linear-gradient(135deg, #355c7d 0%, #6c5b7b 100%)',
        'linear-gradient(135deg, #e96c5e 0%, #e07080 100%)',
    ];

    function cleanNumber(val) {
        if (val === null || val === undefined || val === '') return 0;
        let s = String(val).trim().replace(/[\u00a0\s]/g, '').replace('%', '');
        if (!s || s.toLowerCase() === 'nan') return 0;
        if (s.includes(',') && s.includes('.')) {
            s = s.indexOf('.') < s.indexOf(',') ? s.replace(/\./g,'').replace(',','.') : s.replace(/,/g,'');
        } else if (s.includes(',')) {
            const parts = s.split(',');
            s = (parts.length === 2 && parts[1].length <= 2) ? s.replace(',','.') : s.replace(/,/g,'');
        }
        return parseFloat(s) || 0;
    }

    function parseCSVLine(line) {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
            else { cur += ch; }
        }
        result.push(cur);
        return result.map(c => c.trim());
    }

    async function loadData() {
        try {
            const res = await fetch(SALES_CSV_URL + '&t=' + Date.now());
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim());
            if (!lines.length) return;

            const headers = parseCSVLine(lines[0]).map(h => h.trim());
            const rows = lines.slice(1).map(l => parseCSVLine(l));

            const gradients_store = [...GRADIENTS];
            let gradIdx = 0;

            currentData = rows.map((row, i) => {
                const name = (row[0] || '').trim();
                if (!name || ['nan','0','разом','сума','итог'].includes(name.toLowerCase())) return null;

                const position = (row[1] || '').trim();
                const initials = name.split(' ').slice(0,2).map(p => p[0] || '').join('').toUpperCase();
                const gradient = name.toLowerCase().includes('показники магазину') || name.toLowerCase().includes('тотал')
                    ? 'linear-gradient(135deg, #434343 0%, #000000 100%)'
                    : gradients_store[gradIdx++ % gradients_store.length];

                const metrics = {};
                headers.slice(2).forEach((col, ci) => {
                    const val = cleanNumber(row[ci + 2]);
                    const unit = PERCENT_COLS.includes(col) ? '%' : UNIT_COLS.includes(col) ? 'шт' : 'грн';
                    metrics[col] = { value: val, label: col, unit };
                });

                return { id: i, name, position, initials, gradient, metrics };
            }).filter(Boolean);

            // Якщо є тотал рядок у таблиці — видалити (ми порахуємо самі)
            const totalIdx = currentData.findIndex(d =>
                /тотал|total|загалом|показники магазину/i.test(d.name)
            );
            if (totalIdx >= 0) currentData.splice(totalIdx, 1);

            // --- Розраховуємо "Показники магазину" (ALL) так само як Python-скрипт ---
            const storeTotals = {
                id: 0,
                name: 'Показники магазину',
                position: 'Всі продавці',
                initials: 'ALL',
                gradient: 'linear-gradient(135deg, #434343 0%, #000000 100%)',
                metrics: {}
            };

            const allCols = currentData.length ? Object.keys(currentData[0].metrics) : [];

            // Сумуємо не-відсоткові колонки
            allCols.forEach(col => {
                if (PERCENT_COLS.includes(col)) return;
                const sum = currentData.reduce((acc, p) => acc + (p.metrics[col]?.value || 0), 0);
                const unit = UNIT_COLS.includes(col) ? 'шт' : 'грн';
                storeTotals.metrics[col] = { value: Math.round(sum * 100) / 100, label: col, unit };
            });

            // Перераховуємо Ср. Чек, КПЧ, ASP за правильними формулами
            const totalShт   = storeTotals.metrics['Шт.']?.value  || 0;
            const totalCheky = storeTotals.metrics['Чеки']?.value || 0;
            const totalTO    = storeTotals.metrics['ТО']?.value   || 0;

            if (totalCheky > 0) {
                const srChek = Math.round(totalTO / totalCheky);
                const kpch   = Math.round(totalShт / totalCheky * 100) / 100;
                const asp    = kpch > 0 ? Math.round(srChek / kpch) : 0;
                storeTotals.metrics['Ср. Чек'] = { value: srChek, label: 'Ср. Чек', unit: 'грн' };
                storeTotals.metrics['КПЧ']     = { value: kpch,   label: 'КПЧ',     unit: 'грн' };
                storeTotals.metrics['ASP']     = { value: asp,    label: 'ASP',     unit: 'грн' };
            }

            // Розраховуємо відсоткові показники магазину
            PERCENT_COLS.forEach(col => {
                let res = 0;
                if (totalTO > 0) {
                    if (col === 'Доля Послуг') {
                        const valCat = storeTotals.metrics['Послуги грн']?.value || storeTotals.metrics['Послуги']?.value || 0;
                        res = Math.round((valCat / totalTO) * 10000) / 100;
                    } else if (col === '% Доля ACC') {
                        const valCat = storeTotals.metrics['ACC']?.value || 0;
                        res = Math.round((valCat / totalTO) * 10000) / 100;
                    } else {
                        // Для решти — середнє арифметичне
                        const vals = currentData.map(p => p.metrics[col]?.value || 0);
                        res = vals.length ? Math.round(vals.reduce((a,b) => a+b, 0) / vals.length * 100) / 100 : 0;
                    }
                }
                storeTotals.metrics[col] = { value: res, label: col, unit: '%' };
            });

            currentData = [storeTotals, ...currentData];
            renderCards(currentData);
        } catch (error) {
            console.error('Помилка завантаження даних з Google Sheets:', error);
            // Fallback: спробуємо статичний JSON
            try {
                const response = await fetch('sales-data.json?t=' + Date.now());
                currentData = await response.json();
                renderCards(currentData);
            } catch (e) { console.error('Fallback теж не спрацював:', e); }
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(2) + 'М';
        if (num >= 1000)    return (num / 1000).toFixed(1) + 'К';
        return num;
    }
    function formatFull(num) {
        if (!num && num !== 0) return '0';
        return Math.round(num).toLocaleString('uk-UA');
    }

    function renderCards(data) {
        const container = document.getElementById('sales-cards');
        container.innerHTML = '';

        const carouselContainer = document.createElement('div');
        carouselContainer.className = 'carousel-container';
        const carouselWrapper = document.createElement('div');
        carouselWrapper.className = 'carousel-wrapper';

        const createBanner = (title, subtitle, icon, colorClass, href, isBlank = false) => {
            const banner = document.createElement('a');
            banner.className = `banner-card banner-${colorClass}`;
            banner.href = href;
            if (isBlank) banner.target = '_blank';
            banner.innerHTML = `
                <div class="banner-top">
                    <div class="banner-icon">${icon.img}</div>
                    <div class="banner-content"><h2>${title}</h2><p>${subtitle}</p></div>
                </div>
                <div class="banner-footer"><div class="banner-cta">Переглянути →</div></div>`;
            return banner;
        };

        carouselWrapper.appendChild(createBanner('Щоденні продажі', 'Аналітика по днях',        {bg:'rgba(0,113,227,0.12)', img:'📊'}, 'special',     'daily.html'));
        carouselWrapper.appendChild(createBanner('Графік виходу',   'Google Sheets',             {bg:'rgba(255,149,0,0.12)', img:'📅'}, 'chart',       'https://docs.google.com/spreadsheets/d/1-sUZg6C6w3-lImTpIv2ezkW-mKtK8zXZ_zf4bCK83R8/edit#gid=973370496', true));
        carouselWrapper.appendChild(createBanner('МІСЯЦЬ план/факт','Аналітика виконання',       {bg:'rgba(52,199,89,0.12)', img:'📈'}, 'plan-fact',   'plan-fact.html'));
        carouselWrapper.appendChild(createBanner('Вечірній звіт',   'Розширена аналітика',       {bg:'rgba(175,82,222,0.12)',img:'📊'}, 'plan-fact-2', 'plan-fact-2.html'));
        carouselWrapper.appendChild(createBanner('Акційний бюлетень','АБ та постійні акції',     {bg:'rgba(0,122,255,0.12)', img:'📄'}, 'documents',   'document-viewer.html'));
        carouselWrapper.appendChild(createBanner('Динаміка показників','Тренди по місяцях',      {bg:'rgba(88,86,214,0.12)', img:'📈'}, 'dynamics',    'dynamics.html'));
        carouselWrapper.appendChild(createBanner('Дельта конкурента',  'Порівняння з конкурентом',{bg:'rgba(255,59,48,0.10)', img:'🏆'}, 'competitor',  'competitor-delta.html'));
        carouselWrapper.appendChild(createBanner('Дельта щоденна',    'По днях і тижнях',         {bg:'rgba(0,179,136,0.10)', img:'📅'}, 'daily-delta', 'daily-delta.html'));
        carouselWrapper.appendChild(createBanner('Звіт по продавцях','Рейтинг та деталі',       {bg:'rgba(255,149,0,0.12)', img:'👤'}, 'sellers',     'sellers-report.html'));

        carouselContainer.appendChild(carouselWrapper);
        container.appendChild(carouselContainer);

        const sectionTitle = document.createElement('div');
        sectionTitle.className = 'section-title';
        sectionTitle.textContent = 'Команда продавців';
        container.appendChild(sectionTitle);

        const cardsGrid = document.createElement('div');
        cardsGrid.className = 'cards-grid';

        data.forEach(person => {
            const to       = person.metrics['ТО']          || {value: 0, unit: 'грн'};
            const acc      = person.metrics['% Доля ACC']  || {value: 0, unit: '%'};
            const services = person.metrics['Доля Послуг'] || {value: 0, unit: '%'};

            const card = document.createElement('div');
            card.className = 'card loaded';
            card.onclick = () => showDetail(person.id);
            card.innerHTML = `
                <div class="card-header">
                    <div class="avatar" style="background: ${person.gradient}">${person.initials}</div>
                    <div class="card-title"><h2>${person.name}</h2><p>${person.position}</p></div>
                </div>
                <div class="main-metric">
                    <div class="main-metric-label">Товарообіг</div>
                    <div class="main-metric-value">${formatNumber(to.value)} <span style="font-size:14px">${to.unit}</span></div>
                </div>
                <div class="secondary-metrics">
                    <div><div class="metric-mini-label">Доля ACC</div><div class="metric-mini-value">${acc.value}%</div></div>
                    <div><div class="metric-mini-label">Послуги</div><div class="metric-mini-value">${services.value}%</div></div>
                </div>
                ${(function(){
                    const pl = getPlan(person.name);
                    if (!pl || (!pl.to && !pl.acc && !pl.serv)) return '';
                    const tF = to.value;
                    const aF = (person.metrics['ACC']||{value:0}).value;
                    const sF = (person.metrics['Послуги грн']||{value:0}).value;
                    return '<div class="plan-metrics">' +
                        '<div class="plan-metrics-title">План / Факт / Залишок</div>' +
                        '<div class="plan-row">' +
                            '<div class="plan-item"><div class="plan-item-label">ТО</div><div class="plan-item-val">' + formatNumber(pl.to) + '</div>' + fmtPct(tF,pl.to) + '<div style="font-size:10px;color:var(--color-text-secondary)">' + fmtRest(tF,pl.to) + '</div></div>' +
                            '<div class="plan-item"><div class="plan-item-label">АСС</div><div class="plan-item-val">' + formatNumber(pl.acc) + '</div>' + fmtPct(aF,pl.acc) + '<div style="font-size:10px;color:var(--color-text-secondary)">' + fmtRest(aF,pl.acc) + '</div></div>' +
                            '<div class="plan-item"><div class="plan-item-label">Послуги</div><div class="plan-item-val">' + formatNumber(pl.serv) + '</div>' + fmtPct(sF,pl.serv) + '<div style="font-size:10px;color:var(--color-text-secondary)">' + fmtRest(sF,pl.serv) + '</div></div>' +
                        '</div>' +
                    '</div>';
                })()}`;
            cardsGrid.appendChild(card);
        });

        container.appendChild(cardsGrid);
    }

    function showDetail(id) {
        const person = currentData.find(p => p.id === id);
        if (!person) return;
        const m = person.metrics;
        const block = (key) => {
            const item = m[key] || {value: 0, unit: '-'};
            return `<div class="detail-metric-card">
                <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase">${key}</div>
                <div style="font-size:22px;font-weight:600">${item.value.toLocaleString('uk-UA')} <span style="font-size:14px;font-weight:400">${item.unit}</span></div>
            </div>`;
        };
        const _pl = getPlan(person.name);
        const _tF = (m['ТО']||{value:0}).value;
        const _aF = (m['ACC']||{value:0}).value;
        const _sF = (m['Послуги грн']||{value:0}).value;
        const _planBlock = _pl ? (
            '<div class="detail-plan-section">' +
                '<div style="font-size:13px;font-weight:700;margin-bottom:4px">📊 План / Факт / Залишок</div>' +
                '<div class="detail-plan-grid">' +
                    '<div class="detail-plan-card"><div class="dpc-label">ТО</div><div class="dpc-plan">План: ' + formatFull(_pl.to) + ' грн</div><div class="dpc-fact">' + formatFull(_tF) + ' грн</div><div class="dpc-rest">Вик.: ' + (_pl.to ? Math.round(_tF/_pl.to*100) : 0) + '% &nbsp; Зал.: ' + fmtRest(_tF,_pl.to) + '</div></div>' +
                    '<div class="detail-plan-card"><div class="dpc-label">АСС</div><div class="dpc-plan">План: ' + formatFull(_pl.acc) + ' грн</div><div class="dpc-fact">' + formatFull(_aF) + ' грн</div><div class="dpc-rest">Вик.: ' + (_pl.acc ? Math.round(_aF/_pl.acc*100) : 0) + '% &nbsp; Зал.: ' + fmtRest(_aF,_pl.acc) + '</div></div>' +
                    '<div class="detail-plan-card"><div class="dpc-label">Послуги</div><div class="dpc-plan">План: ' + formatFull(_pl.serv) + ' грн</div><div class="dpc-fact">' + formatFull(_sF) + ' грн</div><div class="dpc-rest">Вик.: ' + (_pl.serv ? Math.round(_sF/_pl.serv*100) : 0) + '% &nbsp; Зал.: ' + fmtRest(_sF,_pl.serv) + '</div></div>' +
                '</div>' +
            '</div>'
        ) : '';
        document.getElementById('detail-content').innerHTML = `
            <div style="display:flex;align-items:center;margin-bottom:40px;">
                <div class="avatar" style="width:80px;height:80px;font-size:28px;background:${person.gradient}">${person.initials}</div>
                <div><h1 style="font-size:32px">${person.name}</h1><p style="color:var(--color-text-secondary)">${person.position}</p></div>
            </div>
            ${_planBlock}
            <div class="group-title">💰 Продажі та Обіг</div>
            <div class="metric-group group-sales">${block('ТО')} ${block('ASP')} ${block('Ср. Чек')}</div>
            <div class="group-title">⚡ Ефективність</div>
            <div class="metric-group group-eff">${block('Шт.')} ${block('Чеки')} ${block('ПЧ')} ${block('КПЧ')} ${block('Конверсія ПК')}</div>
            <div class="group-title">🎧 Аксесуари (ACC)</div>
            <div class="metric-group group-acc">${block('ACC')} ${block('% Доля ACC')}</div>
            <div class="group-title">🛠 Послуги та УДС</div>
            <div class="metric-group group-services">${block('Послуги грн')} ${block('Доля Послуг')} ${block('УДС')} ${block('Доля УДС')}</div>`;
        document.getElementById('detail-page').classList.add('active');
        document.getElementById('home-page').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function showHome() {
        document.getElementById('detail-page').classList.remove('active');
        document.getElementById('home-page').style.display = 'block';
        window.scrollTo(0, 0);
    }

    // Свайп назад
    let touchStartX = 0, touchStartY = 0, isSwiping = false;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; isSwiping = true; }, { passive: true });
    document.addEventListener('touchend', e => {
        const distanceX = e.changedTouches[0].screenX - touchStartX;
        const distanceY = Math.abs(e.changedTouches[0].screenY - touchStartY);
        if (isSwiping && distanceX > 120 && distanceY < 50) {
            if (document.getElementById('detail-page').classList.contains('active')) showHome();
        }
        isSwiping = false;
    }, { passive: true });

    if (window.innerWidth <= 900) {
        setTimeout(() => {
            const cw = document.querySelector('.carousel-wrapper');
            if (cw) {
                const fc = cw.querySelector('.banner-card');
                if (fc) { cw.scrollLeft = Math.max(0, -(cw.offsetWidth/2 - fc.offsetWidth/2)); }
            }
        }, 100);
    }
</script>
</body>
</html>
