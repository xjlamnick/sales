<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Дельта щоденна — Gorodok Dashboard</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

    <style>
        /* ─────────────────────────────────────────────────────────────────────
           БАЗОВІ СТИЛІ ТА ЗМІННІ
           ───────────────────────────────────────────────────────────────────── */
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --text-sec: #6e6e73;
            --accent: #0071e3;
            --border: #d2d2d7;
            --card: #fff;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 16px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 8px 10px 60px;
        }

        /* ─────────────────────────────────────────────────────────────────────
           АНІМАЦІЯ ЗАВАНТАЖЕННЯ (SKELETON)
           ───────────────────────────────────────────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -600px 0; }
            100% { background-position: 600px 0; }
        }

        .skel {
            background: linear-gradient(90deg, #eaeaed 25%, #f5f5f7 50%, #eaeaed 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s ease-in-out infinite;
            border-radius: 7px;
        }

        .skel-row { display: flex; gap: 8px; padding: 12px 10px; border-bottom: 1px solid #f2f2f4; }
        .skel-cell { height: 12px; border-radius: 5px; flex: 1; }
        .skel-cell.w { flex: 2; }

        /* ─────────────────────────────────────────────────────────────────────
           ВЕРХНЯ ПАНЕЛЬ ТА НАВІГАЦІЯ
           ───────────────────────────────────────────────────────────────────── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
            padding: 4px 5px;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .tabs {
            display: flex;
            gap: 2px;
            background: #e5e5ea;
            border-radius: 12px;
            padding: 3px;
            margin-bottom: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            border: none;
            background: transparent;
            padding: 7px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-sec);
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab.active {
            background: white;
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.12);
        }

        /* ─────────────────────────────────────────────────────────────────────
           ФІЛЬТРИ
           ───────────────────────────────────────────────────────────────────── */
        .filters-wrap {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f2;
        }

        .filter-row:last-child { border-bottom: none; }

        .filter-label {
            font-size: 10px;
            font-weight: 800;
            color: #a0a0ab;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: 75px;
            flex-shrink: 0;
        }

        .pills-container {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }

        .pill {
            border: none;
            background: #f2f2f7;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: #6e6e73;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .pill.active {
            background: #1d1d1f;
            color: #fff;
        }

        /* ─────────────────────────────────────────────────────────────────────
           ТАБЛИЦІ
           ───────────────────────────────────────────────────────────────────── */
        .table-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 14px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .table-wrap {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 75vh;
            position: relative;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        th, td {
            padding: 8px 10px;
            font-size: 12px;
            border-bottom: 1px solid #f2f2f4;
            text-align: right;
            white-space: nowrap;
        }

        /* Sticky Columns */
        thead th {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #374151;
            color: #fff;
            font-weight: 600;
        }

        .c-l1 {
            position: sticky;
            left: 0;
            z-index: 50;
            background: inherit;
            text-align: left;
            border-right: 1px solid rgba(0,0,0,0.05);
            min-width: 60px;
        }

        .c-l2 {
            position: sticky;
            left: 60px;
            z-index: 45;
            background: inherit;
            text-align: left;
            border-right: 2px solid rgba(0,0,0,0.1);
            min-width: 45px;
        }

        th.c-l1, th.c-l2 { background: #374151 !important; z-index: 110; }

        /* Row Styles */
        tr.weekend td { background: #fffcf0; }
        tr.wk-sep td { border-top: 2px solid #e2e2e7; }
        tr:hover td { background: #f9f9fb !important; }

        tr.tot td {
            background: #f0f4ff !important;
            font-weight: 800;
            border-top: 2px solid #b0c0e0;
            color: #1e40af;
        }

        /* Delta Colors */
        .d-best { color: #15803d; font-weight: 800; background: #dcfce7; border-radius: 4px; padding: 2px 4px; }
        .d-good { color: #16a34a; font-weight: 700; }
        .d-neut { color: #6b7280; }
        .d-warn { color: #c2410c; font-weight: 700; }
        .d-bad  { color: #b91c1c; font-weight: 800; background: #fee2e2; border-radius: 4px; padding: 2px 4px; }

        /* Comparison Rows */
        tr.diff-row td {
            background: #fefce8 !important;
            font-size: 11px;
            font-weight: 500;
            color: #854d0e;
            border-bottom: 1px solid #fef08a;
        }
        .diff-up { color: #15803d; font-weight: 700; }
        .diff-down { color: #b91c1c; font-weight: 700; }

        /* ─────────────────────────────────────────────────────────────────────
           ГРАФІКИ
           ───────────────────────────────────────────────────────────────────── */
        .chart-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 14px;
        }

        .chart-wrap {
            position: relative;
            height: 550px;
            width: 100%;
        }

        .chart-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f8fa;
            border-radius: 12px;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-right: 12px;
            border-right: 1px solid #e5e5ea;
        }
        .ctrl-group:last-child { border-right: none; }

        /* ─────────────────────────────────────────────────────────────────────
           СТАТУСИ ТА ПІДКАЗКИ
           ───────────────────────────────────────────────────────────────────── */
        .status-box {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-sec);
            font-weight: 500;
        }

        .hint {
            font-size: 11px;
            color: var(--text-sec);
            padding: 10px 15px;
            background: #fafafa;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:12px">
            <a href="index.html" class="back-link">← Назад</a>
            <h1 class="page-title">Дельта щоденна</h1>
        </div>
    </div>

    <div class="tabs" id="mainTabs">
        <button class="tab active" onclick="setTab('table')">📋 Таблиця</button>
        <button class="tab" onclick="setTab('weekday')">📅 Пн–Чт / Пт–Нд</button>
        <button class="tab" onclick="setTab('weekly')">📆 По тижнях</button>
        <button class="tab" onclick="setTab('monthly')">🗓 По місяцях</button>
        <button class="tab" onclick="setTab('chart')">📈 Динаміка</button>
    </div>

    <div class="filters-wrap" id="filtersArea" style="display:none">
        <div class="filter-row">
            <span class="filter-label">Період</span>
            <div id="filterYM" class="pills-container"></div>
        </div>
        <div class="filter-row">
            <span class="filter-label">Магазин</span>
            <div id="filterStore" class="pills-container"></div>
        </div>
    </div>

    <div id="mainContent">
        <div class="table-card">
            <div class="status-box">Ініціалізація даних...</div>
        </div>
    </div>

<script>
    /* ─────────────────────────────────────────────────────────────────────
       КОНФІГУРАЦІЯ ТА КОНСТАНТИ
       ───────────────────────────────────────────────────────────────────── */
    const CONFIG = {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVyY9d_BjUGvXWa3VUFsdMoBwZH-MINuS8b91-lgNqeNMx-6UsE5oRJ66x6XVmK_JhXcGTbSK9Emx/pub?output=csv',
        months: ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'],
        colors: [
            '#0071e3', '#ff3b30', '#34c759', '#af52de', '#ff9500', '#5856d6', 
            '#ff2d55', '#00c7be', '#a2845e', '#5ac8fa', '#8e8e93', '#212121'
        ],
        storeHeaders: ['#1d4ed8', '#0e7490', '#7e22ce', '#be185d', '#15803d', '#a16207', '#4338ca', '#b91c1c']
    };

    /* ─────────────────────────────────────────────────────────────────────
       ГЛОБАЛЬНИЙ СТАН
       ───────────────────────────────────────────────────────────────────── */
    let rawData = [];
    let stores = [];
    let allYM = [];
    let state = {
        activeTab: 'table',
        selYM: new Set(),
        selStores: new Set(),
        chart: {
            mode: 'all_stores', // or 'single_store'
            period: 'day',      // day, week, month
            metric: 'delta',    // delta, foks, komf
            activeStore: ''
        }
    };

    let chartInstance = null;

    /* ─────────────────────────────────────────────────────────────────────
       ІНІЦІАЛІЗАЦІЯ ТА ПАРСИНГ
       ───────────────────────────────────────────────────────────────────── */
    async function init() {
        renderSkeleton();
        try {
            const response = await fetch(CONFIG.csvUrl + '?t=' + Date.now());
            const csvText = await response.text();
            const rows = parseCSV(csvText);
            
            processData(rows);
            
            // Початковий вибір: останній місяць
            if (allYM.length > 0) state.selYM.add(allYM[allYM.length - 1]);
            state.selStores = new Set(stores.map(s => s.name));
            if (stores.length > 0) state.chart.activeStore = stores[0].name;

            document.getElementById('filtersArea').style.display = 'block';
            renderFilters();
            render();
        } catch (err) {
            console.error(err);
            document.getElementById('mainContent').innerHTML = `
                <div class="table-card"><div class="status-box" style="color:#ff3b30">
                    Помилка завантаження даних: ${err.message}
                </div></div>`;
        }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result;
        });
    }

    function toNum(val) {
        if (!val) return null;
        const n = parseFloat(String(val).replace(/\s/g, '').replace(',', '.'));
        return isNaN(n) ? null : n;
    }

    function processData(rows) {
        // Знаходимо рядок з назвами магазинів (зазвичай 3-й рядок, індекс 2)
        const storeRow = rows[2];
        stores = [];
        for (let i = 7; i < storeRow.length; i++) {
            const name = storeRow[i];
            if (name) {
                stores.push({ name, fCol: i, kCol: i+1, dCol: i+2 });
                i += 2; // Пропускаємо колонки Комфі та Дельта
            }
        }

        // Парсимо дані починаючи з 5-го рядка
        const ymSet = new Set();
        rawData = [];
        for (let i = 4; i < rows.length; i++) {
            const r = rows[i];
            if (!r[0] || !r[6]) continue;

            const ymKey = `${r[0]}-${r[2].padStart(2, '0')}`;
            const rowObj = {
                year: r[0],
                month: parseInt(r[2]),
                week: r[1],
                dayName: r[5],
                date: r[6],
                ymKey: ymKey,
                isWeekend: r[5].toLowerCase().includes('сб') || r[5].toLowerCase().includes('нд'),
                vals: {}
            };

            stores.forEach(s => {
                const foks = toNum(r[s.fCol]);
                const komf = toNum(r[s.kCol]);
                let delta = toNum(r[s.dCol]);
                if (delta === null && foks > 0) delta = komf / foks;

                rowObj.vals[s.name] = { foks, komf, delta };
            });

            rawData.push(rowObj);
            ymSet.add(ymKey);
        }
        allYM = Array.from(ymSet).sort();
    }

    /* ─────────────────────────────────────────────────────────────────────
       РЕНДЕР КОМПОНЕНТІВ
       ───────────────────────────────────────────────────────────────────── */
    function renderFilters() {
        const ymCont = document.getElementById('filterYM');
        ymCont.innerHTML = '';
        allYM.forEach(ym => {
            const btn = document.createElement('button');
            btn.className = `pill ${state.selYM.has(ym) ? 'active' : ''}`;
            btn.textContent = ym;
            btn.onclick = () => {
                if (state.selYM.has(ym)) state.selYM.delete(ym);
                else state.selYM.add(ym);
                renderFilters(); render();
            };
            ymCont.appendChild(btn);
        });

        const stCont = document.getElementById('filterStore');
        stCont.innerHTML = '';
        stores.forEach(s => {
            const btn = document.createElement('button');
            const shortName = s.name.replace('Магазин ', '');
            btn.className = `pill ${state.selStores.has(s.name) ? 'active' : ''}`;
            btn.textContent = shortName;
            btn.onclick = () => {
                if (state.selStores.has(s.name)) state.selStores.delete(s.name);
                else state.selStores.add(s.name);
                renderFilters(); render();
            };
            stCont.appendChild(btn);
        });
    }

    function setTab(tab) {
        state.activeTab = tab;
        document.querySelectorAll('.tab').forEach(el => {
            el.classList.toggle('active', el.getAttribute('onclick').includes(tab));
        });
        render();
    }

    function render() {
        const container = document.getElementById('mainContent');
        const filteredData = rawData.filter(r => state.selYM.has(r.ymKey));

        if (state.activeTab === 'table') renderMainTable(container, filteredData);
        else if (state.activeTab === 'weekday') renderWeekdayTable(container, filteredData);
        else if (state.activeTab === 'weekly') renderAggregatedTable(container, filteredData, 'week');
        else if (state.activeTab === 'monthly') renderAggregatedTable(container, filteredData, 'month');
        else if (state.activeTab === 'chart') renderChartTab(container, filteredData);
    }

    /* ─────────────────────────────────────────────────────────────────────
       ЛОГІКА ТАБЛИЦЬ
       ───────────────────────────────────────────────────────────────────── */
    function getDeltaClass(v) {
        if (v === null) return '';
        if (v < 0.85) return 'd-best';
        if (v < 0.96) return 'd-good';
        if (v <= 1.05) return 'd-neut';
        if (v <= 1.20) return 'd-warn';
        return 'd-bad';
    }

    function nF(v, digits = 0) {
        if (v === null || isNaN(v)) return '—';
        return v.toLocaleString('uk-UA', { maximumFractionDigits: digits });
    }

    function renderMainTable(cont, data) {
        if (!data.length) { cont.innerHTML = '<div class="status-box">Оберіть період</div>'; return; }
        
        let html = `
            <div class="table-card">
                <div class="hint">Ф — Фокстрот | К — Комфі | Δ — Дельта (К/Ф)</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th class="c-l1">Дата</th>
                                <th class="c-l2">ДН</th>`;
        
        const activeSt = stores.filter(s => state.selStores.has(s.name));
        activeSt.forEach((s, i) => {
            const color = CONFIG.storeHeaders[i % CONFIG.storeHeaders.length];
            html += `<th colspan="3" style="background:${color}">${s.name}</th>`;
        });
        
        html += `</tr><tr><th class="c-l1"></th><th class="c-l2"></th>`;
        activeSt.forEach(() => html += `<th>Ф</th><th>К</th><th>Δ</th>`);
        html += `</tr></thead><tbody>`;

        let totals = {};
        activeSt.forEach(s => totals[s.name] = { f: 0, k: 0 });

        data.forEach(r => {
            html += `<tr class="${r.isWeekend ? 'weekend' : ''}">
                        <td class="c-l1">${r.date.split('.').slice(0,2).join('.')}</td>
                        <td class="c-l2">${r.dayName.slice(0,2)}</td>`;
            
            activeSt.forEach(s => {
                const v = r.vals[s.name];
                totals[s.name].f += (v.foks || 0);
                totals[s.name].k += (v.komf || 0);
                html += `<td>${nF(v.foks)}</td><td>${nF(v.komf)}</td><td class="${getDeltaClass(v.delta)}">${v.delta ? v.delta.toFixed(2) : '—'}</td>`;
            });
            html += `</tr>`;
        });

        // Рядок РАЗОМ
        html += `<tr class="tot"><td class="c-l1" colspan="2">РАЗОМ</td>`;
        activeSt.forEach(s => {
            const d = totals[s.name].f > 0 ? totals[s.name].k / totals[s.name].f : null;
            html += `<td>${nF(totals[s.name].f)}</td><td>${nF(totals[s.name].k)}</td><td class="${getDeltaClass(d)}">${d ? d.toFixed(2) : '—'}</td>`;
        });

        html += `</tbody></table></div></div>`;
        cont.innerHTML = html;
    }

    function renderAggregatedTable(cont, data, type) {
        // Групування за тижнями або місяцями
        const groups = {};
        data.forEach(r => {
            const key = type === 'week' ? `Т${r.week} (${r.year})` : CONFIG.months[r.month-1];
            if (!groups[key]) groups[key] = { label: key, f: {}, k: {}, rows: [] };
            groups[key].rows.push(r);
            
            stores.filter(s => state.selStores.has(s.name)).forEach(s => {
                const v = r.vals[s.name];
                groups[key].f[s.name] = (groups[key].f[s.name] || 0) + (v.foks || 0);
                groups[key].k[s.name] = (groups[key].k[s.name] || 0) + (v.komf || 0);
            });
        });

        let html = `<div class="table-card"><div class="table-wrap"><table><thead><tr><th class="c-l1">${type === 'week' ? 'Тиждень' : 'Місяць'}</th>`;
        const activeSt = stores.filter(s => state.selStores.has(s.name));
        activeSt.forEach(s => html += `<th colspan="3">${s.name}</th>`);
        html += `</tr></thead><tbody>`;

        Object.values(groups).forEach(g => {
            html += `<tr><td class="c-l1">${g.label}</td>`;
            activeSt.forEach(s => {
                const f = g.f[s.name], k = g.k[s.name];
                const d = f > 0 ? k/f : null;
                html += `<td>${nF(f)}</td><td>${nF(k)}</td><td class="${getDeltaClass(d)}">${d ? d.toFixed(2) : '—'}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div></div>`;
        cont.innerHTML = html;
    }

    function renderWeekdayTable(cont, data) {
        // Спеціальна логіка для Пн-Чт та Пт-Нд
        const weeks = {};
        data.forEach(r => {
            const wk = r.year + '_W' + r.week;
            if (!weeks[wk]) weeks[wk] = { label: `Т${r.week}`, wd: { f: {}, k: {} }, we: { f: {}, k: {} } };
            const target = r.isWeekend ? weeks[wk].we : weeks[wk].wd;
            
            stores.filter(s => state.selStores.has(s.name)).forEach(s => {
                const v = r.vals[s.name];
                target.f[s.name] = (target.f[s.name] || 0) + (v.foks || 0);
                target.k[s.name] = (target.k[s.name] || 0) + (v.komf || 0);
            });
        });

        let html = `<div class="table-card"><div class="table-wrap"><table><thead><tr><th class="c-l1">Тиждень</th><th class="c-l2">Період</th>`;
        const activeSt = stores.filter(s => state.selStores.has(s.name));
        activeSt.forEach(s => html += `<th colspan="3">${s.name}</th>`);
        html += `</tr></thead><tbody>`;

        Object.values(weeks).forEach(w => {
            ['wd', 'we'].forEach(type => {
                html += `<tr><td class="c-l1">${type === 'wd' ? w.label : ''}</td><td class="c-l2">${type === 'wd' ? 'Пн-Чт' : 'Пт-Нд'}</td>`;
                activeSt.forEach(s => {
                    const f = w[type].f[s.name], k = w[type].k[s.name];
                    const d = f > 0 ? k/f : null;
                    html += `<td>${nF(f)}</td><td>${nF(k)}</td><td class="${getDeltaClass(d)}">${d ? d.toFixed(2) : '—'}</td>`;
                });
                html += `</tr>`;
            });
        });

        html += `</tbody></table></div></div>`;
        cont.innerHTML = html;
    }

    /* ─────────────────────────────────────────────────────────────────────
       ДИНАМІКА (ГРАФІКИ)
       ───────────────────────────────────────────────────────────────────── */
    function renderChartTab(cont, data) {
        cont.innerHTML = `
            <div class="chart-card">
                <div class="chart-controls">
                    <div class="ctrl-group">
                        <button class="pill ${state.chart.mode === 'all_stores' ? 'active' : ''}" onclick="state.chart.mode='all_stores';render()">Усі магазини</button>
                        <button class="pill ${state.chart.mode === 'single_store' ? 'active' : ''}" onclick="state.chart.mode='single_store';render()">Один магазин</button>
                    </div>
                    <div class="ctrl-group">
                        <button class="pill ${state.chart.period === 'day' ? 'active' : ''}" onclick="state.chart.period='day';render()">День</button>
                        <button class="pill ${state.chart.period === 'week' ? 'active' : ''}" onclick="state.chart.period='week';render()">Тиждень</button>
                    </div>
                    <div class="ctrl-group" id="chartStoreSelector" style="display:${state.chart.mode === 'single_store' ? 'flex' : 'none'}">
                        <select onchange="state.chart.activeStore=this.value;render()" style="font-size:12px; padding:4px; border-radius:6px">
                            ${stores.map(s => `<option value="${s.name}" ${s.name === state.chart.activeStore ? 'selected' : ''}>${s.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
            </div>`;

        const ctx = document.getElementById('mainChart').getContext('2d');
        const chartData = prepareChartData(data);
        
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            plugins: [ChartDataLabels],
            data: {
                labels: chartData.labels,
                datasets: chartData.datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    datalabels: {
                        display: chartData.labels.length < 45,
                        align: (context) => context.datasetIndex % 2 === 0 ? 'top' : 'bottom',
                        offset: 6,
                        font: { size: 10, weight: '700' },
                        formatter: (v) => v ? v.toFixed(2) : ''
                    },
                    zoom: {
                        zoom: {
                            wheel: { enabled: true },
                            pinch: { enabled: true },
                            mode: 'x',
                        },
                        pan: { enabled: true, mode: 'x' }
                    }
                },
                scales: {
                    y: { 
                        min: 0.5, 
                        max: 1.6,
                        ticks: { stepSize: 0.1, font: { weight: 'bold' } },
                        grid: { color: '#f0f0f0' }
                    },
                    x: { grid: { display: false } }
                },
                onHover: (e, el) => {
                    if (el.length > 0) {
                        const idx = el[0].datasetIndex;
                        chartInstance.data.datasets.forEach((ds, i) => {
                            ds.borderColor = i === idx ? ds.originalColor : ds.originalColor + '20';
                        });
                    } else {
                        chartInstance.data.datasets.forEach(ds => ds.borderColor = ds.originalColor);
                    }
                    chartInstance.update('none');
                }
            }
        });
    }

    function prepareChartData(data) {
        let labels = [];
        let datasets = [];
        const activeSt = state.chart.mode === 'all_stores' 
            ? stores.filter(s => state.selStores.has(s.name))
            : stores.filter(s => s.name === state.chart.activeStore);

        if (state.chart.period === 'day') {
            labels = data.map(r => r.date.split('.').slice(0,2).join('.'));
            activeSt.forEach((st, i) => {
                const color = CONFIG.colors[i % CONFIG.colors.length];
                datasets.push({
                    label: st.name.replace('Магазин ', ''),
                    data: data.map(r => r.vals[st.name].delta),
                    borderColor: color,
                    backgroundColor: color,
                    originalColor: color,
                    borderWidth: 2.5,
                    tension: 0.3,
                    pointRadius: labels.length > 31 ? 0 : 3
                });
            });
        } else {
            // Агрегація за тижнями
            const weeks = [...new Set(data.map(r => r.week))];
            labels = weeks.map(w => 'Т' + w);
            activeSt.forEach((st, i) => {
                const color = CONFIG.colors[i % CONFIG.colors.length];
                const d = weeks.map(w => {
                    const rows = data.filter(r => r.week === w);
                    const f = rows.reduce((acc, curr) => acc + (curr.vals[st.name].foks || 0), 0);
                    const k = rows.reduce((acc, curr) => acc + (curr.vals[st.name].komf || 0), 0);
                    return f > 0 ? k / f : null;
                });
                datasets.push({
                    label: st.name.replace('Магазин ', ''),
                    data: d,
                    borderColor: color,
                    backgroundColor: color,
                    originalColor: color,
                    borderWidth: 3,
                    tension: 0.3
                });
            });
        }

        return { labels, datasets };
    }

    function renderSkeleton() {
        const cont = document.getElementById('mainContent');
        let html = '<div class="table-card">';
        for (let i = 0; i < 10; i++) {
            html += `<div class="skel-row">
                <div class="skel-cell skel w"></div>
                <div class="skel-cell skel"></div>
                <div class="skel-cell skel"></div>
                <div class="skel-cell skel"></div>
            </div>`;
        }
        html += '</div>';
        cont.innerHTML = html;
    }

    // Запуск
    init();
</script>
</body>
