<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Дельта щоденна</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<style>
:root {
--bg: #f5f5f7;
--text: #1d1d1f;
--text-sec: #6e6e73;
--accent: #0071e3;
--border: #d2d2d7;
--card: #fff;
--shadow: 0 4px 20px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
font-family: 'Inter', sans-serif;
background: var(--bg);
color: var(--text);
padding: 8px 10px 60px;
}
@keyframes shimmer {
0% { background-position: -600px 0; }
100% { background-position: 600px 0; }
}
.skel {
background: linear-gradient(90deg, #eaeaed 25%, #f5f5f7 50%, #eaeaed 75%);
background-size: 600px 100%;
animation: shimmer 1.4s ease-in-out infinite;
border-radius: 7px;
}
.skel-row { display: flex; gap: 8px; padding: 9px 10px; border-bottom: 1px solid #f2f2f4; }
.skel-cell { height: 11px; border-radius: 5px; flex: 1; }
.skel-cell.w { flex: 2; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
.back-link { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; }
.page-title { font-size: 20px; font-weight: 700; }
.tabs {
display: flex;
gap: 2px;
background: #e5e5ea;
border-radius: 12px;
padding: 3px;
margin-bottom: 12px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
}
.tab {
border: none;
background: transparent;
padding: 6px 14px;
border-radius: 10px;
font-size: 12px;
font-weight: 600;
cursor: pointer;
color: var(--text-sec);
font-family: inherit;
transition: all .2s;
white-space: nowrap;
}
.tab.active {
background: white;
color: var(--text);
box-shadow: 0 1px 4px rgba(0,0,0,.12);
}
.filters-wrap {
background: var(--card);
border-radius: 14px;
box-shadow: var(--shadow);
margin-bottom: 12px;
overflow: hidden;
border: 1px solid rgba(0,0,0,0.06);
}
.filter-row {
display: flex;
align-items: flex-start;
flex-wrap: nowrap;
gap: 4px;
padding: 7px 12px;
border-bottom: 1px solid #f0f0f2;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: thin;
}
.filter-row::-webkit-scrollbar { height: 4px; }
.filter-row::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 2px; }
.filter-row:last-child { border-bottom: none; }
.filter-label {
font-size: 10px;
font-weight: 700;
color: #a0a0ab;
text-transform: uppercase;
letter-spacing: .06em;
padding-top: 4px;
margin-right: 6px;
white-space: nowrap;
flex-shrink: 0;
}
.pill {
border: none;
background: transparent;
padding: 3px 7px;
border-radius: 7px;
font-size: 11px;
font-weight: 600;
cursor: pointer;
font-family: inherit;
color: #6e6e73;
transition: all .15s;
white-space: nowrap;
flex-shrink: 0;
}
.pill:hover { background: #f2f2f7; color: #1d1d1f; }
.pill.active { background: #1d1d1f; color: #fff; }
.pill-all { border: 1px solid #d2d2d7; color: #555; }
.pill-all.active { background: #374151; border-color: #374151; color: #fff; }
.table-card {
background: var(--card);
border-radius: 16px;
box-shadow: var(--shadow);
margin-bottom: 14px;
overflow: hidden;
}
.table-wrap {
overflow-x: auto;
-webkit-overflow-scrolling: touch;
max-height: 70vh;
overflow-y: auto;
}
.table-hint {
font-size: 11px;
color: var(--text-sec);
padding: 7px 12px;
border-bottom: 1px solid #f2f2f4;
background: #fafafa;
}
table { border-collapse: collapse; min-width: 100%; }
th, td {
padding: 4px 7px;
border-bottom: 1px solid #f2f2f4;
font-size: 11px;
text-align: right;
white-space: nowrap;
}
thead { 
position: sticky; 
top: 0; 
z-index: 60;
background: var(--card);
}
th.grp {
text-align: center;
font-size: 9px;
font-weight: 800;
letter-spacing: .05em;
color: #fff;
border-bottom: 1px solid rgba(255,255,255,0.15);
height: 22px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 120px;
}
th.sub {
font-size: 9px;
font-weight: 700;
color: rgba(255,255,255,0.9);
text-transform: uppercase;
height: 20px;
border-bottom: 2px solid rgba(0,0,0,0.2);
z-index: 10;
background-clip: padding-box;
}
th.c-l1, td.c-l1 {
position: sticky;
left: 0;
z-index: 50;
text-align: left;
min-width: 52px;
width: 52px;
font-size: 10px;
font-weight: 600;
background: var(--card);
border-right: 1px solid rgba(0,0,0,0.08);
}
th.c-l2, td.c-l2 {
position: sticky;
left: 52px;
z-index: 45;
text-align: left;
min-width: 34px;
width: 34px;
font-size: 10px;
background: var(--card);
border-right: 2px solid rgba(0,0,0,0.1);
box-shadow: 3px 0 5px -2px rgba(0,0,0,.07);
padding-right: 4px;
}
th.c-l1, th.c-l2 { background: #374151; color: #fff; }
tr.weekend td { background: #fff8f0 !important; }
tr.weekend td.c-l1, tr.weekend td.c-l2 { background: #fff0e0 !important; }
tr.wk-sep td { border-top: 2px solid #c8c8d0 !important; }
tr.tot td {
background: #f0f4ff !important;
font-weight: 700;
border-top: 2px solid #b0c0e0;
}
tr.tot td.c-l1, tr.tot td.c-l2 { background: #e0e8ff !important; }
.d5 { color: #15803d; font-weight: 700; background: rgba(21,128,61,.08); border-radius: 3px; padding: 1px 3px; }
.d4 { color: #16a34a; font-weight: 600; }
.d3 { color: #6b7280; font-weight: 600; }
.d2 { color: #c2410c; font-weight: 600; }
.d1 { color: #b91c1c; font-weight: 700; background: rgba(185,28,28,.08); border-radius: 3px; padding: 1px 3px; }
tr.diff-row td {
background: #fefce8;
font-size: 10px;
color: #7c2d12;
border-bottom: 1px solid #fde68a;
}
tr.diff-row td.c-l1 {
position: sticky;
left: 0;
z-index: 55;
background: #fefce8;
border-right: 2px solid rgba(0,0,0,0.1);
}
tr.diff-row td.c-l2 {
position: sticky;
left: 52px;
z-index: 50;
background: #fefce8;
}
tr.diff-row td.diff-pos { color: #15803d; }
tr.diff-row td.diff-neg { color: #b91c1c; }
.chart-card {
background: var(--card);
border-radius: 16px;
box-shadow: var(--shadow);
padding: 16px;
margin-bottom: 14px;
}
.chart-wrap { 
  position: relative; 
  height: 60vh; 
  min-height: 500px; 
  max-height: 700px; 
}
.ctrl-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
.ctrl-lbl { font-size: 11px; font-weight: 600; color: var(--text-sec); margin-right: 2px; }
.status-box { padding: 40px; text-align: center; color: var(--text-sec); font-size: 14px; }
.status-box.error { color: #ff3b30; }
#yearMonthPills, #storePills, #segmentPills {
flex-wrap: nowrap !important;
overflow-x: auto !important;
-webkit-overflow-scrolling: touch !important;
gap: 4px;
scroll-padding: 12px;
scrollbar-width: thin;
}
#yearMonthPills::-webkit-scrollbar, #storePills::-webkit-scrollbar, #segmentPills::-webkit-scrollbar { height: 6px; }
#yearMonthPills::-webkit-scrollbar-thumb, #storePills::-webkit-scrollbar-thumb, #segmentPills::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
.zoom-hint {
  font-size: 10px;
  color: #86868b;
  margin-top: 8px;
  text-align: center;
  font-style: italic;
}

/* ✅ МОБІЛЬНА ОПТИМІЗАЦІЯ */
@media (max-width: 768px) {
body { padding: 6px 8px 50px; }
.page-title { font-size: 18px; }
.tab { font-size: 11px; padding: 5px 10px; }
.filter-label { font-size: 9px; }
.pill { font-size: 10px; padding: 3px 6px; }
th, td { font-size: 10px; padding: 3px 5px; }
.chart-card { padding: 10px; }
.ctrl-row { gap: 4px; }
.ctrl-lbl { font-size: 10px; }
.chart-wrap { 
  height: 70vh !important; 
  min-height: 550px !important; 
  max-height: none !important;
}
.zoom-hint { font-size: 9px; margin-top: 6px; }
.table-wrap { max-height: 60vh; }
}

/* ✅ ПЛАВНІ ПЕРЕХОДИ */
.pill { transition: all 0.15s ease; }
.chart-wrap canvas { transition: opacity 0.2s ease; }
#btnTooltip.active { background: #1d1d1f !important; color: white !important; }
#btnTooltip:not(.active) { background: #ef4444 !important; color: white !important; }
</style>
</head>
<body>
<div class="top-bar">
<div style="display:flex;align-items:center;gap:14px">
<a href="index.html" class="back-link">← Назад</a>
<div class="page-title">Дельта щоденна</div>
</div>
</div>
<div class="tabs" id="tabsEl">
<button class="tab active" onclick="switchTab('table')">📋 Таблиця</button>
<button class="tab" onclick="switchTab('weekday')">📅 Пн–Чт / Пт–Нд</button>
<button class="tab" onclick="switchTab('weekly')">📆 По тижнях</button>
<button class="tab" onclick="switchTab('monthly')">🗓 По місяцях</button>
<button class="tab" onclick="switchTab('chart')">📈 Динаміка</button>
</div>
<div class="filters-wrap" id="filtersWrap" style="display:none">
<div class="filter-row">
<span class="filter-label">Рік-Місяць</span>
<div id="yearMonthPills" style="display:flex;gap:3px"></div>
</div>
<div class="filter-row">
<span class="filter-label">Магазин</span>
<div id="storePills" style="display:flex;gap:3px"></div>
</div>
<div class="filter-row">
<span class="filter-label">ДНІ</span>
<div id="segmentPills" style="display:flex;gap:3px"></div>
</div>
</div>
<div id="tabContent">
<div class="table-card"><div class="status-box">Завантаження…</div></div>
</div>
<script>
// ──────────────────────────────────────────────
// КОНСТАНТИ
// ──────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnVyY9d_BjUGvXWa3VUFsdMoBwZH-MINuS8b91-lgNqeNMx-6UsE5oRJ66x6XVmK_JhXcGTbSK9Emx/pub?output=csv';
const MONTHS_UK = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const DOW_WE = ["пт","сб","нд","субота","неділя","friday","saturday","sunday","пятниця"];
const STORE_HDR = ['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e','#1e40af','#7c3aed'];
const STORE_BG = ['#eff6ff','#ecfeff','#faf5ff','#fdf2f8','#ecfdf5','#fffbeb','#eff6ff','#f5f3ff'];
// ──────────────────────────────────────────────
// СТАН
// ──────────────────────────────────────────────
let stores = [], dataRows = [], allYearMonths = [];
let selYearMonths = new Set(), selStores = new Set();
let selSegments = new Set(['wd','we']);
let activeTab = 'table', chartInstance = null;
let selChartMode = 'store', selChartStore = '', selChartPeriod = 'day', selChartMetric = 'delta';
// ──────────────────────────────────────────────
// УТИЛІТИ
// ──────────────────────────────────────────────
function parseCSV(text) {
const res = []; let row = [], col = '', inQ = false;
for (let i = 0; i < text.length; i++) {
const c = text[i];
if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
else if (c === '"') inQ = !inQ;
else if (c === ',' && !inQ) { row.push(col.trim()); col = ''; }
else if ((c === '\n' || c === '\r') && !inQ) {
if (c === '\r' && text[i+1] === '\n') i++;
row.push(col.trim()); res.push(row); row = []; col = '';
}
else col += c;
}
if (col || row.length) { row.push(col.trim()); res.push(row); }
return res.filter(r => r.some(c => c));
}
function toN(v) {
if (!v && v !== 0) return null;
const s = String(v).replace(/\s|\u00a0/g,'').replace(',','.').replace('%','');
if (['#div/0!','#value!','#n/a','#ref!'].includes(s.toLowerCase())) return null;
const n = parseFloat(s); return isNaN(n) ? null : n;
}
function fmt(v) {
if (v === null || v === undefined) return '—';
const n = Number(v); if (isNaN(n)) return '—';
if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(2) + 'М';
if (Math.abs(n) >= 1000) return (n/1000).toFixed(1) + 'К';
if (n % 1 !== 0) return n.toFixed(2);
return n.toLocaleString('uk-UA');
}
function fmtDate(d) {
if (!d) return '';
const parts = d.replace(/\//g,'.').split('.');
if (parts.length === 3) {
const [a,b,c] = parts;
if (a.length === 4) return `${c}.${b}`;
return `${a}.${b}`;
}
return d;
}
function isWeekend(dow) {
return DOW_WE.some(w => String(dow).toLowerCase().trim() === w || String(dow).toLowerCase().includes(w));
}
// ──────────────────────────────────────────────
// SKELETON ЗАВАНТАЖЕННЯ
// ──────────────────────────────────────────────
function showSkel() {
const cont = document.getElementById('tabContent');
const card = document.createElement('div'); card.className = 'table-card';
const wrap = document.createElement('div');
for (let i = 0; i < 14; i++) {
const row = document.createElement('div'); row.className = 'skel-row';
for (let j = 0; j < 6; j++) {
const c = document.createElement('div');
c.className = 'skel-cell skel' + (j < 2 ? ' w' : '');
c.style.animationDelay = (i * .04 + j * .015) + 's';
row.appendChild(c);
}
wrap.appendChild(row);
}
card.appendChild(wrap);
cont.innerHTML = '';
cont.appendChild(card);
}
// ──────────────────────────────────────────────
// ПАРСИНГ ДАНИХ З CSV
// ──────────────────────────────────────────────
function detect(rows) {
let subRow = -1, storeRow = -1;
for (let i = 0; i < Math.min(10, rows.length); i++) {
const r = rows[i].map(c => (c || '').toLowerCase().trim());
if (r.filter(c => c.includes('фокстрот') || c === 'фокс').length >= 1 &&
r.filter(c => c.includes('комфі') || c === 'комф').length >= 1) {
subRow = i;
storeRow = i - 1;
break;
}
}
if (subRow === -1) { subRow = 3; storeRow = 2; }
const storeRowData = rows[storeRow] || [];
const subRowData = rows[subRow] || [];
stores = [];
let curStore = '';
for (let i = 7; i < Math.max(storeRowData.length, subRowData.length); i++) {
const sn = (storeRowData[i] || '').trim();
if (sn) curStore = sn;
if (!curStore) continue;
const sub = (subRowData[i] || '').toLowerCase().trim();
if (!sub) continue;
let type = null;
if (sub.includes('фокс') || sub === 'фокстрот') type = 'foks';
else if (sub.includes('комф') || sub === 'комфі') type = 'komf';
else if (sub.includes('дельт') || sub.includes('delta')) type = 'delta';
if (!type) continue;
let st = stores.find(s => s.name === curStore);
if (!st) { st = { name: curStore, cols: [] }; stores.push(st); }
st.cols.push({ type, colIdx: i });
}
stores = stores.filter(s => s.name && s.name.trim() && s.cols.length > 0);

const dataStart = subRow + 1;
dataRows = [];
const ymSet = new Set();
for (let ri = dataStart; ri < rows.length; ri++) {
const row = rows[ri];
if (!row.some(c => c)) continue;
const year = toN(row[0]);
const week = toN(row[1]);
const monthNum = toN(row[2]);
const monthName = (row[3] || '').trim();
const dowName = (row[5] || '').trim();
const dateStr = (row[6] || '').trim();
if (!year || !dateStr) continue;
const mo = monthNum || (function() {
const lo = monthName.toLowerCase();
const idx = MONTHS_UK.findIndex(m => lo.includes(m.slice(0,3).toLowerCase()));
return idx >= 0 ? idx + 1 : null;
})();
if (!mo) continue;
let dowNum = 0;
const dowLo = dowName.toLowerCase();
const dowMap = {понеділок:1,пн:1,вівторок:2,вт:2,середа:3,ср:3,четвер:4,чт:4,"п'ятниця":5,пятниця:5,пт:5,субота:6,сб:6,неділя:7,нд:7};
for (const [k,v] of Object.entries(dowMap)) {
if (dowLo === k || dowLo.startsWith(k)) { dowNum = v; break; }
}
const storeVals = {};
stores.forEach(st => {
const fCol = st.cols.find(c => c.type === 'foks');
const kCol = st.cols.find(c => c.type === 'komf');
const dCol = st.cols.find(c => c.type === 'delta');
const fv = fCol ? toN(row[fCol.colIdx]) : null;
const kv = kCol ? toN(row[kCol.colIdx]) : null;
let dv = dCol ? toN(row[dCol.colIdx]) : null;
if (dv === null && fv != null && kv != null && fv !== 0) dv = kv / fv;
storeVals[st.name] = { foks: fv, komf: kv, delta: dv };
});
const isWE = dowNum >= 5 || (dowNum === 0 && isWeekend(dowName));
const yearMonthKey = year + '_' + String(mo).padStart(2, '0');
dataRows.push({ year, month: mo, week, dowName, dowNum, date: dateStr, storeVals, isWE, yearMonth: yearMonthKey });
ymSet.add(yearMonthKey);
}
allYearMonths = [...ymSet].sort();
selYearMonths = new Set(allYearMonths);
selStores = new Set(stores.map(s => s.name));

stores = stores.filter(st => {
return dataRows.some(r => {
const v = r.storeVals[st.name] || {};
return v.foks != null || v.komf != null || v.delta != null;
});
});
selStores = new Set(stores.map(s => s.name));
}
function activeData() {
return dataRows.filter(r => {
if (!selYearMonths.has(r.yearMonth)) return false;
const sts = activeStores();
return sts.some(st => {
const v = r.storeVals[st.name] || {};
return v.foks != null || v.komf != null;
});
});
}
function activeStores() {
return stores.filter(s => selStores.has(s.name));
}
// ──────────────────────────────────────────────
// ФІЛЬТРИ
// ──────────────────────────────────────────────
function mkPill(text, active, cls, onclick) {
const b = document.createElement('button');
b.className = 'pill' + (active ? ' active' : '') + (cls ? ' ' + cls : '');
b.textContent = text;
b.onclick = onclick;
if (active) { b.style.background = '#1d1d1f'; b.style.color = '#fff'; }
return b;
}
function renderFilters() {
const ymp = document.getElementById('yearMonthPills'); ymp.innerHTML = '';
const allYMA = allYearMonths.every(ym => selYearMonths.has(ym));
const baYM = mkPill('Всі', allYMA, 'pill-all', () => {
if (allYMA) allYearMonths.forEach(ym => selYearMonths.delete(ym));
else allYearMonths.forEach(ym => selYearMonths.add(ym));
renderFilters(); render();
});
if (allYMA) baYM.style.background = '#374151';
ymp.appendChild(baYM);

const yearsGrouped = {};
allYearMonths.forEach(ym => {
const [year, month] = ym.split('_');
if (!yearsGrouped[year]) yearsGrouped[year] = [];
yearsGrouped[year].push({key: ym, month: parseInt(month)});
});

Object.keys(yearsGrouped).sort().forEach(year => {
const yearDiv = document.createElement('div');
yearDiv.style.cssText = 'display:flex;flex-direction:column;gap:2px;margin-right:12px;';
const yearHeader = document.createElement('div');
yearHeader.style.cssText = 'font-weight:700;color:#374151;font-size:10px;margin-bottom:2px;';
yearHeader.textContent = year;
yearDiv.appendChild(yearHeader);

const monthsContainer = document.createElement('div');
monthsContainer.style.cssText = 'display:flex;gap:3px;flex-wrap:wrap;';

yearsGrouped[year].forEach(ym => {
const a = selYearMonths.has(ym.key);
const b = mkPill(MONTHS_UK[ym.month-1].slice(0,3), a, '', () => {
if (a) { if (selYearMonths.size > 1) selYearMonths.delete(ym.key); }
else selYearMonths.add(ym.key);
renderFilters(); render();
});
if (a) { b.style.background = '#1d1d1f'; b.style.color = '#fff'; }
monthsContainer.appendChild(b);
});
yearDiv.appendChild(monthsContainer);
ymp.appendChild(yearDiv);
});

const sp = document.getElementById('storePills'); sp.innerHTML = '';
const allSA = stores.every(s => selStores.has(s.name));
const baS = mkPill('Всі', allSA, 'pill-all', () => {
if (allSA) stores.forEach(s => selStores.delete(s.name));
else stores.forEach(s => selStores.add(s.name));
renderFilters(); render();
});
if (allSA) baS.style.background = '#374151';
sp.appendChild(baS);
stores.filter(s => s.name && s.name.trim()).forEach(s => {
const a = selStores.has(s.name);
const displayName = s.name.split(' ').slice(1,4).join(' ');
if (!displayName) return;

b.className = 'pill' + (selChartMetric === m.v ? ' active' : '');
b.textContent = m.l;
if (selChartMetric === m.v) { b.style.background = '#6b21a8'; b.style.color = '#fff'; }
b.onclick = () => { selChartMetric = m.v; renderChart(); };
c2.appendChild(b);
});
if (selChartMode === 'store') {
c2.appendChild(Object.assign(document.createElement('span'), {className: 'ctrl-lbl', textContent: ' Магазин:', style: 'margin-left:8px'}));
sts.forEach(st => {
const b = document.createElement('button');
b.className = 'pill' + (st.name === selChartStore ? ' active' : '');
b.textContent = st.name.split(' ').slice(1,4).join(' ');
b.title = st.name;
if (st.name === selChartStore) { b.style.background = '#1d1d1f'; b.style.color = '#fff'; }
b.onclick = () => { selChartStore = st.name; renderChart(); };
c2.appendChild(b);
});
}
card.appendChild(c2);

function getVal(rows, stName) {
let f = 0, k = 0;
rows.forEach(r => {
const v = r.storeVals[stName] || {};
if (v.foks != null) f += v.foks;
if (v.komf != null) k += v.komf;
});
if (selChartMetric === 'delta') return f > 0 ? k / f : null;
if (selChartMetric === 'foks') return f || null;
return k || null;
}

const gMap = new Map();
data.forEach(r => {
let k;
if (selChartPeriod === 'day') k = r.date;
else if (selChartPeriod === 'week') k = r.year + '_W' + String(r.week || 0).padStart(2, '0');
else k = r.year + '_' + String(r.month).padStart(2, '0');
if (!gMap.has(k)) gMap.set(k, []);
gMap.get(k).push(r);
});
const sortedKeys = [...gMap.keys()].sort();

const filteredKeys = sortedKeys.filter(k => {
const rows = gMap.get(k);
return rows.some(r => {
if (selChartMode === 'store') {
const v = r.storeVals[selChartStore] || {};
return v.foks != null || v.komf != null;
} else {
return sts.some(st => {
const v = r.storeVals[st.name] || {};
return v.foks != null || v.komf != null;
});
}
});
});

const labels = filteredKeys.map(k => {
if (selChartPeriod === 'day') return fmtDate(k);
if (selChartPeriod === 'week') { const p = k.split('_W'); return 'T' + p[1] + (p[0] ? ' ' + String(p[0]).slice(2) : ''); }
const p = k.split('_'); const m = parseInt(p[1]); return MONTHS_UK[m-1]?.slice(0,3) + (p[0] ? ' ' + String(p[0]).slice(2) : '');
});

const datasets = [];
const CHART_COLORS = ['#1a56db','#0e7490','#6b21a8','#9d174d','#065f46','#92400e'];
const dataLength = filteredKeys.length;

// ✅ ПОКАЗУЄМО ВСІ МІТКИ з розумним позиціюванням
const customDataLabelsConfig = {
display: true,
color: (context) => context.dataset.borderColor,
backgroundColor: 'rgba(255, 255, 255, 0.95)',
padding: 2,
font: { size: isMobile ? 8 : 9, weight: '600', family: 'Inter' },
formatter: (v) => v != null ? v.toFixed(2) : '',
anchor: 'end',
align: (context) => {
const idx = context.dataIndex;
const total = context.dataset.data.length;
if (idx === total - 1) return 'right';
if (idx % 4 === 0) return 'top';
if (idx % 4 === 1) return 'bottom';
if (idx % 4 === 2) return 'top';
return 'bottom';
},
offset: isMobile ? 4 : 6,
clip: false,
overflow: 'visible',
borderWidth: 1,
borderColor: (context) => context.dataset.borderColor + '60',
borderRadius: 4
};

if (selChartMode === 'store') {
const vals = filteredKeys.map(k => getVal(gMap.get(k), selChartStore));
const color = selChartMetric === 'delta' ? '#6b21a8' : (selChartMetric === 'foks' ? '#1a56db' : '#0e7490');
const isBar = selChartMetric === 'delta';
const dataset = {
type: isBar ? 'bar' : 'line',
label: selChartStore.split(' ').slice(1,3).join(' '),
data: vals,
backgroundColor: isBar ? vals.map(v => {
if (v === null) return 'rgba(200,200,200,0.3)';
if (v < 0.8) return 'rgba(21,128,61,0.7)';
if (v < 0.95) return 'rgba(22,163,74,0.6)';
if (v <= 1.05) return 'rgba(107,114,128,0.5)';
if (v <= 1.25) return 'rgba(194,65,12,0.6)';
return 'rgba(185,28,28,0.7)';
}) : color + '33',
borderColor: color,
borderWidth: isBar ? 0 : 2.5,
pointRadius: dataLength <= 40 ? 4 : 3,
pointHoverRadius: 8,
tension: 0.25,
fill: !isBar,
spanGaps: true,
datalabels: customDataLabelsConfig
};
dataset.originalColor = color;
datasets.push(dataset);
} else {
// ✅ ВИПРАВЛЕНО: додано "data:" перед vals
sts.forEach((st, i) => {
const color = CHART_COLORS[i % CHART_COLORS.length];
const vals = filteredKeys.map(k => getVal(gMap.get(k), st.name));
const dataset = {
type: 'line',
label: st.name.split(' ').slice(1,3).join(' '),
data: vals,  // ← Ось що було пропущено!
borderColor: color,
backgroundColor: color + '22',
borderWidth: 2.5,
pointRadius: dataLength <= 40 ? 4 : 3,
pointHoverRadius: 8,
tension: 0.25,
fill: false,
spanGaps: true,
datalabels: customDataLabelsConfig
};
dataset.originalColor = color;
datasets.push(dataset);
});
}

const wrap = document.createElement('div'); 
wrap.className = 'chart-wrap';
wrap.style.height = isMobile ? '70vh' : '60vh';
wrap.style.minHeight = isMobile ? '550px' : '500px';

const canvas = document.createElement('canvas'); canvas.id = 'dailyChart';
wrap.appendChild(canvas);

const zoomHint = document.createElement('div');
zoomHint.className = 'zoom-hint';
zoomHint.innerHTML = isMobile ? 
'💡 <i>Щипок для масштабу | Подвійний клік для скидання | Кнопка Tooltip вимикає підказки</i>' : 
'💡 <i>Коліщатко для масштабу | Подвійний клік для скидання</i>';
card.appendChild(wrap);
card.appendChild(zoomHint);

cont.innerHTML = '';
cont.appendChild(card);

if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
const ctx = canvas.getContext('2d');

chartInstance = new Chart(ctx, {
plugins: [ChartDataLabels, window.ChartZoom],
data: { labels, datasets },
options: {
responsive: true,
maintainAspectRatio: false,
interaction: { 
mode: isMobile ? 'nearest' : 'index', 
intersect: false
},
hover: {
mode: 'dataset',
intersect: false
},
onHover: (event, chartElement, chart) => {
const datasets = chart.data.datasets;
if (chartElement.length > 0) {
const index = chartElement[0].datasetIndex;
datasets.forEach((ds, i) => {
if (ds.originalColor) {
ds.borderColor = i === index ? ds.originalColor : ds.originalColor + '22';
}
});
} else {
datasets.forEach(ds => {
if (ds.originalColor) ds.borderColor = ds.originalColor;
});
}
chart.update('none');
},
plugins: {
legend: { 
display: datasets.length > 1, 
position: isMobile ? 'bottom' : 'top', 
labels: { 
font: { size: isMobile ? 9 : 11 }, 
boxWidth: isMobile ? 10 : 18, 
padding: isMobile ? 4 : 10,
usePointStyle: true
} 
},
tooltip: {
enabled: tooltipEnabled,
backgroundColor: 'rgba(0, 0, 0, 0.9)',
titleFont: { size: isMobile ? 11 : 13, weight: '600' },
bodyFont: { size: isMobile ? 10 : 12 },
padding: isMobile ? 6 : 12,
cornerRadius: isMobile ? 4 : 8,
displayColors: true,
hideOnClick: true,
callbacks: {
label: c => ' ' + c.dataset.label + ': ' + (c.raw != null ? (selChartMetric === 'delta' ? c.raw.toFixed(2) : fmt(c.raw)) : '—')
}
},
zoom: {
pan: { enabled: true, mode: 'x' },
zoom: {
wheel: { enabled: !isMobile },
pinch: { enabled: true },
mode: 'x'
}
},
datalabels: customDataLabelsConfig
},
scales: {
x: { 
grid: { 
display: true, 
drawOnChartArea: true,
color: '#e5e7eb'
}, 
ticks: { 
font: { size: isMobile ? 8 : 9 }, 
color: '#6b7280', 
maxTicksLimit: isMobile ? 6 : 24, 
maxRotation: isMobile ? 45 : 0,
autoSkip: true
} 
},
// ✅ АВТОМАТИЧНИЙ МАСШТАБ Y — БЕЗ ЖОРСТКИХ ОБМЕЖЕНЬ
y: {
grace: isMobile ? '35%' : '25%',  // Запас зверху і знизу
grid: { color: '#e5e7eb' },
ticks: {
font: { size: isMobile ? 9 : 10 },
color: '#6b7280',
callback: v => selChartMetric === 'delta' ? v.toFixed(2) : fmt(v)
}
// ✅ Chart.js сам підбере мін/макс під дані!
}
}
}
});
}
// ──────────────────────────────────────────────
// ПЕРЕМИКАННЯ ТАБІВ
// ──────────────────────────────────────────────
function switchTab(tab) {
activeTab = tab;
document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
const activeBtn = Array.from(document.querySelectorAll('.tab')).find(b => b.textContent.includes(tab === 'table' ? 'Таблиця' : tab === 'weekday' ? 'Пн–Чт' : tab === 'weekly' ? 'По тижнях' : tab === 'monthly' ? 'По місяцях' : 'Динаміка'));
if (activeBtn) activeBtn.classList.add('active');
render();
}
function render() {
if (activeTab === 'table') renderTable();
else if (activeTab === 'weekday') renderWeekday();
else if (activeTab === 'weekly') renderWeekly();
else if (activeTab === 'monthly') renderMonthly();
else renderChart();
}
// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
async function init() {
showSkel();
try {
const res = await fetch(CSV_URL + '&t=' + Date.now());
if (!res.ok) throw new Error('HTTP ' + res.status);
const text = await res.text();
const rows = parseCSV(text);
if (!rows.length) throw new Error('Порожній файл');
detect(rows);
if (!stores.length) throw new Error('Не знайдено магазини у файлі');
renderFilters();
render();
} catch (e) {
document.getElementById('tabContent').innerHTML = '<div class="table-card"><div class="status-box error">❌ ' + e.message + '</div></div>';
console.error(e);
}
}
init();
</script>
</body>
</html>
