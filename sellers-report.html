<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Звіт по продавцях</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        :root{--bg:#f5f5f7;--text:#1d1d1f;--text-sec:#6e6e73;--accent:#0071e3;--border:#d2d2d7;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,.06)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:8px 10px 60px}

        /* ── SKELETON + ANIMATION SYSTEM ── */
        @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .skel{
            background:linear-gradient(90deg,#eaeaed 25%,#f5f5f7 50%,#eaeaed 75%);
            background-size:600px 100%;
            animation:shimmer 1.4s ease-in-out infinite;
            border-radius:7px;
        }
        /* skeleton rank card */
        .rank-card-skel{
            background:#fff;border-radius:14px;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
            padding:11px 14px;display:flex;align-items:center;gap:14px;
            margin-bottom:7px;
        }
        .rank-card-skel-pos{width:24px;height:24px;border-radius:6px}
        .rank-card-skel-body{flex:1;display:flex;flex-direction:column;gap:7px}
        .rank-card-skel-line{height:12px;border-radius:6px}
        .rank-card-skel-sub{height:9px;width:50%;border-radius:5px}
        .rank-card-skel-val{width:52px;height:18px;border-radius:7px;flex-shrink:0}
        /* skeleton table row */
        .tbl-row-skel{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid #f2f2f4}
        .tbl-row-skel-cell{height:11px;border-radius:5px;flex:1}
        .tbl-row-skel-cell.wide{flex:2}
        /* real cards animate in */
        .rank-card.appear{animation:fadeInUp .3s ease both}
        .filters-wrap.appear,.metric-bar.appear,.dyn-controls.appear{animation:fadeIn .25s ease both}

        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
        .back-link{color:var(--accent);text-decoration:none;font-weight:600;font-size:14px}
        .page-title{font-size:20px;font-weight:700}
        .view-toggle{display:flex;gap:4px;background:#e5e5ea;border-radius:10px;padding:3px}
        .view-btn{border:none;background:transparent;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-sec);font-family:inherit;transition:all .2s}
        .view-btn.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}

        /* FILTERS */
        .filters-wrap{
            background:var(--card);border-radius:14px;box-shadow:var(--shadow);
            padding:0;margin-bottom:12px;overflow:visible;
            display:flex;align-items:stretch;flex-wrap:wrap;
            border:1px solid rgba(0,0,0,0.06);
        }
        .filter-group{
            display:flex;align-items:flex-start;
            padding:8px 12px;
            border-right:1px solid #f0f0f2;
            flex-shrink:0;
        }
        .filter-group:last-child{border-right:none}
        .filter-group:nth-child(1){flex-shrink:0}
        .filter-group:nth-child(2){flex-shrink:0}
        .filter-group.filter-flex{
            flex:1 1 auto;
            min-width:200px;
            border-right:none;
            border-top:0;
        }
        @media (max-width: 700px) {
            .filter-group.filter-flex{
                border-top:1px solid #f0f0f2;
                flex-basis:100%;
            }
            .filter-group{border-right:1px solid #f0f0f2}
            .filter-group:nth-child(2){border-right:none}
        }
        .filter-row{display:contents}
        .filter-label{
            font-size:10px;font-weight:700;color:#a0a0ab;
            text-transform:uppercase;letter-spacing:.06em;
            white-space:nowrap;margin-right:8px;user-select:none;
            padding-top:5px;flex-shrink:0;
        }
        .pills{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
        .pill{
            border:none;background:transparent;
            padding:4px 9px;border-radius:7px;
            font-size:11px;font-weight:600;cursor:pointer;
            font-family:inherit;color:#6e6e73;
            transition:all .15s;white-space:nowrap;line-height:1.4;
        }
        .pill:hover{background:#f2f2f7;color:#1d1d1f}
        .pill.active{background:#1d1d1f;color:#fff}

        /* TABLE */
        .table-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px}
        table{border-collapse:collapse;table-layout:fixed}
        th{text-align:center;padding:5px 3px;color:var(--text-sec);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;border-bottom:1px solid var(--border);background:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:sticky;top:0;z-index:10}
        td{padding:4px 3px;border-bottom:1px solid #f2f2f4;font-size:10px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        tr:last-child td{border-bottom:none}
        tr.total-row td{background:#e8f0fe!important;font-weight:700}
        tr.total-row .col-fix{background:#e8f0fe!important}
        tr:hover td{background:#fafafe}
        tr.total-row:hover td{background:#dce8fc!important}

        /* Sticky cols */
        .col-fix{position:sticky;left:0;background:white;z-index:5;text-align:left!important;padding-left:8px!important;box-shadow:4px 0 8px -2px rgba(0,0,0,.09);border-right:1px solid #e8e8ed;white-space:normal;word-break:break-word;line-height:1.25;font-size:9px;font-weight:600;color:var(--text)}
        th.col-fix{z-index:11;font-size:9px}

        /* Group headers */
        .gh{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:5px 3px;border-bottom:2px solid currentColor!important}
        .gh-to    {color:#0071e3}
        .gh-serv  {color:#34c759}
        .gh-acc   {color:#ff9500}
        .gh-eff   {color:#af52de}
        .gh-cat   {color:#5856d6}
        .gh-other {color:#86868b}
        .grp-start{border-left:2px solid #e8e8ed!important}

        .badge{display:inline-block;border-radius:5px;font-size:9px;font-weight:600;padding:1px 4px;white-space:nowrap}
        .b-to    {background:rgba(0,113,227,.12);color:#1a50b8}
        .b-serv  {background:rgba(52,199,89,.12);color:#1a7f37}
        .b-acc   {background:rgba(255,149,0,.12);color:#b85000}
        .b-eff   {background:rgba(175,82,222,.12);color:#6d28d9}
        .b-cat   {background:rgba(88,86,214,.12);color:#3634a3}
        .b-pct   {background:rgba(134,134,139,.10);color:#6e6e73}
        .b-plain {background:rgba(134,134,139,.07);color:#444}

        .table-hint{font-size:11px;color:var(--text-sec);padding:8px 12px;border-bottom:1px solid #f2f2f4;background:#fafafa;border-radius:16px 16px 0 0}

        /* RATING VIEW */
        .rating-panel{display:none}
        .rating-panel.visible{display:block}

        .metric-bar{
            background:var(--card);border-radius:14px;box-shadow:var(--shadow);
            padding:0;margin-bottom:12px;overflow:hidden;
            display:flex;align-items:stretch;flex-wrap:wrap;
            border:1px solid rgba(0,0,0,0.06);
        }
        .metric-bar-title{
            font-size:10px;font-weight:700;color:#a0a0ab;
            text-transform:uppercase;letter-spacing:.06em;
            white-space:nowrap;margin-right:8px;user-select:none;
            display:flex;align-items:center;padding:8px 14px;
            border-right:1px solid #f0f0f2;
        }
        .metric-pills{display:flex;gap:3px;align-items:center;flex-wrap:wrap;padding:6px 10px}
        .mpill{
            border:none;background:transparent;
            padding:4px 9px;border-radius:7px;
            font-size:11px;font-weight:600;cursor:pointer;
            font-family:inherit;color:#6e6e73;
            transition:all .15s;white-space:nowrap;line-height:1.4;
        }
        .mpill:hover{background:#f2f2f7;color:#1d1d1f}
        .mpill.active{color:white;border-color:transparent}

        .ranking-grid{display:flex;flex-direction:column;gap:7px}
        .rank-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;transition:transform .15s}
        .rank-card:hover{transform:translateY(-1px)}
        .rank-bg{position:absolute;left:0;top:0;height:100%;opacity:.07;border-radius:14px;pointer-events:none;transition:width .5s ease}
        .rank-top{display:flex;align-items:flex-start;gap:10px}
        .rank-pos{font-size:17px;font-weight:800;min-width:26px;text-align:center;line-height:1.4;flex-shrink:0}
        .rank-pos.gold{color:#f5a623}.rank-pos.silver{color:#9b9b9b}.rank-pos.bronze{color:#c47a3a}.rank-pos.rest{color:#ccc;font-size:13px}
        .rank-name{flex:1;min-width:0}
        .rank-name-text{font-size:12px;font-weight:700;white-space:normal;word-break:break-word;line-height:1.35}
        .rank-sub{font-size:10px;color:var(--text-sec);margin-top:2px}
        .rank-val{text-align:right;flex-shrink:0}
        .rank-val-main{font-size:13px;font-weight:800;line-height:1.2}
        .rank-val-sub{font-size:10px;color:var(--text-sec)}
        .rank-bar-bg{height:5px;background:#ebebef;border-radius:3px;overflow:hidden;margin-left:36px}
        .rank-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

        /* DYNAMICS */
        .dyn-panel{display:none}
        .dyn-panel.visible{display:block}
        .dyn-controls{
            background:var(--card);border-radius:14px;box-shadow:var(--shadow);
            padding:0;margin-bottom:12px;overflow:hidden;
            display:flex;align-items:stretch;flex-wrap:wrap;
            border:1px solid rgba(0,0,0,0.06);
        }
        .dyn-ctrl-title{
            font-size:10px;font-weight:700;color:#a0a0ab;
            text-transform:uppercase;letter-spacing:.06em;
            white-space:nowrap;user-select:none;
            display:flex;align-items:center;padding:8px 14px;
            border-right:1px solid #f0f0f2;
        }
        .dyn-chart-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
        .dyn-chart-wrap{position:relative;height:300px}
        @media(max-width:600px){.dyn-chart-wrap{height:220px}}
        .dyn-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text-sec);gap:8px;font-size:13px;font-weight:500}
        .dyn-metric-pills{display:flex;gap:3px;align-items:center;flex-wrap:wrap;padding:6px 10px;border-right:1px solid #f0f0f2}
        .dmpill{
            border:none;background:transparent;
            padding:4px 9px;border-radius:7px;
            font-size:11px;font-weight:600;cursor:pointer;
            font-family:inherit;color:#6e6e73;
            transition:all .15s;white-space:nowrap;line-height:1.4;
        }
        .dmpill:hover{background:#f2f2f7;color:#1d1d1f}
        .dmpill.active{color:white;border-color:transparent}
        .seller-selector{display:flex;gap:3px;flex-wrap:wrap;align-items:center;padding:6px 10px}
        .spill{
            border:none;background:transparent;
            padding:4px 9px;border-radius:7px;
            font-size:11px;font-weight:600;cursor:pointer;
            font-family:inherit;color:#6e6e73;
            transition:all .15s;white-space:nowrap;line-height:1.4;
        }
        .spill:hover{background:#f2f2f7;color:#1d1d1f}
        .spill.active{color:white;border-color:transparent}

        .status-box{padding:40px;text-align:center;color:var(--text-sec);font-size:14px}
        .status-box.error{color:#ff3b30}

        /* CATEGORIES VIEW */
        .cat-panel{display:none}
        .cat-panel.visible{display:block}
        .cat-summary-banner{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 16px;margin-bottom:12px;display:flex;gap:0;border:1px solid rgba(0,0,0,0.06)}
        .cat-stat{flex:1;text-align:center;padding:0 8px}
        .cat-stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#a0a0ab;margin-bottom:3px}
        .cat-stat-val{font-size:16px;font-weight:800;color:#1d1d1f}
        .cat-divider{width:1px;background:#f0f0f2;flex-shrink:0}
        .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:14px}
        .cat-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;border:1px solid rgba(0,0,0,0.06);position:relative;overflow:hidden}
        .cat-card-bg{position:absolute;left:0;top:0;height:100%;opacity:.07;pointer-events:none;border-radius:14px}
        .cat-card-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
        .cat-donut-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .cat-donut{flex-shrink:0}
        .cat-pct{font-size:22px;font-weight:800;line-height:1}
        .cat-pct-lbl{font-size:9px;color:var(--text-sec);font-weight:600;margin-top:2px}
        .cat-sum{font-size:13px;font-weight:700;margin-bottom:4px}
        .cat-dev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block}
        .cat-dev.up{background:rgba(52,199,89,.13);color:#1a7f37}
        .cat-dev.down{background:rgba(255,59,48,.10);color:#c0392b}
        .cat-dev.flat{background:rgba(134,134,139,.10);color:#6e6e73}
        .cat-bar-bg{height:5px;background:#ebebef;border-radius:3px;margin-top:8px;overflow:hidden}
        .cat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
        /* Cat table */
        #catTable th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#a0a0ab;padding:8px 10px;border-bottom:2px solid #f0f0f2;text-align:right;white-space:nowrap}
        #catTable th:first-child{text-align:left}
        #catTable td{font-size:11px;padding:7px 10px;border-bottom:1px solid #f5f5f7;text-align:right;white-space:nowrap}
        #catTable td:first-child{text-align:left;font-weight:700}
        #catTable tr:last-child td{border-bottom:none;font-weight:800;background:#f9f9fb}
        #catTable tr:hover td{background:#f5f8ff}
        .cat-color-dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;flex-shrink:0}

        /* Skeleton */
        @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
    </style>
</head>
<body>

<div class="top-bar">
    <div style="display:flex;align-items:center;gap:14px">
        <a href="index.html" class="back-link">← Назад</a>
        <div class="page-title">Звіт по продавцях</div>
    </div>
    <div class="view-toggle">
        <button class="view-btn active" id="btnTable" onclick="setView('table')">📋 Таблиця</button>
        <button class="view-btn" id="btnRating" onclick="setView('rating')">🏆 Рейтинг</button>
        <button class="view-btn" id="btnDyn" onclick="setView('dyn')">📈 Динаміка</button>
        <button class="view-btn" id="btnCat" onclick="setView('cat')">🍩 Категорії</button>
    </div>
</div>

<div class="filters-wrap" style="flex-direction:column;align-items:stretch">
    <div class="filter-group" style="border-right:none;border-bottom:1px solid #f0f0f2;flex-wrap:wrap">
        <span class="filter-label" style="padding-top:8px">📅 Період</span>
        <div class="pills" id="periodPills" style="flex-wrap:wrap;padding:6px 0"></div>
    </div>
    <div class="filter-group" style="border-right:none">
        <span class="filter-label">👤 Продавець</span>
        <div class="pills" id="sellerPills"></div>
    </div>
</div>

<!-- TABLE VIEW -->
<div id="tableSection">
    <div class="table-card" id="tableCard">
        <div class="status-box">Завантаження…</div>
    </div>
</div>

<!-- DYNAMICS VIEW -->
<div class="dyn-panel" id="dynPanel">
    <div class="dyn-controls">
        <span class="dyn-ctrl-title">Показник</span>
        <div class="dyn-metric-pills" id="dynMetricPills"></div>
        <span class="dyn-ctrl-title" style="border-left:1px solid #f0f0f2;padding-left:14px">Продавці</span>
        <div class="seller-selector" id="dynSellerPills"></div>
    </div>
    <div class="dyn-chart-card">
        <div id="dynChartBody"><div class="dyn-empty">📊 Оберіть показник і продавця</div></div>
    </div>
</div>

<!-- RATING VIEW -->
<div class="rating-panel" id="ratingPanel">
    <div class="metric-bar">
        <div style="display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #f0f0f2;gap:8px;flex-wrap:wrap">
            <span style="font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Режим</span>
            <div style="display:flex;gap:3px;background:#f0f0f5;border-radius:9px;padding:3px" id="modeToggle">
                <button id="modeBtnTotal" onclick="setAvgMode(false)" style="border:none;padding:4px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:white;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.12)">Загальне</button>
                <button id="modeBtnAvg"   onclick="setAvgMode(true)"  style="border:none;padding:4px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#6e6e73">⌀ Середнє/міс</button>
            </div>
            <span id="modeDesc" style="font-size:10px;color:#a0a0ab;flex:1">Загальна сума за обраний період</span>
        </div>
        <div class="metric-pills" id="metricPills"></div>
    </div>
    <div class="ranking-grid" id="rankingGrid"></div>
</div>

<!-- CATEGORIES VIEW -->
<div class="cat-panel" id="catPanel">
    <div id="catSummaryBanner"></div>
    <div id="catDonutWrap" style="background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px;display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
            <div style="font-size:13px;font-weight:700">Структура продажів за категоріями</div>
        </div>
        <div style="position:relative;height:280px;max-width:420px;margin:0 auto">
            <canvas id="catDonutCanvas"></canvas>
        </div>
    </div>
    <div id="catTableWrap" style="background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow-x:auto;margin-bottom:12px;display:none">
        <table id="catTable" style="width:100%;border-collapse:collapse;table-layout:auto"></table>
    </div>
    <div class="cat-grid" id="catGrid"></div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdFA0KeLd--Xe-bZL6XSZl5jGBu9qGi32Q-Vm8G1wFSjh4rL52f2L2poIUq-mgJ779NCjd-w7o9ago/pub?output=csv';

const MONTHS_UK = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

// Групи колонок для відображення
const COL_GROUPS = [
    { name:'Товарообіг', cls:'gh-to', cols:[
        { key:'ТО', label:'ТО', badge:'b-to', fmt:'money' },
        { key:'Шт', label:'Шт', badge:'b-to', fmt:'int' },
        { key:'Чеки', label:'Чеки', badge:'b-to', fmt:'int' },
        { key:'Ср. Чек', label:'Ср.Чек', badge:'b-to', fmt:'money' },
        { key:'ASP', label:'ASP', badge:'b-to', fmt:'money' },
        { key:'КПЧ', label:'КПЧ', badge:'b-to', fmt:'dec2' },
    ]},
    { name:'Послуги', cls:'gh-serv', cols:[
        { key:'Послуги грн', label:'Послуги', badge:'b-serv', fmt:'money' },
        { key:'Доля Послуг', label:'Доля%', badge:'b-pct', fmt:'pct' },
    ]},
    { name:'Аксесуари', cls:'gh-acc', cols:[
        { key:'ACC', label:'ACC', badge:'b-acc', fmt:'money' },
        { key:'% Доля ACC', label:'Доля%', badge:'b-pct', fmt:'pct' },
    ]},
    { name:'Ефективність', cls:'gh-eff', cols:[
        { key:'Конверсія ПК', label:'Конв.', badge:'b-eff', fmt:'pct' },
        { key:'Конверсія ПК Offline', label:'Оф.Конв', badge:'b-eff', fmt:'pct' },
        { key:'% УДС', label:'УДС', badge:'b-plain', fmt:'money' },
        { key:'CSI', label:'CSI', badge:'b-eff', fmt:'dec2' },
    ]},
    { name:'Категорії', cls:'gh-cat', cols:[

// PARSE CSV
function parseCSV(text){
    const rows=[];let row=[],col='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
        else if(c==='"')inQ=!inQ;
        else if(c===','&&!inQ){row.push(col.trim());col='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(col.trim());rows.push(row);row=[];col='';}
        else col+=c;
    }
    if(col||row.length){row.push(col.trim());rows.push(row);}
    return rows.filter(r=>r.some(c=>c));
}

const MMAP={'січень':1,'лютий':2,'березень':3,'квітень':4,'травень':5,'червень':6,'липень':7,'серпень':8,'вересень':9,'жовтень':10,'листопад':11,'грудень':12,'січ':1,'лют':2,'бер':3,'кві':4,'тра':5,'чер':6,'лип':7,'сер':8,'вер':9,'жов':10,'лис':11,'гру':12};
function mNum(s){const lo=(s||'').toLowerCase().trim();for(const[k,v]of Object.entries(MMAP))if(lo===k||lo.startsWith(k))return v;return null;}

function toN(v){
    if(!v&&v!==0)return null;
    const s=String(v).replace(/\s|\u00a0/g,'').replace('%','').replace(',','.');
    if(['#div/0!','#value!','#ref!','#n/a','#name?'].includes(s.toLowerCase()))return null;
    const n=parseFloat(s);return isNaN(n)?null:n;
}

function normalizeHeader(h){return (h||'').toLowerCase().trim().replace(/\./g,'').replace(/\s+/g,' ');}
function canonicalKey(h){const n=normalizeHeader(h);return COL_NAME_MAP[n] || h;}

function parseFull(rows){
    if(!rows.length)return;
    const rawHeader=rows[0].map(h=>(h||'').trim());
    const header=rawHeader.map(h=>canonicalKey(h));
    console.log('[sellers-report] CSV заголовки (raw → canonical):');
    rawHeader.forEach((raw,i)=>{ if(raw) console.log(`  [${i}] "${raw}" → "${header[i]}"`); });
    const idx={};
    header.forEach((h,i)=>{ idx[h]=i; });
    const iYear=findIdx(header,['рік','year']);
    const iMonth=findIdx(header,['місяць','month','міс']);
    const iSeller=findIdx(header,['продавець','seller','пк','ім\'я']);
    if(iYear<0||iMonth<0||iSeller<0){console.warn('Не знайдено стандартні колонки, спробую 0,1,2');}
    const ySet=new Set(),mSet=new Set(),sSet=new Set();
    rows.slice(1).forEach(row=>{
        const yr=toN(row[iYear>=0?iYear:0]);
        const mo=mNum(row[iMonth>=0?iMonth:1]);
        const seller=(row[iSeller>=0?iSeller:2]||'').trim();
        if(!yr||!mo||!seller)return;
        if(/загальний|підсумок|разом|total|сума/i.test(seller))return;
        ySet.add(yr);mSet.add(mo);sSet.add(seller);
        const rec={рік:yr,місяць:mo,продавець:seller};
        const skipIdx=new Set([iYear>=0?iYear:0,iMonth>=0?iMonth:1,iSeller>=0?iSeller:2]);
        header.forEach((h,hi)=>{
            if(skipIdx.has(hi))return;
            if(!h)return;
            const v=toN(row[hi]);
            if(v!==null)rec[h]=v;
        });
        allData.push(rec);
    });
    allYears=[...ySet].sort((a,b)=>b-a);
    allMonths=[...mSet].sort((a,b)=>a-b);
    allSellers=[...sSet].sort();
}

function findIdx(header,keys){
    for(const k of keys){
        const i=header.findIndex(h=>h.toLowerCase().includes(k));
        if(i>=0)return i;
    }
    return -1;
}

// FORMAT
function fmtV(v,type){
    if(v===null||v===undefined)return'—';
    const n=Number(v);if(isNaN(n))return String(v);
    switch(type){
        case'money':
            if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+'М';
            if(Math.abs(n)>=1000)return(n/1000).toFixed(0)+'К';
            return Math.round(n).toLocaleString('uk-UA');
        case'int':return Math.round(n).toLocaleString('uk-UA');
        case'pct':return n.toFixed(2)+'%';
        case'dec2':return n.toFixed(2);
        default:return n%1!==0?n.toFixed(2):n.toLocaleString('uk-UA');
    }
}

// FILTER
function ym(y,m){return y*100+m;}
function ymKey(y,m){return y+'_'+m;}

function filteredData(){
    return allData.filter(r=>{
        if(selPeriods.size && !selPeriods.has(ymKey(r.рік,r.місяць))) return false;
        if(selSellers.size && !selSellers.has(r.продавець)) return false;
        return true;
    });
}

// Агрегація
const PCT_KEYS=new Set(['% Доля ACC','Доля Послуг','Конверсія ПК','Конверсія ПК Offline','КПЧ','ASP','Ср. Чек']);
function aggregate(rows){
    if(!rows.length)return null;
    const res={};const counts={};
    rows.forEach(row=>{
        Object.entries(row).forEach(([k,v])=>{
            if(typeof v!=='number')return;
            if(!res[k]){res[k]=0;counts[k]=0;}
            res[k]+=v;counts[k]++;
        });
    });
    PCT_KEYS.forEach(k=>{if(res[k]!==undefined)res[k]=res[k]/counts[k];});
    return res;
}

}

            if(dynSellerSet.has(s)){if(dynSellerSet.size>1)dynSellerSet.delete(s);}else dynSellerSet.add(s);
            renderDynControls();renderDynChart();
        };
        sp.appendChild(b);
    });
}

function renderDynChart(){
    const body=document.getElementById('dynChartBody');
    if(dynSellerSet.size===0){
        if(dynChartInstance){dynChartInstance.destroy();dynChartInstance=null;}
        body.innerHTML='<div class="dyn-empty">📊 Оберіть продавця</div>';return;
    }
    const fd=filteredData();
    if(!fd.length){body.innerHTML='<div class="dyn-empty">Немає даних</div>';return;}
    const allPairs=getAllPairs().filter(p=>selPeriods.has(p.key));
    const xYears=[...new Set(allPairs.map(p=>p.y))].sort((a,b)=>a-b);
    const multiYear=xYears.length>1;
    const labels=allPairs.map(p=>multiYear?MONTHS_UK[p.m-1].slice(0,3)+' '+String(p.y).slice(2):MONTHS_UK[p.m-1].slice(0,3));
    const metricMeta=DYN_METRICS.find(x=>x.key===dynMetricKey)||{key:dynMetricKey,label:dynMetricKey,color:'#0071e3',fmt:'money'};
    const isPct=PCT_KEYS.has(dynMetricKey);
    const sellers=[...dynSellerSet];
    const datasets=[];
    const DYN_COLORS=['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c'];
    sellers.forEach((seller,si)=>{
        const color=DYN_COLORS[si%DYN_COLORS.length];
        const label=seller.split(' ').slice(0,2).join(' ');
        const data=allPairs.map(p=>{
            const rows=allData.filter(r=>r.рік===p.y&&r.місяць===p.m&&r.продавець===seller);
            if(!rows.length)return null;
            const vals=rows.map(r=>r[dynMetricKey]).filter(v=>v!=null);
            if(!vals.length)return null;
            return isPct?vals.reduce((a,b)=>a+b,0)/vals.length:vals.reduce((a,b)=>a+b,0);
        });
        if(data.every(v=>v===null))return;
        datasets.push({label,data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true});
    });
    if(dynChartInstance){dynChartInstance.destroy();dynChartInstance=null;}
    body.innerHTML='<div class="dyn-chart-wrap"><canvas id="dynCanvas"></canvas></div>';
    const smartLabels={
        id:'sl',
        afterDatasetsDraw(chart){
            const ctx=chart.ctx;ctx.save();
            const FS=9,PX=3,PY=2,LH=FS+PY*2+2,GAP=3;
            ctx.font=`600 ${FS}px Inter,sans-serif`;
            const pts=[];
            chart.data.datasets.forEach((ds,di)=>{
                const meta=chart.getDatasetMeta(di);if(meta.hidden)return;
                ds.data.forEach((val,pi)=>{
                    if(val===null||val===undefined)return;
                    const el=meta.data[pi];if(!el)return;
                    const text=fmtV(val,metricMeta.fmt);
                    pts.push({x:el.x,y:el.y,text,color:ds.borderColor,tw:ctx.measureText(text).width});
                });
            });
            const byX={};pts.forEach(p=>{const k=Math.round(p.x);if(!byX[k])byX[k]=[];byX[k].push(p);});
            Object.values(byX).forEach(grp=>{
                grp.sort((a,b)=>a.y-b.y);
                grp.forEach(p=>{p.ly=p.y-LH/2-5;});
                for(let it=0;it<20;it++){let ch=false;for(let i=1;i<grp.length;i++){const pr=grp[i-1],cu=grp[i],df=(pr.ly+LH+GAP)-cu.ly;if(df>0){pr.ly-=df/2;cu.ly+=df/2;ch=true;}}if(!ch)break;}
                grp.forEach(p=>{
                    const bw=p.tw+PX*2,bh=FS+PY*2,bx=p.x-bw/2,by=p.ly-bh/2;
                    ctx.shadowColor='rgba(0,0,0,0.13)';ctx.shadowBlur=3;ctx.shadowOffsetY=1;
                    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
                    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
                    ctx.strokeStyle=p.color;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.stroke();
                    ctx.fillStyle=p.color;ctx.font=`700 ${FS}px Inter,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
                    ctx.fillText(p.text,p.x,by+bh/2);ctx.textAlign='left';ctx.textBaseline='alphabetic';
                    const lsy=by+bh;if(p.y-lsy>5){ctx.strokeStyle=p.color+'55';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(p.x,lsy);ctx.lineTo(p.x,p.y-4);ctx.stroke();ctx.setLineDash([]);}
                });
            });
            ctx.restore();
        }
    };
    const ctx2=document.getElementById('dynCanvas').getContext('2d');
    dynChartInstance=new Chart(ctx2,{
        type:'line',data:{labels,datasets},plugins:[smartLabels],
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            layout:{padding:{top:28,left:6,right:6}},
            plugins:{
                legend:{display:sellers.length>1,position:'top',labels:{font:{family:'Inter',size:10},boxWidth:16,padding:10}},
                tooltip:{backgroundColor:'#1d1d1f',titleFont:{family:'Inter',size:11},bodyFont:{family:'Inter',size:10},padding:9,
                    callbacks:{label:c=>` ${c.dataset.label}: ${fmtV(c.raw,metricMeta.fmt)}`}}
            },
            scales:{
                x:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',maxRotation:45}},
                y:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',callback:v=>fmtV(v,metricMeta.fmt)}}
            }
        }
    });
}

// ── RATING RENDER (FIXED) ──
function renderRating(){
    renderMetricPills();
    const data=filteredData();
    const grid=document.getElementById('rankingGrid');
    showRatingSkeleton(grid, 7);
    if(!data.length){
        setTimeout(()=>{grid.innerHTML='<div class="status-box">Немає даних</div>';},150);
        return;
    }
    setTimeout(()=>{
        grid.innerHTML='';
        const m=RATING_METRICS.find(x=>x.key===activeMetricKey)||RATING_METRICS[0];
        const byS={};
        data.forEach(r=>{if(!byS[r.продавець])byS[r.продавець]=[];byS[r.продавець].push(r);});

        const scored=Object.entries(byS).map(([seller,rows])=>{
            const agg=aggregate(rows);
            const uniqueMonths=new Set(rows.map(r=>r.рік+'-'+r.місяць)).size;
            const CAT_KEYS=['AV','IT','DIG','SDA','MDA','NIP'];
            const isAvgByNature = PCT_KEYS.has(m.key);

            const rawTotal = m.allCat
                ? CAT_KEYS.reduce((s,k)=>s+(agg&&agg[k]!=null?agg[k]:0),0)||null
                : agg?agg[m.key]:null;

            const monthlyVal = rawTotal!=null && uniqueMonths>0 && !isAvgByNature
                ? rawTotal / uniqueMonths
                : rawTotal;

            const val = avgMode && !isAvgByNature ? monthlyVal : rawTotal;

            return {seller, val, rawTotal, monthlyVal, uniqueMonths, agg, isAvgByNature};
        }).filter(x=>x.val!==null);

        scored.sort((a,b)=>m.higher?b.val-a.val:a.val-b.val);
        const maxVal=scored[0]?.val||1;

        // ✅ FIX #2: Розрахунок зваженого середнього по магазину
        const isAvgByNatureGlobal = PCT_KEYS.has(m.key);
        const totalMonthsAll = scored.reduce((s,x)=>s+x.uniqueMonths, 0);
        const totalRawAll    = scored.reduce((s,x)=>s+(x.rawTotal!=null?x.rawTotal:0), 0);

        // Зважене середнє по магазину на місяць
        const storeMonthlyAvg = isAvgByNatureGlobal && scored.length>0
            ? scored.reduce((s,x)=>s+(x.val!=null?x.val:0),0) / scored.length
            : (totalMonthsAll>0 ? totalRawAll/totalMonthsAll : 0);

        const banner = document.createElement('div');
        banner.style.cssText=`background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1.5px solid ${m.color}33;padding:10px 14px;margin-bottom:4px;display:flex;gap:0;`;
        const mkStat=(label,valStr,color)=>`
            <div style="flex:1;text-align:center;padding:0 8px">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#a0a0ab;margin-bottom:3px">${label}</div>
                <div style="font-size:15px;font-weight:800;color:${color}">${valStr}</div>
            </div>`;
        const div=(color='#f0f0f2')=>`<div style="width:1px;background:${color};flex-shrink:0"></div>`;

        // Потенціал: хто має місячний показник нижче середнього
        const totalPotential = (m.fmt==='money'||m.fmt==='int')
            ? scored.filter(x => {
                const sellerAvg = x.isAvgByNature ? x.val : (x.rawTotal/x.uniqueMonths);
                return sellerAvg < storeMonthlyAvg;
            }).reduce((s,x) => {
                const sellerAvg = x.isAvgByNature ? x.val : (x.rawTotal/x.uniqueMonths);
                return s + (storeMonthlyAvg - sellerAvg) * x.uniqueMonths;
            }, 0)
            : 0;

        banner.innerHTML =
            mkStat('Продавців', scored.length, '#1d1d1f') +
            div() +
            mkStat(avgMode?'Сума/міс':'Загалом', fmtV(scored.reduce((s,x)=>s+x.val,0), m.fmt), m.color) +
            div() +
            mkStat('🏪 Сер. по магазину/міс', fmtV(storeMonthlyAvg, m.fmt), '#5856d6') +
            (totalPotential>0 ? div()+ mkStat('🎯 Потенціал', fmtV(totalPotential, m.fmt), '#c0392b') : '');
        grid.appendChild(banner);

        scored.forEach((item,i)=>{
            const barPct=(item.val/maxVal*100).toFixed(1);
            const isAvgByNature=item.isAvgByNature;
            const subLine = avgMode && item.rawTotal!=null && !isAvgByNature
                ? `Загалом: ${fmtV(item.rawTotal, m.fmt)}`
                : (!avgMode && m.fmt==='money' && item.uniqueMonths>1 && !isAvgByNature
                    ? `Сер./міс: ${fmtV(item.monthlyVal, m.fmt)}`
                    : '');

            // ✅ FIX #2: Відхилення від зваженого середнього по магазину
            const sellerMonthlyAvg = item.isAvgByNature 
                ? item.val 
                : (item.uniqueMonths>0 && item.rawTotal!=null ? item.rawTotal/item.uniqueMonths : null);
            const diff    = sellerMonthlyAvg!=null && storeMonthlyAvg!=null ? sellerMonthlyAvg - storeMonthlyAvg : null;
            const diffPct = storeMonthlyAvg && diff!=null ? (diff/storeMonthlyAvg*100) : 0;
            const diffColor = diff>=0 ? '#1a7f37' : '#c0392b';
            const diffBg    = diff>=0 ? 'rgba(52,199,89,0.10)' : 'rgba(255,59,48,0.10)';
            const diffSign  = diff>=0 ? '+' : '';
            const diffStr   = (m.fmt==='money'||m.fmt==='int') && diff!=null
                ? `${diffSign}${fmtV(Math.abs(diff),m.fmt)}/міс (${diffSign}${diffPct.toFixed(1)}%)`
                : `${diffSign}${diffPct.toFixed(1)}%`;

            const card=document.createElement('div');card.className='rank-card';
            card.innerHTML=`
                <div class="rank-bg" style="background:${m.color};width:${barPct}%"></div>
                <div class="rank-top">
                    <div class="rank-pos ${i===0?'gold':i===1?'silver':i===2?'bronze':'rest'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                    <div class="rank-name">
                        <div class="rank-name-text">${item.seller}</div>
                        <div class="rank-sub" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;align-items:center">
                            ${i>0?`<span>${(item.val/scored[0].val*100).toFixed(1)}% від лідера</span>`:''}
                            <span style="background:rgba(0,0,0,.06);border-radius:5px;padding:1px 6px;font-size:9px;font-weight:700;color:#6e6e73">📅 ${item.uniqueMonths} міс.</span>
                            <span style="background:${diffBg};border-radius:5px;padding:1px 7px;font-size:9px;font-weight:700;color:${diffColor}">${diff>=0?'▲':'▼'} ${diffStr}</span>
                        </div>
                    </div>
                    <div class="rank-val">
                        <div class="rank-val-main" style="color:${m.color}">${fmtV(item.val,m.fmt)}</div>
                        ${subLine?`<div class="rank-val-sub" style="font-size:9.5px;margin-top:2px;color:#86868b">${subLine}</div>`:''}
                    </div>
                </div>
                <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${barPct}%;background:${m.color}"></div></div>`;
            grid.appendChild(card);
        });
        animateCards(grid);
    }, 180);
}

function showTableSkeleton(card, rows=6, cols=5){
    card.innerHTML='';
    const wrap=document.createElement('div');
    wrap.style.cssText='padding:4px 0';
    for(let r=0;r<rows;r++){
        const row=document.createElement('div');
        row.className='tbl-row-skel';
        const widths=['wide','','','','','','',''];
        for(let c=0;c<cols;c++){
            const cell=document.createElement('div');
            cell.className='tbl-row-skel-cell skel'+(c===0?' wide':'');
            cell.style.animationDelay=(r*0.05+c*0.02)+'s';
            row.appendChild(cell);
        }
        wrap.appendChild(row);
    }
    card.appendChild(wrap);
}

function showRatingSkeleton(grid, count=7){
    grid.innerHTML='';
    for(let i=0;i<count;i++){
        const card=document.createElement('div');
        card.className='rank-card-skel';
        card.style.animationDelay=(i*0.06)+'s';

            <div class="rank-card-skel-pos skel" style="animation-delay:${i*0.06}s"></div>

            </div>
            <div class="rank-card-skel-val skel" style="animation-delay:${i*0.06+0.02}s"></div>`;
        grid.appendChild(card);
    }
}

function animateCards(grid){
    grid.querySelectorAll('.rank-card').forEach((card,i)=>{
        card.classList.add('appear');
        card.style.animationDelay=(i*0.055)+'s';
    });
}

const CAT_KEYS = ['AV','IT','DIG','SDA','MDA','NIP','ACC'];
const CAT_COLORS = {
    'AV' :'#c8392b', 'IT' :'#8e44ad', 'DIG':'#e67e22',
    'SDA':'#d35400', 'MDA':'#2980b9', 'NIP':'#27ae60', 'ACC':'#ff9500'
};
const CAT_LABELS = {
    'AV':'AV','IT':'IT','DIG':'DIG','SDA':'SDA','MDA':'MDA','NIP':'NIP','ACC':'ACC'
};

let catChartInstance=null;

function renderCat(){
    const data=filteredData();
    const banner=document.getElementById('catSummaryBanner');
    const grid=document.getElementById('catGrid');
    const donutWrap=document.getElementById('catDonutWrap');
    const tableWrap=document.getElementById('catTableWrap');
    banner.innerHTML='';grid.innerHTML='';
    donutWrap.style.display='none';tableWrap.style.display='none';

    if(!data.length){
        banner.innerHTML='<div class="status-box">Немає даних за обраний період</div>';
        return;
    }

    const uniqueMonths=new Set(data.map(r=>r.рік+'-'+r.місяць)).size;
    const totals={};let grandTotal=0;
    CAT_KEYS.forEach(k=>{
        const sum=data.reduce((s,r)=>s+(r[k]!=null?r[k]:0),0);
        totals[k]=sum;grandTotal+=sum;
    });

    const activeCats=CAT_KEYS.filter(k=>totals[k]>0);
    const sorted=[...CAT_KEYS].sort((a,b)=>totals[b]-totals[a]).filter(k=>totals[k]>0);
    const storeAvgMonPerCat = activeCats.length>0 && uniqueMonths>0
        ? (grandTotal / activeCats.length) / uniqueMonths
        : 0;
    const avgMonthly=uniqueMonths>0?grandTotal/uniqueMonths:0;

    const mkStat=(lbl,val,color='#1d1d1f')=>
        `<div class="cat-stat"><div class="cat-stat-lbl">${lbl}</div><div class="cat-stat-val" style="color:${color}">${val}</div></div>`;
    const dv=`<div class="cat-divider"></div>`;
    banner.innerHTML=`<div class="cat-summary-banner">
        ${mkStat('Загальна сума',fmtV(grandTotal,'money'),'#1d1d1f')}
        ${dv}${mkStat('Місяців у вибірці',uniqueMonths,'#5856d6')}
        ${dv}${mkStat('Сер./місяць (загалом)',fmtV(avgMonthly,'money'),'#0071e3')}
        ${dv}${mkStat('Сер./місяць на кат.',fmtV(storeAvgMonPerCat,'money'),'#34c759')}

    if(!sorted.length)return;

    donutWrap.style.display='block';

    catChartInstance=new Chart(canvas,{
        type:'doughnut',
        plugins:[ChartDataLabels],
        data:{
            labels:sorted.map(k=>k),
            datasets:[{
                data:sorted.map(k=>totals[k]),
                backgroundColor:sorted.map(k=>CAT_COLORS[k]),
                borderColor:'#fff',
                borderWidth:3,
                hoverOffset:10
            }]
        },
        options:{
            responsive:true,maintainAspectRatio:false,cutout:'52%',
            layout:{padding:{top:10,bottom:10,left:10,right:10}},
            plugins:{
                legend:{
                    display:true,position:'right',
                    labels:{
                        font:{family:'Inter',size:11,weight:'600'},
                        padding:12,boxWidth:13,boxHeight:13,
                        generateLabels(c){
                            return c.data.labels.map((lbl,i)=>{
                                const val=c.data.datasets[0].data[i];
                                const pct=grandTotal>0?(val/grandTotal*100).toFixed(1):'0';
                                const avgM=uniqueMonths>0?val/uniqueMonths:0;
                                return{
                                    text:`${lbl}  ${pct}%  ${fmtV(val,'money')}`,
                                    fillStyle:c.data.datasets[0].backgroundColor[i],
                                    strokeStyle:'#fff',lineWidth:0,index:i
                                };
                            });
                        }
                    }
                },
                tooltip:{
                    backgroundColor:'#1d1d1f',
                    callbacks:{
                        label:c=>{
                            const pct=grandTotal>0?(c.raw/grandTotal*100).toFixed(1):'0';
                            const avgM=uniqueMonths>0?c.raw/uniqueMonths:0;
                            return[
                                ` Сума: ${fmtV(c.raw,'money')} (${pct}%)`,
                                ` Сер./міс: ${fmtV(avgM,'money')}`
                            ];
                        }
                    }
                },
                datalabels:{
                    display:ctx=>ctx.dataset.data[ctx.dataIndex]/grandTotal>0.03,
                    color:'#fff',
                    font:{family:'Inter',size:10,weight:'700'},
                    textAlign:'center',
                    formatter:(val,ctx)=>{
                        const lbl=ctx.chart.data.labels[ctx.dataIndex];

        <th>Частка</th>
        <th>Сер./міс</th>
        <th>Відхилення сер./міс від сер. по маг.</th>
    </tr>`;
    tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    sorted.forEach(cat=>{
        const val=totals[cat];
        const color=CAT_COLORS[cat];
        const pct=grandTotal>0?(val/grandTotal*100):0;
        const avgMon=uniqueMonths>0?val/uniqueMonths:0;
        const dev=avgMon-storeAvgMonPerCat;
        const devPct=storeAvgMonPerCat>0?(dev/storeAvgMonPerCat*100):0;
        const devSign=dev>=0?'+':'';
        const devColor=dev>=0?'#1a7f37':'#c0392b';
        const tr=document.createElement('tr');
        tr.innerHTML=`
            <td style="padding-left:14px"><span class="cat-color-dot" style="background:${color}"></span><strong>${cat}</strong></td>
            <td style="font-weight:700;color:${color}">${fmtV(val,'money')}</td>
            <td style="font-weight:700">${pct.toFixed(1)}%</td>
            <td style="color:#1d1d1f;font-weight:600">${fmtV(avgMon,'money')}</td>
            <td style="font-weight:700;color:${devColor}">${dev>=0?'▲':'▼'} ${devSign}${fmtV(Math.abs(dev),'money')} (${devSign}${devPct.toFixed(1)}%)</td>`;
        tbody.appendChild(tr);
    });
    const trTot=document.createElement('tr');
    trTot.innerHTML=`
        <td style="padding-left:14px;font-weight:800">Загалом</td>
        <td style="font-weight:800">${fmtV(grandTotal,'money')}</td>
        <td style="font-weight:800">100%</td>
        <td style="font-weight:700">${fmtV(avgMonthly,'money')}</td>
        <td style="color:#86868b">—</td>`;
    tbody.appendChild(trTot);
    tbl.appendChild(tbody);

    grid.style.display='none';
}

    document.getElementById('btnTable').classList.toggle('active',mode==='table');
    document.getElementById('btnRating').classList.toggle('active',mode==='rating');
    document.getElementById('btnDyn').classList.toggle('active',mode==='dyn');
    document.getElementById('btnCat').classList.toggle('active',mode==='cat');
    document.getElementById('tableSection').style.display=mode==='table'?'':'none';
    document.getElementById('ratingPanel').classList.toggle('visible',mode==='rating');
    document.getElementById('dynPanel').classList.toggle('visible',mode==='dyn');
    document.getElementById('catPanel').classList.toggle('visible',mode==='cat');
    if(mode==='rating')renderRating();
    else if(mode==='dyn'){renderDynControls();renderDynChart();}
    else if(mode==='cat')renderCat();

}

async function init(){
    showTableSkeleton(document.getElementById('tableCard'), 8, 6);
    try{
        const res=await fetch(CSV_URL+'&t='+Date.now());
        if(!res.ok)throw new Error('HTTP '+res.status);
        const text=await res.text();
        const rows=parseCSV(text);
        if(!rows.length)throw new Error('Порожній файл');
        parseFull(rows);
        if(!allData.length)throw new Error('Не вдалось розпізнати дані');
        const fw=document.querySelector('.filters-wrap');
        if(fw){fw.classList.add('appear');}
        renderFilters();
        renderTable();
    }catch(e){
        document.getElementById('tableCard').innerHTML=`<div class="status-box error">❌ ${e.message}</div>`;
        console.error(e);
    }
}
init();
</script>

</body>
</html>
