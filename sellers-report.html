<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Звіт по продавцях</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter,sans-serif;
background:#f5f5f7;
margin:10px;
color:#1d1d1f;
}

h2{
margin-bottom:8px;
}

.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:10px;
}

select{
padding:6px 10px;
border-radius:8px;
border:1px solid #ccc;
font-size:12px;
}

.table-card{
background:white;
border-radius:14px;
overflow:auto;
box-shadow:0 4px 16px rgba(0,0,0,.08);
}

table{
border-collapse:collapse;
min-width:1000px;
}

th,td{
padding:6px 8px;
font-size:11px;
border-bottom:1px solid #eee;
text-align:center;
white-space:nowrap;
}

th{
background:#fafafa;
font-weight:600;
position:sticky;
top:0;
}

.col-fix{
position:sticky;
left:0;
background:white;
font-weight:600;
text-align:left;
}

.rank-card{
background:white;
padding:8px 12px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.06);
margin-bottom:6px;
display:flex;
justify-content:space-between;
font-size:13px;
}

.section{
margin-top:18px;
}

canvas{
max-height:300px;
}

</style>
</head>

<body>

<h2>Звіт по продавцях</h2>

<div class="filters">

<select id="sellerFilter">
<option value="">Всі продавці</option>
</select>

<select id="metricSelect"></select>

</div>

<div class="table-card" id="tableSection"></div>

<div class="section">
<h3>Рейтинг</h3>
<div id="rankingGrid"></div>
</div>

<div class="section">
<h3>Динаміка</h3>
<canvas id="dynChart"></canvas>
</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTdFA0KeLd--Xe-bZL6XSZl5jGBu9qGi32Q-Vm8G1wFSjh4rL52f2L2poIUq-mgJ779NCjd-w7o9ago/pub?output=csv"

let rawData=[]
let filtered=[]
let columns=[]
let chart

function num(v){
if(!v) return 0
return parseFloat(
v.toString()
.replace(/\s/g,'')
.replace(',','.')
) || 0
}

async function loadData(){

const res=await fetch(CSV_URL)
const csv=await res.text()

const rows=csv.split("\n").map(r=>r.split(","))

columns=rows[0]

rawData=[]

for(let i=1;i<rows.length;i++){

let obj={}

columns.forEach((c,j)=>{
obj[c]=rows[i][j]
})

rawData.push(obj)

}

filtered=[...rawData]

buildFilters()
renderAll()

}

function buildFilters(){

const sellerSet=new Set()

rawData.forEach(r=>{
if(r["Продавець"]) sellerSet.add(r["Продавець"])
})

const sellerSelect=document.getElementById("sellerFilter")

sellerSelect.innerHTML='<option value="">Всі продавці</option>'

sellerSet.forEach(s=>{
sellerSelect.innerHTML+=`<option value="${s}">${s}</option>`
})

const metricSelect=document.getElementById("metricSelect")

metricSelect.innerHTML=""

columns.forEach(c=>{

if(c!=="Продавець" && c!=="Місяць"){

metricSelect.innerHTML+=`<option value="${c}">${c}</option>`

}

})

}

function applyFilters(){

const seller=document.getElementById("sellerFilter").value

filtered=rawData.filter(r=>{

if(!seller) return true

return r["Продавець"]===seller

})

renderAll()

}

function renderAll(){

renderTable()
renderRanking()
renderChart()

}

function renderTable(){

const container=document.getElementById("tableSection")

const table=document.createElement("table")

const thead=document.createElement("thead")
const tbody=document.createElement("tbody")

const trh=document.createElement("tr")

columns.forEach((c,i)=>{

const th=document.createElement("th")

th.textContent=c

if(i==0) th.className="col-fix"

trh.appendChild(th)

})

thead.appendChild(trh)

const fragment=document.createDocumentFragment()

filtered.forEach(r=>{

const tr=document.createElement("tr")

columns.forEach((c,i)=>{

const td=document.createElement("td")

td.textContent=r[c] || ""

if(i==0) td.className="col-fix"

tr.appendChild(td)

})

fragment.appendChild(tr)

})

tbody.appendChild(fragment)

table.appendChild(thead)
table.appendChild(tbody)

container.innerHTML=""
container.appendChild(table)

}

function renderRanking(){

const metric=document.getElementById("metricSelect").value

let map={}

filtered.forEach(r=>{

const seller=r["Продавець"]

const val=num(r[metric])

if(!seller) return

if(!map[seller]) map[seller]=0

map[seller]+=val

})

const arr=Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

let html=""

arr.forEach((r,i)=>{

html+=`
<div class="rank-card">
<div>${i+1}. ${r[0]}</div>
<div>${Math.round(r[1])}</div>
</div>
`

})

document.getElementById("rankingGrid").innerHTML=html

}

function renderChart(){

const metric=document.getElementById("metricSelect").value

let map={}

filtered.forEach(r=>{

const m=r["Місяць"]

const val=num(r[metric])

if(!m) return

if(!map[m]) map[m]=0

map[m]+=val

})

if(chart) chart.destroy()

chart=new Chart(document.getElementById("dynChart"),{

type:"line",

data:{
labels:Object.keys(map),
datasets:[{
label:metric,
data:Object.values(map),
tension:0.3
}]
},

options:{
responsive:true,
plugins:{
legend:{display:false}
}
}

})

}

document.getElementById("sellerFilter").addEventListener("change",applyFilters)
document.getElementById("metricSelect").addEventListener("change",renderAll)

loadData()

setInterval(loadData,300000)

</script>

</body>
</html>
