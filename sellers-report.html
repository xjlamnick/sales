        :root{--bg:#f5f5f7;--text:#1d1d1f;--text-sec:#6e6e73;--accent:#0071e3;--border:#d2d2d7;--card:#fff;--shadow:0 4px 20px rgba(0,0,0,.06)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:8px 10px 60px}

        /* ── SKELETON + ANIMATION SYSTEM ── */
        @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .skel{
            background:linear-gradient(90deg,#eaeaed 25%,#f5f5f7 50%,#eaeaed 75%);
            background-size:600px 100%;
            animation:shimmer 1.4s ease-in-out infinite;
            border-radius:7px;
        }
        /* skeleton rank card */
        .rank-card-skel{
            background:#fff;border-radius:14px;
            box-shadow:0 2px 10px rgba(0,0,0,.04);
            padding:11px 14px;display:flex;align-items:center;gap:14px;
            margin-bottom:7px;
        }
        .rank-card-skel-pos{width:24px;height:24px;border-radius:6px}
        .rank-card-skel-body{flex:1;display:flex;flex-direction:column;gap:7px}
        .rank-card-skel-line{height:12px;border-radius:6px}
        .rank-card-skel-sub{height:9px;width:50%;border-radius:5px}
        .rank-card-skel-val{width:52px;height:18px;border-radius:7px;flex-shrink:0}
        /* skeleton table row */
        .tbl-row-skel{display:flex;gap:8px;padding:8px 12px;border-bottom:1px solid #f2f2f4}
        .tbl-row-skel-cell{height:11px;border-radius:5px;flex:1}
        .tbl-row-skel-cell.wide{flex:2}
        /* real cards animate in */
        .rank-card.appear{animation:fadeInUp .3s ease both}
        .filters-wrap.appear,.metric-bar.appear,.dyn-controls.appear{animation:fadeIn .25s ease both}

        display:flex;align-items:flex-start;
        padding:8px 12px;

        flex-shrink:0;
        /* на маленьких екранах — перенос із повним рядком */
    }
    .filter-group:last-child{border-right:none}
    /* група Рік — мінімальна */
    .filter-group:nth-child(1){flex-shrink:0}
    /* група Місяць — може трохи рости */
    .filter-group:nth-child(2){flex-shrink:0}
    /* група Продавець — займає весь вільний простір, при переносі — повний рядок */
    .filter-group.filter-flex{

        border-right:none;
        border-top:0;

    @media (max-width: 700px) {

            border-top:1px solid #f0f0f2;

// PARSE
function parseCSV(text){
    const rows=[];let row=[],col='',inQ=false;
    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c==='"'&&text[i+1]==='"'){col+='"';i++;}
        else if(c==='"')inQ=!inQ;
        else if(c===','&&!inQ){row.push(col.trim());col='';}
        else if((c==='\n'||c==='\r')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;row.push(col.trim());rows.push(row);row=[];col='';}
        else col+=c;
    }
    if(col||row.length){row.push(col.trim());rows.push(row);}
    return rows.filter(r=>r.some(c=>c));
}

const MMAP={'січень':1,'лютий':2,'березень':3,'квітень':4,'травень':5,'червень':6,'липень':7,'серпень':8,'вересень':9,'жовтень':10,'листопад':11,'грудень':12,'січ':1,'лют':2,'бер':3,'кві':4,'тра':5,'чер':6,'лип':7,'сер':8,'вер':9,'жов':10,'лис':11,'гру':12};
function mNum(s){const lo=(s||'').toLowerCase().trim();for(const[k,v]of Object.entries(MMAP))if(lo===k||lo.startsWith(k))return v;return null;}

function toN(v){
    if(!v&&v!==0)return null;
    const s=String(v).replace(/\s|\u00a0/g,'').replace('%','').replace(',','.');
    if(['#div/0!','#value!','#ref!','#n/a','#name?'].includes(s.toLowerCase()))return null;
    const n=parseFloat(s);return isNaN(n)?null:n;
}

// Маппінг можливих назв колонок CSV → канонічний ключ COL_GROUPS

function normalizeHeader(h){
    return (h||'').toLowerCase().trim().replace(/\./g,'').replace(/\s+/g,' ');
}
function canonicalKey(h){
    const n=normalizeHeader(h);
    return COL_NAME_MAP[n] || h;
}

function parseFull(rows){
    if(!rows.length)return;
    const rawHeader=rows[0].map(h=>(h||'').trim());
    // Нормалізуємо заголовки — кожен raw header → канонічний ключ
    const header=rawHeader.map(h=>canonicalKey(h));
    // DEBUG: виводимо маппінг заголовків у консоль
    console.log('[sellers-report] CSV заголовки (raw → canonical):');
    rawHeader.forEach((raw,i)=>{ if(raw) console.log(`  [${i}] "${raw}" → "${header[i]}"`); });
    const idx={};
    header.forEach((h,i)=>{ idx[h]=i; });

    // Визначаємо індекси ключових колонок
    const iYear   = findIdx(header,['рік','year']);
    const iMonth  = findIdx(header,['місяць','month','міс']);
    const iSeller = findIdx(header,['продавець','seller','пк','ім\'я']);

    if(iYear<0||iMonth<0||iSeller<0){
        // Fallback: колонки 0,1,2
        console.warn('Не знайдено стандартні колонки, спробую 0,1,2');
    }

    const ySet=new Set(),mSet=new Set(),sSet=new Set();

    rows.slice(1).forEach(row=>{
        const yr = toN(row[iYear>=0?iYear:0]);
        const mo = mNum(row[iMonth>=0?iMonth:1]);
        const seller=(row[iSeller>=0?iSeller:2]||'').trim();
        if(!yr||!mo||!seller)return;
        // Ігноруємо підсумкові рядки
        if(/загальний|підсумок|разом|total|сума/i.test(seller))return;

        ySet.add(yr);mSet.add(mo);sSet.add(seller);

        const rec={рік:yr,місяць:mo,продавець:seller};
        const skipIdx=new Set([iYear>=0?iYear:0, iMonth>=0?iMonth:1, iSeller>=0?iSeller:2]);
        header.forEach((h,hi)=>{
            if(skipIdx.has(hi))return;
            if(!h)return;
            const v=toN(row[hi]);
            if(v!==null)rec[h]=v;
        });
        allData.push(rec);
    });

    allYears=[...ySet].sort((a,b)=>b-a);
    allMonths=[...mSet].sort((a,b)=>a-b);
    allSellers=[...sSet].sort();
    // dateFrom/dateTo встановлюються в renderFilters
}

function findIdx(header,keys){
    for(const k of keys){
        const i=header.findIndex(h=>h.toLowerCase().includes(k));
        if(i>=0)return i;
    }
    return -1;
}

// FORMAT
function fmtV(v,type){
    if(v===null||v===undefined)return'—';
    const n=Number(v);if(isNaN(n))return String(v);
    switch(type){
        case'money':
            if(Math.abs(n)>=1000000)return(n/1000000).toFixed(2)+'М';
            if(Math.abs(n)>=1000)return(n/1000).toFixed(0)+'К';
            return Math.round(n).toLocaleString('uk-UA');
        case'int':   return Math.round(n).toLocaleString('uk-UA');
        case'pct':   return n.toFixed(2)+'%';
        case'dec2':  return n.toFixed(2);
        default:     return n%1!==0?n.toFixed(2):n.toLocaleString('uk-UA');
    }
}

// FILTER
function ym(y,m){return y*100+m;}
function ymKey(y,m){return y+'_'+m;}

function filteredData(){
    return allData.filter(r=>{
        if(selPeriods.size && !selPeriods.has(ymKey(r.рік,r.місяць))) return false;
        if(selSellers.size && !selSellers.has(r.продавець)) return false;
        return true;
    });
}

// Агрегація: підсумовуємо числові поля, середнє для %-них і ефективностних
const PCT_KEYS  = new Set(['% Доля ACC','Доля Послуг','Конверсія ПК','Конверсія ПК Offline','КПЧ','ASP','Ср. Чек']);
function aggregate(rows){
    if(!rows.length)return null;
    const res={};
    const counts={};
    rows.forEach(row=>{
        Object.entries(row).forEach(([k,v])=>{
            if(typeof v!=='number')return;
            if(!res[k]){res[k]=0;counts[k]=0;}
            res[k]+=v;counts[k]++;
        });
    });
    // Середнє для % колонок
    PCT_KEYS.forEach(k=>{if(res[k]!==undefined)res[k]=res[k]/counts[k];});
    return res;
}

// ── FILTERS RENDER ──
function getAllPairs(){
    return [...new Set(allData.map(r=>ym(r.рік,r.місяць)))].sort((a,b)=>a-b)
        .map(v=>({y:Math.floor(v/100), m:v%100, key:ymKey(Math.floor(v/100),v%100)}));
}

function renderFilters(){
    const pairs=getAllPairs();
    if(!pairs.length) return;

    // За замовчуванням — всі вибрані
    if(selPeriods.size===0) pairs.forEach(p=>selPeriods.add(p.key));

    const pp=document.getElementById('periodPills');
    pp.innerHTML='';

    // "Всі" — toggle: якщо всі вибрані → зняти всі (залишити останній), якщо не всі → вибрати всі
    const allActive=selPeriods.size===pairs.length;
    const ab=document.createElement('button');
    ab.className='pill'+(allActive?' active':'');
    ab.textContent='Всі';
    ab.onclick=()=>{
        if(selPeriods.size===pairs.length){
            // Знімаємо всі — залишаємо лише останній (найновіший)
            selPeriods.clear();
            selPeriods.add(pairs[pairs.length-1].key);
        } else {
            pairs.forEach(p=>selPeriods.add(p.key));
        }
        renderFilters();refresh();
    };
    pp.appendChild(ab);

    // Пілюля на кожен місяць-рік: "Січ 24"
    pairs.forEach(p=>{
        const b=document.createElement('button');
        b.className='pill'+(selPeriods.has(p.key)?' active':'');
        b.textContent=MONTHS_UK[p.m-1].slice(0,3)+' '+String(p.y).slice(2);
        b.onclick=()=>{
            if(selPeriods.has(p.key)){if(selPeriods.size>1)selPeriods.delete(p.key);}
            else selPeriods.add(p.key);
            renderFilters();refresh();
        };
        pp.appendChild(b);
    });

    // Продавці
    const sp=document.getElementById('sellerPills');sp.innerHTML='';
    const allSellersActive=selSellers.size===0;

    // Кнопка "Всі"
    const sab=document.createElement('button');
    sab.className='pill'+(allSellersActive?' active':'');
    sab.textContent='Всі';
    sab.onclick=()=>{
        if(selSellers.size===0){
            if(allSellers.length) selSellers.add(allSellers[0]);
        } else {
            selSellers.clear();
        }
        renderFilters();refresh();
    };
    sp.appendChild(sab);

    allSellers.forEach(s=>{
        const active=selSellers.size===0||selSellers.has(s);
        const b=document.createElement('button');
        b.className='pill'+(active?' active':'');
        b.setAttribute('data-seller',s);
        b.textContent=s.split(' ').slice(0,2).join(' ');
        b.onclick=()=>{
            if(selSellers.size===0){
                // Зараз "всі" → обрати лише цього
                allSellers.forEach(x=>selSellers.add(x));
                selSellers.delete(s);
                // Якщо залишились всі крім одного — ок; якщо це єдиний — залишаємо його
                if(selSellers.size===0) selSellers.add(s);
            } else if(selSellers.has(s)){
                // Зняти цього — але не можна зняти останнього
                if(selSellers.size>1) selSellers.delete(s);
            } else {
                selSellers.add(s);
                // Якщо вибрані всі — переходимо в режим "всі" (clear)
                if(selSellers.size===allSellers.length) selSellers.clear();
            }
            renderFilters();refresh();
        };
        sp.appendChild(b);
    });
}

    const wrap=document.createElement('div');wrap.style.cssText='overflow-x:auto;-webkit-overflow-scrolling:touch;';card.appendChild(wrap);

    const totalCols=COL_GROUPS.reduce((s,g)=>s+g.cols.length,0);
    const nameW=100,colW=Math.max(46,Math.floor((window.innerWidth-nameW-1)/Math.min(totalCols,8)));

    // Colgroup
    const cg=document.createElement('colgroup');
    const c0=document.createElement('col');c0.style.width=nameW+'px';cg.appendChild(c0);
    COL_GROUPS.forEach(g=>g.cols.forEach(()=>{const c=document.createElement('col');c.style.width=colW+'px';cg.appendChild(c);}));
    tbl.appendChild(cg);

    // Thead row1: groups
    const thead=document.createElement('thead');

    const thCorner=document.createElement('th');thCorner.className='col-fix';thCorner.rowSpan=2;thCorner.textContent='Продавець';tr1.appendChild(thCorner);

        th.className='gh '+g.cls+(gi>0?' grp-start':'');tr1.appendChild(th);
    });
    thead.appendChild(tr1);
    // Thead row2: col names
    const tr2=document.createElement('tr');
    COL_GROUPS.forEach((g,gi)=>{
        g.cols.forEach((col,ci)=>{
            const th=document.createElement('th');th.textContent=col.label;
            th.className=g.cls+(ci===0&&gi>0?' grp-start':'');tr2.appendChild(th);
        });
    });
    thead.appendChild(tr2);
    tbl.appendChild(thead);

    // Body
    const tbody=document.createElement('tbody');
    const allRows=[];

    sellers.forEach(seller=>{
        const agg=aggregate(byS[seller]);
        if(!agg)return;
        // рахуємо унікальні місяці продавця у відфільтрованих даних
        const uniqueMonths=new Set(byS[seller].map(r=>r.рік+'-'+r.місяць)).size;
        const avgTO=agg['ТО']!=null&&uniqueMonths>0?agg['ТО']/uniqueMonths:null;
        allRows.push({seller,agg});
        const tr=document.createElement('tr');
        const tdN=document.createElement('td');tdN.className='col-fix';tdN.textContent=seller;tr.appendChild(tdN);
        COL_GROUPS.forEach((g,gi)=>{
            g.cols.forEach((col,ci)=>{
                const td=document.createElement('td');
                if(ci===0&&gi>0)td.classList.add('grp-start');
                let v;
                if(col.special==='months')      v=uniqueMonths;
                else if(col.special==='avg_to') v=avgTO;
                else                            v=agg[col.key];
                if(v!==undefined&&v!==null){
                    const sp=document.createElement('span');sp.className='badge '+col.badge;
                    sp.textContent=fmtV(v,col.fmt);td.appendChild(sp);
                } else{td.textContent='—';td.style.color='#ccc';}
                tr.appendChild(td);
            });
        });
        tbody.appendChild(tr);
    });

    // Підсумковий рядок
    if(sellers.length>1){
        const allAgg=aggregate(data);
        if(allAgg){
            const tr=document.createElement('tr');tr.className='total-row';
            const tdN=document.createElement('td');tdN.className='col-fix';tdN.textContent='∑ Разом';tr.appendChild(tdN);
            COL_GROUPS.forEach((g,gi)=>{
                g.cols.forEach((col,ci)=>{
                    const td=document.createElement('td');
                    if(ci===0&&gi>0)td.classList.add('grp-start');
                    // special колонки в підсумку — прочерк
                    if(col.special){td.textContent='—';td.style.color='#ccc';tr.appendChild(td);return;}
                    const v=allAgg[col.key];
                    if(v!==undefined&&v!==null){
                        const sp=document.createElement('span');sp.className='badge '+col.badge;
                        sp.textContent=fmtV(v,col.fmt);td.appendChild(sp);
                    } else{td.textContent='—';td.style.color='#ccc';}
                    tr.appendChild(td);
                });
            });
            tbody.appendChild(tr);
        }
    }

    tbl.appendChild(tbody);wrap.appendChild(tbl);

    );

    const metricMeta=DYN_METRICS.find(x=>x.key===dynMetricKey)||{key:dynMetricKey,label:dynMetricKey,color:'#0071e3',fmt:'money'};
    const isPct=PCT_KEYS.has(dynMetricKey);

    const datasets=[];
    const DYN_COLORS=['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c'];
    sellers.forEach((seller,si)=>{
        const color=DYN_COLORS[si%DYN_COLORS.length];
        const label=seller.split(' ').slice(0,2).join(' ');
        // Дані по кожній парі рік+місяць у хронологічному порядку
        const data=allPairs.map(p=>{
            const rows=allData.filter(r=>r.рік===p.y&&r.місяць===p.m&&r.продавець===seller);
            if(!rows.length)return null;
            const vals=rows.map(r=>r[dynMetricKey]).filter(v=>v!=null);
            if(!vals.length)return null;
            return isPct?vals.reduce((a,b)=>a+b,0)/vals.length:vals.reduce((a,b)=>a+b,0);
        });
        if(data.every(v=>v===null))return;
        datasets.push({label,data,borderColor:color,backgroundColor:color+'18',pointBackgroundColor:color,pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:4,pointHoverRadius:7,tension:0.35,fill:false,spanGaps:true});
    });

    if(dynChartInstance){dynChartInstance.destroy();dynChartInstance=null;}
    body.innerHTML='<div class="dyn-chart-wrap"><canvas id="dynCanvas"></canvas></div>';

    // Smart labels plugin
    const smartLabels={
        id:'sl',
        afterDatasetsDraw(chart){
            const ctx=chart.ctx;ctx.save();
            const FS=9,PX=3,PY=2,LH=FS+PY*2+2,GAP=3;
            ctx.font=`600 ${FS}px Inter,sans-serif`;
            const pts=[];
            chart.data.datasets.forEach((ds,di)=>{
                const meta=chart.getDatasetMeta(di);if(meta.hidden)return;
                ds.data.forEach((val,pi)=>{
                    if(val===null||val===undefined)return;
                    const el=meta.data[pi];if(!el)return;
                    const text=fmtV(val,metricMeta.fmt);
                    pts.push({x:el.x,y:el.y,text,color:ds.borderColor,tw:ctx.measureText(text).width});
                });
            });
            const byX={};pts.forEach(p=>{const k=Math.round(p.x);if(!byX[k])byX[k]=[];byX[k].push(p);});
            Object.values(byX).forEach(grp=>{
                grp.sort((a,b)=>a.y-b.y);
                grp.forEach(p=>{p.ly=p.y-LH/2-5;});
                for(let it=0;it<20;it++){let ch=false;for(let i=1;i<grp.length;i++){const pr=grp[i-1],cu=grp[i],df=(pr.ly+LH+GAP)-cu.ly;if(df>0){pr.ly-=df/2;cu.ly+=df/2;ch=true;}}if(!ch)break;}
                grp.forEach(p=>{
                    const bw=p.tw+PX*2,bh=FS+PY*2,bx=p.x-bw/2,by=p.ly-bh/2;
                    ctx.shadowColor='rgba(0,0,0,0.13)';ctx.shadowBlur=3;ctx.shadowOffsetY=1;
                    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
                    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
                    ctx.strokeStyle=p.color;ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.stroke();
                    ctx.fillStyle=p.color;ctx.font=`700 ${FS}px Inter,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
                    ctx.fillText(p.text,p.x,by+bh/2);ctx.textAlign='left';ctx.textBaseline='alphabetic';
                    const lsy=by+bh;if(p.y-lsy>5){ctx.strokeStyle=p.color+'55';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(p.x,lsy);ctx.lineTo(p.x,p.y-4);ctx.stroke();ctx.setLineDash([]);}
                });
            });
            ctx.restore();
        }
    };

    const ctx2=document.getElementById('dynCanvas').getContext('2d');
    dynChartInstance=new Chart(ctx2,{
        type:'line',data:{labels,datasets},plugins:[smartLabels],
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            layout:{padding:{top:28,left:6,right:6}},
            plugins:{
                legend:{display:sellers.length>1,position:'top',labels:{font:{family:'Inter',size:10},boxWidth:16,padding:10}},
                tooltip:{backgroundColor:'#1d1d1f',titleFont:{family:'Inter',size:11},bodyFont:{family:'Inter',size:10},padding:9,
                    callbacks:{label:c=>` ${c.dataset.label}: ${fmtV(c.raw,metricMeta.fmt)}`}}
            },
            scales:{
                x:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',maxRotation:45}},
                y:{grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',callback:v=>fmtV(v,metricMeta.fmt)}}
            }
        }
    });
    renderDynInfoTable(sellers, fd);
}

// ── CALC metric value for a set of rows (з правильними формулами) ──
function calcMetricForRows(rows, key){
    if(!rows.length) return null;
    const sum=k=>rows.reduce((s,r)=>s+(r[k]!=null?r[k]:0),0);
    const avg=k=>{const vals=rows.map(r=>r[k]).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;};
    switch(key){
        // Абсолютні суми
        case 'ТО': case 'Шт': case 'Чеки':
        case 'Послуги грн': case 'ACC':
        case 'AV': case 'DIG': case 'IT': case 'MDA': case 'NIP': case 'SDA':
            return sum(key);
        // % показники — формули
        case 'Доля Послуг':{
            const to=sum('ТО'); return to>0?(sum('Послуги грн')/to*100):null;
        }
        case '% Доля ACC':{
            const to=sum('ТО'); return to>0?(sum('ACC')/to*100):null;
        }
        // Середній чек = ТО / Чеки
        case 'Ср. Чек':{
            const ch=sum('Чеки'); return ch>0?(sum('ТО')/ch):null;
        }
        // КПЧ = Шт / Чеки
        case 'КПЧ':{
            const ch=sum('Чеки'); return ch>0?(sum('Шт')/ch):null;
        }
        // ASP = Ср.Чек / КПЧ = ТО / Шт
        case 'ASP':{
            const sh=sum('Шт'); return sh>0?(sum('ТО')/sh):null;
        }
        // Конверсія — просто середнє
        case 'Конверсія ПК':
        case 'Конверсія ПК Offline':
            return avg(key);
        // CSI — середнє
        case 'CSI': return avg(key);
        // % УДС — сума (це грн)
        case '% УДС': return sum(key);
        default: return avg(key);
    }
}

// Чи потрібно ділити на кількість продавців при порівнянні (абсолютні показники)
function isAbsMetric(key){

}

        const sName=s.split(' ').slice(0,2).join(' ');
        thHtml+=`<th style="color:${color}">${sName}</th><th style="color:${color};opacity:.7">↔ від маг.</th>`;
    });
    if(sellers.length>1) thHtml+=`<th style="color:#5856d6">Магазин сер.</th>`;
    thead.innerHTML=`<tr>${thHtml}</tr>`;
    tbl.appendChild(thead);

    const tbody=document.createElement('tbody');

    INFO_METRICS.forEach(m=>{
        // Перевіряємо чи є хоч якісь дані по цьому показнику
        const storeVal=calcMetricForRows(storeRows, m.key);
        if(storeVal===null) return;

        // Середнє по магазину на 1 продавця (для абсолютних)
        const storeAvgPerSeller=isAbsMetric(m.key)?storeVal/storeSellerCount:storeVal;

        const tr=document.createElement('tr');
        // Виділяємо обраний показник
        const isSelected=m.key===dynMetricKey;
        if(isSelected) tr.style.cssText='background:#f0f4ff';

        let tdHtml=`<td style="${isSelected?'color:var(--accent);':''}font-weight:${isSelected?'800':'700'}">${m.label}</td>`;

        sellers.forEach((seller,si)=>{
            const color=DYN_COLORS[si%DYN_COLORS.length];
            const sellerRows=fd.filter(r=>r.продавець===seller);
            const val=calcMetricForRows(sellerRows, m.key);
            const valStr=val!=null?fmtV(val,m.fmt):'—';

            // Відхилення: для абсолютних — від середнього на 1 продавця; для формульних — від значення магазину
            let devHtml='<td class="dyn-dev-flat">—</td>';
            if(val!=null&&storeVal!=null){
                const ref=storeAvgPerSeller;
                const dev=val-ref;
                const devPct=ref!==0?(dev/Math.abs(ref)*100):0;
                const devSign=dev>=0?'+':'';
                const cls=Math.abs(devPct)<0.5?'dyn-dev-flat':dev>0?'dyn-dev-up':'dyn-dev-down';
                const arrow=cls==='dyn-dev-flat'?'→':dev>0?'▲':'▼';
                if(isFormulaOrPct(m.key)||m.fmt==='pct'){
                    devHtml=`<td class="${cls}">${arrow} ${devSign}${fmtV(Math.abs(dev),m.fmt)}</td>`;
                } else {
                    devHtml=`<td class="${cls}">${arrow} ${devSign}${fmtV(Math.abs(dev),m.fmt)} (${devSign}${devPct.toFixed(1)}%)</td>`;
                }
            }
            tdHtml+=`<td class="dyn-val-cell" style="color:${color}">${valStr}</td>${devHtml}`;
        });

        // Середнє по магазину (якщо кілька продавців)
        if(sellers.length>1){
            tdHtml+=`<td class="dyn-val-cell" style="color:#5856d6">${fmtV(storeAvgPerSeller,m.fmt)}</td>`;
        }

        tr.innerHTML=tdHtml;
        tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.innerHTML='';
    wrap.appendChild(tbl);
}

function renderRating(){
    renderMetricPills();
    const data=filteredData();
    const grid=document.getElementById('rankingGrid');
    showRatingSkeleton(grid, 7);
    if(!data.length){
        setTimeout(()=>{grid.innerHTML='<div class="status-box">Немає даних</div>';},150);
        return;
    }
    setTimeout(()=>{
        grid.innerHTML='';
        const m=RATING_METRICS.find(x=>x.key===activeMetricKey)||RATING_METRICS[0];
        const byS={};
        data.forEach(r=>{if(!byS[r.продавець])byS[r.продавець]=[];byS[r.продавець].push(r);});

        const scored=Object.entries(byS).map(([seller,rows])=>{
            const agg=aggregate(rows);
            const uniqueMonths=new Set(rows.map(r=>r.рік+'-'+r.місяць)).size;
            const CAT_KEYS=['AV','IT','DIG','SDA','MDA','NIP'];
            const isAvgByNature = PCT_KEYS.has(m.key);

            // rawTotal — завжди загальна сума (незалежно від режиму)
            const rawTotal = m.allCat
                ? CAT_KEYS.reduce((s,k)=>s+(agg&&agg[k]!=null?agg[k]:0),0)||null
                : agg?agg[m.key]:null;

            // monthlyVal — показник за місяць
            const monthlyVal = rawTotal!=null && uniqueMonths>0 && !isAvgByNature
                ? rawTotal / uniqueMonths
                : rawTotal;

            // val для сортування і відображення
            const val = avgMode && !isAvgByNature ? monthlyVal : rawTotal;

            return {seller, val, rawTotal, monthlyVal, uniqueMonths, agg, isAvgByNature};
        }).filter(x=>x.val!==null);

        scored.sort((a,b)=>m.higher?b.val-a.val:a.val-b.val);
        const maxVal=scored[0]?.val||1;

        // ── СЕРЕДНЄ ──
        // Зважене середнє місячного показника: Σ(місячний × місяці) / Σ(місяці)
        // = Σ(rawTotal) / Σ(місяці) — те саме але через rawTotal
        // Для % і avg-by-nature — просте арифметичне
        const isAvgByNatureGlobal = PCT_KEYS.has(m.key);
        const totalMonths = scored.reduce((s,x)=>s+x.uniqueMonths, 0);
        const totalRaw    = scored.reduce((s,x)=>s+(x.rawTotal||0), 0);

        // зважене середнє місячного: Σ(rawTotal) / Σ(місяці)
        const weightedMonthlyAvg = !isAvgByNatureGlobal && totalMonths>0
            ? totalRaw / totalMonths
            : scored.reduce((s,x)=>s+x.val,0) / scored.length;

        // те що показуємо в шапці і порівнюємо — завжди місячне зважене
        const displayAvg = weightedMonthlyAvg;

        // totalSum для шапки — залежить від режиму
        const totalSum = scored.reduce((s,x)=>s+x.val, 0);

        // потенціал: хто має місячний показник нижче середнього
        // потенціал = (середнє - місячний) × місяці = скільки недобрав за свій період
        const totalPotential = (m.fmt==='money'||m.fmt==='int')
            ? scored.filter(x => x.monthlyVal < displayAvg)
                    .reduce((s,x) => s + (displayAvg - x.monthlyVal) * x.uniqueMonths, 0)
            : 0;

        const banner = document.createElement('div');
        banner.style.cssText=`background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1.5px solid ${m.color}33;padding:10px 14px;margin-bottom:4px;display:flex;gap:0;`;
        const mkStat=(label,valStr,color)=>`
            <div style="flex:1;text-align:center;padding:0 8px">
                <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#a0a0ab;margin-bottom:3px">${label}</div>
                <div style="font-size:15px;font-weight:800;color:${color}">${valStr}</div>
            </div>`;
        const div=(color='#f0f0f2')=>`<div style="width:1px;background:${color};flex-shrink:0"></div>`;
        banner.innerHTML =
            mkStat('Продавців', scored.length, '#1d1d1f') +
            div() +
            mkStat(avgMode?'Сума/міс':'Загалом', fmtV(totalSum, m.fmt), m.color) +
            div() +
            mkStat('Сер.зважене/міс', fmtV(displayAvg, m.fmt), '#5856d6') +
            (totalPotential>0 ? div()+ mkStat('🎯 Потенціал', fmtV(totalPotential, m.fmt), '#c0392b') : '');
        grid.appendChild(banner);

        scored.forEach((item,i)=>{
            const barPct=(item.val/maxVal*100).toFixed(1);
            const isAvgByNature=item.isAvgByNature;
            const subLine = avgMode && item.rawTotal!=null && !isAvgByNature
                ? `Загалом: ${fmtV(item.rawTotal, m.fmt)}`
                : (!avgMode && m.fmt==='money' && item.uniqueMonths>1 && !isAvgByNature
                    ? `Сер./міс: ${fmtV(item.monthlyVal, m.fmt)}`
                    : '');

            // відхилення: завжди порівнюємо місячний показник із зваженим середнім місячним
            const sellerMonthly = item.isAvgByNature ? item.val : item.monthlyVal;
            const diff    = sellerMonthly - displayAvg;
            const diffPct = displayAvg ? (diff/displayAvg*100) : 0;
            const diffColor = diff>=0 ? '#1a7f37' : '#c0392b';
            const diffBg    = diff>=0 ? 'rgba(52,199,89,0.10)' : 'rgba(255,59,48,0.10)';
            const diffSign  = diff>=0 ? '+' : '';
            const diffStr   = m.fmt==='money'||m.fmt==='int'
                ? `${diffSign}${fmtV(Math.abs(diff),m.fmt)}/міс (${diffSign}${diffPct.toFixed(1)}%)`
                : `${diffSign}${diffPct.toFixed(1)}%`;

            // потенціал = (середнє - місячний) × місяці — скільки недобрав за свій період
            const potential = diff < 0 && (m.fmt==='money'||m.fmt==='int')
                ? Math.abs(diff) * item.uniqueMonths
                : null;

            const card=document.createElement('div');card.className='rank-card';
            card.innerHTML=`
                <div class="rank-bg" style="background:${m.color};width:${barPct}%"></div>
                <div class="rank-top">
                    <div class="rank-pos ${i===0?'gold':i===1?'silver':i===2?'bronze':'rest'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
                    <div class="rank-name">
                        <div class="rank-name-text">${item.seller}</div>
                        <div class="rank-sub" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;align-items:center">
                            ${i>0?`<span>${(item.val/scored[0].val*100).toFixed(1)}% від лідера</span>`:''}
                            <span style="background:rgba(0,0,0,.06);border-radius:5px;padding:1px 6px;font-size:9px;font-weight:700;color:#6e6e73">📅 ${item.uniqueMonths} міс.</span>
                            <span style="background:${diffBg};border-radius:5px;padding:1px 7px;font-size:9px;font-weight:700;color:${diffColor}">${diff>=0?'▲':'▼'} ${diffStr}</span>
                        </div>
                        ${potential?`<div style="display:flex;align-items:center;gap:5px;margin-top:5px;padding:4px 8px;background:rgba(255,59,48,0.07);border-radius:7px;border-left:3px solid #ff3b30">
                            <span style="font-size:9px;font-weight:700;color:#c0392b;text-transform:uppercase;letter-spacing:.04em">🎯 Потенціал</span>
                            <span style="font-size:12px;font-weight:800;color:#c0392b;margin-left:auto">${fmtV(potential,m.fmt)}</span>
                        </div>`:''}
                    </div>
                    <div class="rank-val">
                        <div class="rank-val-main" style="color:${m.color}">${fmtV(item.val,m.fmt)}</div>
                        ${subLine?`<div class="rank-val-sub" style="font-size:9.5px;margin-top:2px;color:#86868b">${subLine}</div>`:''}
                    </div>
                </div>
                <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${barPct}%;background:${m.color}"></div></div>`;
            grid.appendChild(card);
        });
        animateCards(grid);
    }, 180);
}

function showTableSkeleton(card, rows=6, cols=5){
    card.innerHTML='';
    const wrap=document.createElement('div');
    wrap.style.cssText='padding:4px 0';
    for(let r=0;r<rows;r++){
        const row=document.createElement('div');
        row.className='tbl-row-skel';
        const widths=['wide','','','','','','',''];
        for(let c=0;c<cols;c++){
            const cell=document.createElement('div');
            cell.className='tbl-row-skel-cell skel'+(c===0?' wide':'');
            cell.style.animationDelay=(r*0.05+c*0.02)+'s';
            row.appendChild(cell);
        }
        wrap.appendChild(row);
    }
    card.appendChild(wrap);
}

function showRatingSkeleton(grid, count=7){
    grid.innerHTML='';
    for(let i=0;i<count;i++){

        card.style.animationDelay=(i*0.06)+'s';

function renderCatCatPills(){
    const wrap=document.getElementById('catCatPills');
    wrap.innerHTML='';
    CAT_KEYS.forEach(cat=>{
        const color=CAT_COLORS[cat];
        const active=catSelectedCats.has(cat);

        if(active){b.style.background=color;b.style.color='#fff';}

function renderCatSellerView(data){
    const container=document.getElementById('catSellerCharts');
    container.innerHTML='';
    catSellerChartInstances.forEach(c=>c.destroy());
    catSellerChartInstances=[];

    if(!data.length){
        container.innerHTML='<div class="status-box">Немає даних</div>';return;
    }

    const uniqueMonths=new Set(data.map(r=>r.рік+'-'+r.місяць)).size;
    // Всі продавці з даних
    const sellers=[...new Set(data.map(r=>r.продавець))].sort();

    const SELLER_COLORS=['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c','#e67e22','#8e44ad'];

    [...catSelectedCats].forEach(cat=>{
        const color=CAT_COLORS[cat]||'#5856d6';

        // Сума по кожному продавцю для цієї категорії
        const sellerVals=sellers.map(s=>{
            const rows=data.filter(r=>r.продавець===s);
            return rows.reduce((sum,r)=>sum+(r[cat]!=null?r[cat]:0),0);
        });
        const catTotal=sellerVals.reduce((a,b)=>a+b,0);
        if(catTotal===0) return;

        // Сортуємо продавців за сумою
        const sorted=sellers.map((s,i)=>({seller:s,val:sellerVals[i]}))
            .filter(x=>x.val>0)
            .sort((a,b)=>b.val-a.val);

        const card=document.createElement('div');
        card.className='cat-seller-card';

        const avgPerSeller=sorted.length>0?catTotal/sorted.length:0;

        card.innerHTML=`
            <div class="cat-seller-title" style="color:${color}">${cat}</div>
            <div class="cat-seller-sub">
                Загалом: <strong>${fmtV(catTotal,'money')}</strong> &nbsp;·&nbsp;
                Сер./міс: <strong>${fmtV(uniqueMonths>0?catTotal/uniqueMonths:0,'money')}</strong> &nbsp;·&nbsp;
                Сер. на продавця: <strong>${fmtV(avgPerSeller,'money')}</strong>
            </div>`;

        // Donut chart + рядки
        const chartRow=document.createElement('div');
        chartRow.style.cssText='display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap';

        // Donut
        const donutWrap=document.createElement('div');
        donutWrap.style.cssText='flex-shrink:0;width:200px;height:200px;position:relative';
        const canvas=document.createElement('canvas');
        donutWrap.appendChild(canvas);
        chartRow.appendChild(donutWrap);

        // Рядки продавців
        const rowsWrap=document.createElement('div');
        rowsWrap.style.cssText='flex:1;min-width:220px;padding-top:4px';
        const maxVal=sorted[0]?.val||1;

        sorted.forEach((item,i)=>{
            const pct=catTotal>0?(item.val/catTotal*100):0;
            const sColor=SELLER_COLORS[i%SELLER_COLORS.length];
            const dev=item.val-avgPerSeller;
            const devPct=avgPerSeller>0?(dev/avgPerSeller*100):0;
            const devSign=dev>=0?'+':'';
            const devColor=dev>=0?'#1a7f37':'#c0392b';

            const row=document.createElement('div');
            row.className='cat-seller-row';
            row.innerHTML=`
                <div class="cat-seller-name" style="color:${sColor}" title="${item.seller}">${item.seller.split(' ').slice(0,2).join(' ')}</div>
                <div class="cat-seller-bar-bg">
                    <div class="cat-seller-bar-fill" style="width:${(item.val/maxVal*100).toFixed(1)}%;background:${sColor}"></div>
                </div>
                <div class="cat-seller-val" style="color:${sColor}">${fmtV(item.val,'money')}</div>
                <div class="cat-seller-pct">${pct.toFixed(1)}%</div>
                <div style="font-size:10px;font-weight:700;color:${devColor};min-width:70px;text-align:right;flex-shrink:0">${dev>=0?'▲':'▼'} ${devSign}${fmtV(Math.abs(dev),'money')}</div>`;
            rowsWrap.appendChild(row);
        });
        chartRow.appendChild(rowsWrap);
        card.appendChild(chartRow);
        container.appendChild(card);

        // Donut
        const inst=new Chart(canvas,{
            type:'doughnut',
            plugins:[ChartDataLabels],
            data:{
                labels:sorted.map(x=>x.seller.split(' ').slice(0,2).join(' ')),
                datasets:[{
                    data:sorted.map(x=>x.val),
                    backgroundColor:sorted.map((_,i)=>SELLER_COLORS[i%SELLER_COLORS.length]+'cc'),
                    borderColor:'#fff',
                    borderWidth:2,
                    hoverOffset:6
                }]
            },
            options:{
                responsive:true,maintainAspectRatio:false,cutout:'54%',
                layout:{padding:4},
                plugins:{
                    legend:{display:false},
                    tooltip:{backgroundColor:'#1d1d1f',callbacks:{
                        label:c=>{
                            const pct=catTotal>0?(c.raw/catTotal*100).toFixed(1):'0';
                            return` ${fmtV(c.raw,'money')} (${pct}%)`;
                        }
                    }},
                    datalabels:{
                        display:ctx=>ctx.dataset.data[ctx.dataIndex]/catTotal>0.04,
                        color:'#fff',
                        font:{family:'Inter',size:9,weight:'700'},
                        textAlign:'center',
                        formatter:(val,ctx)=>{
                            const lbl=ctx.chart.data.labels[ctx.dataIndex];
                            const pct=catTotal>0?(val/catTotal*100).toFixed(1):'0';
                            return`${lbl}\n${pct}%`;
                        }
                    }
                }
            }
        });
        catSellerChartInstances.push(inst);
    });
}

    const uniqueMonths=new Set(data.map(r=>r.рік+'-'+r.місяць)).size;

    // Дані по магазину цілком (всі продавці, ті ж самі місяці/фільтри, але без фільтра продавця)
    const storeData=allData.filter(r=>selPeriods.size===0||selPeriods.has(ymKey(r.рік,r.місяць)));
    const storeSellers=new Set(storeData.map(r=>r.продавець));
    const storeSellerCount=storeSellers.size||1;

    // Сума по кожній категорії — для вибраних продавців
    const totals={};let grandTotal=0;
    CAT_KEYS.forEach(k=>{
        const sum=data.reduce((s,r)=>s+(r[k]!=null?r[k]:0),0);
        totals[k]=sum;grandTotal+=sum;
    });

    // Сума по кожній категорії — по ВСІХ продавцях магазину (для розрахунку середнього)
    const storeTotals={};
    CAT_KEYS.forEach(k=>{
        storeTotals[k]=storeData.reduce((s,r)=>s+(r[k]!=null?r[k]:0),0);
    });

    // Середнє по магазину на 1 продавця для кожної категорії
    // = сума_кат_по_всіх / кількість_продавців_у_магазині
    const storeAvgPerSeller={};
    CAT_KEYS.forEach(k=>{ storeAvgPerSeller[k]=storeTotals[k]/storeSellerCount; });

    // Кількість вибраних продавців
    const selectedSellerCount=selSellers.size===0?storeSellerCount:selSellers.size;
    // Очікувана сума для вибраної кількості продавців = середнє × кількість
    const isAllSellers=selSellers.size===0||selSellers.size===storeSellerCount;

    const activeCats=CAT_KEYS.filter(k=>totals[k]>0||storeTotals[k]>0);
    const sorted=[...CAT_KEYS].sort((a,b)=>totals[b]-totals[a]).filter(k=>storeTotals[k]>0||totals[k]>0);

    const storeGrandTotal=Object.values(storeTotals).reduce((a,b)=>a+b,0);
    const avgMonthly=uniqueMonths>0?grandTotal/uniqueMonths:0;

    // BANNER
    const mkStat=(lbl,val,color='#1d1d1f')=>
        `<div class="cat-stat"><div class="cat-stat-lbl">${lbl}</div><div class="cat-stat-val" style="color:${color}">${val}</div></div>`;
    const dv=`<div class="cat-divider"></div>`;
    const selLabel=isAllSellers?'Магазин (всі)':`${selectedSellerCount} прод.`;
    banner.innerHTML=`<div class="cat-summary-banner">
        ${mkStat('Загальна сума',fmtV(grandTotal,'money'),'#1d1d1f')}
        ${dv}${mkStat('Місяців',uniqueMonths,'#5856d6')}
        ${dv}${mkStat('Продавців у маг.',storeSellerCount,'#ff9500')}
        ${dv}${mkStat('Сер./продавець',fmtV(grandTotal/selectedSellerCount,'money'),'#0071e3')}
    </div>`;

    if(!sorted.length)return;

    // DONUT CHART
    donutWrap.style.display='block';
    const canvas=document.getElementById('catDonutCanvas');
    catChartInstance=new Chart(canvas,{
        type:'doughnut',
        plugins:[ChartDataLabels],
        data:{
            labels:sorted.map(k=>k),
            datasets:[{
                data:sorted.map(k=>totals[k]),
                backgroundColor:sorted.map(k=>CAT_COLORS[k]),
                borderColor:'#fff',
                borderWidth:3,
                hoverOffset:10
            }]
        },
        options:{
            responsive:true,maintainAspectRatio:false,cutout:'52%',
            layout:{padding:{top:10,bottom:10,left:10,right:10}},
            plugins:{
                legend:{
                    display:true,position:'right',
                    labels:{
                        font:{family:'Inter',size:11,weight:'600'},
                        padding:12,boxWidth:13,boxHeight:13,
                        generateLabels(c){
                            return c.data.labels.map((lbl,i)=>{
                                const val=c.data.datasets[0].data[i];
                                const pct=grandTotal>0?(val/grandTotal*100).toFixed(1):'0';
                                const avgM=uniqueMonths>0?val/uniqueMonths:0;
                                return{
                                    text:`${lbl}  ${pct}%  ${fmtV(val,'money')}`,
                                    fillStyle:c.data.datasets[0].backgroundColor[i],
                                    strokeStyle:'#fff',lineWidth:0,index:i
                                };
                            });
                        }
                    }
                },
                tooltip:{
                    backgroundColor:'#1d1d1f',
                    callbacks:{
                        label:c=>{
                            const pct=grandTotal>0?(c.raw/grandTotal*100).toFixed(1):'0';
                            const avgM=uniqueMonths>0?c.raw/uniqueMonths:0;
                            return[
                                ` Сума: ${fmtV(c.raw,'money')} (${pct}%)`,
                                ` Сер./міс: ${fmtV(avgM,'money')}`
                            ];
                        }
                    }
                },
                datalabels:{
                    display:ctx=>ctx.dataset.data[ctx.dataIndex]/grandTotal>0.03,
                    color:'#fff',
                    font:{family:'Inter',size:10,weight:'700'},
                    textAlign:'center',
                    formatter:(val,ctx)=>{
                        const lbl=ctx.chart.data.labels[ctx.dataIndex];
                        const pct=grandTotal>0?(val/grandTotal*100).toFixed(1):'0';
                        return `${lbl}\n${pct}%`;
                    }
                }
            }
        }
    });

    // TABLE
    tableWrap.style.display='block';
    const tbl=document.getElementById('catTable');
    tbl.innerHTML='';
    const thead=document.createElement('thead');
    const devColLabel=isAllSellers
        ? 'Сер. на продавця'
        : 'Відхилення від сер. по магазину';
    thead.innerHTML=`<tr>
        <th style="text-align:left;padding-left:14px">Категорія</th>
        <th>Сума за період</th>
        <th>Частка</th>
        <th>Сер./міс</th>
        <th>${devColLabel}</th>
    </tr>`;
    tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    sorted.forEach(cat=>{
        const val=totals[cat];
        const color=CAT_COLORS[cat];
        const pct=grandTotal>0?(val/grandTotal*100):0;
        const avgMon=uniqueMonths>0?val/uniqueMonths:0;

        let devCell='';
        if(isAllSellers){
            // Магазин: показуємо середнє на 1 продавця
            const perSeller=val/storeSellerCount;
            devCell=`<td style="color:#6e6e73">${fmtV(perSeller,'money')}</td>`;
        } else {
            // Конкретний продавець: відхилення від середнього по магазину
            const storeAvg=storeAvgPerSeller[cat]; // середнє на 1 продавця по магазину
            const dev=val-storeAvg;
            const devPct=storeAvg>0?(dev/storeAvg*100):0;
            const devSign=dev>=0?'+':'';
            const devColor=dev>=0?'#1a7f37':'#c0392b';
            devCell=`<td style="font-weight:700;color:${devColor}">${dev>=0?'▲':'▼'} ${devSign}${fmtV(Math.abs(dev),'money')} (${devSign}${devPct.toFixed(1)}%)</td>`;
        }

        const tr=document.createElement('tr');
        tr.innerHTML=`
            <td style="padding-left:14px"><span class="cat-color-dot" style="background:${color}"></span><strong>${cat}</strong></td>
            <td style="font-weight:700;color:${color}">${fmtV(val,'money')}</td>
            <td style="font-weight:700">${pct.toFixed(1)}%</td>
            <td style="color:#1d1d1f;font-weight:600">${fmtV(avgMon,'money')}</td>
            ${devCell}`;
        tbody.appendChild(tr);
    });
    // Підсумок
    const trTot=document.createElement('tr');
    const totDevCell=isAllSellers
        ? `<td style="color:#6e6e73">${fmtV(grandTotal/storeSellerCount,'money')}</td>`
        : `<td style="color:#86868b">—</td>`;
    trTot.innerHTML=`
        <td style="padding-left:14px;font-weight:800">Загалом</td>
        <td style="font-weight:800">${fmtV(grandTotal,'money')}</td>
        <td style="font-weight:800">100%</td>
        <td style="font-weight:700">${fmtV(avgMonthly,'money')}</td>
        ${totDevCell}`;
    tbody.appendChild(trTot);
    tbl.appendChild(tbody);

    // Без карток
    grid.style.display='none';
}

function renderCatCumulPills(){
    const wrap=document.getElementById('catCumulCatPills');
    wrap.innerHTML='';
    CAT_KEYS.forEach(cat=>{
        const color=CAT_COLORS[cat];
        const active=catCumulSelectedCats.has(cat);
        const b=document.createElement('button');
        b.className='pill'+(active?' active':'');
        if(active){b.style.background=color;b.style.color='#fff';}
        b.textContent=cat;
        b.onclick=()=>{
            if(catCumulSelectedCats.has(cat)){
                if(catCumulSelectedCats.size>1) catCumulSelectedCats.delete(cat);
            } else {
                catCumulSelectedCats.add(cat);
            }
            renderCatCumulPills();
            renderCatCumul(filteredData());
        };
        wrap.appendChild(b);
    });
}

function renderCatCumul(data){
    if(catCumulChartInstance){catCumulChartInstance.destroy();catCumulChartInstance=null;}
    const canvas=document.getElementById('catCumulCanvas');
    if(!data.length){canvas.parentElement.innerHTML='<div class="dyn-empty">Немає даних</div>';return;}

    // Продавці відсортовані за загальною сумою обраних категорій
    const sellers=[...new Set(data.map(r=>r.продавець))].sort();
    const sellerTotals=sellers.map(s=>{
        const rows=data.filter(r=>r.продавець===s);
        return [...catCumulSelectedCats].reduce((sum,cat)=>sum+rows.reduce((s2,r)=>s2+(r[cat]||0),0),0);
    });
    // Сортуємо за загальним ТО
    const sorted=sellers.map((s,i)=>({s,total:sellerTotals[i]})).sort((a,b)=>b.total-a.total);
    const labels=sorted.map(x=>x.s.split(' ').slice(0,2).join(' '));

    // Датасети по категоріях
    const datasets=[...catCumulSelectedCats].map(cat=>{
        const color=CAT_COLORS[cat];
        return {
            label:cat,
            data:sorted.map(({s})=>{
                const rows=data.filter(r=>r.продавець===s);
                return rows.reduce((sum,r)=>sum+(r[cat]||0),0);
            }),
            backgroundColor:color+'cc',
            borderColor:color,
            borderWidth:1,
            borderRadius:3,
            borderSkipped:false
        };
    });

    catCumulChartInstance=new Chart(canvas,{
        type:'bar',
        plugins:[ChartDataLabels],
        data:{labels,datasets},
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            layout:{padding:{top:30,left:4,right:4,bottom:4}},
            plugins:{
                legend:{display:true,position:'top',labels:{font:{family:'Inter',size:10},boxWidth:12,padding:10}},
                tooltip:{backgroundColor:'#1d1d1f',callbacks:{
                    label:c=>` ${c.dataset.label}: ${fmtV(c.raw,'money')}`,
                    footer:items=>{const tot=items.reduce((s,i)=>s+i.raw,0);return`Разом: ${fmtV(tot,'money')}`;}
                }},
                datalabels:{
                    display:ctx=>{
                        // Показуємо лише для останнього датасету — загальна сума зверху
                        const isLast=ctx.datasetIndex===datasets.length-1;
                        if(!isLast)return false;
                        // Рахуємо total stack для цього бару
                        const idx=ctx.dataIndex;
                        const tot=datasets.reduce((s,ds)=>s+(ds.data[idx]||0),0);
                        return tot>0;
                    },
                    anchor:'end',align:'top',offset:2,
                    color:'#1d1d1f',
                    font:{family:'Inter',size:10,weight:'700'},
                    formatter:(val,ctx)=>{
                        const idx=ctx.dataIndex;
                        const tot=datasets.reduce((s,ds)=>s+(ds.data[idx]||0),0);
                        return fmtV(tot,'money');
                    }
                }
            },
            scales:{
                x:{stacked:true,grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',maxRotation:30}},
                y:{stacked:true,grid:{color:'#f0f0f0'},ticks:{font:{family:'Inter',size:9},color:'#86868b',callback:v=>fmtV(v,'money')}}
            }
        }
    });
}

let potShowTO = true; // чи показувати колонку потенціалу ТО

// ── POTENTIAL VIEW ──
function renderPot(){
    const data=filteredData();
    const container=document.getElementById('potContent');
    container.innerHTML='';

    if(!data.length){
        container.innerHTML='<div class="status-box">Немає даних за обраний фільтр</div>';return;
    }

    // Всі продавці з filteredData + дані магазину (всі продавці ті ж місяці)
    const storeData=allData.filter(r=>selPeriods.size===0||selPeriods.has(ymKey(r.рік,r.місяць)));
    const storeSellers=[...new Set(storeData.map(r=>r.продавець))].sort();
    // Обрані продавці (або всі якщо selSellers порожній)
    const activeSellers=selSellers.size===0?storeSellers:[...selSellers].sort();

    // Допоміжна функція: дані по продавцю
    function sellerStats(seller,srcData){
        const rows=srcData.filter(r=>r.продавець===seller);
        if(!rows.length)return null;
        const months=new Set(rows.map(r=>r.рік+'-'+r.місяць)).size||1;
        const sum=k=>rows.reduce((s,r)=>s+(r[k]||0),0);
        const avg=k=>{const vals=rows.map(r=>r[k]).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;};
        const sumTO=sum('ТО'),sumSht=sum('Шт'),sumCheky=sum('Чеки'),sumACC=sum('ACC'),sumPoslugy=sum('Послуги грн');
        const avgTO=sumTO/months;
        const avgSht=sumSht/months;
        const avgASP=sumSht>0?sumTO/sumSht:0;  // ASP = ТО/Шт
        const avgCheky=sumCheky/months;
        return{months,sumTO,sumSht,sumCheky,sumACC,sumPoslugy,avgTO,avgSht,avgASP,avgCheky};
    }

    // Статистика по магазину (всі продавці)
    // Середнє ТО — зважене (як на вкладці Рейтинг): Σ(sumTO) / Σ(місяці)
    const storeStats=storeSellers.map(s=>sellerStats(s,storeData)).filter(Boolean);
    const n=storeStats.length||1;
    // Зважене середнє ТО/міс (той самий принцип що у renderRating: totalRaw / totalMonths)
    const totalRawTO=storeStats.reduce((s,x)=>s+x.sumTO,0);
    const totalMonthsStore=storeStats.reduce((s,x)=>s+x.months,0)||1;
    const storeAvgTO=totalRawTO/totalMonthsStore;
    // Для Шт і ASP — також зважені
    const totalRawSht=storeStats.reduce((s,x)=>s+x.sumSht,0);
    const storeAvgSht=totalRawSht/totalMonthsStore;
    const storeAvgASP=totalRawSht>0?totalRawTO/totalRawSht:0;

    // ── Банер по магазину ──
    const mkStat=(lbl,val,color='#1d1d1f')=>`<div class="pot-stat"><div class="pot-stat-lbl">${lbl}</div><div class="pot-stat-val" style="color:${color}">${val}</div></div>`;
    const dv=`<div class="pot-divider"></div>`;

    // Перемикач показу потенціалу ТО
    const toggleWrap=document.createElement('div');
    toggleWrap.style.cssText='display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px;gap:8px';
    toggleWrap.innerHTML=`
        <span style="font-size:11px;color:#86868b;font-weight:500">Потенціал ТО:</span>
        <div style="display:flex;gap:2px;background:#e5e5ea;border-radius:8px;padding:2px" id="potTOToggle">
            <button id="potTOOn" onclick="setPotTO(true)" style="border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;${potShowTO?'background:white;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.12)':'background:transparent;color:#6e6e73'}">Показати</button>
            <button id="potTOOff" onclick="setPotTO(false)" style="border:none;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;${!potShowTO?'background:white;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.12)':'background:transparent;color:#6e6e73'}">Приховати</button>
        </div>`;
    container.appendChild(toggleWrap);

    const storeBanner=document.createElement('div');
    storeBanner.className='pot-store-banner';
    storeBanner.innerHTML=
        mkStat('Продавців у вибірці',activeSellers.length)+dv+
        mkStat('Сер. ТО/міс (зважене)',fmtV(storeAvgTO,'money'),'#0071e3')+dv+
        mkStat('Сер. Шт/міс по маг.',fmtV(storeAvgSht,'int'),'#34c759')+dv+
        mkStat('Сер. ASP по маг.',fmtV(storeAvgASP,'money'),'#ff9500');
    container.appendChild(storeBanner);

    // ── Картки продавців ──
    let totalPotSht=0,totalPotASP=0,totalPotTO=0;

    const title=document.createElement('div');
    title.className='pot-section-title';
    title.textContent='Потенціал по продавцях';
    container.appendChild(title);

    activeSellers.forEach((seller,si)=>{
        const st=sellerStats(seller,data);
        if(!st)return;

        // ШТ: відхилення місячного від середнього по магазину
        const devSht=storeAvgSht-st.avgSht; // >0 значить є потенціал
        const potSht=devSht>0?devSht*st.avgASP*st.months:0; // потенціал = відхилення × ASP × місяців

        // ASP: відхилення від середнього по магазину
        const devASP=storeAvgASP-st.avgASP;
        const potASP=devASP>0?devASP*st.avgCheky*st.months:0; // відхилення × сер.чеки × місяців

        // ТО: з існуючого рейтингу — відхилення місячного від середнього × місяці
        const devTO=storeAvgTO-st.avgTO;
        const potTO=devTO>0?devTO*st.months:0;

        const potTotal=potSht+potASP; // ТО окремо
        totalPotSht+=potSht;totalPotASP+=potASP;totalPotTO+=potTO;

        const hasPot=potTotal>0||potTO>0;
        const COLORS=['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5856d6','#00b388','#ff6b35','#c8392b','#1abc9c','#e67e22','#8e44ad'];
        const color=COLORS[si%COLORS.length];

        const card=document.createElement('div');
        card.className='pot-card';
        card.style.borderLeft=`4px solid ${color}`;

        const mkRow=(lbl,val,valColor='#1d1d1f',sub='')=>`
            <div class="pot-row">
                <div class="pot-row-lbl">${lbl}</div>
                <div class="pot-row-val" style="color:${valColor}">${val}${sub?`<span style="font-size:9px;color:#86868b;font-weight:400;margin-left:4px">${sub}</span>`:''}</div>
            </div>`;

        card.innerHTML=`
            <div class="pot-card-name" style="color:${color}">${seller}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">
                <div>
                    ${mkRow('Місяців у вибірці',st.months)}
                    ${mkRow('Сер. ТО/міс',fmtV(st.avgTO,'money'),devTO>0?'#c0392b':'#1a7f37',`vs ${fmtV(storeAvgTO,'money')}`)}
                    ${mkRow('Сер. Шт/міс',fmtV(st.avgSht,'int'),devSht>0?'#c0392b':'#1a7f37',`vs ${fmtV(storeAvgSht,'int')}`)}
                    ${mkRow('ASP продавця',fmtV(st.avgASP,'money'),devASP>0?'#c0392b':'#1a7f37',`vs ${fmtV(storeAvgASP,'money')}`)}
                </div>
                <div>
                    <div class="pot-total">
                        <div style="font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Потенціал ШТ+ASP</div>
                        ${potSht>0?mkRow('↑ Шт → ТО',fmtV(potSht,'money'),'#c0392b'):'<div class="pot-row"><div class="pot-row-lbl">↑ Шт</div><span class="pot-badge none">✓ Вище сер.</span></div>'}
                        ${potASP>0?mkRow('↑ ASP → ТО',fmtV(potASP,'money'),'#c0392b'):'<div class="pot-row"><div class="pot-row-lbl">↑ ASP</div><span class="pot-badge none">✓ Вище сер.</span></div>'}
                        ${potTotal>0?mkRow('Разом потенціал',fmtV(potTotal,'money'),'#c0392b'):'<div class="pot-row"><div class="pot-row-lbl">Разом</div><span class="pot-badge none">✓ Немає</span></div>'}
                    </div>
                    ${potShowTO?`<div class="pot-total" style="margin-top:6px;padding-top:6px;border-top:1px dashed #e0e0e5">
                        <div style="font-size:10px;font-weight:700;color:#a0a0ab;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Потенціал ТО (зважене)</div>
                        ${potTO>0?mkRow('↑ ТО від сер.',fmtV(potTO,'money'),'#e67e22'):'<div class="pot-row"><div class="pot-row-lbl">ТО</div><span class="pot-badge none">✓ Вище сер.</span></div>'}
                    </div>`:''}
                </div>
            </div>`;
        container.appendChild(card);
    });

    // ── Підсумок по магазину ──
    const summTitle=document.createElement('div');
    summTitle.className='pot-section-title';
    summTitle.textContent='Загальний потенціал магазину';
    container.appendChild(summTitle);

    const summBanner=document.createElement('div');
    summBanner.className='pot-store-banner';
    summBanner.innerHTML=
        mkStat('Потенціал ШТ→ТО',fmtV(totalPotSht,'money'),'#c0392b')+dv+
        mkStat('Потенціал ASP→ТО',fmtV(totalPotASP,'money'),'#c0392b')+dv+
        mkStat('ШТ+ASP разом',fmtV(totalPotSht+totalPotASP,'money'),'#c0392b')+
        (potShowTO?dv+mkStat('Потенціал ТО (зважене)',fmtV(totalPotTO,'money'),'#e67e22'):'');
    container.appendChild(summBanner);
}

function setPotTO(val){
    potShowTO=val;
    renderPot();
}

function setView(mode){
    viewMode=mode;
    ['table','rating','dyn','cat','pot'].forEach(m=>{
        const btn=document.getElementById('btn'+m.charAt(0).toUpperCase()+m.slice(1));
        if(btn) btn.classList.toggle('active',m===mode);
    });
    document.getElementById('tableSection').style.display=mode==='table'?'':'none';
    document.getElementById('ratingPanel').classList.toggle('visible',mode==='rating');
    document.getElementById('dynPanel').classList.toggle('visible',mode==='dyn');
    document.getElementById('catPanel').classList.toggle('visible',mode==='cat');
    document.getElementById('potPanel').style.display=mode==='pot'?'':'none';
    if(mode==='rating')renderRating();
    else if(mode==='dyn'){renderDynControls();renderDynChart();}
    else if(mode==='cat')renderCat();
    else if(mode==='pot')renderPot();
    else renderTable();
}

// ── INIT ──
async function init(){
    // Show skeletons immediately
    showTableSkeleton(document.getElementById('tableCard'), 8, 6);
    try{
        const res=await fetch(CSV_URL+'&t='+Date.now());
        if(!res.ok)throw new Error('HTTP '+res.status);
        const text=await res.text();
        const rows=parseCSV(text);
        if(!rows.length)throw new Error('Порожній файл');
        parseFull(rows);
        if(!allData.length)throw new Error('Не вдалось розпізнати дані');
        // Animate filters in
        const fw=document.querySelector('.filters-wrap');
        if(fw){fw.classList.add('appear');}
        renderFilters();
        renderTable();
    }catch(e){
        document.getElementById('tableCard').innerHTML=`<div class="status-box error">❌ ${e.message}</div>`;
        console.error(e);
    }
}
init();
</script>
