<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Щоденні звіти</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 8px 10px;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 6px;
            font-size: 14px;
        }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }

        .table-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th.group-header {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 7px 4px;
            color: #1d1d1f;
            border-bottom: 1px solid #d2d2d7;
            background: white;
        }
        th.group-header.g-to     { color: #0071e3; border-bottom: 3px solid #0071e3; }
        th.group-header.g-serv   { color: #34c759; border-bottom: 3px solid #34c759; }
        th.group-header.g-acc    { color: #ff9500; border-bottom: 3px solid #ff9500; }
        th.group-header.g-checks { color: #af52de; border-bottom: 3px solid #af52de; }
        th.group-header.g-none   { color: #86868b; border-bottom: 3px solid #d2d2d7; }

        th {
            text-align: left;
            padding: 5px 4px;
            color: #86868b;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid #d2d2d7;
            background: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        th.g-to     { color: #0071e3; }
        th.g-serv   { color: #34c759; }
        th.g-acc    { color: #ff9500; }
        th.g-checks { color: #af52de; }

        td {
            padding: 4px 3px;
            border-bottom: 1px solid #f2f2f4;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .grp-start { border-left: 2px solid #d2d2d7 !important; }

        /* STICKY ім'я */
        .name-cell, th:first-child {
            position: sticky;
            left: 0;
            background: white;
            z-index: 100;
            box-shadow: 4px 0 8px -2px rgba(0,0,0,0.12);
            font-weight: 600;
            white-space: normal;
            line-height: 1.2;
            word-break: break-word;
        }
        th:first-child { z-index: 101; }

        .cell-badge {
            display: block;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            padding: 2px 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-plan        { background: rgba(134,134,139,0.10); color: #6e6e73; font-weight: 500; font-size: 9px; }
        .badge-fact-to     { background: rgba(0,113,227,0.12);   color: #1a50b8; }
        .badge-fact-serv   { background: rgba(52,199,89,0.12);   color: #1a7f37; }
        .badge-fact-acc    { background: rgba(255,149,0,0.12);   color: #b85000; }
        .badge-fact-checks { background: rgba(175,82,222,0.12);  color: #6d28d9; }
        .badge-fact-none   { background: rgba(134,134,139,0.08); color: #3d3d3f; }

        .time-row td           { background: #f5f5f7 !important; font-weight: 700; color: #333; }
        .time-row td.name-cell { background: #f5f5f7 !important; }
        .summary-row td           { background: #eaf1fe !important; font-weight: 700; color: #1d1d1f !important; }
        .summary-row td.name-cell { background: #eaf1fe !important; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
        .error   { padding: 40px; text-align: center; color: #ff3b30; }

        /* ===================== ДЕСКТОП ===================== */
        @media (min-width: 768px) {
            table { min-width: 1100px; }

            .name-cell, th:first-child {
                width: 110px; min-width: 110px; max-width: 110px;
                font-size: 11px;
                padding: 5px 6px;
            }

            /* план */
            .col-plan  { width: 72px; }
            /* факт */
            .col-fact  { width: 90px; }
            /* % або доля */
            .col-pct   { width: 70px; }
            /* share (Доля послуг / Доля ACC) */
            .col-share { width: 70px; }

            td { font-size: 12px; padding: 5px 5px; }
            th { font-size: 10px; padding: 5px 5px; }
            .cell-badge { font-size: 11px; padding: 2px 5px; }
        }

        /* ===================== МОБІЛЬНИЙ =====================
           Мета: sticky ПК (85px) + рівно 3 колонки групи на екрані (~305px залишок на 390px екрані)
           Кожна колонка = ~101px → 3 × 101 = 303px ✓
        */
        @media (max-width: 767px) {
            /* Ширина 1 колонки = (100vw - 85px) / 3 */
            :root { --mob-name: 85px; --mob-col: calc((100vw - 85px) / 3); }

            table { min-width: calc(85px + var(--mob-col) * 12); } /* запас на всі колонки */

            .name-cell, th:first-child {
                width: var(--mob-name); min-width: var(--mob-name); max-width: var(--mob-name);
                font-size: 9px;
                padding: 4px 4px;
                z-index: 200 !important;
                background: white;
                background-clip: padding-box;
                box-shadow: 4px 0 10px -2px rgba(0,0,0,0.18);
                border-right: 1px solid #e0e0e5;
            }
            th:first-child { z-index: 201 !important; }

            /* Усі колонки даних — рівно 1/3 вільного простору */
            .col-plan, .col-fact, .col-pct, .col-share {
                width: var(--mob-col);
                min-width: var(--mob-col);
                max-width: var(--mob-col);
            }

            td { font-size: 10.5px; padding: 4px 3px; }
            th { font-size: 8.5px;  padding: 4px 3px; }
            th.group-header { font-size: 9px; padding: 5px 3px; }

            .cell-badge {
                font-size: 10px;
                padding: 2px 3px;
                border-radius: 5px;
            }

            .table-card {
                scroll-snap-type: x mandatory;
                scroll-padding-left: var(--mob-name);
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Назад</a>
    <h1>Щоденні звіти</h1>

    <div class="table-card">
        <div id="loader" class="loading">Завантаження...</div>
        <table id="tbl" style="display:none">
            <colgroup id="cg"></colgroup>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

<script>
// ===== CSV =====
function parseCSV(text) {
    const rows = [];
    for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const row = []; let cell = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (q && line[i+1]==='"') { cell+='"'; i++; } else q=!q; }
            else if (c === ',' && !q) { row.push(cell.trim()); cell=''; }
            else cell += c;
        }
        row.push(cell.trim());
        if (row.some(x => x !== '')) rows.push(row);
    }
    return rows;
}

// ===== ГРУПИ =====
function colInfo(h) {
    const u = h.toUpperCase().trim();
    let g = '', t = 'fact';
    if      (u.includes('ПОСЛУГ') || u.includes('ПОСЛ')) g = 'serv';
    else if (u.includes('АСС') || u.includes('ACC') || u.includes('АКСЕС')) g = 'acc';
    else if (u === 'ЧЕКИ' || u === 'ЧЕК' || u.startsWith('ПЛАН ЧЕК') || u.startsWith('ФАКТ ЧЕК') || u.startsWith('% ЧЕК')) g = 'checks';
    else if (u.includes(' ТО') || u.startsWith('ТО') || u.endsWith('ТО')) g = 'to';

    if      (u.includes('ПЛАН'))                         t = 'plan';
    else if (u.includes('%') || u.includes('ВИКО'))      t = 'pct';
    else if (u.includes('ДОЛЯ') || u.includes('SHARE'))  t = 'share';
    return { g, t };
}

const GLABELS = { to:'Товарообіг', serv:'Послуги', acc:'Аксесуари', checks:'Чеки', '':'' };

// ===== ЧИСЛА =====
function toNum(v) {
    if (!v) return 0;
    return parseFloat(v.toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v) {
    const n = toNum(v);
    return n ? Math.round(n).toLocaleString('uk-UA') : (v || '');
}
function fmtPct(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    return n.toFixed(1) + '%';
}
function pctBg(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    if (n <= 0)  return { bg:'rgba(255,59,48,0.13)',  fg:'#c0392b' };
    if (n < 50)  return { bg:'rgba(255,59,48,0.10)',  fg:'#d63b2a' };
    if (n < 80)  return { bg:'rgba(255,149,0,0.12)',  fg:'#b86e00' };
    if (n < 100) return { bg:'rgba(255,204,0,0.13)',  fg:'#8a6800' };
    if (n < 120) return { bg:'rgba(52,199,89,0.12)',  fg:'#1e7e34' };
    return             { bg:'rgba(52,199,89,0.20)',  fg:'#155724' };
}

// ===== THEAD =====
function buildThead(headers) {
    const thead = document.getElementById('thead');
    const groups = [];
    let cur = null;
    for (let i = 1; i < headers.length; i++) {
        const { g } = colInfo(headers[i]);
        if (!cur || cur.g !== g) { cur = { g, count:1 }; groups.push(cur); }
        else cur.count++;
    }

    const tr1 = document.createElement('tr');
    const corner = document.createElement('th');
    corner.rowSpan = 2;
    corner.textContent = headers[0];
    tr1.appendChild(corner);
    for (const grp of groups) {
        const th = document.createElement('th');
        th.colSpan = grp.count;
        th.className = 'group-header g-' + (grp.g || 'none');
        th.textContent = GLABELS[grp.g] || '';
        tr1.appendChild(th);
    }
    thead.appendChild(tr1);

    const tr2 = document.createElement('tr');
    let prevG = '';
    for (let i = 1; i < headers.length; i++) {
        const { g, t } = colInfo(headers[i]);
        const th = document.createElement('th');
        th.className = (g ? 'g-'+g : '');
        // клас ширини
        if (t === 'plan')  th.classList.add('col-plan');
        else if (t === 'pct')   th.classList.add('col-pct');
        else if (t === 'share') th.classList.add('col-share');
        else                    th.classList.add('col-fact');

        if (g !== prevG) th.classList.add('grp-start');
        prevG = g;
        const lbl = headers[i].trim().toUpperCase();
        const glbl = (GLABELS[g] || '').toUpperCase();
        th.textContent = (glbl && lbl === glbl) ? '' : headers[i];
        tr2.appendChild(th);
    }
    thead.appendChild(tr2);
}

// ===== ДИНАМІЧНА ЗАЛИВКА "ДОЛЯ" КОЛОНОК =====
function colorizeShareCols(headers) {
    const tbody = document.getElementById('tbody');
    if (!tbody) return;

    const shareColIndexes = [];
    for (let i = 1; i < headers.length; i++) {
        if (colInfo(headers[i]).t === 'share') shareColIndexes.push(i);
    }
    if (!shareColIndexes.length) return;

    shareColIndexes.forEach(colIdx => {
        const cells = [];
        tbody.querySelectorAll('tr:not(.time-row):not(.summary-row)').forEach(tr => {
            const td = tr.querySelectorAll('td')[colIdx];
            if (!td) return;
            const badge = td.querySelector('.cell-badge');
            const raw = badge ? badge.textContent.trim() : td.textContent.trim();
            const num = parseFloat(raw.replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
            cells.push({ badge, num });
        });

        if (!cells.length) return;
        const vals = cells.map(c => c.num);
        const min = Math.min(...vals), max = Math.max(...vals);
        const range = max - min || 1;

        cells.forEach(({ badge, num }) => {
            if (!badge) return;
            const ratio = (num - min) / range;
            const hue  = Math.round(ratio * 120);
            const lBg  = Math.round(88 - ratio * 10);
            const lFg  = Math.round(28 + ratio * 10);
            badge.style.background = `hsl(${hue},70%,${lBg}%)`;
            badge.style.color      = `hsl(${hue},60%,${lFg}%)`;
        });
    });
}

// ===== SNAP по grp-start колонках =====
function applySnapToGroupStarts() {
    if (window.innerWidth >= 768) return;
    // Знаходимо індекси td де є grp-start і виставляємо scroll-snap-align
    const rows = document.querySelectorAll('#tbody tr');
    if (!rows.length) return;
    const firstRow = rows[0];
    firstRow.querySelectorAll('td').forEach((td, i) => {
        if (i === 0) return;
        if (td.classList.contains('grp-start')) {
            // виставляємо snap через stylesheet
            td.style.scrollSnapAlign = 'start';
        }
    });
    // те саме для thead
    document.querySelectorAll('#thead tr:last-child th').forEach((th, i) => {
        if (i === 0) return;
        if (th.classList.contains('grp-start')) {
            th.style.scrollSnapAlign = 'start';
        }
    });
}

// ===== ЗАВАНТАЖЕННЯ =====
async function load() {
    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOxz-ozH9yNLW3IAzlkMlbRqOTrR4sIUO1__KpAMBFEvvpMXr4LWTnRvzYGb_y6za7WBxOUhl2DV84/pub?output=csv";
    try {
        const res = await fetch(SHEET + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = parseCSV(await res.text());
        if (rows.length < 2) throw new Error('Немає даних');

        const headers = rows[0];
        document.getElementById('loader').style.display = 'none';
        document.getElementById('tbl').style.display = '';

        buildThead(headers);

        const tbody = document.getElementById('tbody');
        for (const row of rows.slice(1)) {
            if (!row[0] || !row[0].trim()) continue;

            const name   = row[0].trim();
            const nameLC = name.toLowerCase();
            const isTime = /^\d{1,2}:\d{2}(:\d{2})?$/.test(name);
            const isSummary = ['виконання','залишок','разом','всього','підсумок','total','итого']
                              .some(k => nameLC.includes(k));

            const tr = document.createElement('tr');
            if (isTime)    tr.className = 'time-row';
            if (isSummary) tr.className = 'summary-row';

            const tdN = document.createElement('td');
            tdN.className = 'name-cell';
            tdN.textContent = name;
            tr.appendChild(tdN);

            let prevG = '';
            for (let i = 1; i < headers.length; i++) {
                const { g, t } = colInfo(headers[i]);
                const val = (row[i] || '').trim();
                const isStart = g !== prevG;
                prevG = g;

                const td = document.createElement('td');
                if (isStart && g) td.classList.add('grp-start');

                // клас ширини для td
                if (t === 'plan')       td.classList.add('col-plan');
                else if (t === 'pct')   td.classList.add('col-pct');
                else if (t === 'share') td.classList.add('col-share');
                else                    td.classList.add('col-fact');

                if (t === 'pct' && !isTime) {
                    const { bg, fg } = pctBg(val);
                    td.className += ' val-pct' + (g ? ' g-'+g : '');
                    if (isStart && g) td.classList.add('grp-start');
                    td.innerHTML = '<span class="cell-badge" style="background:'+bg+';color:'+(isSummary?'#1d1d1f':fg)+'">'+( val ? fmtPct(val) : '')+'</span>';
                } else if (t === 'share') {
                    td.innerHTML = '<span class="cell-badge badge-fact-'+(g||'none')+'">'+val+'</span>';
                } else if (t === 'plan') {
                    const planTxt = isTime ? val : fmtInt(val);
                    td.innerHTML = isTime ? planTxt : '<span class="cell-badge badge-plan">'+planTxt+'</span>';
                } else {
                    const factTxt = (!isTime && val && !val.includes('%')) ? fmtInt(val) : val;
                    td.innerHTML = isTime ? factTxt : '<span class="cell-badge badge-fact-'+(g||'none')+'">'+factTxt+'</span>';
                }
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }

        colorizeShareCols(headers);
        applySnapToGroupStarts();

    } catch(e) {
        const el = document.getElementById('loader');
        el.className = 'error';
        el.textContent = '❌ ' + e.message;
    }
}

load();

// Свайп назад
let x0=0, y0=0, sw=false;
document.addEventListener('touchstart', e=>{x0=e.changedTouches[0].screenX; y0=e.changedTouches[0].screenY; sw=true;},{passive:true});
document.addEventListener('touchmove',  e=>{if(Math.abs(e.changedTouches[0].screenY-y0)>25) sw=false;},{passive:true});
document.addEventListener('touchend',   e=>{
    if(sw && e.changedTouches[0].screenX-x0>120 && Math.abs(e.changedTouches[0].screenY-y0)<50)
        window.location.href='index.html';
    sw=false;
},{passive:true});
</script>
</body>
</html>
