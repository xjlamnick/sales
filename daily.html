<script>
// ===== CSV =====
function parseCSV(text) {
    const rows = [];
    for (const line of text.split(/\r?\n/)) {
        if (!line.trim()) continue;
        const row = []; let cell = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') { if (q && line[i+1]==='"') { cell+='"'; i++; } else q=!q; }
            else if (c === ',' && !q) { row.push(cell.trim()); cell=''; }
            else cell += c;
        }
        row.push(cell.trim());
        if (row.some(x => x !== '')) rows.push(row);
    }
    return rows;
}

// ===== ГРУПИ =====
function colInfo(h) {
    const u = h.toUpperCase().trim();
    let g = '', t = 'fact';
    if      (u.includes('ПОСЛУГ') || u.includes('ПОСЛ')) g = 'serv';
    else if (u.includes('АСС') || u.includes('ACC') || u.includes('АКСЕС')) g = 'acc';
    else if (u === 'ЧЕКИ' || u === 'ЧЕК' || u.startsWith('ПЛАН ЧЕК') || u.startsWith('ФАКТ ЧЕК') || u.startsWith('% ЧЕК')) g = 'checks';
    else if (u.includes(' ТО') || u.startsWith('ТО') || u.endsWith('ТО')) g = 'to';
    else if (u.includes('ДОХІД') || u.includes('ДОХОД') || u.includes('INCOME') || u.includes('MARGIN') || u.includes('МАРЖА')) g = 'income';
    else if ((u.includes('СР') && (u.includes('ЧЕК') || u.includes('CHECK'))) || u === 'ASP' || u.includes('AVG CHECK')) g = 'avgcheck';
    if      (u.includes('ПЛАН'))                         t = 'plan';
    else if (u.includes('%') || u.includes('ВИКО'))      t = 'pct';
    else if (u.includes('ДОЛЯ') || u.includes('SHARE'))  t = 'share';
    return { g, t };
}

const GLABELS = { to:'Товарообіг', serv:'Послуги', acc:'Аксесуари', checks:'Чеки', '':'' };

function toNum(v) {
    if (!v) return 0;
    return parseFloat(v.toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v) {
    const n = toNum(v);
    return n ? Math.round(n).toLocaleString('uk-UA') : (v || '');
}
function fmtPct(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    return n.toFixed(1) + '%';
}
function pctBg(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    if (n <= 0)  return { bg:'rgba(255,59,48,0.13)',  fg:'#c0392b' };
    if (n < 50)  return { bg:'rgba(255,59,48,0.10)',  fg:'#d63b2a' };
    if (n < 80)  return { bg:'rgba(255,149,0,0.12)',  fg:'#b86e00' };
    if (n < 100) return { bg:'rgba(255,204,0,0.13)',  fg:'#8a6800' };
    if (n < 120) return { bg:'rgba(52,199,89,0.12)',  fg:'#1e7e34' };
    return             { bg:'rgba(52,199,89,0.20)',  fg:'#155724' };
}

// ===== ДИНАМІЧНА ЗАЛИВКА SHARE =====
function colorizeShareCols(headers) {
    const tbody = document.getElementById('tbody');
    if (!tbody) return;
    const shareColIndexes = [];
    for (let i = 1; i < headers.length; i++) {
        if (colInfo(headers[i]).t === 'share') shareColIndexes.push(i);
    }
    if (!shareColIndexes.length) return;
    shareColIndexes.forEach(colIdx => {
        const cells = [];
        tbody.querySelectorAll('tr:not(.time-row):not(.summary-row)').forEach(tr => {
            const td = tr.querySelectorAll('td')[colIdx];
            if (!td) return;
            const badge = td.querySelector('.cell-badge');
            const raw = badge ? badge.textContent.trim() : td.textContent.trim();
            const num = parseFloat(raw.replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
            cells.push({ badge, num });
        });
        if (!cells.length) return;
        const vals = cells.map(c => c.num);
        const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
        cells.forEach(({ badge, num }) => {
            if (!badge) return;
            const ratio = (num - min) / range;
            const hue = Math.round(ratio * 120);
            badge.style.background = `hsl(${hue},70%,${Math.round(88-ratio*10)}%)`;
            badge.style.color      = `hsl(${hue},60%,${Math.round(28+ratio*10)}%)`;
        });
    });
}

// ===== ЗБЕРЕЖЕНІ ДАНІ =====
let savedHeaders = [];
let savedRows = [];
let isCompact = false;

// ===== РЕНДЕР ТАБЛИЦІ =====
function renderTable(headers, rows, compact) {
    const isMob = window.innerWidth < 768;
    const nameW = isMob ? 82 : 110;
    const avail = window.innerWidth - nameW - 1;

    // Фільтруємо колонки якщо compact
    // compact: залишаємо тільки "Факт ТО", "Факт Посл", "Факт АСС", "Факт Чеки"
    let colIndexes = []; // індекси в оригінальних headers (крім 0)
    for (let i = 1; i < headers.length; i++) {
        const { g, t } = colInfo(headers[i]);
        if (!compact) {
            colIndexes.push(i);
        } else {
            // в компакті: тільки fact колонки для to/serv/acc/checks
            if (t === 'fact' && ['to','serv','acc','checks'].includes(g)) {
                colIndexes.push(i);
            }
        }
    }

    const totalCols = colIndexes.length;

    // Ширина колонок
    let colW;
    if (compact) {
        // 4 колонки рівно в екран
        colW = () => Math.floor(avail / 4);
    } else {
        colW = (g) => {
            const c3 = Math.floor(avail / 3);
            const c4 = Math.floor(avail / 4);
            return c3; // в повному режимі — snap по групах
        };
    }

    // Очищаємо
    const cg = document.getElementById('cg');
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const tbl = document.getElementById('tbl');
    cg.innerHTML = '';
    thead.innerHTML = '';
    tbody.innerHTML = '';

    // Ширини колонок
    const isMobMode = window.innerWidth < 768;
    let colWidths = [];
    if (compact) {
        const cw = Math.floor(avail / 4);
        colWidths = colIndexes.map(() => cw);
        tbl.style.width = (nameW + cw * 4) + 'px';
    } else {
        const c3 = Math.floor(avail / 3);
        const c4 = Math.floor(avail / 4);
        // рахуємо групи
        const grpSizes = {};
        colIndexes.forEach(i => {
            const { g } = colInfo(headers[i]);
            grpSizes[g] = (grpSizes[g] || 0) + 1;
        });
        colWidths = colIndexes.map(i => {
            const { g } = colInfo(headers[i]);
            const n = grpSizes[g] || 3;
            return n <= 3 ? c3 : c4;
        });
        // totalW = name + sum
        const totalW = nameW + colWidths.reduce((a,b)=>a+b,0);
        tbl.style.width = isMobMode ? totalW + 'px' : '';
    }

    // Colgroup
    const mkCol = w => { const c = document.createElement('col'); c.style.width = w+'px'; return c; };
    cg.appendChild(mkCol(nameW));
    colWidths.forEach(w => cg.appendChild(mkCol(w)));

    // THEAD
    if (compact) {
        // Один рядок заголовків
        const tr = document.createElement('tr');
        const corner = document.createElement('th');
        corner.textContent = headers[0];
        corner.style.width = nameW + 'px';
        tr.appendChild(corner);
        colIndexes.forEach((ci, ii) => {
            const { g } = colInfo(headers[ci]);
            const th = document.createElement('th');
            th.className = 'g-' + g + (ii === 0 ? '' : ' grp-start');
            th.style.width = colWidths[ii] + 'px';
            // Скорочена назва групи
            th.textContent = GLABELS[g] || headers[ci];
            tr.appendChild(th);
        });
        thead.appendChild(tr);
    } else {
        // Два рядки як раніше
        const groups = [];
        let cur = null;
        colIndexes.forEach(i => {
            const { g } = colInfo(headers[i]);
            if (!cur || cur.g !== g) { cur = { g, count:1 }; groups.push(cur); }
            else cur.count++;
        });

        const tr1 = document.createElement('tr');
        const corner = document.createElement('th');
        corner.rowSpan = 2;
        corner.textContent = headers[0];
        corner.style.width = nameW + 'px';
        tr1.appendChild(corner);
        for (const grp of groups) {
            const th = document.createElement('th');
            th.colSpan = grp.count;
            th.className = 'group-header g-' + (grp.g || 'none');
            th.textContent = GLABELS[grp.g] || '';
            tr1.appendChild(th);
        }
        thead.appendChild(tr1);

        const tr2 = document.createElement('tr');
        let prevG = '';
        colIndexes.forEach((ci, ii) => {
            const { g } = colInfo(headers[ci]);
            const th = document.createElement('th');
            th.className = (g ? 'g-'+g : '');
            if (g !== prevG) th.classList.add('grp-start');
            prevG = g;
            const lbl = headers[ci].trim().toUpperCase();
            const glbl = (GLABELS[g] || '').toUpperCase();
            th.textContent = (glbl && lbl === glbl) ? '' : headers[ci];
            tr2.appendChild(th);
        });
        thead.appendChild(tr2);
    }

    // TBODY
    for (const row of rows) {
        if (!row || row.length === 0) continue;
        if (!row[0] || !row[0].trim()) continue;
        const name = row[0].trim();
        const nameLC = name.toLowerCase();
        const isTime = /^\d{1,2}:\d{2}(:\d{2})?$/.test(name);
        const isSummary = ['виконання','залишок','разом','всього','підсумок','total','итого','тотал','тоtal'].some(k => nameLC.includes(k));

        const tr = document.createElement('tr');
        if (isTime)    tr.className = 'time-row';
        if (isSummary) tr.className = 'summary-row';

        const tdN = document.createElement('td');
        tdN.className = 'name-cell';
        tdN.style.width = nameW + 'px';
        tdN.textContent = name;
        tr.appendChild(tdN);

        colIndexes.forEach((ci, ii) => {
            const { g, t } = colInfo(headers[ci]);
            const val = (row[ci] != null ? row[ci] : '').toString().trim();
            const td = document.createElement('td');
            td.style.width = colWidths[ii] + 'px';
            if (ii === 0 || (!compact && colIndexes[ii-1] !== undefined && colInfo(headers[colIndexes[ii-1]]).g !== g)) {
                td.classList.add('grp-start');
            }

            if (t === 'pct' && !isTime) {
                const { bg, fg } = pctBg(val);
                td.innerHTML = `<span class="cell-badge" style="background:${bg};color:${isSummary?'#1d1d1f':fg}">${val ? fmtPct(val) : ''}</span>`;
            } else if (t === 'share') {
                td.innerHTML = `<span class="cell-badge badge-fact-${g||'none'}">${val}</span>`;
            } else if (t === 'plan') {
                const planTxt = isTime ? val : fmtInt(val);
                td.innerHTML = isTime ? planTxt : `<span class="cell-badge badge-plan">${planTxt}</span>`;
            } else {
                const factTxt = (!isTime && val && !val.includes('%')) ? fmtInt(val) : val;
                td.innerHTML = isTime ? factTxt : `<span class="cell-badge badge-fact-${g||'none'}">${factTxt}</span>`;
            }
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    }

    if (!compact) colorizeShareCols(headers);

    // Scroll snap (тільки повний режим мобільний)
    if (isMobMode && !compact) {
        const card = document.getElementById('tableCard');
        const grpSizes2 = {};
        const grpOrder2 = [];
        colIndexes.forEach(i => {
            const { g } = colInfo(headers[i]);
            if (!grpSizes2[g]) { grpSizes2[g] = 0; grpOrder2.push(g); }
            grpSizes2[g]++;
        });
        const c3 = Math.floor(avail / 3), c4 = Math.floor(avail / 4);
        const snaps = [];
        let x = 0;
        grpOrder2.forEach(g => {
            snaps.push(x);
            x += (grpSizes2[g] <= 3 ? c3 : c4) * grpSizes2[g];
        });

        card._snaps = snaps;
        card._snapHandler && card.removeEventListener('touchend', card._snapHandler);
        let t0x = 0;
        card.addEventListener('touchstart', e => { t0x = e.touches[0].clientX; }, { passive:true });
        const handler = e => {
            const dx = t0x - e.changedTouches[0].clientX;
            const cur = card.scrollLeft;
            let best = snaps.reduce((a,b) => Math.abs(b-cur)<Math.abs(a-cur)?b:a, snaps[0]);
            let idx = snaps.indexOf(best);
            if (dx > 40 && idx < snaps.length-1) best = snaps[idx+1];
            if (dx < -40 && idx > 0) best = snaps[idx-1];
            card.scrollTo({ left: best, behavior: 'smooth' });
        };
        card._snapHandler = handler;
        card.addEventListener('touchend', handler, { passive:true });
    }
}

    { key:'acc',      label:'Чемпіон з АСС',             icon:'🎧', color:'#ff9500', iconBg:'rgba(255,149,0,0.12)', gFilter:'acc',    tFilter:'fact' },
    { key:'checks',   label:'Найбільше чеків',           icon:'🧾', color:'#af52de', iconBg:'rgba(175,82,222,0.12)', gFilter:'checks', tFilter:'fact' },

function getTopPerson(gFilter, tFilter) {
    let factIdx = -1;
    for (let i = 1; i < savedHeaders.length; i++) {
        const { g, t } = colInfo(savedHeaders[i]);
        if (g === gFilter && t === tFilter && factIdx < 0) { factIdx = i; break; }
    }
    if (factIdx < 0) return null;

    const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення','виконання','залишок'];
    const items = savedRows
        .filter(r => {
            const name = (r[0]||'').trim();
            if (!name) return false;
            if (/^\d{1,2}:\d{2}/.test(name)) return false;
            const nl = name.toLowerCase();
            return !excluded.some(k => nl.includes(k));
        })
        .map(r => ({ name: (r[0]||'').trim(), val: toNum(r[factIdx]) }))
        .filter(x => x.val > 0);

    if (!items.length) return null;
    items.sort((a,b) => b.val - a.val);
    return items[0];
}

function fmtInsightVal(val, gFilter) {
    const n = Number(val);
    if (isNaN(n) || n === 0) return '—';
    if (gFilter === 'checks') return Math.round(n).toLocaleString('uk-UA') + ' чек.';
    if (gFilter === 'avgcheck') return Math.round(n).toLocaleString('uk-UA') + ' грн';
    if (gFilter === 'income') return Math.round(n).toLocaleString('uk-UA') + ' грн';
    return Math.round(n).toLocaleString('uk-UA') + ' ₴';
}

function renderInsights() {
    const grid = document.getElementById('insightsGrid');
    grid.innerHTML = '';

    const available = INSIGHT_DEFS.filter(d =>
        savedHeaders.some(h => {
            const { g, t } = colInfo(h);
            return g === d.gFilter && t === d.tFilter;
        })
    );

    if (!available.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b;grid-column:1/-1">Немає даних для інсайтів</div>';
        return;
    }

    available.forEach((def, idx) => {
        const top = getTopPerson(def.gFilter, def.tFilter);
        if (!top) return;

        const card = document.createElement('div');
        card.className = 'insight-card';
        card.style.animationDelay = (idx * 0.07) + 's';

        card.innerHTML = `
            <div class="insight-card-glow" style="background:${def.color}"></div>
            <div class="insight-icon" style="background:${def.iconBg};font-size:20px">${def.icon}</div>
            <div class="insight-body">
                <div class="insight-label">${def.label}</div>
                <div class="insight-name">🥇 ${top.name}</div>
                <div class="insight-value" style="color:${def.color}">${fmtInsightVal(top.val, def.gFilter)}</div>
            </div>`;
        grid.appendChild(card);
    });
}

function buildRatingMetricPills() {
    const c = document.getElementById('metricPills');
    c.innerHTML = '';
    // показуємо тільки метрики для яких є відповідна колонка в заголовках
    const available = RATING_DEFS.filter(d => {
        return savedHeaders.some(h => {
            const { g, t } = colInfo(h);
            return g === d.gFilter && t === d.tFilter;
        });
    });
    available.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'mpill' + (d.key === activeRatingKey ? ' active' : '');
        btn.textContent = d.label;
        if (d.key === activeRatingKey) btn.style.background = d.color;
        btn.onclick = () => { activeRatingKey = d.key; buildRatingMetricPills(); renderRankingCards(); };
        c.appendChild(btn);
    });
    // якщо поточна метрика недоступна — переключаємо на першу
    if (available.length && !available.find(d => d.key === activeRatingKey)) {
        activeRatingKey = available[0].key;
    }
}

function renderRankingCards() {
    const grid = document.getElementById('rankingGrid');
    grid.innerHTML = '';
    const def = RATING_DEFS.find(d => d.key === activeRatingKey) || RATING_DEFS[0];

    // Знаходимо індекс колонки за gFilter + tFilter
    let factIdx = -1, planIdx = -1, pctIdx = -1;
    for (let i = 1; i < savedHeaders.length; i++) {
        const { g, t } = colInfo(savedHeaders[i]);
        if (g !== def.gFilter) continue;
        if (t === def.tFilter && factIdx < 0) factIdx = i;
        // план і % шукаємо тільки для fact-метрик (не для share)
        if (def.tFilter === 'fact') {
            if (t === 'plan' && planIdx < 0) planIdx = i;
            if (t === 'pct'  && pctIdx  < 0) pctIdx  = i;
        }
    }
    if (factIdx < 0) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b">Немає даних для цієї метрики</div>';
        return;
    }

    // ── ПЛАШКА МАГАЗИНУ ──
    const sumKeywords = ['разом','сума','total','тотал','підсумок','всього','итого'];
    const storeRow = savedRows.find(r => {
        const nl = (r[0]||'').trim().toLowerCase();
        return sumKeywords.some(k => nl.includes(k));
    });
    if (storeRow) {
        const sFact = toNum(storeRow[factIdx]);
        const sPlan = planIdx >= 0 ? toNum(storeRow[planIdx]) : null;
        const sPctRaw = pctIdx >= 0 ? storeRow[pctIdx] : null;

        // Для послуг і АСС — рахуємо % через факт/план якщо є обидва
        let sPctNum = null;
        if (['serv','acc'].includes(def.gFilter) && sFact && sPlan) {
            sPctNum = (sFact / sPlan) * 100;
        } else if (sPctRaw != null) {
            sPctNum = toNum(sPctRaw);
            if (!String(sPctRaw).includes('%') && sPctNum > 0 && sPctNum < 2) sPctNum *= 100;
        }
        const pctColor = !sPctNum ? '#86868b' : sPctNum < 80 ? '#ff3b30' : sPctNum < 100 ? '#ff9500' : '#34c759';
        const valFmtS = v => {
            if (!v) return '—';
            // Доля — до сотих без округлення
            if (def.tFilter === 'share') return Number(v).toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
            // Дохід і середній чек — з припискою грн
            if (['income','avgcheck'].includes(def.gFilter)) return Math.round(v).toLocaleString('uk-UA') + ' грн';
            return Math.round(v).toLocaleString('uk-UA');
        };

        const banner = document.createElement('div');
        banner.style.cssText = `
            background:white;border-radius:14px;
            box-shadow:0 2px 12px rgba(0,0,0,.06);
            border:1.5px solid ${def.color}33;
            padding:10px 14px;margin-bottom:4px;
            display:flex;align-items:center;gap:8px;flex-wrap:wrap;
        `;
        banner.innerHTML = `
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#a0a0ab;flex:0 0 auto">🏪 Магазин</div>
            <div style="display:flex;gap:12px;flex:1;flex-wrap:wrap;align-items:center">
                ${sPlan ? `<div style="display:flex;flex-direction:column;align-items:center">
                    <span style="font-size:9px;color:#a0a0ab;font-weight:600;text-transform:uppercase">План</span>
                    <span style="font-size:13px;font-weight:700;color:#1d1d1f">${valFmtS(sPlan)}</span>
                </div>` : ''}
                <div style="display:flex;flex-direction:column;align-items:center">
                    <span style="font-size:9px;color:#a0a0ab;font-weight:600;text-transform:uppercase">Факт</span>
                    <span style="font-size:13px;font-weight:700;color:${def.color}">${valFmtS(sFact)}</span>
                </div>
                ${sPctNum != null ? `<div style="display:flex;flex-direction:column;align-items:center">
                    <span style="font-size:9px;color:#a0a0ab;font-weight:600;text-transform:uppercase">Виконання</span>
                    <span style="font-size:15px;font-weight:800;color:${pctColor}">${sPctNum.toFixed(1)}%</span>
                </div>` : ''}
            </div>`;
        grid.appendChild(banner);
    }

    const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення','виконання','залишок'];

    const items = savedRows
        .filter(r => {
            const name = (r[0]||'').trim();
            if (!name) return false;
            if (/^\d{1,2}:\d{2}/.test(name)) return false; // часові рядки
            const nl = name.toLowerCase();
            return !excluded.some(k => nl.includes(k));
        })
        .map(r => ({
            name: (r[0]||'').trim(),
            val:  toNum(r[factIdx]),
            plan: planIdx >= 0 ? toNum(r[planIdx]) : null,
            pct:  pctIdx  >= 0 ? r[pctIdx] : null,
        }))
        .filter(x => x.val > 0);

    items.sort((a, b) => b.val - a.val);
    const maxVal = items.length ? items[0].val : 1;

    items.forEach((item, i) => {
        const pos = i + 1;
        const posClass = pos===1?'gold':pos===2?'silver':pos===3?'bronze':'rest';
        const barPct = Math.round(item.val / maxVal * 100);

        let pctStr = null;
        if (['serv','acc'].includes(def.gFilter) && item.val && item.plan) {
            // Для послуг і АСС — рахуємо % самостійно
            pctStr = ((item.val / item.plan) * 100).toFixed(1) + '%';
        } else if (item.pct != null) {
            let n = toNum(item.pct);
            if (!String(item.pct).includes('%') && n > 0 && n < 2) n *= 100;
            pctStr = n.toFixed(1) + '%';
        }

        const valFmt = v => {
            if (!v) return '—';
            const n = Number(v);
            if (isNaN(n)) return String(v);
            // Доля — до сотих
            if (def.tFilter === 'share') return n.toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
            // Дохід і середній чек — з грн
            if (['income','avgcheck'].includes(def.gFilter)) return Math.round(n).toLocaleString('uk-UA') + ' грн';
            return Number.isInteger(n) ? n.toLocaleString('uk-UA') : n.toLocaleString('uk-UA', {minimumFractionDigits:2, maximumFractionDigits:2});
        };

        const card = document.createElement('div');
        card.className = 'rank-card';
        card.innerHTML = `
            <div class="rank-bg" style="background:${def.color};width:${barPct}%"></div>
            <div class="rank-top">
                <div class="rank-pos ${posClass}">${pos<=3?['🥇','🥈','🥉'][pos-1]:pos}</div>
                <div class="rank-name">
                    <div class="rank-name-text">${item.name}</div>
                    ${pctStr ? `<div class="rank-sub">Виконання: ${pctStr}</div>` : ''}
                </div>
                <div class="rank-val">
                    <div class="rank-val-main" style="color:${def.color}">${valFmt(item.val)}</div>
                    ${item.plan ? `<div class="rank-val-sub">план: ${valFmt(item.plan)}</div>` : ''}
                </div>
            </div>
            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${barPct}%;background:${def.color}"></div></div>`;
        grid.appendChild(card);
    });

    if (!items.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b">Немає даних</div>';
    } else {
        grid.querySelectorAll('.rank-card').forEach((c,i)=>{c.classList.add('appear');c.style.animationDelay=(i*0.055)+'s';});
    }
}

// ===== ЗАВАНТАЖЕННЯ =====
async function load() {
    // Show skeleton table rows while fetching
    const tableCard = document.getElementById('tableCard');
    const loader = document.getElementById('loader');
    loader.style.display = 'none';
    // Build skeleton rows
    const skelWrap = document.createElement('div');
    skelWrap.id = 'skelWrap';
    const cols = window.innerWidth < 500 ? 4 : 7;
    for(let r=0;r<10;r++){
        const row = document.createElement('div');
        row.className = 'tbl-row-skel';
        for(let c=0;c<cols;c++){
            const cell=document.createElement('div');
            cell.className='tbl-row-skel-cell skel'+(c===0?' wide':'');
            cell.style.animationDelay=(r*0.05+c*0.02)+'s';
            row.appendChild(cell);
        }
        skelWrap.appendChild(row);
    }
    tableCard.appendChild(skelWrap);

    const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOxz-ozH9yNLW3IAzlkMlbRqOTrR4sIUO1__KpAMBFEvvpMXr4LWTnRvzYGb_y6za7WBxOUhl2DV84/pub?output=csv";
    try {
        const res = await fetch(SHEET + '&t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = parseCSV(await res.text());
        if (rows.length < 2) throw new Error('Немає даних');
        savedHeaders = rows[0];
        savedRows = rows.slice(1);
        const sw = document.getElementById('skelWrap');
        if(sw) sw.remove();
        document.getElementById('tbl').style.display = '';
        renderTable(savedHeaders, savedRows, false);
    } catch(e) {
        loader.style.display = '';
        loader.className = 'error';
        loader.textContent = '❌ ' + e.message;
        const sw = document.getElementById('skelWrap');
        if(sw) sw.remove();
    }
}

load();

// Свайп назад
let x0=0, y0=0, sw=false;
document.addEventListener('touchstart', e=>{x0=e.changedTouches[0].screenX; y0=e.changedTouches[0].screenY; sw=true;},{passive:true});
document.addEventListener('touchmove',  e=>{if(Math.abs(e.changedTouches[0].screenY-y0)>25) sw=false;},{passive:true});
document.addEventListener('touchend',   e=>{
    if(sw && e.changedTouches[0].screenX-x0>120 && Math.abs(e.changedTouches[0].screenY-y0)<50)
        window.location.href='index.html';
    sw=false;
},{passive:true});
</script>
