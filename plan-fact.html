<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План-Факт — Детальна Аналітика</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 8px 10px; }

        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 8px; font-size: 14px; }

        .table-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        .group-header {
            text-align: center; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 7px 4px; border-bottom: 1px solid #d2d2d7; background: white;
        }
        .group-to     { color: #0071e3; border-bottom: 3px solid #0071e3 !important; }
        .group-serv   { color: #34c759; border-bottom: 3px solid #34c759 !important; }
        .group-acc    { color: #ff9500; border-bottom: 3px solid #ff9500 !important; }
        .group-checks { color: #af52de; border-bottom: 3px solid #af52de !important; }

        th {
            text-align: center; padding: 5px 4px; color: #86868b;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            border-bottom: 1px solid #d2d2d7; background: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        th.group-to     { color: #0071e3; }
        th.group-serv   { color: #34c759; }
        th.group-acc    { color: #ff9500; }
        th.group-checks { color: #af52de; }

        td {
            padding: 5px 4px; border-bottom: 1px solid #f2f2f4;
            font-size: 12px; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; text-align: center;
        }

        .group-start { border-left: 2px solid #d2d2d7 !important; }

        .name-cell, th:first-child {
            position: sticky; left: 0; background: white; z-index: 100;
            font-weight: 600; white-space: normal; line-height: 1.2;
            word-break: break-word; text-align: left;
            box-shadow: 4px 0 8px -2px rgba(0,0,0,0.10);
        }
        th:first-child { z-index: 101; }

        .cell-badge {
            display: block; border-radius: 6px; font-size: 11px; font-weight: 600;
            text-align: center; padding: 2px 4px; white-space: nowrap;
        }
        .badge-plan   { background: rgba(134,134,139,0.10); color: #6e6e73; font-weight: 500; font-size: 10px; }
        .badge-to     { background: rgba(0,113,227,0.12);   color: #1a50b8; }
        .badge-serv   { background: rgba(52,199,89,0.12);   color: #1a7f37; }
        .badge-acc    { background: rgba(255,149,0,0.12);   color: #b85000; }
        .badge-checks { background: rgba(175,82,222,0.12);  color: #6d28d9; }

        .total-row td           { background: #e8f0fe !important; font-weight: 700 !important; }
        .total-row td.name-cell { background: #e8f0fe !important; color: #1d1d1f !important; }
        .deviation-row td       { font-style: italic; color: #86868b !important; font-size: 11px !important; }
        .deviation-row .name-cell { font-style: italic; color: #86868b !important; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
        .error   { padding: 40px; text-align: center; color: #ff3b30; }

        /* ===== ДЕСКТОП ===== */
        @media (min-width: 768px) {
            table { min-width: 1200px; }
            .name-cell, th:first-child { width: 110px; min-width: 110px; max-width: 110px; padding: 6px 6px; font-size: 11px; }
            .col-plan  { width: 80px; }
            .col-fact  { width: 88px; }
            .col-pct   { width: 72px; }
            .col-share { width: 68px; }
            td { font-size: 12px; padding: 6px 5px; }
            th { font-size: 10px; padding: 6px 5px; }
            .cell-badge { font-size: 11px; padding: 2px 5px; }
        }

        @media (max-width: 767px) {
            .table-card {
                scroll-snap-type: x mandatory;
                scroll-padding-left: 82px;
            }
            .name-cell, th:first-child {
                width: 82px; min-width: 82px; max-width: 82px;
                font-size: 9px; padding: 4px 4px;
                z-index: 200 !important;
                background: white; background-clip: padding-box;
                box-shadow: 4px 0 10px -2px rgba(0,0,0,0.18);
                border-right: 1px solid #e0e0e5;
            }
            th:first-child { z-index: 201 !important; }
            td { font-size: 10.5px; padding: 4px 2px; }
            th { font-size: 8px; padding: 4px 2px; }
            th.group-header { font-size: 8.5px; padding: 5px 2px; }
            .cell-badge { font-size: 10px; padding: 2px 2px; border-radius: 5px; }
            /* ширини колонок задає JS через setMobileWidths() */
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← На головну</a>

    <div class="table-card">
        <div id="loader" class="loading">Завантаження даних...</div>
        <table id="tbl" style="display:none">
            <thead>
                <tr>
                    <th rowspan="2" style="text-align:left">ПК</th>
                    <th colspan="3" class="group-header group-to">Товарообіг</th>
                    <th colspan="4" class="group-header group-serv">Послуги</th>
                    <th colspan="4" class="group-header group-acc">Аксесуари</th>
                    <th colspan="3" class="group-header group-checks">Чеки</th>
                </tr>
                <tr>
                    <th class="group-to    col-to-plan   group-start">План</th>
                    <th class="group-to    col-to-fact">Факт</th>
                    <th class="group-to    col-to-pct">%</th>

                    <th class="group-serv  col-serv-plan  group-start">План</th>
                    <th class="group-serv  col-serv-fact">Факт</th>
                    <th class="group-serv  col-serv-share">Доля</th>
                    <th class="group-serv  col-serv-pct">%</th>

                    <th class="group-acc   col-acc-plan   group-start">План</th>
                    <th class="group-acc   col-acc-fact">Факт</th>
                    <th class="group-acc   col-acc-share">Доля</th>
                    <th class="group-acc   col-acc-pct">%</th>

                    <th class="group-checks col-chk-plan  group-start">План</th>
                    <th class="group-checks col-chk-fact">Факт</th>
                    <th class="group-checks col-chk-pct">%</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

<script>
function parseCSV(text) {
    const rows = []; let row = []; let col = ""; let inQ = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (c === '"' && text[i+1] === '"') { col += '"'; i++; }
        else if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(col); col = ""; }
        else if (c === '\n' && !inQ) { row.push(col); rows.push(row); row = []; col = ""; }
        else col += c;
    }
    if (col || row.length) { row.push(col); rows.push(row); }
    return rows;
}

function toNum(v) {
    if (!v) return 0;
    return parseFloat(v.toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v) {
    const n = toNum(v);
    return n ? Math.round(n).toLocaleString('uk-UA') : (v || '0');
}
function fmtShare(v) { return toNum(v).toFixed(2); }
function fmtPct(v) {
    let n = toNum(v);
    const s = v ? v.toString() : '';
    if (!s.includes('%') && n > 0 && n < 2) n *= 100;
    return n.toFixed(1) + '%';
}

function badge(text, cls) {
    return `<span class="cell-badge ${cls}">${text}</span>`;
}
// % бейдж — нейтральний сірий, колір виставить colorize()
function pctBadge(val, colClass) {
    return `<span class="cell-badge badge-plan ${colClass}" data-pct="${toNum(val)}">${fmtPct(val)}</span>`;
}

// ===== ДИНАМІЧНА ЗАЛИВКА % КОЛОНОК =====
// Збираємо всі бейджі з однаковим data-pct класом, рахуємо min/max, фарбуємо
function colorizePct() {
    // Групуємо бейджі по класу колонки
    const groups = {};
    document.querySelectorAll('#tbody tr:not(.total-row):not(.deviation-row) .cell-badge[data-pct]').forEach(el => {
        // знаходимо клас групи з батьківського td
        const td = el.parentElement;
        const cls = [...td.classList].find(c => c.startsWith('col-') && c.endsWith('-pct'));
        if (!cls) return;
        if (!groups[cls]) groups[cls] = [];
        groups[cls].push({ el, val: parseFloat(el.dataset.pct) });
    });

    Object.values(groups).forEach(cells => {
        const vals = cells.map(c => c.val);
        const min = Math.min(...vals), max = Math.max(...vals);
        const range = max - min || 1;
        cells.forEach(({ el, val }) => {
            const ratio = (val - min) / range; // 0=мін червоне, 1=макс зелене
            const hue  = Math.round(ratio * 120);
            const lBg  = Math.round(88 - ratio * 10);
            const lFg  = Math.round(28 + ratio * 10);
            el.style.background = `hsl(${hue},70%,${lBg}%)`;
            el.style.color      = `hsl(${hue},60%,${lFg}%)`;
        });
    });

    // Підсумковий рядок — стандартна заливка по значенню
    document.querySelectorAll('#tbody tr.total-row .cell-badge[data-pct]').forEach(el => {
        const n = parseFloat(el.dataset.pct);
        let bg, fg;
        if (n >= 100) { bg='rgba(52,199,89,0.20)'; fg='#155724'; }
        else if (n >= 80) { bg='rgba(255,204,0,0.15)'; fg='#8a6800'; }
        else { bg='rgba(255,59,48,0.13)'; fg='#c0392b'; }
        el.style.background = bg;
        el.style.color = '#1d1d1f';
    });
}

async function load() {
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
    try {
        const res = await fetch(URL + '&t=' + Date.now());
        const rows = parseCSV(await res.text()).slice(1);

        document.getElementById('loader').style.display = 'none';
        document.getElementById('tbl').style.display = '';

        const tbody = document.getElementById('tbody');

        rows.forEach(row => {
            if (!row[0] || !row[0].trim()) return;
            const name = row[0].trim();
            const nameLC = name.toLowerCase();
            const isTotal = ['разом','сума','total','тотал','підсумок','всього','итого'].some(k => nameLC.includes(k));
            const isDev   = nameLC.includes('відставання') || nameLC.includes('відхилення');

            const tr = document.createElement('tr');
            if (isTotal) tr.className = 'total-row';
            if (isDev)   tr.className = 'deviation-row';

            const r = i => (row[i] || '').trim();

            if (isDev) {
                tr.innerHTML = `
                    <td class="name-cell">${name}</td>
                    <td class="col-to-plan    group-start">${r(1)}</td>
                    <td class="col-to-fact">${r(2)}</td>
                    <td class="col-to-pct">${r(3)}</td>
                    <td class="col-serv-plan  group-start">${r(4)}</td>
                    <td class="col-serv-fact">${r(5)}</td>
                    <td class="col-serv-share">${r(6)}</td>
                    <td class="col-serv-pct">${r(7)}</td>
                    <td class="col-acc-plan   group-start">${r(8)}</td>
                    <td class="col-acc-fact">${r(9)}</td>
                    <td class="col-acc-share">${r(10)}</td>
                    <td class="col-acc-pct">${r(11)}</td>
                    <td class="col-chk-plan   group-start">${r(12)}</td>
                    <td class="col-chk-fact">${r(13)}</td>
                    <td class="col-chk-pct">${r(14)}</td>`;
            } else {
                tr.innerHTML = `
                    <td class="name-cell">${name}</td>
                    <td class="col-to-plan    group-start">${badge(fmtInt(r(1)),'badge-plan')}</td>
                    <td class="col-to-fact">${badge(fmtInt(r(2)),'badge-to')}</td>
                    <td class="col-to-pct">${pctBadge(r(3),'col-to-pct')}</td>
                    <td class="col-serv-plan  group-start">${badge(fmtInt(r(4)),'badge-plan')}</td>
                    <td class="col-serv-fact">${badge(fmtInt(r(5)),'badge-serv')}</td>
                    <td class="col-serv-share">${badge(fmtShare(r(6)),'badge-serv')}</td>
                    <td class="col-serv-pct">${pctBadge(r(7),'col-serv-pct')}</td>
                    <td class="col-acc-plan   group-start">${badge(fmtInt(r(8)),'badge-plan')}</td>
                    <td class="col-acc-fact">${badge(fmtInt(r(9)),'badge-acc')}</td>
                    <td class="col-acc-share">${badge(fmtShare(r(10)),'badge-acc')}</td>
                    <td class="col-acc-pct">${pctBadge(r(11),'col-acc-pct')}</td>
                    <td class="col-chk-plan   group-start">${badge(fmtInt(r(12)),'badge-plan')}</td>
                    <td class="col-chk-fact">${badge(fmtInt(r(13)),'badge-checks')}</td>
                    <td class="col-chk-pct">${pctBadge(r(14),'col-chk-pct')}</td>`;
            }
            tbody.appendChild(tr);
        });

        colorizePct();
        setMobileWidths();

    } catch(e) {
        const el = document.getElementById('loader');
        el.className = 'error';
        el.textContent = '❌ ' + e.message;
    }
}

load();

// Свайп назад
let x0=0, y0=0, sw=false;
document.addEventListener('touchstart', e=>{x0=e.changedTouches[0].screenX; y0=e.changedTouches[0].screenY; sw=true;},{passive:true});
document.addEventListener('touchmove',  e=>{if(Math.abs(e.changedTouches[0].screenY-y0)>25) sw=false;},{passive:true});
document.addEventListener('touchend',   e=>{
    if(sw && e.changedTouches[0].screenX-x0>120 && Math.abs(e.changedTouches[0].screenY-y0)<50)
        window.location.href='index.html';
    sw=false;
},{passive:true});
</script>
</body>
</html>
