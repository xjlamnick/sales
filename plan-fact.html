<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План-Факт</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 8px 10px; }
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 8px; font-size: 14px; }

        .table-card {
            background: white; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        table { border-collapse: collapse; table-layout: fixed; }

        th {
            text-align: center; padding: 5px 3px; color: #86868b;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            border-bottom: 1px solid #d2d2d7; background: white;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        td {
            padding: 3px 3px; border-bottom: 1px solid #f2f2f4;
            font-size: 12px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .group-header {
            text-align: center; font-size: 10px; font-weight: 800;
            text-transform: uppercase; padding: 6px 4px;
            border-bottom: 1px solid #d2d2d7; background: white;
        }
        .g-to     { color: #0071e3; border-bottom: 3px solid #0071e3 !important; }
        .g-serv   { color: #34c759; border-bottom: 3px solid #34c759 !important; }
        .g-acc    { color: #ff9500; border-bottom: 3px solid #ff9500 !important; }
        .g-checks { color: #af52de; border-bottom: 3px solid #af52de !important; }

        .grp-start { border-left: 2px solid #d2d2d7 !important; }

        .name-cell, th.name-th {
            position: sticky; left: 0; background: white; z-index: 100;
            font-weight: 600; white-space: normal; line-height: 1.15;
            word-break: break-word; text-align: left;
            box-shadow: 4px 0 8px -2px rgba(0,0,0,0.12);
            border-right: 1px solid #e0e0e5;
            font-size: 9px;
        }
        th.name-th { z-index: 101; font-size: 9px; }

        .badge {
            display: block; border-radius: 5px; font-size: 9.5px; font-weight: 600;
            text-align: center; padding: 1px 2px; white-space: nowrap;
        }
        .b-plan   { background: rgba(134,134,139,0.10); color: #6e6e73; font-size: 8.5px; }
        .b-to     { background: rgba(0,113,227,0.12);   color: #1a50b8; }
        .b-serv   { background: rgba(52,199,89,0.12);   color: #1a7f37; }
        .b-acc    { background: rgba(255,149,0,0.12);   color: #b85000; }
        .b-checks { background: rgba(175,82,222,0.12);  color: #6d28d9; }

        .total-row td           { background: #e8f0fe !important; font-weight: 700; }
        .total-row td.name-cell { background: #e8f0fe !important; color: #1d1d1f; }
        .dev-row td             { font-style: italic; color: #86868b !important; font-size: 10px; }
        .dev-row td.name-cell   { font-style: italic; color: #86868b !important; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
        .error   { padding: 40px; text-align: center; color: #ff3b30; }

        /* TOP BAR */
        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
        .view-toggle{display:flex;gap:4px;background:#e5e5ea;border-radius:10px;padding:3px}
        .view-btn{border:none;background:transparent;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:#6e6e73;font-family:inherit;transition:all .2s}
        .view-btn.active{background:white;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.12)}

        /* RATING VIEW */
        .rating-panel{display:none}
        .rating-panel.visible{display:block}
        .metric-bar{background:white;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.06);padding:12px 14px;margin-bottom:12px}
        .metric-bar-title{font-size:11px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
        .metric-pills{display:flex;gap:6px;flex-wrap:wrap}
        .mpill{border:1.5px solid #d2d2d7;background:white;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:#6e6e73;transition:all .15s;white-space:nowrap}
        .mpill.active{color:white;border-color:transparent}
        .ranking-grid{display:flex;flex-direction:column;gap:7px}
        .rank-card{background:white;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.06);padding:11px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:transform .15s}
        .rank-card:hover{transform:translateY(-1px)}
        .rank-bg{position:absolute;left:0;top:0;height:100%;opacity:.07;border-radius:14px;pointer-events:none;transition:width .5s ease}
        .rank-pos{font-size:18px;font-weight:800;min-width:26px;text-align:center;line-height:1}
        .rank-pos.gold{color:#f5a623}.rank-pos.silver{color:#9b9b9b}.rank-pos.bronze{color:#c47a3a}.rank-pos.rest{color:#ccc;font-size:14px}
        .rank-name{flex:1;min-width:0}
        .rank-name-text{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .rank-sub{font-size:10px;color:#6e6e73;margin-top:1px}
        .rank-bar-wrap{flex:2;min-width:50px;max-width:140px}
        .rank-bar-bg{height:6px;background:#ebebef;border-radius:3px;overflow:hidden}
        .rank-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
        .rank-val{text-align:right;min-width:58px}
        .rank-val-main{font-size:14px;font-weight:800;line-height:1.2}
        .rank-val-sub{font-size:10px;color:#6e6e73}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-link">← На головну</a>
        <div class="view-toggle">
            <button class="view-btn active" id="btnTable" onclick="setView('table')">📋 Таблиця</button>
            <button class="view-btn" id="btnRating" onclick="setView('rating')">🏆 Рейтинг</button>
        </div>
    </div>
    <div class="table-card" id="tableCard">
        <div id="loader" class="loading">Завантаження...</div>
        <table id="tbl" style="display:none">
            <thead>
                <tr id="tr-groups"></tr>
                <tr id="tr-heads"></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <!-- RATING VIEW -->
    <div class="rating-panel" id="ratingPanel">
        <div class="metric-bar">
            <div class="metric-bar-title">Метрика для рейтингу</div>
            <div class="metric-pills" id="metricPills"></div>
        </div>
        <div class="ranking-grid" id="rankingGrid"></div>
    </div>

<script>
// ======= CONFIG =======
// Групи: назва, css-клас, [{ label, csvIdx, type, badge }]
const GROUPS = [
    { name:'Товарообіг', cls:'g-to', cols:[
        { label:'План',  idx:1,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:2,  type:'fact',  b:'b-to'   },
        { label:'%',     idx:3,  type:'pct'                },
    ]},
    { name:'Послуги', cls:'g-serv', cols:[
        { label:'План',  idx:4,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:5,  type:'fact',  b:'b-serv' },
        { label:'Доля',  idx:6,  type:'share', b:'b-serv' },
        { label:'%',     idx:7,  type:'pct'                },
    ]},
    { name:'Аксесуари', cls:'g-acc', cols:[
        { label:'План',  idx:8,  type:'plan',  b:'b-plan' },
        { label:'Факт',  idx:9,  type:'fact',  b:'b-acc'  },
        { label:'Доля',  idx:10, type:'share', b:'b-acc'  },
        { label:'%',     idx:11, type:'pct'                },
    ]},
    { name:'Чеки', cls:'g-checks', cols:[
        { label:'План',  idx:12, type:'plan',  b:'b-plan'   },
        { label:'Факт',  idx:13, type:'fact',  b:'b-checks' },
        { label:'%',     idx:14, type:'pct'                  },
    ]},
];

// Метрики для рейтингу (факт-значення)
const RATING_METRICS = [
    { key:'to_fact',   label:'ТО',        idx:2,  color:'#0071e3', planIdx:1,  pctIdx:3,  fmt:'int' },
    { key:'serv_fact', label:'Послуги',   idx:5,  color:'#34c759', planIdx:4,  pctIdx:7,  fmt:'int' },
    { key:'acc_fact',  label:'ACC',       idx:9,  color:'#ff9500', planIdx:8,  pctIdx:11, fmt:'int' },
    { key:'chk_fact',  label:'Чеки',      idx:13, color:'#af52de', planIdx:12, pctIdx:14, fmt:'int' },
    { key:'serv_shr',  label:'Частка посл.', idx:6, color:'#34c759', fmt:'share' },
    { key:'acc_shr',   label:'Частка ACC', idx:10, color:'#ff9500', fmt:'share' },
];

let allRatingRows = [];
let activeMetricKey = 'to_fact';

// ======= HELPERS =======
function parseCSV(text) {
    const rows = []; let row = [], col = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (c==='"' && text[i+1]==='"') { col+='"'; i++; }
        else if (c==='"') inQ=!inQ;
        else if (c===',' && !inQ) { row.push(col); col=''; }
        else if (c==='\n' && !inQ) { row.push(col); rows.push(row); row=[]; col=''; }
        else col+=c;
    }
    if (col||row.length) { row.push(col); rows.push(row); }
    return rows;
}
function toNum(v) {
    return parseFloat((v||'').toString().replace('%','').replace(/\s/g,'').replace(',','.')) || 0;
}
function fmtInt(v) { const n=toNum(v); return n ? Math.round(n).toLocaleString('uk-UA') : (v||'0'); }
function fmtShare(v) { return toNum(v).toFixed(2); }
function fmtPct(v) {
    let n=toNum(v);
    if (!(v||'').toString().includes('%') && n>0 && n<2) n*=100;
    return n.toFixed(1)+'%';
}
function pctNum(v) {
    let n=toNum(v);
    if (!(v||'').toString().includes('%') && n>0 && n<2) n*=100;
    return n;
}

// ======= WIDTHS =======
// Задаємо ширини в px через JS щоб браузер не міг нічого переробити
function getWidths() {
    const mob = window.innerWidth < 768;
    if (!mob) {
        return { name: 110, c3: 82, c4: 78 };
    }
    const nameW = 82;
    const avail = window.innerWidth - nameW - 1; // -1 px запас
    return {
        name: nameW,
        c3: Math.floor(avail / 3),   // для груп по 3 колонки
        c4: Math.floor(avail / 4),   // для груп по 4 колонки
    };
}

// ======= BUILD TABLE =======
function buildTable(dataRows) {
    const W = getWidths();

    const tbl = document.getElementById('tbl');
    tbl.style.display = '';

    // Загальна ширина таблиці
    // ТО: 3*c3, Посл: 4*c4, АСС: 4*c4, Чеки: 3*c4
    const totalW = W.name + 3*W.c3 + 4*W.c4 + 4*W.c4 + 3*W.c4;
    tbl.style.width = totalW + 'px';

    // Colgroup
    const cg = document.createElement('colgroup');
    function addCol(w) {
        const c = document.createElement('col');
        c.style.width = w + 'px';
        cg.appendChild(c);
    }
    addCol(W.name);
    GROUPS.forEach(g => {
        const cw = g.cols.length === 3 ? W.c3 : W.c4;
        g.cols.forEach(() => addCol(cw));
    });
    tbl.prepend(cg);

    // Рядок групових заголовків
    const trG = document.getElementById('tr-groups');
    // corner
    const corner = document.createElement('th');
    corner.rowSpan = 2;
    corner.className = 'name-th';
    corner.style.width = W.name + 'px';
    corner.textContent = 'ПК';
    trG.appendChild(corner);

    GROUPS.forEach(g => {
        const th = document.createElement('th');
        th.colSpan = g.cols.length;
        th.className = 'group-header ' + g.cls + ' grp-start';
        th.textContent = g.name;
        trG.appendChild(th);
    });

    // Рядок підзаголовків
    const trH = document.getElementById('tr-heads');
    GROUPS.forEach(g => {
        g.cols.forEach((col, ci) => {
            const th = document.createElement('th');
            th.className = g.cls + (ci===0 ? ' grp-start' : '');
            th.textContent = col.label;
            trH.appendChild(th);
        });
    });

    // Збираємо % spans для colorize
    const pctSpans = GROUPS.map(() => []);

    // Рядки даних
    const tbody = document.getElementById('tbody');
    dataRows.forEach(row => {
        if (!row[0]||!row[0].trim()) return;
        const name = row[0].trim();
        const nl = name.toLowerCase();
        const isTotal = ['разом','сума','total','тотал','підсумок','всього','итого'].some(k=>nl.includes(k));
        const isDev   = nl.includes('відставання')||nl.includes('відхилення');

        const tr = document.createElement('tr');
        if (isTotal) tr.className = 'total-row';
        if (isDev)   tr.className = 'dev-row';

        // name cell
        const nc = document.createElement('td');
        nc.className = 'name-cell';
        nc.style.width = W.name + 'px';
        nc.textContent = name;
        tr.appendChild(nc);

        GROUPS.forEach((g, gi) => {
            const cw = g.cols.length===3 ? W.c3 : W.c4;
            g.cols.forEach((col, ci) => {
                const val = (row[col.idx]||'').trim();
                const td = document.createElement('td');
                td.style.width = cw + 'px';
                if (ci===0) td.classList.add('grp-start');

                if (isDev) {
                    td.textContent = val;
                } else if (col.type==='plan') {
                    td.innerHTML = `<span class="badge b-plan">${fmtInt(val)}</span>`;
                } else if (col.type==='share') {
                    td.innerHTML = `<span class="badge ${col.b}">${fmtShare(val)}</span>`;
                } else if (col.type==='fact') {
                    td.innerHTML = `<span class="badge ${col.b}">${fmtInt(val)}</span>`;
                } else if (col.type==='pct') {
                    const span = document.createElement('span');
                    span.className = 'badge b-plan';
                    span.textContent = fmtPct(val);
                    span.dataset.pct = pctNum(val);
                    td.appendChild(span);
                    if (!isTotal) pctSpans[gi].push(span);
                }
                tr.appendChild(td);
            });
        });

        tbody.appendChild(tr);
    });

    // Динамічна заливка %
    pctSpans.forEach(spans => {
        if (!spans.length) return;
        const vals = spans.map(s => +s.dataset.pct);
        const min = Math.min(...vals), max = Math.max(...vals), range = max-min||1;
        spans.forEach(s => {
            const ratio = (+s.dataset.pct - min) / range;
            const h = Math.round(ratio*120);
            s.style.background = `hsl(${h},70%,${Math.round(88-ratio*10)}%)`;
            s.style.color      = `hsl(${h},60%,${Math.round(28+ratio*10)}%)`;
        });
    });
    // total рядок % — по значенню
    tbody.querySelectorAll('.total-row .badge[data-pct]').forEach(s => {
        const n = +s.dataset.pct;
        s.style.background = n>=100?'rgba(52,199,89,0.20)':n>=80?'rgba(255,204,0,0.15)':'rgba(255,59,48,0.13)';
        s.style.color = '#1d1d1f';
    });

    // Scroll snap через JS (touchend)
    if (window.innerWidth < 768) {
        const card = document.querySelector('.table-card');
        // Позиції snap = початок кожної групи
        const snaps = [];
        let x = 0;
        GROUPS.forEach(g => {
            snaps.push(x);
            x += (g.cols.length===3 ? W.c3 : W.c4) * g.cols.length;
        });

        let t0x = 0;
        card.addEventListener('touchstart', e => { t0x = e.touches[0].clientX; }, { passive:true });
        card.addEventListener('touchend', e => {
            const dx = t0x - e.changedTouches[0].clientX;
            const cur = card.scrollLeft;
            // найближча позиція
            let best = snaps.reduce((a,b) => Math.abs(b-cur)<Math.abs(a-cur)?b:a, snaps[0]);
            let idx = snaps.indexOf(best);
            if (dx > 40 && idx < snaps.length-1) best = snaps[idx+1];
            if (dx < -40 && idx > 0) best = snaps[idx-1];
            card.scrollTo({ left: best, behavior: 'smooth' });
        }, { passive:true });
    }
}

// ======= VIEW TOGGLE =======
function setView(mode) {
    const tableCard = document.getElementById('tableCard');
    const ratingPanel = document.getElementById('ratingPanel');
    document.getElementById('btnTable').classList.toggle('active', mode==='table');
    document.getElementById('btnRating').classList.toggle('active', mode==='rating');
    tableCard.style.display = mode==='table' ? '' : 'none';
    if (mode==='rating') {
        ratingPanel.classList.add('visible');
        renderRating();
    } else {
        ratingPanel.classList.remove('visible');
    }
}

// ======= RATING =======
function fmtRatingVal(v, fmt) {
    if (v===null||v===undefined) return '—';
    const n = Number(v);
    if (isNaN(n)) return '—';
    if (fmt==='share') return n.toFixed(2)+'%';
    if (fmt==='pct') return n.toFixed(1)+'%';
    if (Math.abs(n)>=1000000) return (n/1000000).toFixed(2)+'М';
    if (Math.abs(n)>=1000) return (n/1000).toFixed(0)+'К';
    return Math.round(n).toLocaleString('uk-UA');
}

function buildMetricPills() {
    const container = document.getElementById('metricPills');
    container.innerHTML = '';
    RATING_METRICS.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'mpill' + (m.key===activeMetricKey?' active':'');
        btn.textContent = m.label;
        if (m.key===activeMetricKey) btn.style.background = m.color;
        btn.onclick = () => { activeMetricKey = m.key; buildMetricPills(); renderRankingCards(); };
        container.appendChild(btn);
    });
}

function renderRankingCards() {
    const m = RATING_METRICS.find(x=>x.key===activeMetricKey) || RATING_METRICS[0];
    const grid = document.getElementById('rankingGrid');
    grid.innerHTML = '';

    // Filter out total/dev rows — broad exclusion
    const sellers = allRatingRows.filter(r => {
        const nl = (r[0]||'').toLowerCase().trim();
        if (!nl) return false;
        const excluded = ['разом','сума','total','тотал','підсумок','всього','итого','відставання','відхилення','магазин','store','shop'];
        return !excluded.some(k=>nl.includes(k));
    });

    const withVals = sellers.map(r => ({
        name: (r[0]||'').trim(),
        val: toNum(r[m.idx]||'0'),
        plan: m.planIdx ? toNum(r[m.planIdx]||'0') : null,
        pct: m.pctIdx ? toNum(r[m.pctIdx]||'0') : null,
    })).filter(x=>x.name && x.val > 0);

    withVals.sort((a,b) => b.val - a.val);
    const maxVal = withVals.length ? withVals[0].val : 1;

    withVals.forEach((item, i) => {
        const pos = i+1;
        const posClass = pos===1?'gold':pos===2?'silver':pos===3?'bronze':'rest';
        const barPct = maxVal>0 ? Math.round((item.val/maxVal)*100) : 0;

        const pctStr = item.pct!=null ? (() => {
            let n = item.pct;
            if (!(String(item.pct)).includes('%') && n>0 && n<2) n*=100;
            return n.toFixed(1)+'%';
        })() : null;

        const card = document.createElement('div');
        card.className = 'rank-card';
        card.innerHTML = `
            <div class="rank-bg" style="background:${m.color};width:${barPct}%"></div>
            <div class="rank-pos ${posClass}">${pos<=3?['🥇','🥈','🥉'][pos-1]:pos}</div>
            <div class="rank-name">
                <div class="rank-name-text">${item.name}</div>
                ${pctStr?`<div class="rank-sub">Виконання: ${pctStr}</div>`:''}
            </div>
            <div class="rank-bar-wrap">
                <div class="rank-bar-bg">
                    <div class="rank-bar-fill" style="width:${barPct}%;background:${m.color}"></div>
                </div>
            </div>
            <div class="rank-val">
                <div class="rank-val-main" style="color:${m.color}">${fmtRatingVal(item.val, m.fmt)}</div>
                ${item.plan?`<div class="rank-val-sub">план: ${fmtRatingVal(item.plan, m.fmt)}</div>`:''}
            </div>`;
        grid.appendChild(card);
    });

    if (!withVals.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:#86868b">Немає даних</div>';
    }
}

function renderRating() {
    buildMetricPills();
    renderRankingCards();
}

async function load() {
    const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOUXHhUpCkh6tgvNpJzY-w5tVrhPkvEeC0W0ZWuy2YxPayuO3pvahfeKYmMZ1DwHnILTpsJFNtXLsH/pub?output=csv";
    try {
        const res = await fetch(URL + '&t=' + Date.now());
        const rows = parseCSV(await res.text()).slice(1);
        allRatingRows = rows;
        document.getElementById('loader').style.display = 'none';
        buildTable(rows);
    } catch(e) {
        const el = document.getElementById('loader');
        el.className = 'error';
        el.textContent = '❌ ' + e.message;
    }
}
load();

// Свайп назад
let x0=0,y0=0,sw=false;
document.addEventListener('touchstart',e=>{x0=e.changedTouches[0].screenX;y0=e.changedTouches[0].screenY;sw=true;},{passive:true});
document.addEventListener('touchmove', e=>{if(Math.abs(e.changedTouches[0].screenY-y0)>25)sw=false;},{passive:true});
document.addEventListener('touchend',  e=>{
    if(sw&&e.changedTouches[0].screenX-x0>120&&Math.abs(e.changedTouches[0].screenY-y0)<50)
        window.location.href='index.html';
    sw=false;
},{passive:true});
</script>
