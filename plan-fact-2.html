<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План-Факт 2 — Детальна Аналітика</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 10px auto; }
        
        /* Десктопна версія - вужча таблиця */
        @media (min-width: 768px) {
            .container { 
                max-width: 900px;
                margin: 20px auto;
            }
        }
        
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        
        .table-card { 
            background: white; 
            border-radius: 18px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* Кольорові групи для РЯДКІВ */
        /* Лівий бордер для кольорових груп */
        tr.group-to td:first-child    { border-left: 4px solid #34c759; }
        tr.group-serv td:first-child  { border-left: 4px solid #af52de; }
        tr.group-acc td:first-child   { border-left: 4px solid #ff9500; }
        tr.group-traffic td:first-child { border-left: 4px solid #0071e3; }
        tr.group-other td:first-child  { border-left: 4px solid #8e8e93; }


        .group-header {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 5px 8px;
            color: #1d1d1f;
            border-bottom: 1px solid #d2d2d7;
            position: relative;
        }

        th { 
            text-align: center; 
            padding: 5px 8px; 
            color: #86868b; 
            font-size: 10px; 
            font-weight: 600; 
            border-bottom: 1px solid #d2d2d7; 
            background: white;
        }
        
        td { 
            padding: 5px 8px; 
            border-bottom: 1px solid #f5f5f7; 
            font-size: 13px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        /* Ширина колонок: План менша, Факт і % трохи більші */
        .val-plan { 
            width: 65px;
            min-width: 65px;
        }
        .val-fact { 
            width: 105px;
            min-width: 105px;
        }
        .val-pct, .val-pct-success, .val-pct-danger { 
            width: 70px;
            min-width: 70px;
        }
        
        /* Мобільна версія - зменшуємо ширину колонок */
        @media (max-width: 767px) {
            .val-plan { 
                width: 52px;
                min-width: 52px;
                padding: 4px 4px;
            }
            .val-fact { 
                width: 80px;
                min-width: 80px;
                padding: 4px 4px;
            }
            .val-pct, .val-pct-success, .val-pct-danger { 
                width: 56px;
                min-width: 56px;
                padding: 4px 4px;
            }
            
            .name-cell, th:first-child { 
                width: 90px;
                min-width: 90px;
                font-size: 11px;
                padding: 4px 4px;
            }
            
            td {
                font-size: 11px;
            }
            
            th {
                font-size: 9px;
                padding: 4px 4px;
            }
            
            .group-header {
                font-size: 9px;
                padding: 4px 4px;
            }
        }
        
        /* Зменшена ширина першого стовбця */
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            width: 110px;
            min-width: 110px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            font-weight: 600;
            font-size: 12px;
            white-space: normal;
            line-height: 1.2;
            text-align: left;
        }
        th:first-child { 
            z-index: 11;
        }

        /* РІЗНІ КОЛЬОРИ ДЛЯ ПЛАН, ФАКТ, % */
        .val-plan { color: #86868b; font-size: 11px; background: transparent; text-align: center; }
        .val-fact { font-weight: 600; background: transparent; color: #1d1d1f; text-align: center; }
        /* === ПЛАН badge — розтягується на всю ширину клітинки === */
        .plan-badge {
            display: block; padding: 2px 7px; border-radius: 7px;
            font-size: 11px; font-weight: 500; white-space: nowrap; text-align: center;
        }
        .group-to    .plan-badge { background: rgba(52,199,89,0.09);   color: #3a9e5f; }
        .group-serv  .plan-badge { background: rgba(175,82,222,0.09);  color: #8e44ad; }
        .group-acc   .plan-badge { background: rgba(255,149,0,0.09);   color: #b87000; }
        .group-traffic .plan-badge { background: rgba(0,113,227,0.09); color: #1a6bc4; }
        .group-other .plan-badge { background: rgba(142,142,147,0.09); color: #6e6e73; }

        /* === ФАКТ badge — яскравіший колір рядка === */
        .fact-badge {
            display: block; padding: 3px 8px; border-radius: 8px;
            font-size: 12px; font-weight: 600; white-space: nowrap; text-align: center;
        }
        .group-to    .fact-badge { background: rgba(52,199,89,0.18);   color: #1a7f37; }
        .group-serv  .fact-badge { background: rgba(175,82,222,0.18);  color: #6d28d9; }
        .group-acc   .fact-badge { background: rgba(255,149,0,0.18);   color: #c05800; }
        .group-traffic .fact-badge { background: rgba(0,113,227,0.18); color: #1d4ed8; }
        .group-other .fact-badge { background: rgba(142,142,147,0.12); color: #3d3d3f; }

        /* === Роздільник між групами — тонка лінія === */
        tr.group-border-top td { border-top: none !important; padding-top: 2px !important; }
        tr.group-border-big td { border-top: 14px solid #f0f0f5 !important; padding-top: 8px !important; }
        .val-pct, .val-pct-success, .val-pct-danger {
            font-weight: 700;
            text-align: right;
            background: transparent !important;
        }
        .pct-badge {
            display: block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
            white-space: nowrap;
            text-align: center;
        }
        .pct-badge-success { background: rgba(52,199,89,0.15); color: #1a7f37; }
        .pct-badge-danger  { background: rgba(255,59,48,0.12); color: #d93025; }
        .pct-badge-neutral { background: rgba(52,199,89,0.08); color: #34c759; }
        
        /* Для рядка "Разом" перевизначаємо кольори */
        .total-row { background: #1d1d1f !important; }
        .total-row td { color: white !important; font-weight: 700; }
        .total-row .name-cell { background: #1d1d1f !important; color: white; }
        .total-row .plan-badge { background: rgba(255,255,255,0.1); color: #c0c0c0; }
        .total-row .fact-badge { background: rgba(255,255,255,0.15) !important; color: white !important; }
        .total-row .pct-badge-success { background: rgba(52,199,89,0.3); color: #34c759; }
        .total-row .pct-badge-danger  { background: rgba(217,48,37,0.25); color: #ff6b6b; }
        .total-row .pct-badge-neutral { background: rgba(52,199,89,0.2); color: #34c759; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На головну</a>
        <div class="table-card">
            <div id="loader" class="loading">Завантаження даних...</div>
            <table id="dataTable" style="display: none;">
                <colgroup id="tableColgroup"></colgroup>
                <thead></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else { col += char; }
            }
            if (col || row.length) { row.push(col); rows.push(row); }
            return rows;
        }

        function cleanVal(val) {
            if (!val) return 0;
            let s = val.toString().replace('%', '').replace(/\s/g, '').replace(',', '.');
            return parseFloat(s) || 0;
        }

        // Форматування: зберігаємо сотих якщо вони є в оригіналі
        function formatDisplay(val, isPct = false) {
            if (!val && val !== 0) return '0';
            
            let originalStr = val.toString().trim();
            
            // Перевіряємо чи є символ % в оригіналі
            let isPercentInOriginal = originalStr.includes('%');
            
            let num = cleanVal(val);
            
            // Якщо isPct=true або є % в оригіналі - форматуємо як відсоток
            if (isPct || isPercentInOriginal) {
                // Просто додаємо % без конвертації
                return num.toFixed(2) + '%';
            }
            
            // Перевіряємо чи є десяткова частина в оригіналі
            let hasDecimals = originalStr.includes('.') || originalStr.includes(',');
            
            if (hasDecimals) {
                // Якщо є - показуємо 2 знаки після коми
                return num.toLocaleString('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            } else {
                // Якщо немає - показуємо як ціле число
                return Math.round(num).toLocaleString('uk-UA');
            }
        }

        // Визначаємо кольорову групу за назвою колонки (для заголовків)
        function getGroupClass(colName) {
            const name = colName.toLowerCase().trim();
            
            // Видаляємо зайві символи для аналізу
            const cleanName = name.replace(/₴/g, '').replace(/%/g, '').trim();
            
            // Блок ТО 
            if (cleanName === 'то' || cleanName.startsWith('то ') || cleanName.endsWith(' то')) {
                return 'group-to';
            }
            
            // Блок Послуги
            if (cleanName.includes('послуг')) {
                return 'group-serv';
            }
            
            // Блок АСС
            if (cleanName === 'асс' || cleanName === 'acc' || cleanName.includes('асс ') || cleanName.includes('acc ')) {
                return 'group-acc';
            }
            
            // Блок Трафік/Чеки (трафік, чеки, ктч, срч, конверсія, pick-up, кредит)
            if (cleanName === 'трафік' || cleanName === 'чеки' || cleanName === 'ктч' || 
                cleanName === 'срч' || cleanName.includes('конверс') || cleanName.includes('pick-up') ||
                cleanName === 'кредит') {
                return 'group-traffic';
            }
            
            // Все інше (logitech, tefal/philips та інші)
            return 'group-other';
        }

        // Визначаємо кольорову групу для РЯДКА за назвою метрики
        function getRowGroupClass(rowName) {
            const name = rowName.toLowerCase().trim();
            
            // Блок ТО
            if (name.includes('то ₴')) {
                return 'group-to';
            }
            
            // Блок Послуги
            if (name.includes('послуг')) {
                return 'group-serv';
            }
            
            // Блок АСС
            if (name.includes('асс')) {
                return 'group-acc';
            }
            
            // Блок Трафік/Чеки
            if (name === 'трафік' || name === 'чеки' || name === 'ктч' || 
                name === 'срч' || name.includes('конверс') || name === 'pick-up' ||
                name === 'кредит') {
                return 'group-traffic';
            }
            
            // Все інше
            return 'group-other';
        }

        async function loadTable() {
            const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOIhykbS0HNX-ODto87MxEF8gEbXroIyDF-G4vL2YzwXCvSioCuFw4ZOp00mfYkZNeM6zi3qge8VuN/pub?output=csv";
            try {
                const res = await fetch(URL + '&t=' + Date.now());
                const text = await res.text();
                const rows = parseCSV(text);
                
                if (rows.length < 2) {
                    document.getElementById('loader').textContent = "Немає даних";
                    return;
                }

                const headers = rows[0]; // Перший рядок - заголовки
                const dataRows = rows.slice(1);

                // Динамічно будуємо заголовки таблиці
                const thead = document.querySelector('thead');
                thead.innerHTML = '';
                
                // Перший рядок - групові заголовки
                const headerRow1 = document.createElement('tr');
                const th1 = document.createElement('th');
                th1.rowSpan = 2;
                th1.textContent = headers[0]; // Перша колонка (Продавець)
                headerRow1.appendChild(th1);

                // Групуємо колонки по 3 (План, Факт, %)
                const numGroups = Math.floor((headers.length - 1) / 3);
                const groupHeaders = [];
                
                for (let i = 0; i < numGroups; i++) {
                    const startIdx = 1 + i * 3;
                    const groupName = headers[startIdx].replace(/план/i, '').replace(/факт/i, '').replace(/%/g, '').trim();
                    groupHeaders.push(groupName);
                    
                    const groupTh = document.createElement('th');
                    groupTh.colSpan = 3;
                    groupTh.className = 'group-header ' + getGroupClass(groupName);
                    groupTh.textContent = groupName;
                    headerRow1.appendChild(groupTh);
                }

                // Другий рядок - План, Факт, %
                const headerRow2 = document.createElement('tr');
                for (let i = 0; i < numGroups; i++) {
                    const groupClass = getGroupClass(groupHeaders[i]);
                    
                    ['План', 'Факт', '%'].forEach(label => {
                        const th = document.createElement('th');
                        th.className = groupClass;
                        th.textContent = label;
                        if (label === 'План') th.style.width = '18%';
                        else if (label === 'Факт') th.style.width = '28%';
                        else th.style.width = '20%';
                        headerRow2.appendChild(th);
                    });
                }

                thead.appendChild(headerRow1);
                thead.appendChild(headerRow2);

                // Заповнюємо дані
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                // Задаємо ширини колонок через colgroup
                const cg = document.getElementById('tableColgroup');
                cg.innerHTML = '';
                const isMob = window.innerWidth < 768;
                const wName = isMob ? '90px' : '110px';
                const wPlan = isMob ? '52px' : '65px';
                const wFact = isMob ? '82px' : '108px';
                const wPct  = isMob ? '56px' : '72px';
                const mkCol = w => { const c = document.createElement('col'); c.style.width = w; return c; };
                cg.appendChild(mkCol(wName));
                const nGroups = Math.floor((headers.length - 1) / 3);
                for (let g = 0; g < nGroups; g++) {
                    cg.appendChild(mkCol(wPlan));
                    cg.appendChild(mkCol(wFact));
                    cg.appendChild(mkCol(wPct));
                }
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                let prevGroupClass = null;

                dataRows.forEach(row => {
                    if (!row[0] || !row[0].trim()) return;

                    const tr = document.createElement('tr');
                    const isTotal = row[0].toLowerCase().includes('разом') || 
                                   row[0].toLowerCase().includes('сума') ||
                                   row[0].toLowerCase().includes('всього');
                    
                    // Визначаємо групу рядка за назвою метрики
                    const rowGroupClass = getRowGroupClass(row[0]);
                    
                    // Роздільник при зміні групи
                    const isGroupChange = prevGroupClass !== null && rowGroupClass !== prevGroupClass && !isTotal;
                    const isBigSep = isGroupChange && ['group-to','group-serv','group-acc','group-traffic'].includes(prevGroupClass);
                    if (!isTotal) prevGroupClass = rowGroupClass;
                    
                    if (isTotal) {
                        tr.className = 'total-row';
                    } else {
                        tr.className = rowGroupClass + (isBigSep ? ' group-border-big' : isGroupChange ? '' : '');
                    }

                    // Перша колонка - ім'я
                    const nameCell = document.createElement('td');
                    nameCell.className = 'name-cell';
                    nameCell.textContent = row[0];
                    tr.appendChild(nameCell);

                    // Решта колонок
                    for (let i = 0; i < numGroups; i++) {
                        const startIdx = 1 + i * 3;
                        const groupClass = getGroupClass(groupHeaders[i]);
                        const isLastGroup = (i === numGroups - 1);
                        
                        // План
                        const planCell = document.createElement('td');
                        planCell.className = 'val-plan ' + rowGroupClass;
                        planCell.innerHTML = '<span class="plan-badge">' + formatDisplay(row[startIdx] || 0) + '</span>';
                        tr.appendChild(planCell);
                        
                        // Факт
                        const factCell = document.createElement('td');
                        factCell.className = 'val-fact ' + rowGroupClass;
                        factCell.innerHTML = '<span class="fact-badge">' + formatDisplay(row[startIdx + 1] || 0) + '</span>';
                        tr.appendChild(factCell);
                        
                        // %
                        const pctCell = document.createElement('td');
                        const pctValue = cleanVal(row[startIdx + 2] || 0);
                        const pctText = formatDisplay(row[startIdx + 2] || 0, true);
                        
                        if (isLastGroup) {
                            const badgeCls = pctValue >= 100 ? 'pct-badge-success' : 'pct-badge-danger';
                            const tdCls = pctValue >= 100 ? 'val-pct-success' : 'val-pct-danger';
                            pctCell.className = tdCls + ' ' + groupClass;
                            pctCell.innerHTML = '<span class="pct-badge ' + badgeCls + '">' + pctText + '</span>';
                        } else {
                            pctCell.className = 'val-pct ' + groupClass;
                            pctCell.innerHTML = '<span class="pct-badge pct-badge-neutral">' + pctText + '</span>';
                        }
                        tr.appendChild(pctCell);
                    }

                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loader').textContent = "Помилка завантаження: " + e.message;
            }
        }
        loadTable();
    </script>
</body>
</html>
