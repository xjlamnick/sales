<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План-Факт 2 — Детальна Аналітика</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --accent: #0071e3; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 10px auto; }
        
        /* Десктопна версія - вужча таблиця */
        @media (min-width: 768px) {
            .container { 
                max-width: 900px;
                margin: 20px auto;
            }
        }
        
        .back-link { color: var(--accent); text-decoration: none; font-weight: 500; display: inline-block; margin-bottom: 15px; font-size: 14px; }
        
        .table-card { 
            background: white; 
            border-radius: 18px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        /* Кольорові групи для РЯДКІВ */
        /* Лівий бордер для кольорових груп */
        tr.group-to td:first-child    { border-left: 4px solid #34c759; }
        tr.group-serv td:first-child  { border-left: 4px solid #af52de; }
        tr.group-acc td:first-child   { border-left: 4px solid #ff9500; }
        tr.group-traffic td:first-child { border-left: 4px solid #0071e3; }
        tr.group-other td:first-child  { border-left: 4px solid #8e8e93; }


        .group-header {
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 5px 8px;
            color: #1d1d1f;
            border-bottom: 1px solid #d2d2d7;
            position: relative;
        }

        th { 
            text-align: center; 
            padding: 5px 8px; 
            color: #86868b; 
            font-size: 10px; 
            font-weight: 600; 
            border-bottom: 1px solid #d2d2d7; 
            background: white;
        }
        
        td { 
            padding: 5px 8px; 
            border-bottom: 1px solid #f5f5f7; 
            font-size: 13px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        /* Ширина колонок: План менша, Факт і % трохи більші */
        .val-plan { 
            width: 65px;
            min-width: 65px;
        }
        .val-fact { 
            width: 105px;
            min-width: 105px;
        }
        .val-pct, .val-pct-success, .val-pct-danger { 
            width: 70px;
            min-width: 70px;
        }
        
        /* Мобільна версія - зменшуємо ширину колонок */
        @media (max-width: 767px) {
            .val-plan { 
                width: 52px;
                min-width: 52px;
                padding: 4px 4px;
            }
            .val-fact { 
                width: 80px;
                min-width: 80px;
                padding: 4px 4px;
            }
            .val-pct, .val-pct-success, .val-pct-danger { 
                width: 56px;
                min-width: 56px;
                padding: 4px 4px;
            }
            
            .name-cell, th:first-child { 
                width: 90px;
                min-width: 90px;
                font-size: 11px;
                padding: 4px 4px;
            }
            
            td {
                font-size: 11px;
            }
            
            th {
                font-size: 9px;
                padding: 4px 4px;
            }
            
            .group-header {
                font-size: 9px;
                padding: 4px 4px;
            }
        }
        
        /* Зменшена ширина першого стовбця */
        .name-cell, th:first-child { 
            position: sticky; 
            left: 0; 
            background: white; 
            z-index: 10; 
            width: 110px;
            min-width: 110px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            font-weight: 600;
            font-size: 12px;
            white-space: normal;
            line-height: 1.2;
            text-align: left;
        }
        th:first-child { 
            z-index: 11;
        }

        /* РІЗНІ КОЛЬОРИ ДЛЯ ПЛАН, ФАКТ, % */
        .val-plan { color: #86868b; font-size: 11px; background: transparent; text-align: center; }
        .val-fact { font-weight: 600; background: transparent; color: #1d1d1f; text-align: center; }
        /* === ПЛАН badge — темно-сірий для всіх груп === */
        .plan-badge {
            display: block; padding: 2px 7px; border-radius: 7px;
            font-size: 11px; font-weight: 500; white-space: nowrap; text-align: center;
            background: rgba(60,60,67,0.10); color: #3c3c43;
        }
        .group-to    .plan-badge { background: rgba(60,60,67,0.10); color: #3c3c43; }
        .group-serv  .plan-badge { background: rgba(60,60,67,0.10); color: #3c3c43; }
        .group-acc   .plan-badge { background: rgba(60,60,67,0.10); color: #3c3c43; }
        .group-traffic .plan-badge { background: rgba(60,60,67,0.10); color: #3c3c43; }
        .group-other .plan-badge { background: rgba(60,60,67,0.10); color: #3c3c43; }

        /* === ФАКТ badge — яскравіший колір рядка === */
        .fact-badge {
            display: block; padding: 3px 8px; border-radius: 8px;
            font-size: 12px; font-weight: 800; white-space: nowrap; text-align: center;
        }
        .group-to    .fact-badge { background: rgba(52,199,89,0.18);   color: #1a7f37; }
        .group-serv  .fact-badge { background: rgba(175,82,222,0.18);  color: #6d28d9; }
        .group-acc   .fact-badge { background: rgba(255,149,0,0.18);   color: #c05800; }
        .group-traffic .fact-badge { background: rgba(0,113,227,0.18); color: #1d4ed8; }
        .group-other .fact-badge { background: rgba(142,142,147,0.12); color: #3d3d3f; }

        /* === Роздільник між групами — тонка лінія === */
        tr.group-border-top td { border-top: none !important; padding-top: 2px !important; }
        tr.group-border-big td { border-top: 14px solid #f0f0f5 !important; padding-top: 8px !important; }
        .val-pct, .val-pct-success, .val-pct-danger {
            font-weight: 700;
            text-align: right;
            background: transparent !important;
        }
        .pct-badge {
            display: block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.4;
            white-space: nowrap;
            text-align: center;
        }
        .pct-badge-success { background: rgba(52,199,89,0.15); color: #1a7f37; }
        .pct-badge-danger  { background: rgba(255,59,48,0.12); color: #d93025; }
        .pct-badge-neutral { background: rgba(52,199,89,0.08); color: #34c759; }
        
        /* Для рядка "Разом" перевизначаємо кольори */
        .total-row { background: #1d1d1f !important; }
        .total-row td { color: white !important; font-weight: 700; }
        .total-row .name-cell { background: #1d1d1f !important; color: white; }
        .total-row .plan-badge { background: rgba(255,255,255,0.1); color: #c0c0c0; }
        .total-row .fact-badge { background: rgba(255,255,255,0.15) !important; color: white !important; }
        .total-row .pct-badge-success { background: rgba(52,199,89,0.3); color: #34c759; }
        .total-row .pct-badge-danger  { background: rgba(217,48,37,0.25); color: #ff6b6b; }
        .total-row .pct-badge-neutral { background: rgba(52,199,89,0.2); color: #34c759; }

        .loading { padding: 40px; text-align: center; color: #86868b; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На головну</a>
        <div class="table-card">
            <div id="loader" class="loading">Завантаження даних...</div>
            <table id="dataTable" style="display: none;">
                <colgroup id="tableColgroup"></colgroup>
                <thead></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function parseCSV(text) {
            const rows = []; let row = []; let col = ""; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                if (char === '"' && text[i+1] === '"') { col += '"'; i++; }
                else if (char === '"') { inQuotes = !inQuotes; }
                else if (char === ',' && !inQuotes) { row.push(col); col = ""; }
                else if (char === '\n' && !inQuotes) { row.push(col); rows.push(row); row = []; col = ""; }
                else { col += char; }
            }
            if (col || row.length) { row.push(col); rows.push(row); }
            return rows;
        }

        function cleanVal(val) {
            if (!val) return 0;
            let s = val.toString().replace('%', '').replace(/\s/g, '').replace(',', '.');
            return parseFloat(s) || 0;
        }

        // Форматування: зберігаємо сотих якщо вони є в оригіналі
        function formatDisplay(val, isPct = false) {
            if (!val && val !== 0) return '0';
            
            let originalStr = val.toString().trim();
            
            // Перевіряємо чи є символ % в оригіналі
            let isPercentInOriginal = originalStr.includes('%');
            
            let num = cleanVal(val);
            
            // Якщо isPct=true або є % в оригіналі - форматуємо як відсоток
            if (isPct || isPercentInOriginal) {
                // Просто додаємо % без конвертації
                return num.toFixed(2) + '%';
            }
            
            // Перевіряємо чи є десяткова частина в оригіналі
            let hasDecimals = originalStr.includes('.') || originalStr.includes(',');
            
            if (hasDecimals) {
                // Якщо є - показуємо 2 знаки після коми
                return num.toLocaleString('uk-UA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            } else {
                // Якщо немає - показуємо як ціле число
                return Math.round(num).toLocaleString('uk-UA');
            }
        }

        // Визначаємо кольорову групу за назвою колонки (для заголовків)
        function getGroupClass(colName) {
            const name = colName.toLowerCase().trim();
            
            // Видаляємо зайві символи для аналізу
            const cleanName = name.replace(/₴/g, '').replace(/%/g, '').trim();
            
            // Блок ТО 
            if (cleanName === 'то' || cleanName.startsWith('то ') || cleanName.endsWith(' то')) {
                return 'group-to';
            }
            
            // Блок Послуги
            if (cleanName.includes('послуг')) {
                return 'group-serv';
            }
            
            // Блок АСС
            if (cleanName === 'асс' || cleanName === 'acc' || cleanName.includes('асс ') || cleanName.includes('acc ')) {
                return 'group-acc';
            }
            
            // Блок Трафік/Чеки (трафік, чеки, ктч, срч, конверсія, pick-up, кредит)
            if (cleanName === 'трафік' || cleanName === 'чеки' || cleanName === 'ктч' || 
                cleanName === 'срч' || cleanName.includes('конверс') || cleanName.includes('pick-up') ||
                cleanName === 'кредит') {
                return 'group-traffic';
            }
            
            // Все інше (logitech, tefal/philips та інші)
            return 'group-other';
        }

        // Визначаємо кольорову групу для РЯДКА за назвою метрики
        function getRowGroupClass(rowName) {
            const name = rowName.toLowerCase().trim();
            
            // Блок ТО
            if (name.includes('то ₴')) {
                return 'group-to';
            }
            
            // Блок Послуги
            if (name.includes('послуг')) {
                return 'group-serv';
            }
            
            // Блок АСС
            if (name.includes('асс')) {
                return 'group-acc';
            }
            
            // Блок Трафік/Чеки
            if (name === 'трафік' || name === 'чеки' || name === 'ктч' || 
                name === 'срч' || name.includes('конверс') || name === 'pick-up' ||
                name === 'кредит') {
                return 'group-traffic';
            }
            
            // Все інше
            return 'group-other';
        }

        async function loadTable() {
            const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOIhykbS0HNX-ODto87MxEF8gEbXroIyDF-G4vL2YzwXCvSioCuFw4ZOp00mfYkZNeM6zi3qge8VuN/pub?output=csv";
            try {
                const res = await fetch(URL + '&t=' + Date.now());
                const text = await res.text();
                const rows = parseCSV(text);
                
                if (rows.length < 2) {
                    document.getElementById('loader').textContent = "Немає даних";
                    return;
                }

                const headers = rows[0]; // Перший рядок - заголовки
                const dataRows = rows.slice(1);

                // Динамічно будуємо заголовки таблиці
                const thead = document.querySelector('thead');
                thead.innerHTML = '';
                
                // Перший рядок - групові заголовки
                const headerRow1 = document.createElement('tr');
                const th1 = document.createElement('th');
                th1.rowSpan = 2;
                th1.textContent = headers[0]; // Перша колонка (Продавець)
                headerRow1.appendChild(th1);

                // Групуємо колонки по 3 (План, Факт, %)
                const numGroups = Math.floor((headers.length - 1) / 3);
                const groupHeaders = [];
                
                for (let i = 0; i < numGroups; i++) {
                    const startIdx = 1 + i * 3;
                    const groupName = headers[startIdx].replace(/план/i, '').replace(/факт/i, '').replace(/%/g, '').trim();
                    groupHeaders.push(groupName);
                    
                    const groupTh = document.createElement('th');
                    groupTh.colSpan = 3;
                    groupTh.className = 'group-header ' + getGroupClass(groupName);
                    groupTh.textContent = groupName;
                    headerRow1.appendChild(groupTh);
                }

                // Другий рядок - План, Факт, %
                const headerRow2 = document.createElement('tr');
                for (let i = 0; i < numGroups; i++) {
                    const groupClass = getGroupClass(groupHeaders[i]);
                    
                    ['План', 'Факт', '%'].forEach(label => {
                        const th = document.createElement('th');
                        th.className = groupClass;
                        th.textContent = label;
                        if (label === 'План') th.style.width = '18%';
                        else if (label === 'Факт') th.style.width = '28%';
                        else th.style.width = '20%';
                        headerRow2.appendChild(th);
                    });
                }

                thead.appendChild(headerRow1);
                thead.appendChild(headerRow2);

                // Заповнюємо дані
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dataTable').style.display = 'table';
                // Задаємо ширини колонок через colgroup
                const cg = document.getElementById('tableColgroup');
                cg.innerHTML = '';
                const isMob = window.innerWidth < 768;
                const wName = isMob ? '90px' : '110px';
                const wPlan = isMob ? '52px' : '65px';
                const wFact = isMob ? '82px' : '108px';
                const wPct  = isMob ? '56px' : '72px';
                const mkCol = w => { const c = document.createElement('col'); c.style.width = w; return c; };
                cg.appendChild(mkCol(wName));
                const nGroups = Math.floor((headers.length - 1) / 3);
                for (let g = 0; g < nGroups; g++) {
                    cg.appendChild(mkCol(wPlan));
                    cg.appendChild(mkCol(wFact));
                    cg.appendChild(mkCol(wPct));
                }
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                let prevGroupClass = null;

                dataRows.forEach(row => {
                    if (!row[0] || !row[0].trim()) return;

                    const tr = document.createElement('tr');
                    const isTotal = row[0].toLowerCase().includes('разом') || 
                                   row[0].toLowerCase().includes('сума') ||
                                   row[0].toLowerCase().includes('всього');
                    
                    // Визначаємо групу рядка за назвою метрики
                    const rowGroupClass = getRowGroupClass(row[0]);
                    
                    // Роздільник при зміні групи
                    const isGroupChange = prevGroupClass !== null && rowGroupClass !== prevGroupClass && !isTotal;
                    const isBigSep = isGroupChange && ['group-to','group-serv','group-acc','group-traffic'].includes(prevGroupClass);
                    if (!isTotal) prevGroupClass = rowGroupClass;
                    
                    if (isTotal) {
                        tr.className = 'total-row';
                    } else {
                        tr.className = rowGroupClass + (isBigSep ? ' group-border-big' : isGroupChange ? '' : '');
                    }

                    // Перша колонка - ім'я
                    const nameCell = document.createElement('td');
                    nameCell.className = 'name-cell';
                    nameCell.textContent = row[0];
                    tr.appendChild(nameCell);

                    // Решта колонок
                    for (let i = 0; i < numGroups; i++) {
                        const startIdx = 1 + i * 3;
                        const groupClass = getGroupClass(groupHeaders[i]);
                        const isLastGroup = (i === numGroups - 1);
                        
                        // План
                        const planCell = document.createElement('td');
                        planCell.className = 'val-plan ' + rowGroupClass;
                        planCell.innerHTML = '<span class="plan-badge">' + formatDisplay(row[startIdx] || 0) + '</span>';
                        tr.appendChild(planCell);
                        
                        // Факт
                        const factCell = document.createElement('td');
                        factCell.className = 'val-fact ' + rowGroupClass;
                        factCell.innerHTML = '<span class="fact-badge">' + formatDisplay(row[startIdx + 1] || 0) + '</span>';
                        tr.appendChild(factCell);
                        
                        // %
                        const pctCell = document.createElement('td');
                        const pctValue = cleanVal(row[startIdx + 2] || 0);
                        const pctText = formatDisplay(row[startIdx + 2] || 0, true);
                        
                        if (isLastGroup) {
                            const badgeCls = pctValue >= 100 ? 'pct-badge-success' : 'pct-badge-danger';
                            const tdCls = pctValue >= 100 ? 'val-pct-success' : 'val-pct-danger';
                            pctCell.className = tdCls + ' ' + groupClass;
                            pctCell.innerHTML = '<span class="pct-badge ' + badgeCls + '">' + pctText + '</span>';
                        } else {
                            pctCell.className = 'val-pct ' + groupClass;
                            pctCell.innerHTML = '<span class="pct-badge pct-badge-neutral">' + pctText + '</span>';
                        }
                        tr.appendChild(pctCell);
                    }

                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loader').textContent = "Помилка завантаження: " + e.message;
            }
        }
        loadTable();
    </script>

    <script>
        const IPHONE_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="14" y="4" width="26" height="46" rx="5" fill="currentColor"/>
            <rect x="16" y="8" width="22" height="34" rx="2" fill="white" opacity=".35"/>
            <rect x="22" y="6" width="10" height="2" rx="1" fill="white" opacity=".5"/>
            <circle cx="27" cy="46" r="2" fill="white" opacity=".5"/>
        </svg>`;

        const MACBOOK_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="12" width="38" height="24" rx="3" fill="currentColor"/>
            <rect x="11" y="15" width="32" height="18" rx="1.5" fill="white" opacity=".35"/>
            <rect x="4" y="36" width="46" height="4" rx="2" fill="currentColor" opacity=".8"/>
            <rect x="20" y="36" width="14" height="2" rx="1" fill="white" opacity=".4"/>
        </svg>`;

        const TV_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="8" width="44" height="30" rx="3" fill="currentColor"/>
            <rect x="8" y="11" width="38" height="24" rx="1.5" fill="white" opacity=".35"/>
            <rect x="20" y="38" width="14" height="3" rx="1" fill="currentColor" opacity=".7"/>
            <rect x="16" y="41" width="22" height="3" rx="1.5" fill="currentColor" opacity=".6"/>
        </svg>`;

        const LAPTOP_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="9" y="10" width="36" height="24" rx="3" fill="currentColor"/>
            <rect x="12" y="13" width="30" height="18" rx="1.5" fill="white" opacity=".35"/>
            <rect x="3" y="34" width="48" height="5" rx="2" fill="currentColor" opacity=".8"/>
            <rect x="19" y="35" width="16" height="2" rx="1" fill="white" opacity=".4"/>
        </svg>`;

        const VACUUM_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="27" cy="30" r="16" fill="currentColor"/>
            <circle cx="27" cy="30" r="10" fill="white" opacity=".25"/>
            <circle cx="27" cy="30" r="4" fill="white" opacity=".4"/>
            <rect x="26" y="6" width="4" height="14" rx="2" fill="currentColor" opacity=".8"/>
            <rect x="30" y="8" width="14" height="4" rx="2" fill="currentColor" opacity=".7"/>
        </svg>`;

        const WASHER_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="6" width="38" height="44" rx="4" fill="currentColor"/>
            <circle cx="27" cy="32" r="12" fill="white" opacity=".25"/>
            <circle cx="27" cy="32" r="8" fill="white" opacity=".2"/>
            <circle cx="27" cy="32" r="3" fill="white" opacity=".5"/>
            <rect x="12" y="10" width="8" height="4" rx="2" fill="white" opacity=".5"/>
            <circle cx="36" cy="12" r="2.5" fill="white" opacity=".5"/>
        </svg>`;

        const POWERSTATION_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="7" y="14" width="40" height="26" rx="4" fill="currentColor"/>
            <rect x="10" y="17" width="34" height="20" rx="2" fill="white" opacity=".2"/>
            <rect x="47" y="22" width="4" height="10" rx="2" fill="currentColor" opacity=".7"/>
            <rect x="13" y="20" width="10" height="14" rx="2" fill="white" opacity=".3"/>
            <rect x="26" y="20" width="10" height="14" rx="2" fill="white" opacity=".3"/>
            <path d="M30 10 L24 26 H29 L24 44 L36 22 H30 L36 10 Z" fill="white" opacity=".55"/>
        </svg>`;

        const ACC_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="12" y="8" width="30" height="20" rx="10" fill="currentColor"/>
            <rect x="16" y="12" width="10" height="12" rx="5" fill="white" opacity=".4"/>
            <rect x="28" y="12" width="10" height="12" rx="5" fill="white" opacity=".4"/>
            <rect x="14" y="28" width="26" height="16" rx="3" fill="currentColor" opacity=".85"/>
            <rect x="17" y="31" width="20" height="3" rx="1.5" fill="white" opacity=".4"/>
            <rect x="17" y="37" width="12" height="3" rx="1.5" fill="white" opacity=".3"/>
        </svg>`;

        const DIG_SVG = `<svg viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="10" width="34" height="24" rx="3" fill="currentColor"/>
            <rect x="13" y="13" width="28" height="18" rx="1.5" fill="white" opacity=".3"/>
            <rect x="20" y="34" width="14" height="3" rx="1" fill="currentColor" opacity=".7"/>
            <rect x="14" y="37" width="26" height="5" rx="2" fill="currentColor" opacity=".6"/>
            <circle cx="35" cy="19" r="4" fill="white" opacity=".5"/>
            <circle cx="35" cy="19" r="2" fill="currentColor" opacity=".4"/>
        </svg>`;

        function getIconHtml(name, fallbackEmoji, color) {
            const nl = name.toLowerCase();
            let svg = null;
            if (nl.includes('iphone'))                         svg = IPHONE_SVG;
            else if (nl.includes('macbook') || nl.includes('mac book')) svg = MACBOOK_SVG;
            else if (nl === 'av' || nl.includes('телевіз'))    svg = TV_SVG;
            else if (nl === 'it')                              svg = LAPTOP_SVG;
            else if (nl === 'sda')                             svg = VACUUM_SVG;
            else if (nl === 'mda')                             svg = WASHER_SVG;
            else if (nl === 'nip')                             svg = POWERSTATION_SVG;
            else if (nl === 'acc')                             svg = ACC_SVG;
            else if (nl === 'dig')                             svg = DIG_SVG;
            if (svg) return `<span style="color:${color}">${svg}</span>`;
            return fallbackEmoji;
        }

        const CAT_PALETTES = [
            { bg:'#e8f1fd', text:'#1a50b8', icon:'📱' },
            { bg:'#e3f8ec', text:'#1a7f37', icon:'💻' },
            { bg:'#fff3e0', text:'#b85000', icon:'🎧' },
            { bg:'#f3eefe', text:'#6d28d9', icon:'🖥️' },
            { bg:'#fde8e8', text:'#c0392b', icon:'📷' },
            { bg:'#e8f8f5', text:'#0f6e56', icon:'⌚' },
            { bg:'#fef9e0', text:'#8a6800', icon:'🎮' },
            { bg:'#fde8f5', text:'#8b2258', icon:'📟' },
            { bg:'#e8f4fd', text:'#1a6bc4', icon:'🔌' },
            { bg:'#e9fde8', text:'#2e7d32', icon:'🖨️' },
            { bg:'#fdf0e8', text:'#c05800', icon:'📡' },
            { bg:'#f0e8fd', text:'#5e35b1', icon:'💾' },
        ];
        const CAT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHr5D0io8bTywVzOwBLMzTkEWRZdA2uWixvn8Jm8ZI9NC9KMSp0ewzs0cJLv8gy_MvJbq_EqCzoPCh/pub?output=csv';

        function parseCatCSV(text) {
            const rows = [];
            for (const line of text.split(/\r?\n/)) {
                if (!line.trim()) continue;
                const row = []; let cell = '', q = false;
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"') { if (q && line[i+1]==='"') { cell+='"'; i++; } else q=!q; }
                    else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
                    else cell += c;
                }
                row.push(cell.trim());
                if (row.some(x => x !== '')) rows.push(row);
            }
            return rows;
        }

        function fmtSum(v) {
            const n = parseFloat(v.toString().replace(/\s/g,'').replace(',','.')) || 0;
            return n ? Math.round(n).toLocaleString('uk-UA') + ' ₴' : '—';
        }

        function showCatSkeleton(grid, count) {
            grid.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const c = document.createElement('div');
                c.className = 'cat-card-skel';
                const d = (i * 0.05) + 's';
                c.innerHTML = `
                    <div class="cat-skel" style="width:50%;height:9px;animation-delay:${d}"></div>
                    <div class="cat-skel" style="width:75%;height:16px;animation-delay:${d}"></div>
                    <div class="cat-skel" style="width:35%;height:9px;animation-delay:${d}"></div>`;
                grid.appendChild(c);
            }
        }

        async function loadCategories() {
            const grid = document.getElementById('catGrid');
            showCatSkeleton(grid, 8);
            try {
                const res = await fetch(CAT_URL + '&t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const text = await res.text();
                const rows = parseCatCSV(text);
                if (rows.length < 2) throw new Error('Немає даних, рядків: ' + rows.length);

                const headers = rows[0].map(h => h.trim().toLowerCase());
                const idxCat = headers.findIndex(h => h.includes('катег'));
                const idxSum = headers.findIndex(h => h.includes('сум') || h.includes('sum'));
                const idxQty = headers.findIndex(h => h.includes('шт') || h.includes('qty') || h.includes('кіл'));

                if (idxCat < 0) throw new Error('Не знайдено колонку Категорія. Заголовки: ' + headers.join(', '));
                if (idxSum < 0) throw new Error('Не знайдено колонку Сума. Заголовки: ' + headers.join(', '));

                const dataRows = rows.slice(1).filter(r => r[idxCat] && r[idxCat].trim());

                // ── картки категорій ──
                grid.innerHTML = '';
                dataRows.forEach((row, i) => {
                    const name = row[idxCat] ? row[idxCat].trim() : '—';
                    const sum  = idxSum >= 0 ? row[idxSum] : '';
                    const qty  = idxQty >= 0 ? row[idxQty] : '';
                    const pal  = CAT_PALETTES[i % CAT_PALETTES.length];

                    const card = document.createElement('div');
                    card.className = 'cat-card';
                    card.style.cssText = `background:${pal.bg};animation-delay:${i*0.05}s`;
                    card.innerHTML = `
                        <div class="cat-icon-bg">${getIconHtml(name, pal.icon, pal.text)}</div>
                        <div class="cat-name">${name}</div>
                        <div class="cat-sum" style="color:${pal.text}">${fmtSum(sum)}</div>
                        ${qty ? `<div class="cat-qty" style="color:${pal.text}">${parseInt(qty) || qty} шт</div>` : ''}`;
                    grid.appendChild(card);
                });

                // ── кругова діаграма ──
                const PIE_KEYS   = ['av','it','dig','sda','mda','acc','nip'];
                const PIE_COLORS = ['#0071e3','#34c759','#af52de','#ff9500','#ff3b30','#5856d6','#00b388'];
                const PIE_LABELS = { av:'AV', it:'IT', dig:'DIG', sda:'SDA', mda:'MDA', acc:'ACC', nip:'NIP' };

                const pieData = {};
                dataRows.forEach(r => {
                    const n = (r[idxCat]||'').trim().toLowerCase();
                    const v = parseFloat((r[idxSum]||'').toString().replace(/\s/g,'').replace(',','.')) || 0;
                    PIE_KEYS.forEach(k => { if (n === k) pieData[k] = v; });
                });

                const pieTotal = PIE_KEYS.reduce((s,k) => s + (pieData[k]||0), 0);
                if (pieTotal > 0) {
                    document.getElementById('catChartWrap').style.display = 'block';
                    const canvas = document.getElementById('catPieCanvas');
                    const dpr = window.devicePixelRatio || 1;
                    const wrap = document.getElementById('catChartWrap');
                    const SIZE = Math.min(wrap.offsetWidth - 32 || 280, 280);
                    const FULL = Math.round(SIZE * 1.35); // більше місця для зовнішніх підписів
                    canvas.width  = FULL * dpr;
                    canvas.height = FULL * dpr;
                    canvas.style.width  = FULL + 'px';
                    canvas.style.height = FULL + 'px';
                    const ctx = canvas.getContext('2d');
                    ctx.scale(dpr, dpr);
                    const cx = FULL/2, cy = FULL/2;
                    const R = SIZE*0.36, ri = SIZE*0.21;
                    const ROUT = SIZE*0.44;
                    const RTXT = SIZE*0.52;
                    let angle = -Math.PI/2;

                    const slices = PIE_KEYS
                        .filter(k => (pieData[k]||0) > 0)
                        .map(k => ({ key:k, val:pieData[k], pct:pieData[k]/pieTotal, color:PIE_COLORS[PIE_KEYS.indexOf(k)] }));

                    // 1. малюємо сектори
                    slices.forEach(s => {
                        const sweep = s.pct * 2 * Math.PI;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.arc(cx, cy, R, angle, angle+sweep);
                        ctx.closePath();
                        ctx.fillStyle = s.color;
                        ctx.fill();
                        ctx.strokeStyle = '#f5f5f7';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        angle += sweep;
                    });

                    // 2. дірка
                    ctx.beginPath();
                    ctx.arc(cx, cy, ri, 0, 2*Math.PI);
                    ctx.fillStyle = '#f5f5f7';
                    ctx.fill();

                    // 3. центр текст
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#1d1d1f';
                    ctx.font = `700 ${Math.round(SIZE*0.052)}px Inter,sans-serif`;
                    ctx.fillText('Структура', cx, cy - SIZE*0.038);
                    ctx.fillStyle = '#86868b';
                    ctx.font = `500 ${Math.round(SIZE*0.036)}px Inter,sans-serif`;
                    ctx.fillText('продажів', cx, cy + SIZE*0.04);

                    // 4. підписи зовні з лінією
                    angle = -Math.PI/2;
                    const fontSize = Math.round(SIZE*0.036);
                    slices.forEach(s => {
                        const sweep = s.pct * 2 * Math.PI;
                        const mid = angle + sweep/2;

                        // точка на краю сектора
                        const x1 = cx + R*0.92*Math.cos(mid);
                        const y1 = cy + R*0.92*Math.sin(mid);
                        // точка зовні кола
                        const x2 = cx + ROUT*Math.cos(mid);
                        const y2 = cy + ROUT*Math.sin(mid);
                        // точка тексту
                        const tx = cx + RTXT*Math.cos(mid);
                        const ty = cy + RTXT*Math.sin(mid);

                        // лінія
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = s.color;
                        ctx.lineWidth = 1.2;
                        ctx.stroke();

                        // текст: назва + %
                        const label = PIE_LABELS[s.key];
                        const pctStr = (s.pct*100).toFixed(1)+'%';
                        ctx.textAlign = tx > cx ? 'left' : 'right';
                        ctx.textBaseline = 'middle';

                        // назва категорії
                        ctx.fillStyle = '#1d1d1f';
                        ctx.font = `700 ${fontSize}px Inter,sans-serif`;
                        ctx.fillText(label, tx, ty - fontSize*0.6);

                        // %
                        ctx.fillStyle = s.color;
                        ctx.font = `600 ${fontSize}px Inter,sans-serif`;
                        ctx.fillText(pctStr, tx, ty + fontSize*0.6);

                        angle += sweep;
                    });

                    // легенда
                    const legend = document.getElementById('catLegend');
                    legend.innerHTML = '';
                    slices.forEach(s => {
                        const item = document.createElement('div');
                        item.style.cssText = 'display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f2f2f4;';
                        item.innerHTML = `
                            <span style="width:11px;height:11px;border-radius:3px;background:${s.color};flex-shrink:0;display:inline-block"></span>
                            <span style="font-size:13px;font-weight:700;color:#1d1d1f">${PIE_LABELS[s.key]}</span>
                            <span style="font-size:11px;color:#86868b;flex:1">${Math.round(s.val).toLocaleString('uk-UA')} ₴</span>
                            <span style="font-size:13px;font-weight:700;color:${s.color}">${(s.pct*100).toFixed(1)}%</span>`;
                        legend.appendChild(item);
                    });
                }
            } catch(e) {
                grid.innerHTML = `<div style="grid-column:1/-1;padding:20px;text-align:center;color:#ff3b30;font-size:13px;font-weight:600">❌ ${e.message}</div>`;
            }
        }

        loadCategories();
    </script>
